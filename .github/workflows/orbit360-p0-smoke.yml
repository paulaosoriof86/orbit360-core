name: Orbit 360 P0 Smoke

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'orbit360-platform/core/importa-polizas-p0.js'
      - 'orbit360-platform/core/importa-cartera-p0.js'
      - 'orbit360-platform/core/importa-comisiones-p0.js'
      - 'orbit360-platform/core/importa-banco-comisiones-p0.js'
      - 'orbit360-platform/core/importa-write-p0.js'
      - 'orbit360-platform/modules/importar-p0-dashboard.js'
      - 'tools/orbit360-p0-dryrun-manifest-20260709.mjs'
      - 'tools/orbit360-test-importa-polizas-p0.mjs'
      - 'tools/orbit360-test-importa-cartera-p0.mjs'
      - 'tools/orbit360-test-importa-comisiones-p0.mjs'
      - 'tools/orbit360-test-importa-banco-comisiones-p0.mjs'
      - 'tools/orbit360-test-importa-write-p0.mjs'
      - 'tools/orbit360-test-importar-p0-dashboard.mjs'
      - 'tools/orbit360-test-p0-dryrun-manifest.mjs'
      - 'tools/orbit360-validar-backend-lab-contrato.mjs'
      - '.github/workflows/orbit360-p0-smoke.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'orbit360-platform/core/importa-polizas-p0.js'
      - 'orbit360-platform/core/importa-cartera-p0.js'
      - 'orbit360-platform/core/importa-comisiones-p0.js'
      - 'orbit360-platform/core/importa-banco-comisiones-p0.js'
      - 'orbit360-platform/core/importa-write-p0.js'
      - 'orbit360-platform/modules/importar-p0-dashboard.js'
      - 'tools/orbit360-p0-dryrun-manifest-20260709.mjs'
      - 'tools/orbit360-test-importa-polizas-p0.mjs'
      - 'tools/orbit360-test-importa-cartera-p0.mjs'
      - 'tools/orbit360-test-importa-comisiones-p0.mjs'
      - 'tools/orbit360-test-importa-banco-comisiones-p0.mjs'
      - 'tools/orbit360-test-importa-write-p0.mjs'
      - 'tools/orbit360-test-importar-p0-dashboard.mjs'
      - 'tools/orbit360-test-p0-dryrun-manifest.mjs'
      - 'tools/orbit360-validar-backend-lab-contrato.mjs'
      - '.github/workflows/orbit360-p0-smoke.yml'

permissions:
  contents: read

jobs:
  p0-smoke:
    name: P0 importadores backend smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check policy rules syntax
        run: node --check orbit360-platform/core/importa-polizas-p0.js

      - name: Check cartera rules syntax
        run: node --check orbit360-platform/core/importa-cartera-p0.js

      - name: Check commission rules syntax
        run: node --check orbit360-platform/core/importa-comisiones-p0.js

      - name: Check bank commission rules syntax
        run: node --check orbit360-platform/core/importa-banco-comisiones-p0.js

      - name: Check controlled write syntax
        run: node --check orbit360-platform/core/importa-write-p0.js

      - name: Check dashboard syntax
        run: node --check orbit360-platform/modules/importar-p0-dashboard.js

      - name: Check dry-run manifest syntax
        run: node --check tools/orbit360-p0-dryrun-manifest-20260709.mjs

      - name: Check policy smoke syntax
        run: node --check tools/orbit360-test-importa-polizas-p0.mjs

      - name: Check cartera smoke syntax
        run: node --check tools/orbit360-test-importa-cartera-p0.mjs

      - name: Check commission smoke syntax
        run: node --check tools/orbit360-test-importa-comisiones-p0.mjs

      - name: Check bank commission smoke syntax
        run: node --check tools/orbit360-test-importa-banco-comisiones-p0.mjs

      - name: Check controlled write smoke syntax
        run: node --check tools/orbit360-test-importa-write-p0.mjs

      - name: Check dashboard smoke syntax
        run: node --check tools/orbit360-test-importar-p0-dashboard.mjs

      - name: Check dry-run manifest smoke syntax
        run: node --check tools/orbit360-test-p0-dryrun-manifest.mjs

      - name: Run policy smoke
        run: node tools/orbit360-test-importa-polizas-p0.mjs

      - name: Run cartera smoke
        run: node tools/orbit360-test-importa-cartera-p0.mjs

      - name: Run commission smoke
        run: node tools/orbit360-test-importa-comisiones-p0.mjs

      - name: Run bank commission smoke
        run: node tools/orbit360-test-importa-banco-comisiones-p0.mjs

      - name: Run controlled write smoke
        run: node tools/orbit360-test-importa-write-p0.mjs

      - name: Run dashboard smoke
        run: node tools/orbit360-test-importar-p0-dashboard.mjs

      - name: Run dry-run manifest smoke
        run: node tools/orbit360-test-p0-dryrun-manifest.mjs

      - name: Run backend LAB validator if available
        run: |
          if [ -f tools/orbit360-validar-backend-lab-contrato.mjs ]; then
            node tools/orbit360-validar-backend-lab-contrato.mjs
          else
            echo "Validator not present; skipping."
          fi
