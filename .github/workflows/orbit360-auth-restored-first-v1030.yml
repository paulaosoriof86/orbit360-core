name: Orbit 360 Apply Restored Session Patch

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - "tools/orbit360-patch-auth-restored-first-v20260718.mjs"
      - ".github/workflows/orbit360-auth-restored-first-v1030.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2

      - name: Aplicar refinamiento exacto
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-patch-auth-restored-first-v20260718.mjs
          node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          if ! grep -Fq "## Refinamiento de sesión restaurada" orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-GATE-AUTH-LEGAL-EXTERNO-20260718.md; then
            printf '\n## Refinamiento de sesión restaurada\n\nLa corrida externa confirmó que Firebase puede restaurar la sesión y ocultar el acceso antes de que el gate busque el formulario. El gate observa primero `body.pre-auth` y `#login.hidden`; solo exige campos visibles cuando la página continúa realmente en estado de acceso.\n' >> orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-GATE-AUTH-LEGAL-EXTERNO-20260718.md
          fi

      - name: Preflight vinculante
        shell: bash
        env:
          ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
        run: |
          set -euo pipefail
          node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717
          test "$(jq -r '.status' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = "GO_GATE_CONTRACT"
          test "$(jq -r '.failed' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = "0"

      - name: Publicar refinamiento y limpiar temporales
        shell: bash
        run: |
          set -euo pipefail
          git rm tools/orbit360-patch-auth-restored-first-v20260718.mjs
          git rm .github/workflows/orbit360-auth-restored-first-v1030.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-GATE-AUTH-LEGAL-EXTERNO-20260718.md
          git commit -m "fix(block1): observe restored session before login form"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
