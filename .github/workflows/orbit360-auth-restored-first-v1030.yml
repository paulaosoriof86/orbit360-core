name: Orbit 360 Auth Restored First
on:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths: [".github/workflows/orbit360-auth-restored-first-v1030.yml"]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2
      - name: Corregir orden del gate de autenticación
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs')
          source = path.read_text()
          old = '''  await bounded('authentication_form_ready', async () => {
            const form = page.locator('#login-form');
            await form.waitFor({ state: 'visible', timeout: 20000 });
            requireState(await form.getAttribute('data-auth-mode') === 'firestore-lab', 'AUTH_FORM_MODE_INVALID');
            await page.locator('#lg-user').waitFor({ state: 'visible', timeout: 10000 });
            await page.locator('#lg-pass').waitFor({ state: 'visible', timeout: 10000 });
          }, 24000);

          const bodyClass = String(await page.locator('body').getAttribute('class') || '');
          if (!bodyClass.split(/\\s+/).includes('pre-auth')) {
            report.authMode = 'session_restored_external_ui';
            report.checks.authenticated = true;
            return;
          }
'''
          new = '''  const entryState = await bounded('authentication_form_ready', async () => {
            const body = page.locator('body');
            const login = page.locator('#login');
            await body.waitFor({ state: 'attached', timeout: 12000 });
            await login.waitFor({ state: 'attached', timeout: 12000 });
            const bodyClass = String(await body.getAttribute('class') || '');
            const loginClass = String(await login.getAttribute('class') || '');
            const restored = !bodyClass.split(/\\s+/).includes('pre-auth') || loginClass.split(/\\s+/).includes('hidden');
            if (restored) return { restored: true };

            const form = page.locator('#login-form');
            await form.waitFor({ state: 'visible', timeout: 20000 });
            requireState(await form.getAttribute('data-auth-mode') === 'firestore-lab', 'AUTH_FORM_MODE_INVALID');
            await page.locator('#lg-user').waitFor({ state: 'visible', timeout: 10000 });
            await page.locator('#lg-pass').waitFor({ state: 'visible', timeout: 10000 });
            return { restored: false };
          }, 26000);

          if (entryState && entryState.restored) {
            report.authMode = 'session_restored_external_ui';
            report.checks.authenticated = true;
            return;
          }
'''
          assert old in source, 'AUTH_FORM_READY_BLOCK_NOT_FOUND'
          path.write_text(source.replace(old, new, 1))
          PY

          cat >> orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-GATE-AUTH-LEGAL-EXTERNO-20260718.md <<'DOC'

          ## Refinamiento de sesión restaurada

          La primera corrida externa mostró que Firebase ya podía restaurar la sesión y ocultar `#login` antes de que el gate buscara el formulario. El gate ahora observa primero `body.pre-auth` y `#login.hidden`; solo exige campos visibles cuando la página continúa en estado de acceso.
          DOC

          node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          git rm .github/workflows/orbit360-auth-restored-first-v1030.yml
      - name: Preflight vinculante
        shell: bash
        env:
          ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
        run: |
          set -euo pipefail
          node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717
          test "$(jq -r '.status' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = GO_GATE_CONTRACT
          test "$(jq -r '.failed' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = 0
      - name: Publicar refinamiento
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-GATE-AUTH-LEGAL-EXTERNO-20260718.md
          git commit -m "fix(block1): observe restored session before login form"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
