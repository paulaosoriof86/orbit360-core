name: Orbit 360 Preflight Tenant Bootstrap
on:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths: [".github/workflows/orbit360-preflight-tenant-bootstrap-v1028.yml"]
permissions:
  contents: write
jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2
      - name: Validar contrato fusionado
        shell: bash
        env:
          ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
        run: |
          set -euo pipefail
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node --check orbit360-platform/core/router-tenant-config-bootstrap.js
          node --check orbit360-platform/core/router.js
          node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717
          test "$(jq -r '.status' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = GO_GATE_CONTRACT
          test "$(jq -r '.failed' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = 0
          cp orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json .github/orbit360-v1028-preflight-status.json
          git rm .github/workflows/orbit360-preflight-tenant-bootstrap-v1028.yml
      - name: Persistir resultado sanitizado
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/orbit360-v1028-preflight-status.json
          git commit -m "test(block1): tenant bootstrap preflight result [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
