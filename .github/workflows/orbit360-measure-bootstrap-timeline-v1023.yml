name: Orbit 360 Measure Bootstrap Timeline 1.0.23

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-measure-bootstrap-timeline-v1023.yml"

permissions:
  contents: read

jobs:
  measure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
      - name: Instalar navegador
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Medir bootstrap solo con eventos externos
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p orbit360-bootstrap-timeline
          cat > /tmp/measure-bootstrap.mjs <<'NODE'
          import { chromium } from 'playwright';
          import { writeFileSync } from 'node:fs';
          const url='https://ays-orbit-360-lab--orbit360-ays-lab-fj1zxnk2.web.app/index.html?orbitBackend=firestore-lab&tenant=alianzas-soluciones&runtime=20260717-2#/aseguradoras';
          const report={schemaVersion:'orbit360-bootstrap-timeline-v2',containsPII:false,containsSecrets:false,startedAt:new Date().toISOString(),milestones:{},runtimeSignals:[],pageErrors:[],badResponses:[],lastRequestFinished:null,result:null,diagnosticError:null};
          const started=Date.now();
          const ms=()=>Date.now()-started;
          const pathOf=value=>{try{return new URL(value).pathname}catch{return ''}};
          let browser=null;
          try {
            browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:1440,height:1000}});
            const cdp=await page.context().newCDPSession(page);
            await cdp.send('Debugger.enable');
            await cdp.send('DOM.enable');
            cdp.on('Debugger.scriptParsed',event=>{
              const path=pathOf(event.url);
              const key=path==='/data/store.js'?'storeParsedMs':path==='/core/auth.js'?'authParsedMs':path==='/core/router.js'?'routerParsedMs':path==='/core/pwa.js'?'pwaParsedMs':'';
              if(key&&report.milestones[key]==null)report.milestones[key]=ms();
            });
            cdp.on('Debugger.scriptFailedToParse',event=>{
              const path=pathOf(event.url);
              if(path==='/data/store.js'||path==='/core/auth.js'||path==='/core/router.js'||path==='/core/pwa.js')report.badResponses.push({type:'scriptFailedToParse',path,ms:ms()});
            });
            page.on('requestfinished',request=>{
              report.lastRequestFinished={path:pathOf(request.url()),type:request.resourceType(),ms:ms()};
              if(report.lastRequestFinished.path==='/core/novedades.js'&&report.milestones.novedadesFinishedMs==null)report.milestones.novedadesFinishedMs=ms();
            });
            page.on('response',response=>{if(response.status()>=400&&report.badResponses.length<20)report.badResponses.push({type:'http',path:pathOf(response.url()),status:response.status(),ms:ms()});});
            page.on('pageerror',error=>{if(report.pageErrors.length<12)report.pageErrors.push({name:String(error&&error.name||''),message:String(error&&error.message||'').slice(0,300),ms:ms()});});
            page.on('console',message=>{
              const text=String(message.text()||'');
              if(!text.startsWith('ORBIT360_RUNTIME_SIGNAL:'))return;
              if(report.runtimeSignals.length<80)report.runtimeSignals.push({text,ms:ms()});
              if(text==='ORBIT360_RUNTIME_SIGNAL:router-ready:1'&&report.milestones.routerReadySignalMs==null)report.milestones.routerReadySignalMs=ms();
              if(text.includes('ORBIT360_RUNTIME_SIGNAL:contract-requested:')&&report.milestones.firstContractRequestedMs==null)report.milestones.firstContractRequestedMs=ms();
            });
            try { await page.goto(url,{waitUntil:'commit',timeout:30000}); report.milestones.navigationCommittedMs=ms(); }
            catch(error) { report.navigationError=String(error&&error.message||error).slice(0,300); }
            const deadline=Date.now()+180000;
            while(Date.now()<deadline){
              try {
                const doc=await cdp.send('DOM.getDocument',{depth:1,pierce:true});
                const form=await cdp.send('DOM.querySelector',{nodeId:doc.root.nodeId,selector:'#login-form'});
                if(form.nodeId){
                  const attrs=await cdp.send('DOM.getAttributes',{nodeId:form.nodeId});
                  for(let i=0;i<attrs.attributes.length;i+=2){
                    if(attrs.attributes[i]==='data-auth-mode'&&attrs.attributes[i+1]==='firestore-lab'&&report.milestones.authModeReadyMs==null)report.milestones.authModeReadyMs=ms();
                  }
                }
              } catch(error) {
                if(!report.domError)report.domError=String(error&&error.message||error).slice(0,300);
              }
              if(report.milestones.authModeReadyMs!=null&&report.milestones.routerParsedMs!=null&&report.milestones.firstContractRequestedMs!=null)break;
              await new Promise(resolve=>setTimeout(resolve,250));
            }
            report.result={complete:Boolean(report.milestones.authModeReadyMs!=null&&report.milestones.routerParsedMs!=null&&report.milestones.firstContractRequestedMs!=null),elapsedMs:ms(),pageErrorCount:report.pageErrors.length,badResponseCount:report.badResponses.length};
          } catch(error) {
            report.diagnosticError={name:String(error&&error.name||''),message:String(error&&error.message||error).slice(0,500),stack:String(error&&error.stack||'').replace(/\/home\/runner\/work\/[^\s]+/g,'[workspace]').slice(0,1200)};
          } finally {
            report.finishedAt=new Date().toISOString();
            writeFileSync('orbit360-bootstrap-timeline/timeline.json',JSON.stringify(report,null,2)+'\n');
            if(browser)await Promise.race([browser.close().catch(()=>{}),new Promise(resolve=>setTimeout(resolve,5000))]);
          }
          NODE
          node /tmp/measure-bootstrap.mjs || true
      - name: Publicar medición sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-bootstrap-timeline-v1023
          path: orbit360-bootstrap-timeline/timeline.json
          retention-days: 3
          if-no-files-found: error
      - name: Marcar corrida diagnóstica
        if: always()
        shell: bash
        run: exit 1
