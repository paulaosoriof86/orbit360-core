name: Orbit 360 Secure Handoff Module Resolution Fix 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: orbit360-secure-handoff-module-resolution-fix-v20260720
  cancel-in-progress: false

jobs:
  fix_module_resolution:
    name: Aseguradoras · corregir mecanismo de carga Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      TARGET: tools/orbit360-apply-secure-credentials-handoff-v20260720.mjs
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "ays/backend-tenant-lab-v99-20260703"
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Instalar dependencias declaradas
        shell: bash
        run: |
          set -euo pipefail
          npm install --prefix functions --ignore-scripts --no-audit --no-fund
          npm --prefix functions run check

      - name: Corregir exclusivamente resolución de módulos
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const path = process.env.TARGET;
          let source = readFileSync(path, 'utf8');
          const before = `const require = createRequire(import.meta.url);
          const { initializeApp, cert, getApps } = require('../functions/node_modules/firebase-admin/app');
          const { getAuth } = require('../functions/node_modules/firebase-admin/auth');
          const { getFirestore } = require('../functions/node_modules/firebase-admin/firestore');`;
          const after = `const require = createRequire(new URL('../functions/package.json', import.meta.url));
          const { initializeApp, cert, getApps } = require('firebase-admin/app');
          const { getAuth } = require('firebase-admin/auth');
          const { getFirestore } = require('firebase-admin/firestore');`;
          if (source.includes(after)) {
            console.log('Resolución ya corregida');
          } else {
            if (!source.includes(before)) throw new Error('MODULE_RESOLUTION_SIGNATURE_NOT_FOUND');
            source = source.replace(before, after);
            writeFileSync(path, source);
          }
          NODE

      - name: Validar mecanismo corregido
        shell: bash
        run: |
          set -euo pipefail
          node --check "$TARGET"
          node - <<'NODE'
          const { createRequire } = require('node:module');
          const { pathToFileURL } = require('node:url');
          const { resolve } = require('node:path');
          const req = createRequire(pathToFileURL(resolve('functions/package.json')));
          const app = req('firebase-admin/app');
          const auth = req('firebase-admin/auth');
          const firestore = req('firebase-admin/firestore');
          if (!app.initializeApp || !auth.getAuth || !firestore.getFirestore) process.exit(41);
          console.log('GO_FIREBASE_ADMIN_MODULE_RESOLUTION');
          NODE
          grep -Fq "createRequire(new URL('../functions/package.json', import.meta.url))" "$TARGET"
          grep -Fq "require('firebase-admin/app')" "$TARGET"

      - name: Persistir corrección validada
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "orbit360-gate-bot"
          git config user.email "orbit360-gate-bot@users.noreply.github.com"
          git add "$TARGET"
          if git diff --cached --quiet; then echo 'Sin cambios'; exit 0; fi
          git commit -m "fix(security): resolver firebase-admin desde package contract [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703

      - name: Comentar diagnóstico sanitizado en PR 5
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body '### Causa raíz del primer intento de handoff\n\n- Clasificación: **PIPELINE_MECHANISM_FAILURE**\n- Capa corregida: resolución local de `firebase-admin` en el ejecutor efímero.\n- Validación: `GO_FIREBASE_ADMIN_MODULE_RESOLUTION`\n- Datos modificados: **ninguno**\n- Secretos expuestos: **ninguno**\n- Run: `'$GITHUB_RUN_ID'`\n- Commit evaluado: `'$GITHUB_SHA'`\n\nNo se reintentó la importación durante este diagnóstico.'
