name: Orbit 360 Secure Target Bridge Deploy LAB 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - .github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy_bridge:
    name: Aseguradoras · validar y publicar puente seguro
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      SA_PRIMARY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Validar archivos del puente
        shell: bash
        run: |
          set -euo pipefail
          node --check orbit360-platform/core/insurer-secure-target-bridge-v20260720.js
          node --check orbit360-platform/core/router-tenant-config-bootstrap.js
          grep -Fq '__insurerSecureTargetBridgeV20260720' orbit360-platform/core/insurer-secure-target-bridge-v20260720.js
          grep -Fq 'insurer-secure-target-bridge-v20260720.js?v=20260720-1' orbit360-platform/core/router-tenant-config-bootstrap.js

      - name: Resolver cuenta LAB
        shell: bash
        run: |
          set -euo pipefail
          FILE="${RUNNER_TEMP}/lab.json"
          printf '%s' "$SA_PRIMARY" > "$FILE"
          chmod 600 "$FILE"
          test "$(jq -r '.project_id // empty' "$FILE")" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$FILE" >> "$GITHUB_ENV"

      - name: Publicar y verificar canal LAB
        shell: bash
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/deploy.json"
          npx --yes firebase-tools@latest hosting:channel:deploy orbit360-ays-lab --project "$FIREBASE_PROJECT_ID" --expires 30d --non-interactive --json | tee "$OUT"
          URL="$(jq -r '.. | strings | select(test("^https://[^/]*--orbit360-ays-lab[^/]*\\.(web\\.app|firebaseapp\\.com)$"))' "$OUT" | head -n 1)"
          test -n "$URL"
          BRIDGE="$(curl -fsSL --retry 8 --retry-delay 2 --retry-all-errors -H 'Cache-Control: no-cache' "$URL/core/insurer-secure-target-bridge-v20260720.js?run=$GITHUB_RUN_ID")"
          BOOT="$(curl -fsSL --retry 8 --retry-delay 2 --retry-all-errors -H 'Cache-Control: no-cache' "$URL/core/router-tenant-config-bootstrap.js?run=$GITHUB_RUN_ID")"
          printf '%s' "$BRIDGE" | grep -Fq '__insurerSecureTargetBridgeV20260720'
          printf '%s' "$BOOT" | grep -Fq 'insurer-secure-target-bridge-v20260720.js?v=20260720-1'
          echo "LAB_URL=$URL" >> "$GITHUB_ENV"

      - name: Limpiar archivo temporal
        if: always()
        run: rm -f "${GOOGLE_APPLICATION_CREDENTIALS:-/nonexistent}"

      - name: Comentar cierre
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body "Puente seguro aseguradora–portal publicado y verificado. Run: $GITHUB_RUN_ID. LAB: $LAB_URL."
