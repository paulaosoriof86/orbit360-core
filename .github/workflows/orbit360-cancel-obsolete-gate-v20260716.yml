name: Orbit 360 Insurer Credential Inventory Read Only 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: orbit360-insurer-credential-inventory-readonly-v20260720
  cancel-in-progress: false

jobs:
  inventory:
    name: Aseguradoras · inventario credenciales sin valores
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        env:
          ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
        run: |
          set -euo pipefail
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Resolver cuenta de servicio LAB
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then echo "BLOQUEO_SECRET_LAB"; exit 42; fi
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencia de lectura
        run: npm install --no-save firebase-admin@13

      - name: Inventariar estado de credenciales sin revelar valores
        run: |
          set -euo pipefail
          mkdir -p orbit360-platform/runtime-gate-crm-v20260716
          node <<'NODE'
          const fs = require('fs');
          const { applicationDefault, initializeApp } = require('firebase-admin/app');
          const { getFirestore } = require('firebase-admin/firestore');
          const projectId = 'ays-orbit-360-lab';
          const tenantId = 'alianzas-soluciones';
          const clean = value => String(value == null ? '' : value).trim();
          const first = (row, keys) => {
            for (const key of keys) {
              const value = clean(row && row[key]);
              if (value) return value;
            }
            return '';
          };
          const app = initializeApp({ credential: applicationDefault(), projectId });
          const db = getFirestore(app);
          (async () => {
            const snap = await db.collection('tenantId').doc(tenantId).collection('aseguradoras').get();
            const report = {
              schemaVersion: 'orbit360-insurer-credential-inventory-v1',
              generatedAt: new Date().toISOString(),
              tenantId,
              readOnly: true,
              containsPII: false,
              containsSecrets: false,
              insurers: snap.size,
              countries: {},
              portals: {
                total: 0,
                directUsername: 0,
                directPassword: 0,
                directComplete: 0,
                directPartial: 0,
                realCredentialRef: 0,
                backendRequired: 0,
                secureAccessRefPending: 0,
                usernameHintOnly: 0,
                sourceTrace: 0,
                usableByExistingOwner: 0,
                pendingOnly: 0
              },
              accounts: {
                total: 0,
                directNumber: 0,
                realAccountRef: 0,
                backendRequired: 0
              },
              topLevelSensitiveFields: 0
            };
            for (const doc of snap.docs) {
              const data = doc.data() || {};
              const country = clean(data.pais || data.country || 'SIN_PAIS').toUpperCase();
              report.countries[country] = (report.countries[country] || 0) + 1;
              if (first(data, ['usuario','user','username','password','pass','contrasena','clave'])) report.topLevelSensitiveFields += 1;
              const portals = [].concat(data.portales || data.plataformas || []);
              for (const portal of portals) {
                report.portals.total += 1;
                const username = first(portal, ['usuario','user','username']);
                const password = first(portal, ['password','pass','contrasena','clave']);
                const ref = first(portal, ['credentialRef','secretRef']);
                const secureRef = first(portal, ['secureAccessRef']);
                const hint = first(portal, ['usuarioHint','usernameHint']);
                const realRef = Boolean(ref && ref !== 'backend_required');
                const pendingRef = ref === 'backend_required' || secureRef === 'backend_required';
                if (username) report.portals.directUsername += 1;
                if (password) report.portals.directPassword += 1;
                if (username && password) report.portals.directComplete += 1;
                else if (username || password) report.portals.directPartial += 1;
                if (realRef) report.portals.realCredentialRef += 1;
                if (ref === 'backend_required') report.portals.backendRequired += 1;
                if (secureRef === 'backend_required') report.portals.secureAccessRefPending += 1;
                if (hint && !username) report.portals.usernameHintOnly += 1;
                if (portal.fuenteTraza || portal.sourceTrace) report.portals.sourceTrace += 1;
                if (username || password || realRef) report.portals.usableByExistingOwner += 1;
                if (!username && !password && !realRef && pendingRef) report.portals.pendingOnly += 1;
              }
              const accounts = [].concat(data.cuentas || data.bankAccounts || []);
              for (const account of accounts) {
                report.accounts.total += 1;
                const number = first(account, ['numero','accountNumber']);
                const ref = first(account, ['accountRef','numeroRef']);
                if (number) report.accounts.directNumber += 1;
                if (ref && ref !== 'backend_required') report.accounts.realAccountRef += 1;
                if (ref === 'backend_required') report.accounts.backendRequired += 1;
              }
            }
            report.classification = report.portals.usableByExistingOwner > 0
              ? 'FUNCTIONAL_DEFECT_OR_OWNER_NOT_LOADED'
              : (report.portals.pendingOnly > 0 ? 'DATA_CONTRACT_FAILURE_IMPORTER_DROPPED_VALUES' : 'NO_CREDENTIALS_IN_LAB_RECORDS');
            fs.writeFileSync('orbit360-platform/runtime-gate-crm-v20260716/insurer-credential-inventory-sanitized.json', JSON.stringify(report, null, 2) + '\n');
            console.log('ORBIT360_CREDENTIAL_INVENTORY:' + JSON.stringify({
              insurers: report.insurers,
              portals: report.portals,
              accounts: report.accounts,
              classification: report.classification
            }));
          })().catch(error => {
            console.error(String(error && (error.code || error.message) || error).replace(/[^a-z0-9_/:.-]/gi, '').slice(0,160));
            process.exit(1);
          });
          NODE

      - name: Publicar evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-insurer-credential-inventory-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/insurer-credential-inventory-sanitized.json
          if-no-files-found: error
          retention-days: 7

      - name: Comentar resultado sanitizado en PR 5
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILE="orbit360-platform/runtime-gate-crm-v20260716/insurer-credential-inventory-sanitized.json"
          test -f "$FILE"
          node <<'NODE' > /tmp/credential-inventory-comment.md
          const fs = require('fs');
          const d = JSON.parse(fs.readFileSync('orbit360-platform/runtime-gate-crm-v20260716/insurer-credential-inventory-sanitized.json','utf8'));
          process.stdout.write([
            '### Inventario sanitizado · credenciales Aseguradoras',
            '',
            '- Solo lectura: `' + d.readOnly + '`',
            '- Aseguradoras: `' + d.insurers + '`',
            '- Portales: `' + d.portals.total + '`',
            '- Accesos directos completos: `' + d.portals.directComplete + '`',
            '- Accesos directos parciales: `' + d.portals.directPartial + '`',
            '- Referencias seguras reales: `' + d.portals.realCredentialRef + '`',
            '- Referencias pendientes: `' + (d.portals.backendRequired + d.portals.secureAccessRefPending) + '`',
            '- Utilizables por el owner existente: `' + d.portals.usableByExistingOwner + '`',
            '- Pendientes sin valor ni referencia real: `' + d.portals.pendingOnly + '`',
            '- Clasificación: **' + d.classification + '**',
            '- Run: `' + process.env.GITHUB_RUN_ID + '`',
            '',
            'No se leyeron ni publicaron valores, nombres, usuarios, contraseñas, URLs, cuentas o identificadores.'
          ].join('\n'));
          NODE
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body-file /tmp/credential-inventory-comment.md

      - name: Alto controlado para obtener evidencia observable
        if: always()
        run: exit 1

# Segundo disparo controlado: mismo diagnóstico, cero escrituras.
