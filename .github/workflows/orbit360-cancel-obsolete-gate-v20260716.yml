name: Orbit 360 Secure Credential Handoff Key 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: orbit360-secure-credential-handoff-key-v20260720
  cancel-in-progress: false

jobs:
  prepare_key:
    name: Aseguradoras · llave efímera para handoff cifrado
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      HANDOFF_SECRET_ID: orbit360-credential-handoff-key-20260720
      SA_PRIMARY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "ays/backend-tenant-lab-v99-20260703"
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Resolver principal LAB
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SA_PRIMARY:-}"
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SA_PRIMARY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"
          echo "DEPLOYER_EMAIL=$(jq -r '.client_email // empty' "$KEY_FILE")" >> "$GITHUB_ENV"

      - name: Instalar Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ays-orbit-360-lab

      - name: Crear llave efímera y guardar solo la privada en Secret Manager
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="orbit360-platform/runtime-gate-crm-v20260716"
          mkdir -p "$OUT_DIR"
          PRIVATE_KEY="${RUNNER_TEMP}/handoff-private.pem"
          PUBLIC_KEY="$OUT_DIR/handoff-public.pem"
          DIAG="$OUT_DIR/handoff-key-sanitized.json"

          gcloud auth activate-service-account "$DEPLOYER_EMAIL" --key-file="$GOOGLE_APPLICATION_CREDENTIALS" --project="$FIREBASE_PROJECT_ID" >/dev/null
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:4096 -out "$PRIVATE_KEY" >/dev/null 2>&1
          openssl pkey -in "$PRIVATE_KEY" -pubout -out "$PUBLIC_KEY" >/dev/null 2>&1
          chmod 600 "$PRIVATE_KEY"

          if gcloud secrets describe "$HANDOFF_SECRET_ID" --project "$FIREBASE_PROJECT_ID" >/dev/null 2>&1; then
            gcloud secrets versions add "$HANDOFF_SECRET_ID" --data-file="$PRIVATE_KEY" --project "$FIREBASE_PROJECT_ID" >/dev/null
          else
            gcloud secrets create "$HANDOFF_SECRET_ID" --replication-policy=automatic --data-file="$PRIVATE_KEY" --project "$FIREBASE_PROJECT_ID" >/dev/null
          fi

          FINGERPRINT="$(openssl pkey -pubin -in "$PUBLIC_KEY" -outform DER 2>/dev/null | sha256sum | awk '{print $1}')"
          jq -n \
            --arg run "$GITHUB_RUN_ID" \
            --arg commit "$GITHUB_SHA" \
            --arg fingerprint "$FINGERPRINT" \
            '{schemaVersion:"orbit360-secure-handoff-key-v1",containsSecrets:false,containsPII:false,ok:true,keyReady:true,algorithm:"RSA-OAEP-4096+AES-256-GCM",run:$run,commit:$commit,publicKeyFingerprint:$fingerprint}' > "$DIAG"
          shred -u "$PRIVATE_KEY" || rm -f "$PRIVATE_KEY"

      - name: Publicar llave pública y evidencia sanitizada
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-secure-handoff-public-key-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/handoff-public.pem
            orbit360-platform/runtime-gate-crm-v20260716/handoff-key-sanitized.json
          if-no-files-found: error
          retention-days: 1

      - name: Comentar resultado sanitizado en PR 5
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          FILE="orbit360-platform/runtime-gate-crm-v20260716/handoff-key-sanitized.json"
          FINGERPRINT="$(jq -r '.publicKeyFingerprint' "$FILE")"
          printf -v BODY '### Handoff cifrado efímero · llave preparada\n\n- Resultado: **OK**\n- Algoritmo: `RSA-OAEP-4096 + AES-256-GCM`\n- Huella pública: `%s`\n- Run: `%s`\n- Commit: `%s`\n\nLa llave privada temporal permanece exclusivamente en Secret Manager. El artefacto contiene solo la llave pública y evidencia sanitizada.' "$FINGERPRINT" "$GITHUB_RUN_ID" "$GITHUB_SHA"
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body "$BODY"
