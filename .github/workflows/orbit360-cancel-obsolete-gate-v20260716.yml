name: Orbit 360 M1 Preflight Isolated 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: orbit360-m1-preflight-isolated-v20260720
  cancel-in-progress: false

jobs:
  preflight_only:
    name: M1 · preflight aislado sin secretos ni deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Ejecutar contrato vinculante
        id: preflight
        continue-on-error: true
        env:
          ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
        run: |
          set +e
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          code=$?
          if [ "$code" = "0" ]; then
            node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717
            code=$?
          fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publicar evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-m1-preflight-isolated-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
          if-no-files-found: error
          retention-days: 7

      - name: Comentar resultado sanitizado en PR 5
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node - <<'NODE' > /tmp/preflight-comment.md
          const fs = require('fs');
          const file = 'orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json';
          let data = {};
          try { data = JSON.parse(fs.readFileSync(file, 'utf8')); } catch (_) {}
          const lines = [
            '### Preflight aislado vinculante · M1',
            '',
            '- Estado: **' + (data.status || 'SIN_EVIDENCIA') + '**',
            '- Clasificación: `' + (data.classification || 'NINGUNA') + '`',
            '- Contrato: `' + (data.contractVersion || '') + '`',
            '- Diagnóstico: `' + (data.diagnosticRevision || '') + '`',
            '- Checks: `' + (data.passed || 0) + '/' + (data.total || 0) + '`',
            '- Fallos: `' + (data.failed || 0) + '`',
            '- Run: `' + process.env.GITHUB_RUN_ID + '`',
            '- Commit: `' + process.env.GITHUB_SHA + '`',
            '',
            'Ejecución aislada: sin secretos, Firebase, sincronización, deploy, Playwright ni navegador.'
          ];
          if (Array.isArray(data.failedCheckIds) && data.failedCheckIds.length) {
            lines.push('', 'Checks fallidos:', '', ...data.failedCheckIds.slice(0, 15).map(x => '- `' + x + '`'));
          }
          process.stdout.write(lines.join('\n'));
          NODE
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body-file /tmp/preflight-comment.md

      - name: Alto controlado para obtener ID del run
        if: always()
        env:
          EXIT_CODE: ${{ steps.preflight.outputs.exit_code }}
        run: |
          test "${EXIT_CODE:-41}" = "0"
          echo "EVIDENCE_READY_EXPECTED_STOP"
          exit 78
