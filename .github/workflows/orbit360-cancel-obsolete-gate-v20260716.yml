name: Orbit 360 Importers E2E Parser Observer Fix 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - .github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  fix_observer:
    name: Importadores · corregir validador obsoleto de lectura
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ORBIT360_GATE_ID: importers-e2e-acceptance-lab-v20260720
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      ORBIT360_HOSTING_CHANNEL: orbit360-ays-lab
      ORBIT360_PREFLIGHT_EVIDENCE: orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "ays/backend-tenant-lab-v99-20260703"
          node tools/orbit360-validar-gate-contracts-v20260717.mjs importers-e2e-acceptance-lab-v20260720

      - name: Aplicar corrección determinista
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-fix-importers-e2e-parser-observer-v20260720.mjs
          node --check tools/orbit360-importers-e2e-browser-v20260720.mjs
          grep -Fq "observerVersion: '20260720.2'" tools/orbit360-importers-e2e-browser-v20260720.mjs
          grep -Fq "referencias de conexión detectadas|Credenciales detectadas" tools/orbit360-importers-e2e-browser-v20260720.mjs

      - name: Persistir únicamente el validador
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "orbit360-gate-bot"
          git config user.email "orbit360-gate-bot@users.noreply.github.com"
          git add tools/orbit360-importers-e2e-browser-v20260720.mjs
          git diff --cached --quiet && exit 0
          git commit -m "fix(validators): observar rótulo vigente del parser [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
