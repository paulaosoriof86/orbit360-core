name: Orbit 360 Secure Only Patched Smoke Diagnosis 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose_patched_smoke:
    name: Aseguradoras · diagnosticar respuesta del smoke parcheado
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      TARGET: orbit360-platform/core/insurer-directory-import-v1202.js
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        run: node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Aplicar patch únicamente en workspace diagnóstico
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import {readFileSync,writeFileSync} from 'node:fs';
          const path=process.env.TARGET; let source=readFileSync(path,'utf8');
          const start=source.indexOf('  async function applySecureOnly(result, confirmation) {');
          const marker='  applySecureOnly.__secureOnlyV20260720 = true;';
          const end=source.indexOf(marker,start);
          if(start<0||end<0) throw new Error('FUNCTION_NOT_FOUND');
          const replacement=`  function secureProviderReady() { return !!(Orbit.secureImport && typeof Orbit.secureImport.importInsurerDirectory === 'function'); }
          async function waitForSecureProvider(timeoutMs) {
            if (secureProviderReady()) return Orbit.secureImport.importInsurerDirectory;
            return new Promise(resolve => {
              let settled = false;
              const finish = () => { if (settled) return; settled = true; try { window.removeEventListener('orbit:insurer-credential-provider-ready', onReady); } catch (e) {} resolve(secureProviderReady() ? Orbit.secureImport.importInsurerDirectory : null); };
              const onReady = () => finish();
              try { window.addEventListener('orbit:insurer-credential-provider-ready', onReady, { once: true }); } catch (e) {}
              setTimeout(finish, Math.max(1000, Number(timeoutMs) || 8000));
            });
          }
          async function applySecureOnly(result, confirmation) {
            if (!canManage()) return { ok: false, errors: ['permiso_importacion_denegado'] };
            if (!result || !result.report) return { ok: false, errors: ['dry_run_requerido'] };
            if (!confirmation || confirmation.approved !== true || confirmation.phrase !== CONFIRM_PHRASE || !clean(confirmation.reason)) return { ok: false, errors: ['confirmacion_reforzada_requerida'] };
            const operations = result.report._operations || [];
            const blockedSheets = new Set(operations.filter(op => { const alerts=[].concat(op&&op.data&&op.data.validacionAlertas||[]); return alerts.some(alert => /entidad_no_es_aseguradora_directa|duplicado_dentro_del_archivo/.test(clean(alert))); }).map(op => op.sourceSheet));
            const sourceItems = secureSession.get(result.report.reportId) || [];
            const secureItems = sourceItems.filter(item => item && item.type === 'credential' && !blockedSheets.has(item.insurerSheet));
            if (!secureItems.length) return { ok: false, errors: ['sin_accesos_elegibles_para_guardar'], blockedSheets: blockedSheets.size };
            const secureProvider = await waitForSecureProvider(8000);
            if (typeof secureProvider !== 'function') return { ok: false, errors: ['proveedor_seguro_no_disponible'] };
            try {
              const remote = await secureProvider({ tenantId: tenantId(), sourceFileName: result.report.sourceFileName, sourceHash: result.report.sourceHash, items: secureItems });
              const imported = Number(remote && remote.imported || 0); const mappings=[].concat(remote&&remote.mappings||[]);
              if (!remote || remote.ok !== true || imported <= 0 || !mappings.length) throw new Error('confirmacion_remota_sin_accesos');
              secureSession.delete(result.report.reportId);
              return { ok:true, imported, requested:secureItems.length, skipped:Math.max(0,secureItems.length-imported), mappings, secureStatus:'confirmado_backend_seguro', blockedSheets:blockedSheets.size, containsSecrets:false };
            } catch(error) { return {ok:false,errors:['confirmacion_remota_incompleta'],errorCode:clean(error&&(error.code||error.message),120)}; }
          }
          applySecureOnly.__secureOnlyV20260720 = true;
          applySecureOnly.__secureOnlyProviderGateV20260720 = true;`;
          source=source.slice(0,start)+replacement+source.slice(end+marker.length);
          writeFileSync(path,source);
          NODE

      - name: Ejecutar smoke instrumentado sin fallar el job
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p orbit360-platform/runtime-gate-crm-v20260716
          export OUT_FILE=orbit360-platform/runtime-gate-crm-v20260716/secure-only-patched-smoke-diagnosis.json
          node <<'NODE'
          const fs=require('fs'),vm=require('vm');
          (async()=>{
            let providerCalls=0, exception=''; let applied=null; let securePayloadCount=0;
            try{
              const code=fs.readFileSync(process.env.TARGET,'utf8');
              const insurers=[{id:'asg_demo',nombre:'Aseguradora Diferente',pais:'GT',portales:[]}];
              const Orbit={store:{all:c=>c==='aseguradoras'?insurers:[],insert:()=>{},update:()=>{}},ui:{today:()=> '2026-07-20',esc:String,toast:()=>{},prompt:async()=>''},access:{activeRole:()=> 'Dirección',actorAdvisor:()=>({}),tenantId:()=> 'alianzas-soluciones',actorUser:()=>({nombre:'Dirección'})},secureImport:{importInsurerDirectory:async payload=>{providerCalls++;return {ok:true,imported:(payload.items||[]).length,mappings:(payload.items||[]).map((x,i)=>({credentialRef:'cred_'+String(i+1).padStart(32,'0')}))};}};
              const window={Orbit,addEventListener:()=>{},removeEventListener:()=>{},dispatchEvent:()=>{}};
              const context={window,Orbit,console,setTimeout,clearTimeout,URL,Map,Set,Promise,CustomEvent:function(){}}; vm.createContext(context); vm.runInContext(code,context);
              const rows=[['SEGUROS DIFERENTE'],[],['NOMBRE','CARGO','ÁREA','EXT.','EMAIL','CELULAR','OBSERVACIONES'],['Contacto','Ejecutiva','Comercial','','contacto@example.invalid','',''],['ACCESO AL SISTEMA EN LINEA'],['PRODUCTO','LINK','USUARIO','CONTRASEÑA'],['Portal','https://example.invalid','usuario-prueba','clave-prueba']];
              const result=context.Orbit.insurerDirectoryImport.parseMatrices({GENERAL:rows},{country:'GT',fileName:'synthetic.xlsx',captureSecure:true});
              securePayloadCount=result.securePayloadCount||0;
              applied=await context.Orbit.insurerDirectoryImport.applySecureOnly(result,{approved:true,phrase:'CONFIRMO DIRECTORIO',reason:'smoke'});
            }catch(error){exception=String(error&&error.message||error).slice(0,160);}
            const out={schemaVersion:'orbit360-secure-only-patched-smoke-diagnosis-v1',containsSecrets:false,containsPII:false,ok:true,phase:'completed',securePayloadCount,providerCalls,applyOk:Boolean(applied&&applied.ok),imported:Number(applied&&applied.imported||0),requested:Number(applied&&applied.requested||0),errors:[].concat(applied&&applied.errors||[]),errorCode:String(applied&&applied.errorCode||''),exception};
            fs.writeFileSync(process.env.OUT_FILE,JSON.stringify(out,null,2)); console.log(JSON.stringify(out));
          })();
          NODE

      - name: Publicar diagnóstico
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-secure-only-patched-smoke-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/secure-only-patched-smoke-diagnosis.json
          if-no-files-found: error
          retention-days: 7

      - name: Comentar diagnóstico
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          F=orbit360-platform/runtime-gate-crm-v20260716/secure-only-patched-smoke-diagnosis.json
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body "### Diagnóstico smoke parcheado secure-only\n\n- Payload: \`$(jq -r '.securePayloadCount' $F)\`\n- Llamadas proveedor: \`$(jq -r '.providerCalls' $F)\`\n- Resultado apply: \`$(jq -r '.applyOk' $F)\`\n- Importados: \`$(jq -r '.imported' $F)\`\n- Errores: \`$(jq -c '.errors' $F)\`\n- Excepción: \`$(jq -r '.exception' $F)\`\n- Run: \`$GITHUB_RUN_ID\`\n\nNo se modificó producto ni se usaron datos reales."
