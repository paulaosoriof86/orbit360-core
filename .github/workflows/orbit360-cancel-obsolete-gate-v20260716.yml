name: Orbit 360 Secure Access Audit Diagnosis LAB 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    name: Aseguradoras · distinguir proveedor no invocado vs refs no aplicadas
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      TENANT_ID: alianzas-soluciones
      SA_PRIMARY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "ays/backend-tenant-lab-v99-20260703"
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Resolver principal LAB
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SA_PRIMARY:-}"
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SA_PRIMARY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencias declaradas
        run: npm install --prefix functions --ignore-scripts --no-audit --no-fund

      - name: Leer únicamente auditoría sanitizada
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p orbit360-platform/runtime-gate-crm-v20260716
          export OUT_FILE=orbit360-platform/runtime-gate-crm-v20260716/secure-access-audit-diagnosis-sanitized.json
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { createRequire } from 'node:module';
          const require = createRequire(new URL('./functions/package.json', import.meta.url));
          const { initializeApp, cert, getApps } = require('firebase-admin/app');
          const { getFirestore } = require('firebase-admin/firestore');
          const env=process.env;
          const serviceAccount=JSON.parse(fs.readFileSync(env.GOOGLE_APPLICATION_CREDENTIALS,'utf8'));
          const app=getApps()[0]||initializeApp({credential:cert(serviceAccount),projectId:env.FIREBASE_PROJECT_ID});
          const db=getFirestore(app);
          const auditSnap=await db.collection('tenants').doc(env.TENANT_ID).collection('auditEvents').get();
          const counts={}; let importedCountTotal=0; let importEvents=0; let latestImportAt='';
          for(const doc of auditSnap.docs){
            const row=doc.data()||{}; const action=String(row.action||'');
            counts[action]=(counts[action]||0)+1;
            if(action==='credential.import'){
              importEvents+=1; importedCountTotal+=Number(row.count||0);
              const raw=row.createdAt; const iso=raw&&typeof raw.toDate==='function'?raw.toDate().toISOString():String(raw||'');
              if(iso>latestImportAt) latestImportAt=iso;
            }
          }
          const insurers=await db.collection('tenantId').doc(env.TENANT_ID).collection('aseguradoras').get();
          let refs=0, availableState=0, backendRequired=0;
          for(const doc of insurers.docs){
            for(const portal of (doc.data()?.portales||[])){
              const ref=String(portal?.credentialRef||'').trim();
              if(/^cred_[a-f0-9]{32}$/.test(ref)) refs+=1;
              if(ref==='backend_required') backendRequired+=1;
              if(String(portal?.estadoAcceso||'')==='Acceso disponible') availableState+=1;
            }
          }
          const classification = importEvents===0
            ? 'PROVIDER_NOT_INVOKED'
            : refs===0
              ? 'REMOTE_STORED_LOCAL_REFS_NOT_APPLIED'
              : 'PARTIAL_OR_COMPLETE_APPLICATION';
          const result={schemaVersion:'orbit360-secure-access-audit-diagnosis-v1',containsSecrets:false,containsPII:false,ok:true,phase:'completed',run:env.GITHUB_RUN_ID||'',commit:env.GITHUB_SHA||'',classification,auditEvents:auditSnap.size,credentialImportEvents:importEvents,credentialItemsStored:importedCountTotal,latestCredentialImportAt:latestImportAt?true:false,opaqueRefs:refs,storedAccessAvailable:availableState,backendRequired};
          fs.writeFileSync(env.OUT_FILE,JSON.stringify(result,null,2));
          console.log(`DIAG_${classification}`);
          NODE

      - name: Limpiar cuenta temporal
        if: always()
        run: |
          if [ -f "${GOOGLE_APPLICATION_CREDENTIALS:-/nonexistent}" ]; then shred -u "$GOOGLE_APPLICATION_CREDENTIALS" 2>/dev/null || rm -f "$GOOGLE_APPLICATION_CREDENTIALS"; fi

      - name: Publicar evidencia sanitizada
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-secure-access-audit-diagnosis-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/secure-access-audit-diagnosis-sanitized.json
          if-no-files-found: error
          retention-days: 7

      - name: Comentar diagnóstico en PR 5
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILE=orbit360-platform/runtime-gate-crm-v20260716/secure-access-audit-diagnosis-sanitized.json
          CLASS=$(jq -r '.classification' "$FILE")
          EVENTS=$(jq -r '.credentialImportEvents' "$FILE")
          STORED=$(jq -r '.credentialItemsStored' "$FILE")
          REFS=$(jq -r '.opaqueRefs' "$FILE")
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body "### Diagnóstico causa raíz · carga segura Aseguradoras\n\n- Resultado: **OK diagnóstico**\n- Clasificación: \`$CLASS\`\n- Eventos de importación remota: \`$EVENTS\`\n- Ítems confirmados por proveedor: \`$STORED\`\n- Referencias opacas en Firestore: \`$REFS\`\n- Run: \`$GITHUB_RUN_ID\`\n- Commit: \`$GITHUB_SHA\`\n\nNo se leyeron ni publicaron valores protegidos."
