name: Orbit 360 Ephemeral Handoff Cleanup LAB 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  cleanup:
    name: Seguridad · retirar llaves efímeras de handoff
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      SA_PRIMARY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}

    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "ays/backend-tenant-lab-v99-20260703"
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Resolver principal LAB
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SA_PRIMARY:-}"
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SA_PRIMARY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"
          echo "DEPLOYER_EMAIL=$(jq -r '.client_email // empty' "$KEY_FILE")" >> "$GITHUB_ENV"

      - name: Instalar Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ays-orbit-360-lab

      - name: Eliminar exclusivamente llaves efímeras
        shell: bash
        run: |
          set -euo pipefail
          gcloud auth activate-service-account "$DEPLOYER_EMAIL" --key-file="$GOOGLE_APPLICATION_CREDENTIALS" --project "$FIREBASE_PROJECT_ID" >/dev/null
          REMOVED=0
          for item in orbit360-credential-handoff-key-20260720 orbit360-credential-handoff-key-20260720-v2; do
            if gcloud secrets describe "$item" --project "$FIREBASE_PROJECT_ID" >/dev/null 2>&1; then
              gcloud secrets delete "$item" --project "$FIREBASE_PROJECT_ID" --quiet >/dev/null
              REMOVED=$((REMOVED + 1))
            fi
          done
          mkdir -p orbit360-platform/runtime-gate-crm-v20260716
          jq -n --arg run "$GITHUB_RUN_ID" --arg commit "$GITHUB_SHA" --argjson removed "$REMOVED" '{schemaVersion:"orbit360-ephemeral-handoff-cleanup-v1",containsSecrets:false,containsPII:false,ok:true,phase:"completed",run:$run,commit:$commit,ephemeralKeysRemoved:$removed,permanentVaultTouched:false}' > orbit360-platform/runtime-gate-crm-v20260716/ephemeral-handoff-cleanup-sanitized.json

      - name: Publicar evidencia sanitizada
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-ephemeral-handoff-cleanup-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/ephemeral-handoff-cleanup-sanitized.json
          if-no-files-found: error
          retention-days: 7

      - name: Comentar resultado en PR 5
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body "Limpieza de handoff efímero completada. La bóveda permanente no fue modificada. Run: ${GITHUB_RUN_ID}. Commit: ${GITHUB_SHA}."
