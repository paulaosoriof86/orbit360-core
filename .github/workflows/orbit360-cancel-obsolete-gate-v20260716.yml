name: Orbit 360 Secure Credentials Static Restore 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: orbit360-secure-credentials-static-restore-v20260720
  cancel-in-progress: false

jobs:
  static_restore:
    name: Credenciales Aseguradoras · validar y restaurar slice auditado
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      RESTORE_COMMIT: c5804d778bd5bae37097538abc85ce07ccf1f56c
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 0

      - name: Preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "ays/backend-tenant-lab-v99-20260703"
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Restaurar slice auditado desde historial
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor "$RESTORE_COMMIT" HEAD
          mkdir -p functions orbit360-platform/core orbit360-platform/runtime-gate-crm-v20260716
          git show "$RESTORE_COMMIT:functions/index.js" > functions/index.js
          git show "$RESTORE_COMMIT:functions/package.json" > functions/package.json
          git show "$RESTORE_COMMIT:orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js" > orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js

      - name: Validación estática por fase
        shell: bash
        run: |
          set -uo pipefail
          DIAG="orbit360-platform/runtime-gate-crm-v20260716/credential-provider-static-diagnostic.json"
          PHASE="initializing"
          write_diag() {
            local ok="$1"
            local code="$2"
            jq -n \
              --arg phase "$PHASE" \
              --arg commit "$GITHUB_SHA" \
              --arg run "$GITHUB_RUN_ID" \
              --argjson ok "$ok" \
              --argjson exitCode "$code" \
              '{schemaVersion:"orbit360-secure-provider-static-diagnostic-v1",containsSecrets:false,containsPII:false,ok:$ok,phase:$phase,exitCode:$exitCode,commit:$commit,run:$run}' > "$DIAG"
          }
          run_phase() {
            PHASE="$1"
            shift
            echo "ORBIT360_STATIC_PHASE:${PHASE}"
            if "$@"; then return 0; fi
            local code=$?
            write_diag false "$code"
            exit "$code"
          }
          write_diag false 0
          run_phase node_functions node --check functions/index.js
          run_phase node_provider node --check orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js
          run_phase node_bootstrap node --check orbit360-platform/core/router-tenant-config-bootstrap.js
          run_phase firebase_functions_contract node -e "const f=require('./firebase.json'); if(!f.functions||f.functions.source!=='functions'||f.functions.runtime!=='nodejs22') process.exit(41)"
          run_phase bootstrap_provider_marker grep -Fq 'data-orbit-insurer-credential-provider' orbit360-platform/core/router-tenant-config-bootstrap.js
          run_phase provider_remote_confirmation_marker grep -Fq 'appliesOpaqueRefsAfterRemoteConfirmation: true' orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js
          run_phase provider_no_persistence_marker grep -Fq 'noSecretPersistence: true' orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js
          run_phase npm_install npm install --prefix functions --ignore-scripts --no-audit --no-fund
          run_phase npm_check npm --prefix functions run check
          PHASE="completed"
          write_diag true 0

      - name: Persistir slice únicamente después de validación OK
        shell: bash
        run: |
          set -euo pipefail
          jq -e '.ok == true and .phase == "completed"' orbit360-platform/runtime-gate-crm-v20260716/credential-provider-static-diagnostic.json >/dev/null
          git config user.name "orbit360-gate-bot"
          git config user.email "orbit360-gate-bot@users.noreply.github.com"
          git add functions/index.js functions/package.json orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js
          if git diff --cached --quiet; then
            echo "Slice ya persistido"
            exit 0
          fi
          git commit -m "feat(security): restaurar proveedor seguro LAB [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703

      - name: Publicar evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-secure-provider-static-restore-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/credential-provider-static-diagnostic.json
          if-no-files-found: error
          retention-days: 3

      - name: Publicar resultado sanitizado en PR 5
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          FILE="orbit360-platform/runtime-gate-crm-v20260716/credential-provider-static-diagnostic.json"
          if [ ! -f "$FILE" ]; then exit 0; fi
          node - <<'NODE' > /tmp/orbit360-static-restore.md
          const fs = require('fs');
          const d = JSON.parse(fs.readFileSync('orbit360-platform/runtime-gate-crm-v20260716/credential-provider-static-diagnostic.json','utf8'));
          process.stdout.write([
            '### Restauración estática · proveedor seguro LAB',
            '',
            '- Resultado: **' + (d.ok ? 'OK' : 'NO_GO') + '**',
            '- Fase: `' + d.phase + '`',
            '- Exit code: `' + d.exitCode + '`',
            '- Run: `' + d.run + '`',
            '- Commit evaluado: `' + d.commit + '`',
            '',
            'La evidencia no contiene credenciales, datos personales ni valores protegidos.'
          ].join('\n'));
          NODE
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body-file /tmp/orbit360-static-restore.md
