name: Orbit 360 Secure Mapping Audit LAB 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  audit_mapping:
    name: Aseguradoras · auditoría de vínculo remoto
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      TENANT_ID: alianzas-soluciones
      SA_PRIMARY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        run: node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Resolver cuenta LAB
        shell: bash
        run: |
          set -euo pipefail
          FILE="${RUNNER_TEMP}/lab.json"
          printf '%s' "$SA_PRIMARY" > "$FILE"
          chmod 600 "$FILE"
          test "$(jq -r '.project_id // empty' "$FILE")" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencia
        run: npm install --prefix functions --ignore-scripts --no-audit --no-fund

      - name: Contar eventos y referencias
        shell: bash
        run: |
          mkdir -p orbit360-platform/runtime-gate-crm-v20260716
          export OUT_FILE=orbit360-platform/runtime-gate-crm-v20260716/mapping-audit-sanitized.json
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import {createRequire} from 'node:module';
          const require=createRequire(new URL('./functions/package.json',import.meta.url));
          const {initializeApp,cert}=require('firebase-admin/app');
          const {getFirestore}=require('firebase-admin/firestore');
          const account=JSON.parse(fs.readFileSync(process.env.GOOGLE_APPLICATION_CREDENTIALS,'utf8'));
          const app=initializeApp({credential:cert(account),projectId:process.env.FIREBASE_PROJECT_ID});
          const db=getFirestore(app);
          const audit=await db.collection('tenants').doc(process.env.TENANT_ID).collection('auditEvents').get();
          let events=0,items=0;
          for(const doc of audit.docs){const row=doc.data()||{};if(String(row.action||'')==='credential.import'){events+=1;items+=Number(row.count||0);}}
          const insurers=await db.collection('tenantId').doc(process.env.TENANT_ID).collection('aseguradoras').get();
          let portals=0,refs=0;
          for(const doc of insurers.docs){for(const portal of (doc.data()?.portales||[])){portals+=1;if(/^cred_[a-f0-9]{32}$/.test(String(portal?.credentialRef||'').trim()))refs+=1;}}
          const classification=events===0&&refs===0?'TARGET_MAPPING_EMPTY_BEFORE_PROVIDER':events>0&&refs===0?'REMOTE_STORED_REFS_NOT_APPLIED':'PARTIAL_OR_COMPLETE';
          fs.writeFileSync(process.env.OUT_FILE,JSON.stringify({schemaVersion:'orbit360-mapping-audit-v1',containsSecrets:false,containsPII:false,ok:true,classification,events,items,insurers:insurers.size,portals,refs},null,2));
          console.log(`DIAG_${classification}`);
          NODE

      - name: Limpiar archivo temporal
        if: always()
        run: rm -f "${GOOGLE_APPLICATION_CREDENTIALS:-/nonexistent}"

      - name: Publicar evidencia
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-mapping-audit-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/mapping-audit-sanitized.json
          if-no-files-found: error
          retention-days: 7

      - name: Comentar resultado
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          F=orbit360-platform/runtime-gate-crm-v20260716/mapping-audit-sanitized.json
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body "### Auditoría segundo intento\n\n- Clasificación: \`$(jq -r .classification $F)\`\n- Eventos: \`$(jq -r .events $F)\`\n- Ítems: \`$(jq -r .items $F)\`\n- Referencias: \`$(jq -r .refs $F)\`\n- Run: \`$GITHUB_RUN_ID\`"
