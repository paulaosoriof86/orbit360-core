name: Orbit 360 Insurer Portal Mapping Sanitized 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: orbit360-insurer-portal-mapping-sanitized-v20260720
  cancel-in-progress: true

jobs:
  mapping:
    name: Aseguradoras · inventario sanitizado de portales
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      SA_PRIMARY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "ays/backend-tenant-lab-v99-20260703"
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Resolver cuenta LAB
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SA_PRIMARY:-}"
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SA_PRIMARY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Generar inventario sin valores protegidos
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save firebase-admin@13
          mkdir -p orbit360-platform/runtime-gate-crm-v20260716
          node --input-type=module - <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          import { cert, initializeApp } from 'firebase-admin/app';
          import { getFirestore } from 'firebase-admin/firestore';
          const key = JSON.parse(readFileSync(process.env.GOOGLE_APPLICATION_CREDENTIALS, 'utf8'));
          const app = initializeApp({ credential: cert(key), projectId: 'ays-orbit-360-lab' });
          const db = getFirestore(app);
          const snapshot = await db.collection('tenantId').doc('alianzas-soluciones').collection('aseguradoras').get();
          const insurers = snapshot.docs.map(doc => {
            const row = doc.data() || {};
            return {
              id: doc.id,
              nombre: String(row.nombre || ''),
              pais: String(row.pais || ''),
              sourceSheet: String(row.fuenteDirectorio && row.fuenteDirectorio.hoja || ''),
              portals: [].concat(row.portales || []).map((portal, index) => ({
                id: String(portal && (portal.id || index)),
                nombre: String(portal && portal.nombre || ''),
                sourceSheet: String(portal && portal.fuenteTraza && portal.fuenteTraza.hoja || ''),
                sourceRow: Number(portal && portal.fuenteTraza && portal.fuenteTraza.fila || 0),
                credentialState: /^cred_[a-f0-9]{32}$/.test(String(portal && portal.credentialRef || '')) ? 'opaque_ref' : (String(portal && portal.credentialRef || '') ? 'pending_ref' : 'none')
              }))
            };
          }).sort((a,b) => a.pais.localeCompare(b.pais) || a.nombre.localeCompare(b.nombre));
          const payload = {
            schemaVersion: 'orbit360-insurer-portal-mapping-sanitized-v1',
            containsSecrets: false,
            containsPII: false,
            tenantId: 'alianzas-soluciones',
            insurerCount: insurers.length,
            portalCount: insurers.reduce((sum, item) => sum + item.portals.length, 0),
            insurers
          };
          writeFileSync('orbit360-platform/runtime-gate-crm-v20260716/insurer-portal-mapping-sanitized.json', JSON.stringify(payload, null, 2));
          NODE

      - name: Publicar inventario sanitizado
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-insurer-portal-mapping-sanitized-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/insurer-portal-mapping-sanitized.json
          if-no-files-found: error
          retention-days: 3

      - name: Publicar referencia sanitizada en PR 5
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          COUNT="$(jq -r '.insurerCount' orbit360-platform/runtime-gate-crm-v20260716/insurer-portal-mapping-sanitized.json)"
          PORTALS="$(jq -r '.portalCount' orbit360-platform/runtime-gate-crm-v20260716/insurer-portal-mapping-sanitized.json)"
          printf -v BODY '### Inventario sanitizado de portales\n\n- Aseguradoras: `%s`\n- Portales: `%s`\n- Run: `%s`\n- Commit: `%s`\n\nNo contiene enlaces, usuarios, contraseñas, cuentas, contactos ni datos personales.' "$COUNT" "$PORTALS" "$GITHUB_RUN_ID" "$GITHUB_SHA"
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body "$BODY"
