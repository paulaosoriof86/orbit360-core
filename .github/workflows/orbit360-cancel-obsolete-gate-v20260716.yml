name: Orbit 360 Secure Credentials Static Diagnosis 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: orbit360-secure-credentials-static-diagnosis-v20260720
  cancel-in-progress: false

jobs:
  static_diagnosis:
    name: Credenciales Aseguradoras · diagnóstico estático vinculante
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      RESTORE_COMMIT: c5804d778bd5bae37097538abc85ce07ccf1f56c
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 0

      - name: Preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "ays/backend-tenant-lab-v99-20260703"
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Restaurar slice auditado desde historial
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor "$RESTORE_COMMIT" HEAD
          mkdir -p functions orbit360-platform/core orbit360-platform/runtime-gate-crm-v20260716
          git show "$RESTORE_COMMIT:functions/index.js" > functions/index.js
          git show "$RESTORE_COMMIT:functions/package.json" > functions/package.json
          git show "$RESTORE_COMMIT:orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js" > orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js

      - name: Diagnóstico estático por fase
        shell: bash
        run: |
          set -u
          DIAG="orbit360-platform/runtime-gate-crm-v20260716/credential-provider-static-diagnostic.json"
          PHASE="initializing"
          write_diag() {
            local ok="$1"
            local code="$2"
            jq -n \
              --arg phase "$PHASE" \
              --arg commit "$GITHUB_SHA" \
              --arg run "$GITHUB_RUN_ID" \
              --argjson ok "$ok" \
              --argjson exitCode "$code" \
              '{schemaVersion:"orbit360-secure-provider-static-diagnostic-v1",containsSecrets:false,containsPII:false,ok:$ok,phase:$phase,exitCode:$exitCode,commit:$commit,run:$run}' > "$DIAG"
          }
          check() {
            PHASE="$1"
            shift
            echo "ORBIT360_STATIC_PHASE:${PHASE}"
            "$@"
            local code=$?
            if [ "$code" -ne 0 ]; then
              write_diag false "$code"
              exit "$code"
            fi
          }
          write_diag false 0
          check node_functions node --check functions/index.js
          check node_provider node --check orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js
          check node_bootstrap node --check orbit360-platform/core/router-tenant-config-bootstrap.js
          PHASE="firebase_functions_contract"
          node -e "const f=require('./firebase.json'); if(!f.functions||f.functions.source!=='functions'||f.functions.runtime!=='nodejs22') process.exit(41)"
          code=$?; if [ "$code" -ne 0 ]; then write_diag false "$code"; exit "$code"; fi
          PHASE="bootstrap_provider_marker"
          grep -Fq 'data-orbit-insurer-credential-provider' orbit360-platform/core/router-tenant-config-bootstrap.js
          code=$?; if [ "$code" -ne 0 ]; then write_diag false "$code"; exit "$code"; fi
          PHASE="provider_remote_confirmation_marker"
          grep -Fq 'appliesOpaqueRefsAfterRemoteConfirmation: true' orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js
          code=$?; if [ "$code" -ne 0 ]; then write_diag false "$code"; exit "$code"; fi
          PHASE="provider_no_persistence_marker"
          grep -Fq 'noSecretPersistence: true' orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js
          code=$?; if [ "$code" -ne 0 ]; then write_diag false "$code"; exit "$code"; fi
          PHASE="npm_install"
          npm install --prefix functions --ignore-scripts --no-audit --no-fund
          code=$?; if [ "$code" -ne 0 ]; then write_diag false "$code"; exit "$code"; fi
          PHASE="npm_check"
          npm --prefix functions run check
          code=$?; if [ "$code" -ne 0 ]; then write_diag false "$code"; exit "$code"; fi
          PHASE="completed"
          write_diag true 0

      - name: Publicar diagnóstico sanitizado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-secure-provider-static-diagnostic-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/credential-provider-static-diagnostic.json
          if-no-files-found: error
          retention-days: 3

      - name: Publicar resultado sanitizado en PR 5
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          FILE="orbit360-platform/runtime-gate-crm-v20260716/credential-provider-static-diagnostic.json"
          if [ ! -f "$FILE" ]; then exit 0; fi
          node - <<'NODE' > /tmp/orbit360-static-diagnostic.md
          const fs = require('fs');
          const d = JSON.parse(fs.readFileSync('orbit360-platform/runtime-gate-crm-v20260716/credential-provider-static-diagnostic.json','utf8'));
          process.stdout.write([
            '### Diagnóstico estático · proveedor seguro LAB',
            '',
            '- Resultado: **' + (d.ok ? 'OK' : 'NO_GO') + '**',
            '- Fase: `' + d.phase + '`',
            '- Exit code: `' + d.exitCode + '`',
            '- Run: `' + d.run + '`',
            '- Commit: `' + d.commit + '`',
            '',
            'La evidencia no contiene credenciales, datos personales ni valores protegidos.'
          ].join('\n'));
          NODE
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body-file /tmp/orbit360-static-diagnostic.md
