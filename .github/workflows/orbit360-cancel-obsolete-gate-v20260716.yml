name: Orbit 360 Secure Only Smoke Fixture Diagnosis 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose_fixture:
    name: Aseguradoras · diagnosticar fixture sintético secure-only
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      TARGET: orbit360-platform/core/insurer-directory-import-v1202.js
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        run: node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Ejecutar diagnóstico sintético sin modificar producto
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p orbit360-platform/runtime-gate-crm-v20260716
          export OUT_FILE=orbit360-platform/runtime-gate-crm-v20260716/secure-only-fixture-diagnosis-sanitized.json
          node <<'NODE'
          const fs=require('fs'); const vm=require('vm');
          const code=fs.readFileSync(process.env.TARGET,'utf8');
          const insurers=[{id:'asg_demo',nombre:'Aseguradora Diferente',pais:'GT',portales:[]}];
          const Orbit={
            store:{all:(c)=>c==='aseguradoras'?insurers:[],insert:()=>{},update:()=>{}},
            ui:{today:()=> '2026-07-20',esc:String,toast:()=>{},prompt:async()=>''},
            access:{activeRole:()=> 'Dirección',actorAdvisor:()=>({}),tenantId:()=> 'alianzas-soluciones',actorUser:()=>({nombre:'Dirección'})}
          };
          const window={Orbit,addEventListener:()=>{},removeEventListener:()=>{},dispatchEvent:()=>{}};
          const context={window,Orbit,console,setTimeout,clearTimeout,URL,Map,Set,Promise,CustomEvent:function(){}};
          vm.createContext(context); vm.runInContext(code,context);
          const rows=[
            ['SEGUROS DIFERENTE'],[],['NOMBRE','CARGO','ÁREA','EXT.','EMAIL','CELULAR','OBSERVACIONES'],
            ['Contacto','Ejecutiva','Comercial','','contacto@example.invalid','',''],
            ['ACCESO AL SISTEMA EN LINEA'],['PRODUCTO','LINK','USUARIO','CONTRASEÑA'],
            ['Portal','https://example.invalid','usuario-prueba','clave-prueba']
          ];
          let result=null,errorCode='';
          try { result=context.Orbit.insurerDirectoryImport.parseMatrices({GENERAL:rows},{country:'GT',fileName:'synthetic.xlsx',captureSecure:true}); }
          catch(error){ errorCode=String(error&&error.message||error).slice(0,120); }
          const report=result&&result.report||{};
          const ops=report._operations||[];
          const out={
            schemaVersion:'orbit360-secure-only-fixture-diagnosis-v1',containsSecrets:false,containsPII:false,ok:true,phase:'completed',
            errorCode,securePayloadCount:Number(result&&result.securePayloadCount||0),operations:ops.length,
            blocked:Number(report.totals&&report.totals.blocked||0),
            action:ops[0]&&ops[0].action||'',existingMatched:Boolean(ops[0]&&ops[0].id),
            alertsCount:Array.isArray(ops[0]&&ops[0].data&&ops[0].data.validacionAlertas)?ops[0].data.validacionAlertas.length:0,
            credentialsDetected:Number(report.sensitiveSummary&&report.sensitiveSummary.credentials||0)
          };
          fs.writeFileSync(process.env.OUT_FILE,JSON.stringify(out,null,2));
          console.log(JSON.stringify(out));
          NODE

      - name: Publicar evidencia sanitizada
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-secure-only-fixture-diagnosis-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/secure-only-fixture-diagnosis-sanitized.json
          if-no-files-found: error
          retention-days: 7

      - name: Comentar diagnóstico en PR 5
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          F=orbit360-platform/runtime-gate-crm-v20260716/secure-only-fixture-diagnosis-sanitized.json
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body "### Diagnóstico fixture secure-only\n\n- Payload sensible detectado: \`$(jq -r '.securePayloadCount' $F)\`\n- Operaciones: \`$(jq -r '.operations' $F)\`\n- Bloqueadas: \`$(jq -r '.blocked' $F)\`\n- Existente vinculado: \`$(jq -r '.existingMatched' $F)\`\n- Error sanitizado: \`$(jq -r '.errorCode' $F)\`\n- Run: \`$GITHUB_RUN_ID\`\n\nNo se modificó producto ni se usaron datos reales."
