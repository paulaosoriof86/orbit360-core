name: Orbit 360 Functions State Readonly 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-cancel-obsolete-gate-v20260716.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    name: Credenciales Aseguradoras · estado Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      REGION: us-central1
      EXPECTED_RUNTIME_SA: orbit360-secrets-lab@ays-orbit-360-lab.iam.gserviceaccount.com
      SA_PRIMARY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        run: node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Resolver principal existente
        shell: bash
        run: |
          set -euo pipefail
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SA_PRIMARY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id' "$KEY_FILE")" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"
          echo "DEPLOYER_EMAIL=$(jq -r '.client_email' "$KEY_FILE")" >> "$GITHUB_ENV"

      - name: Instalar Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ays-orbit-360-lab

      - name: Consultar estado sin modificar recursos
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="orbit360-platform/runtime-gate-crm-v20260716"
          OUT="$OUT_DIR/functions-state-readonly.json"
          mkdir -p "$OUT_DIR"
          gcloud auth activate-service-account "$DEPLOYER_EMAIL" --key-file="$GOOGLE_APPLICATION_CREDENTIALS" --project="$FIREBASE_PROJECT_ID" >/dev/null
          ITEMS='[]'
          ACTIVE=0
          MATCH=0
          for name in orbit360ImportInsurerCredentials orbit360CredentialStatus orbit360RevealInsurerCredential orbit360CopyInsurerCredential; do
            FILE="${RUNNER_TEMP}/${name}.json"
            if gcloud functions describe "$name" --gen2 --region "$REGION" --project "$FIREBASE_PROJECT_ID" --format=json > "$FILE" 2>/dev/null; then
              state="$(jq -r '.state // "UNKNOWN"' "$FILE")"
              runtime="$(jq -r '.serviceConfig.serviceAccountEmail // ""' "$FILE")"
              codes="$(jq -c '[.stateMessages[]?.code // empty]' "$FILE")"
              [ "$state" = "ACTIVE" ] && ACTIVE=$((ACTIVE + 1))
              runtime_ok=false; [ "$runtime" = "$EXPECTED_RUNTIME_SA" ] && runtime_ok=true && MATCH=$((MATCH + 1))
              item="$(jq -n --arg name "$name" --arg state "$state" --argjson runtimeOk "$runtime_ok" --argjson codes "$codes" '{name:$name,state:$state,runtimeOk:$runtimeOk,codes:$codes}')"
            else
              item="$(jq -n --arg name "$name" '{name:$name,state:"NOT_FOUND",runtimeOk:false,codes:[]}')"
            fi
            ITEMS="$(jq -c --argjson item "$item" '. + [$item]' <<< "$ITEMS")"
          done
          jq -n --arg run "$GITHUB_RUN_ID" --arg commit "$GITHUB_SHA" --argjson functions "$ITEMS" --argjson active "$ACTIVE" --argjson runtimeMatch "$MATCH" '{schemaVersion:"orbit360-functions-state-readonly-v1",containsSecrets:false,containsPII:false,ok:true,run:$run,commit:$commit,functions:$functions,activeFunctions:$active,runtimeMatchFunctions:$runtimeMatch}' > "$OUT"

      - name: Publicar evidencia sanitizada
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-functions-state-readonly-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/functions-state-readonly.json
          if-no-files-found: error
          retention-days: 3

      - name: Comentar estado sanitizado en PR 5
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node - <<'NODE' > /tmp/functions-state.md
          const fs=require('fs');
          const d=JSON.parse(fs.readFileSync('orbit360-platform/runtime-gate-crm-v20260716/functions-state-readonly.json','utf8'));
          const states=d.functions.map(x=>x.name+':'+x.state+(x.codes.length?'['+x.codes.join(',')+']':'')).join(' · ');
          process.stdout.write('### Estado real · Functions del proveedor seguro\n\n- Activas: `'+d.activeFunctions+' de 4`\n- Cuenta runtime correcta: `'+d.runtimeMatchFunctions+' de 4`\n- Estados: `'+states+'`\n- Run: `'+d.run+'`\n- Commit: `'+d.commit+'`\n\nComprobación de solo lectura; no contiene credenciales.');
          NODE
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body-file /tmp/functions-state.md
