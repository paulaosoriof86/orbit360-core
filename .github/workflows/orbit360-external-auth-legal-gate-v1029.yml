name: Orbit 360 External Auth and Legal Gate
on:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths: [".github/workflows/orbit360-external-auth-legal-gate-v1029.yml"]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2
      - name: Sustituir interacciones internas por UI canónica
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs')
          source = path.read_text()

          auth = r'''export async function authenticateWithOwner(page, { email, key, runtime, bounded, requireState, report }) {
            await bounded('authentication_form_ready', async () => {
              const form = page.locator('#login-form');
              await form.waitFor({ state: 'visible', timeout: 20000 });
              requireState(await form.getAttribute('data-auth-mode') === 'firestore-lab', 'AUTH_FORM_MODE_INVALID');
              await page.locator('#lg-user').waitFor({ state: 'visible', timeout: 10000 });
              await page.locator('#lg-pass').waitFor({ state: 'visible', timeout: 10000 });
            }, 24000);

            const bodyClass = String(await page.locator('body').getAttribute('class') || '');
            if (!bodyClass.split(/\s+/).includes('pre-auth')) {
              report.authMode = 'session_restored_external_ui';
              report.checks.authenticated = true;
              return;
            }

            await bounded('authentication_fill_form', async () => {
              await page.locator('#lg-user').fill(email);
              await page.locator('#lg-pass').fill(key);
              const form = page.locator('#login-form');
              requireState(String(await form.getAttribute('data-auth-mode') || '') === 'firestore-lab', 'AUTH_FORM_MODE_INVALID');
            }, 15000);

            await bounded('authentication_submit_form', async () => {
              const button = page.locator('#login-form button[type="submit"]');
              await button.waitFor({ state: 'visible', timeout: 10000 });
              await button.click();
            }, 15000);

            await bounded('authentication_observe_ui', async () => {
              const inside = page.locator('body:not(.pre-auth)');
              const failure = page.locator('#login-error');
              const deadline = Date.now() + 50000;
              while (Date.now() < deadline) {
                if (await inside.count()) return;
                if (await failure.count()) {
                  const text = String(await failure.textContent() || '').trim();
                  if (text) requireState(false, 'LOGIN_FORM_ERROR', text.slice(0, 160));
                }
                await page.waitForTimeout(200);
              }
              requireState(false, 'LOGIN_FORM_DID_NOT_ENTER_APP');
            }, 54000);

            await bounded('authentication_verify_ui', async () => {
              const finalClass = String(await page.locator('body').getAttribute('class') || '');
              requireState(!finalClass.split(/\s+/).includes('pre-auth'), 'AUTH_BODY_STILL_PRE_AUTH');
              await page.locator('#login').waitFor({ state: 'hidden', timeout: 12000 });
              await page.locator('#shell').waitFor({ state: 'visible', timeout: 12000 });
            }, 16000);

            report.authMode = 'canonical_login_form_external_gate';
            report.checks.authenticated = true;
          }

          export async function acceptLegalOnce'''

          source, count = re.subn(
              r'export async function authenticateWithOwner[\s\S]*?\nexport async function acceptLegalOnce',
              auth,
              source,
              count=1,
          )
          assert count == 1, 'AUTH_FUNCTION_RANGE_NOT_FOUND'

          legal = r'''export async function acceptLegalOnce(page, { bounded, requireState, report }) {
            await page.waitForTimeout(900);

            await bounded('legal_gate_visible', async () => {
              const roots = page.locator('[data-legal-gate]:visible');
              await roots.first().waitFor({ state: 'visible', timeout: 15000 });
              const count = await roots.count();
              requireState(count === 1, count ? 'LEGAL_DUPLICATE_VISIBLE' : 'LEGAL_GATE_NOT_VISIBLE', String(count));
              const checkbox = roots.first().locator('#lg-chk');
              const button = roots.first().locator('#lg-ok');
              requireState(await checkbox.count() === 1, 'LEGAL_CHECKBOX_MISSING');
              requireState(await button.count() === 1, 'LEGAL_ACCEPT_BUTTON_MISSING');
            }, 18000);

            await bounded('legal_gate_click_accept', async () => {
              const root = page.locator('[data-legal-gate]:visible').first();
              const checkbox = root.locator('#lg-chk');
              const button = root.locator('#lg-ok');
              await checkbox.check();
              await button.waitFor({ state: 'visible', timeout: 8000 });
              await button.click();
            }, 12000);

            await bounded('legal_gate_verify_external', async () => {
              await page.locator('[data-legal-gate]').waitFor({ state: 'detached', timeout: 18000 });
              requireState(await page.locator('#lg-chk,#conf-chk').count() === 0, 'LEGAL_GATE_STILL_VISIBLE');
            }, 20000);

            report.legalGateMode = 'canonical_visible_controls_external_gate';
            report.checks.legalOneClick = true;
          }
          '''

          source, count = re.subn(
              r'export async function acceptLegalOnce[\s\S]*?\n}\s*$',
              legal.rstrip(),
              source,
              count=1,
          )
          assert count == 1, 'LEGAL_FUNCTION_RANGE_NOT_FOUND'
          path.write_text(source)
          PY

          node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          git rm .github/workflows/orbit360-external-auth-legal-gate-v1029.yml
      - name: Actualizar overlay y documentación
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import json

          path = Path('tools/orbit360-gate-contract-overlay-v20260718.json')
          data = json.loads(path.read_text())
          owners = [x for x in data.get('canonicalOwners', []) if x.get('id') != 'gateExternalAuthLegal']
          owners.append({
            'id': 'gateExternalAuthLegal',
            'path': 'tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs',
            'requiredTokens': [
              "authentication_form_ready",
              "authentication_fill_form",
              "authentication_submit_form",
              "authentication_observe_ui",
              "body:not(.pre-auth)",
              "canonical_login_form_external_gate",
              "legal_gate_visible",
              "legal_gate_click_accept",
              "checkbox.check()",
              "legal_gate_verify_external",
              "canonical_visible_controls_external_gate"
            ]
          })
          data['canonicalOwners'] = owners
          required = data.setdefault('requiredFiles', [])
          helper = 'tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs'
          if helper not in required: required.append(helper)
          graph = data.setdefault('runtimeGraphFiles', [])
          if helper not in graph: graph.append(helper)
          contracts = [x for x in data.get('runtimeVersionContracts', []) if x.get('path') != helper]
          contracts.append({
            'path': helper,
            'requiredTokens': owners[-1]['requiredTokens']
          })
          data['runtimeVersionContracts'] = contracts
          data['classification'] = 'PIPELINE_MECHANISM_FAILURE'
          data['diagnosticRevision'] = 'external-ui-auth-legal-gate-v1'
          path.write_text(json.dumps(data, indent=2) + '\n')
          PY

          cat > orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-GATE-AUTH-LEGAL-EXTERNO-20260718.md <<'DOC'
          # Bloque 1 · Gate externo de autenticación y legal

          Fecha: 2026-07-18

          Clasificación: `PIPELINE_MECHANISM_FAILURE`.

          El bootstrap completo, la configuración activa del tenant y `router-ready` quedaron aprobados. El primer fallo posterior ocurrió cuando el validador intentó iniciar sesión mediante `page.evaluate`, aunque la plataforma ya dispone de un formulario canónico que es el propietario real del flujo Firebase.

          La corrección no modifica Auth, usuarios ni datos. El gate completa `#lg-user` y `#lg-pass`, envía `#login-form` y observa externamente que el cuerpo abandona `pre-auth`, que el login se oculta y que el shell aparece.

          La aceptación legal también usa controles visibles: un único modal `data-legal-gate`, checkbox `#lg-chk` y botón `#lg-ok`. Se elimina la inspección y programación mediante evaluaciones internas.

          Carril A: UI canónica utilizada sin cambios. Carril B: solo validator/gate y contrato; Auth, Store, reglas y backend protegidos intactos. Carril C: 414 clientes, 26 aseguradoras y 7 asesores sin reimportación.

          Claude: `BACKEND_PROTEGIDO_NO_CLAUDE`. Academia: distinguir prueba del flujo real por UI frente a invocar funciones internas desde el validador.
          DOC

          cat > orbit360-platform/docs/ACADEMIA-BLOQUE1-GATE-UI-EXTERNO-20260718.md <<'DOC'
          # Academia Orbit 360 · Gate por interfaz externa

          Un gate funcional debe probar el mismo camino que usa una persona: completar el formulario, enviarlo y observar el cambio visible de estado. Invocar funciones internas con `page.evaluate` puede bloquear el hilo que se intenta validar y no representa la experiencia real.

          Para acuerdos legales, la evidencia correcta es la existencia de un único modal, el cambio del checkbox, la habilitación del botón y la desaparición del modal tras aceptar.

          Este patrón se clasifica como `PIPELINE_MECHANISM_FAILURE`: el producto puede estar correcto mientras el mecanismo de prueba impide o sustituye el flujo real.
          DOC
      - name: Preflight vinculante
        shell: bash
        env:
          ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
        run: |
          set -euo pipefail
          node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717
          test "$(jq -r '.status' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = GO_GATE_CONTRACT
          test "$(jq -r '.failed' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = 0
      - name: Publicar corte externo
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs tools/orbit360-gate-contract-overlay-v20260718.json orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-GATE-AUTH-LEGAL-EXTERNO-20260718.md orbit360-platform/docs/ACADEMIA-BLOQUE1-GATE-UI-EXTERNO-20260718.md
          git commit -m "fix(block1): validate auth and legal through canonical UI"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
