name: Orbit 360 A&S LAB Preview

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - "orbit360-platform/**"
      - "tools/orbit360-ensure-lab-user.mjs"
      - "tools/orbit360-verify-lab-data-counts.mjs"
      - "tools/orbit360-test-import-initial-pending-insurers.mjs"
      - "tools/orbit360-test-lab-import-readiness.mjs"
      - "tools/orbit360-test-lab-canonical-view-sync.mjs"
      - "firestore.rules"
      - "firebase.json"
      - ".github/workflows/orbit360-ays-lab-preview.yml"
  pull_request:
    branches:
      - main
    paths:
      - "orbit360-platform/**"
      - "tools/orbit360-ensure-lab-user.mjs"
      - "tools/orbit360-verify-lab-data-counts.mjs"
      - "tools/orbit360-test-import-initial-pending-insurers.mjs"
      - "tools/orbit360-test-lab-import-readiness.mjs"
      - "tools/orbit360-test-lab-canonical-view-sync.mjs"
      - "firestore.rules"
      - "firebase.json"
      - ".github/workflows/orbit360-ays-lab-preview.yml"
  workflow_dispatch:
  workflow_call:
    inputs:
      source_ref:
        description: Rama exacta autorizada para checkout y despliegue LAB.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: orbit360-ays-lab-preview
  cancel-in-progress: true

jobs:
  deploy_preview:
    name: Deploy preview only
    if: >-
      github.event_name == 'workflow_call' ||
      (github.event_name == 'push' && github.ref_name == 'ays/backend-tenant-lab-v99-20260703') ||
      (github.event_name == 'pull_request' && github.head_ref == 'ays/backend-tenant-lab-v99-20260703') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      EXPECTED_FIREBASE_PROJECT_ID: ays-orbit-360-lab
      REQUESTED_SOURCE_REF: ${{ inputs.source_ref }}
      SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      ORBIT360_LAB_LOGIN_PASSWORD: ${{ secrets.ORBIT360_LAB_LOGIN_PASSWORD }}

    steps:
      - name: Checkout authorized branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.event.pull_request.head.sha || github.sha }}

      - name: Resolve and enforce authorized source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          case "$GITHUB_EVENT_NAME" in
            push) SOURCE_BRANCH="$GITHUB_REF_NAME" ;;
            pull_request) SOURCE_BRANCH="$GITHUB_HEAD_REF" ;;
            workflow_call) SOURCE_BRANCH="${REQUESTED_SOURCE_REF:-}" ;;
            workflow_dispatch) SOURCE_BRANCH="${REQUESTED_SOURCE_REF:-$GITHUB_REF_NAME}" ;;
            *) SOURCE_BRANCH="" ;;
          esac
          test "$SOURCE_BRANCH" = "ays/backend-tenant-lab-v99-20260703"
          test -f firebase.json
          test -f firestore.rules
          test -f orbit360-platform/ays-lab-preview.html
          test -f orbit360-platform/core/backend-lab-loader.js
          test -f orbit360-platform/core/backend-lab-auth-guard.js
          test -f orbit360-platform/core/backend-lab-import-readiness-guard.js
          test -f orbit360-platform/core/backend-lab-canonical-view-sync.js
          test -f orbit360-platform/core/router.js
          test -f orbit360-platform/modules/aseguradoras-v1197-ux-bridge.js
          test -f orbit360-platform/modules/importar-initial-tenant-lab.js
          test -f tools/orbit360-ensure-lab-user.mjs
          test -f tools/orbit360-verify-lab-data-counts.mjs
          test -f tools/orbit360-test-import-initial-pending-insurers.mjs
          test -f tools/orbit360-test-lab-import-readiness.mjs
          test -f tools/orbit360-test-lab-canonical-view-sync.mjs
          if git ls-files | grep -Eq '(^|/)auth-firebase\.config\.local\.js$|(^|/)CARGA-INICIAL-AYS-.*\.json$|(^|/)(clientes|aseguradoras)\.json$'; then
            echo "BLOQUEO_ARCHIVO_PRIVADO_VERSIONADO"
            exit 41
          fi
          echo "branch=$SOURCE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Resolve and validate Firebase LAB service account
        id: firebase_auth
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then echo "BLOQUEO_SECRET_LAB"; exit 42; fi
          if [ ${#ORBIT360_LAB_LOGIN_PASSWORD} -lt 12 ]; then echo "BLOQUEO_LOGIN_LAB"; exit 46; fi
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          PROJECT_ID="$(jq -r '.project_id // empty' "$KEY_FILE")"
          test "$PROJECT_ID" = "$EXPECTED_FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

      - name: Validate JavaScript syntax and import contract
        shell: bash
        run: |
          set -euo pipefail
          node --check orbit360-platform/core/backend-lab-loader.js
          node --check orbit360-platform/core/backend-lab-init.js
          node --check orbit360-platform/core/backend-lab-auth-guard.js
          node --check orbit360-platform/core/backend-lab-import-readiness-guard.js
          node --check orbit360-platform/core/backend-lab-canonical-view-sync.js
          node --check orbit360-platform/core/router.js
          node --check orbit360-platform/core/importa-dryrun-p0.js
          node --check orbit360-platform/core/importa-write-p0.js
          node --check orbit360-platform/core/pwa.js
          node --check orbit360-platform/core/auth.js
          node --check orbit360-platform/data/import-initial-profiles.js
          node --check orbit360-platform/modules/aseguradoras-v1197-ux-bridge.js
          node --check orbit360-platform/modules/importar-initial-tenant-lab.js
          node --check tools/orbit360-ensure-lab-user.mjs
          node --check tools/orbit360-verify-lab-data-counts.mjs
          node --check tools/orbit360-test-import-initial-pending-insurers.mjs
          node --check tools/orbit360-test-lab-import-readiness.mjs
          node --check tools/orbit360-test-lab-canonical-view-sync.mjs
          timeout 30s node tools/orbit360-test-import-initial-pending-insurers.mjs
          timeout 30s node tools/orbit360-test-lab-import-readiness.mjs
          timeout 30s node tools/orbit360-test-lab-canonical-view-sync.mjs

      - name: Ensure canonical LAB user and tenant membership
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save firebase-admin@13
          node tools/orbit360-ensure-lab-user.mjs
          node tools/orbit360-verify-lab-data-counts.mjs

      - name: Upload sanitized tenant counts
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-lab-data-counts-${{ github.run_id }}
          path: orbit360-platform/lab-data-counts.json
          if-no-files-found: error
          retention-days: 7

      - name: Deploy Firestore rules to authorized LAB project
        id: rules_deploy
        shell: bash
        run: |
          set +e
          test "$FIREBASE_PROJECT_ID" = "$EXPECTED_FIREBASE_PROJECT_ID"
          LOG_FILE="${RUNNER_TEMP}/firestore-rules-deploy.log"
          npx --yes firebase-tools@latest deploy \
            --only firestore:rules \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive > "$LOG_FILE" 2>&1
          CODE=$?
          CATEGORY="ok"
          if [ "$CODE" -ne 0 ]; then
            if grep -Eqi 'permission|forbidden|not authorized|403|iam' "$LOG_FILE"; then CATEGORY="permission_denied"
            elif grep -Eqi 'syntax|parse|compile|invalid rules' "$LOG_FILE"; then CATEGORY="rules_invalid"
            elif grep -Eqi 'project|not found|does not exist' "$LOG_FILE"; then CATEGORY="project_mismatch"
            else CATEGORY="deploy_failed"
            fi
          fi
          if [ "$CODE" -eq 0 ]; then OK="true"; else OK="false"; fi
          echo "ok=$OK" >> "$GITHUB_OUTPUT"
          echo "category=$CATEGORY" >> "$GITHUB_OUTPUT"
          echo "exit_code=$CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish sanitized LAB runtime status and build seal
        shell: bash
        run: |
          set -euo pipefail
          RULES_OK='${{ steps.rules_deploy.outputs.ok }}'
          RULES_CATEGORY='${{ steps.rules_deploy.outputs.category }}'
          RULES_EXIT='${{ steps.rules_deploy.outputs.exit_code }}'
          jq -n \
            --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg commit "$GITHUB_SHA" \
            --arg run "$GITHUB_RUN_ID" \
            --arg branch '${{ steps.source.outputs.branch }}' \
            --arg projectId "$FIREBASE_PROJECT_ID" \
            --arg rulesCategory "$RULES_CATEGORY" \
            --arg rulesExit "$RULES_EXIT" \
            --argjson rulesOk "$RULES_OK" \
            '{schemaVersion:"orbit360-lab-runtime-status-v2",generatedAt:$generatedAt,commit:$commit,run:$run,branch:$branch,projectId:$projectId,membershipBootstrap:true,rulesDeploy:{ok:$rulesOk,category:$rulesCategory,exitCode:$rulesExit},containsSecrets:false}' \
            > orbit360-platform/lab-runtime-status.json
          printf '{"schemaVersion":"orbit360-runtime-build-v1","commit":"%s","run":"%s","branch":"%s"}\n' \
            "$GITHUB_SHA" "$GITHUB_RUN_ID" '${{ steps.source.outputs.branch }}' \
            > orbit360-platform/runtime-build.json

      - name: Deploy and verify fixed preview channel
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_JSON="${RUNNER_TEMP}/firebase-preview.json"
          npx --yes firebase-tools@latest hosting:channel:deploy orbit360-ays-lab \
            --project "$FIREBASE_PROJECT_ID" \
            --expires 30d \
            --non-interactive \
            --json | tee "$DEPLOY_JSON"

          URL="$(jq -r '.. | strings | select(test("^https://[^/]*--orbit360-ays-lab[^/]*\\.(web\\.app|firebaseapp\\.com)$"))' "$DEPLOY_JSON" | head -n 1)"
          if [ -z "$URL" ]; then
            echo "BLOQUEO_URL_CANAL_LAB_NO_ENCONTRADA"
            jq -r '.. | strings | select(test("^https://"))' "$DEPLOY_JSON" || true
            exit 44
          fi
          case "$URL" in
            *--orbit360-ays-lab*) ;;
            *) echo "BLOQUEO_URL_NO_CORRESPONDE_AL_CANAL_LAB"; exit 45 ;;
          esac

          BUILD_JSON="$(curl -fsSL --retry 6 --retry-delay 2 --retry-all-errors "$URL/runtime-build.json")"
          test "$(printf '%s' "$BUILD_JSON" | jq -r '.commit // empty')" = "$GITHUB_SHA"
          test "$(printf '%s' "$BUILD_JSON" | jq -r '.run // empty')" = "$GITHUB_RUN_ID"
          curl -fsSL --retry 6 --retry-delay 2 --retry-all-errors "$URL/core/backend-lab-loader.js" | grep -q 'Backend LAB loader'
          curl -fsSL --retry 6 --retry-delay 2 --retry-all-errors "$URL/ays-lab-preview.html" | grep -q 'orbit-preview-version'

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          {
            echo "## Orbit 360 A&S LAB Preview"
            echo ""
            echo "Commit verificado: $GITHUB_SHA"
            echo ""
            echo "Run: $GITHUB_RUN_ID"
            echo ""
            echo "Preview base: $URL"
            echo ""
            echo "Acceso directo: ${URL}/ays-lab-preview.html"
            echo ""
            echo "Diagnóstico sanitizado: ${URL}/lab-runtime-status.json"
            echo ""
            echo "Conteos del tenant: ${URL}/lab-data-counts.json"
            echo ""
            echo "Canal: orbit360-ays-lab · expiración renovable 30 días · no live."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report Firestore rules deployment status
        shell: bash
        run: |
          set -euo pipefail
          if [ '${{ steps.rules_deploy.outputs.ok }}' != 'true' ]; then
            echo "::warning::Las reglas LAB no se actualizaron en esta ejecución. Categoría: ${{ steps.rules_deploy.outputs.category }}. El preview se publicó sin modificar reglas."
          fi
