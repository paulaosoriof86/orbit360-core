name: Orbit 360 A&S LAB Preview Manual Fallback

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manual_notice:
    name: Canonical workflow notice
    runs-on: ubuntu-latest
    steps:
      - name: Inform canonical deployment path
        shell: bash
        run: |
          {
            echo "## Orbit 360 A&S LAB"
            echo ""
            echo "La publicación y validación automática canónica se ejecutan en:"
            echo ""
            echo "orbit360-aseguradoras-runtime-gate-v20260716.yml"
            echo ""
            echo "Este workflow queda solo como referencia manual para evitar dos despliegues simultáneos, resultados contradictorios y ciclos de diagnóstico duplicados."
          } >> "$GITHUB_STEP_SUMMARY"
