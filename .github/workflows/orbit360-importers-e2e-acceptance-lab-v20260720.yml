name: Orbit 360 Importers E2E Acceptance LAB 20260720 V4
run-name: M1 importadores v4 rollback verificado · ${{ github.sha }}

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-importers-e2e-acceptance-lab-v20260720.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: orbit360-importers-e2e-v4-single-execution
  cancel-in-progress: true

jobs:
  preflight:
    name: Importadores · preflight vinculante sin secretos
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      validated_sha: ${{ steps.validated-head.outputs.sha }}
    steps:
      - name: Checkout SHA inmutable
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Preflight vinculante antes de secretos
        id: validated-head
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = "push"
          test "$GITHUB_REF_NAME" = "ays/backend-tenant-lab-v99-20260703"
          ACTUAL_SHA="$(git rev-parse HEAD)"
          test "$ACTUAL_SHA" = "$GITHUB_SHA"
          echo "sha=$ACTUAL_SHA" >> "$GITHUB_OUTPUT"
          echo "IMPORTERS_E2E_V4_SINGLE_EXECUTION"
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs importers-e2e-acceptance-lab-v20260720

      - name: Validar estructura inmutable y ausencia de redeploy
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = '.github/workflows/orbit360-importers-e2e-acceptance-lab-v20260720.yml';
          const source = fs.readFileSync(path, 'utf8').replace(/\r\n/g, '\n');
          const lines = source.split('\n');

          function topLevelBlock(name) {
            const start = lines.findIndex((line) => line === `${name}:`);
            if (start < 0) throw new Error(`TOP_LEVEL_BLOCK_MISSING_${name.toUpperCase()}`);
            const block = [];
            for (let index = start + 1; index < lines.length; index += 1) {
              const line = lines[index];
              if (/^[A-Za-z0-9_-]+:\s*$/.test(line)) break;
              block.push(line);
            }
            return block;
          }

          const onBlock = topLevelBlock('on');
          const triggerKeys = onBlock
            .map((line) => line.match(/^  ([A-Za-z0-9_-]+):\s*$/))
            .filter(Boolean)
            .map((match) => match[1]);
          if (triggerKeys.length !== 1 || triggerKeys[0] !== 'push') {
            throw new Error(`TRIGGER_SET_NOT_SINGLE_PUSH_${triggerKeys.join('_') || 'EMPTY'}`);
          }
          if (!onBlock.some((line) => /^      - ays\/backend-tenant-lab-v99-20260703\s*$/.test(line))) {
            throw new Error('AUTHORIZED_BRANCH_MISSING');
          }
          if (!onBlock.some((line) => /^      - ["']?\.github\/workflows\/orbit360-importers-e2e-acceptance-lab-v20260720\.yml["']?\s*$/.test(line))) {
            throw new Error('WORKFLOW_SELF_PATH_FILTER_MISSING');
          }

          const checkoutCount = lines.filter((line) => /^\s+uses:\s+actions\/checkout@v4\s*$/.test(line)).length;
          const checkoutRefs = lines
            .map((line) => line.match(/^\s+ref:\s*(.+?)\s*$/))
            .filter(Boolean)
            .map((match) => match[1]);
          const immutableRef = '$' + '{{ github.sha }}';
          if (checkoutCount !== 2) throw new Error(`CHECKOUT_ACTION_COUNT_${checkoutCount}`);
          if (checkoutRefs.length !== checkoutCount) throw new Error(`CHECKOUT_REF_COUNT_${checkoutRefs.length}`);
          if (!checkoutRefs.every((value) => value === immutableRef)) {
            throw new Error(`NON_IMMUTABLE_CHECKOUT_REF_${checkoutRefs.join('_')}`);
          }

          const concurrencyBlock = topLevelBlock('concurrency');
          const group = concurrencyBlock
            .map((line) => line.match(/^  group:\s*(.+?)\s*$/))
            .filter(Boolean)
            .map((match) => match[1]);
          const cancel = concurrencyBlock
            .map((line) => line.match(/^  cancel-in-progress:\s*(.+?)\s*$/))
            .filter(Boolean)
            .map((match) => match[1]);
          if (group.length !== 1 || group[0] !== 'orbit360-importers-e2e-v4-single-execution') {
            throw new Error(`CONCURRENCY_GROUP_INVALID_${group.join('_') || 'EMPTY'}`);
          }
          if (cancel.length !== 1 || cancel[0] !== 'true') {
            throw new Error(`CANCEL_IN_PROGRESS_INVALID_${cancel.join('_') || 'EMPTY'}`);
          }

          const forbiddenProviderSelector = ['--only', 'functions:'].join(' ');
          if (source.includes(forbiddenProviderSelector)) throw new Error('PROVIDER_REDEPLOY_FORBIDDEN');
          if (!source.includes('No provider redeploy')) throw new Error('NO_REDEPLOY_CONTRACT_TOKEN_MISSING');
          console.log('ORBIT360_IMMUTABLE_CURRENT_PROVIDER_WORKFLOW_OK');
          NODE

      - name: Validar owners y contratos vigentes
        shell: bash
        run: |
          set -euo pipefail
          node --check functions/index.js
          node --check orbit360-platform/core/session-readiness-contract-v20260720.js
          node --check orbit360-platform/core/membership-multirol-contract-p0.js
          node --check orbit360-platform/core/importer-execution-contract-v20260720.js
          node --check tools/orbit360-ensure-lab-secure-membership-v20260720.mjs
          node --check tools/orbit360-validate-provider-role-normalization-v20260720.mjs
          node --check tools/orbit360-diagnose-credential-provider-auth-v20260720-v2.mjs
          node --check tools/orbit360-prepare-orphan-vault-rollback-state-v20260720.mjs
          node --check tools/orbit360-importers-e2e-vault-rollback-v20260720.mjs
          node --check tools/orbit360-importers-e2e-browser-v20260720.mjs
          node --check tools/orbit360-run-importers-e2e-gate-v20260720.mjs
          node --check tools/orbit360-importers-e2e-finalize-v20260720.mjs
          node tools/orbit360-validate-provider-role-normalization-v20260720.mjs
          node tools/orbit360-validate-session-readiness-contract-v20260720.mjs

  e2e:
    name: Importadores · proveedor vigente, rollback, UI legal, store y auditoría
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      ORBIT360_GATE_ID: importers-e2e-acceptance-lab-v20260720
      ORBIT360_HOSTING_CHANNEL: orbit360-ays-lab
      ORBIT360_LAB_LOGIN_EMAIL: orbit.lab@demo.com
      ORBIT360_EXPECTED_UID: woJlxR1iFEeiQZvTscPj4qQ5Qc73
      ORBIT360_LAB_LOGIN_PASSWORD: ${{ secrets.ORBIT360_LAB_LOGIN_PASSWORD }}
      SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      ORBIT360_IMPORTERS_E2E_EVIDENCE: orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-acceptance-sanitized.json
      ORBIT360_PREFLIGHT_EVIDENCE: orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
      ORBIT360_MEMBERSHIP_EVIDENCE: orbit360-platform/runtime-gate-crm-v20260716/membership-contract-sanitized.json
      ORBIT360_PROVIDER_AUTH_DIAGNOSTIC: orbit360-platform/runtime-gate-crm-v20260716/provider-authorization-diagnostic-sanitized.json
      ORBIT360_IMPORTERS_E2E_VAULT_ROLLBACK: orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-vault-rollback-sanitized.json
      ORBIT360_ORPHAN_STATE_PATH: orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-orphan-state.json
      ORBIT360_ORPHAN_ROLLBACK_EVIDENCE: orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-orphan-vault-rollback-sanitized.json
      ORBIT360_ROLLBACK_TARGET_RUN_ID: "29782834288"
      ORBIT360_REFERENCE_DEPLOY_RUN_ID: "29781660851"
      ORBIT360_REFERENCE_DEPLOY_START: "2026-07-20T21:49:46Z"
      ORBIT360_REFERENCE_DEPLOY_END: "2026-07-20T21:53:15Z"
      ORBIT360_VALIDATED_SHA: ${{ needs.preflight.outputs.validated_sha }}
    steps:
      - name: Checkout SHA inmutable
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Confirmar mismo HEAD del preflight
        shell: bash
        run: |
          set -euo pipefail
          ACTUAL_SHA="$(git rev-parse HEAD)"
          test "$ACTUAL_SHA" = "$GITHUB_SHA"
          test "$ACTUAL_SHA" = "$ORBIT360_VALIDATED_SHA"
          echo "ORBIT360_SAME_HEAD_ACROSS_JOBS_OK"

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolver cuenta LAB después del preflight
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then echo "BLOQUEO_SECRET_LAB"; exit 42; fi
          if [ ${#ORBIT360_LAB_LOGIN_PASSWORD} -lt 12 ]; then echo "BLOQUEO_LOGIN_LAB"; exit 46; fi
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          PROJECT_ID="$(jq -r '.project_id // empty' "$KEY_FILE")"
          test "$PROJECT_ID" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencias verificadas
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save firebase-admin@13 google-auth-library@9 playwright@1.52.0 xlsx@0.18.5 firebase-tools@15.24.0 @google-cloud/secret-manager@6.2.0
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('node_modules/firebase-tools/package.json', 'utf8'));
          if (pkg.version !== '15.24.0') throw new Error(`FIREBASE_TOOLS_VERSION_${pkg.version}`);
          console.log('FIREBASE_TOOLS_PINNED_15.24.0');
          NODE
          node -e "require('firebase-admin'); require('google-auth-library'); require('xlsx'); require('@google-cloud/secret-manager'); console.log('SECRET_MANAGER_ROLLBACK_DEPENDENCY_OK')"
          npx playwright install --with-deps chromium

      - name: Verificar proveedor vigente sin redeploy
        id: provider_diagnostic
        shell: bash
        run: node tools/orbit360-diagnose-credential-provider-auth-v20260720-v2.mjs

      - name: Validar revisión remota antes del importador
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const diagnostic = JSON.parse(fs.readFileSync(process.env.ORBIT360_PROVIDER_AUTH_DIAGNOSTIC, 'utf8'));
          if (diagnostic.mode !== 'read_only') throw new Error('PROVIDER_DIAGNOSTIC_NOT_READ_ONLY');
          if (diagnostic.deploymentClassification !== 'DEPLOYMENT_CONFIRMED_CURRENT') {
            throw new Error(`PROVIDER_REVISION_NOT_CURRENT:${diagnostic.deploymentClassification || 'UNKNOWN'}`);
          }
          if (diagnostic.providerAuthorizationReady !== true || diagnostic.classification !== 'PROVIDER_AUTHORIZATION_LAYER_READY') {
            throw new Error(`PROVIDER_AUTHORIZATION_NOT_READY:${diagnostic.classification || 'UNKNOWN'}`);
          }
          if (diagnostic.checks?.allFunctionsActive !== true || diagnostic.checks?.allLatestRevisionsReady !== true) {
            throw new Error('PROVIDER_FUNCTIONS_NOT_READY');
          }
          console.log('ORBIT360_PROVIDER_CURRENT_AND_AUTHORIZED');
          NODE

      - name: Preparar limpieza determinística del residuo anterior
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-prepare-orphan-vault-rollback-state-v20260720.mjs
          echo "ORBIT360_ORPHAN_VAULT_ROLLBACK_STATE_READY"

      - name: Retirar y verificar residuo sintético antes del nuevo fixture
        shell: bash
        run: |
          set -euo pipefail
          ORBIT360_IMPORTERS_E2E_STATE="$ORBIT360_ORPHAN_STATE_PATH" \
          ORBIT360_IMPORTERS_E2E_VAULT_ROLLBACK="$ORBIT360_ORPHAN_ROLLBACK_EVIDENCE" \
          node tools/orbit360-importers-e2e-vault-rollback-v20260720.mjs
          node <<'NODE'
          const fs = require('fs');
          const rollback = JSON.parse(fs.readFileSync(process.env.ORBIT360_ORPHAN_ROLLBACK_EVIDENCE, 'utf8'));
          if (rollback.vaultRecordDeleted !== true) throw new Error('ORPHAN_VAULT_RECORD_NOT_DELETED');
          if (rollback.transientVersionDestroyed !== true) throw new Error('ORPHAN_TRANSIENT_VERSION_NOT_DESTROYED');
          if (rollback.otherRecordsPreserved !== true) throw new Error('ORPHAN_OTHER_RECORDS_NOT_PRESERVED');
          if (rollback.containsPII !== false || rollback.containsSecrets !== false) throw new Error('ORPHAN_ROLLBACK_SANITIZATION_FAILED');
          console.log('ORBIT360_IMPORTERS_E2E_VAULT_ROLLBACK_OK');
          NODE

      - name: Ejecutar gate integral una sola vez
        id: integrated_gate
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-run-importers-e2e-gate-v20260720.mjs

      - name: Publicar evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-importers-e2e-v4-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
            orbit360-platform/runtime-gate-crm-v20260716/provider-authorization-diagnostic-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-orphan-vault-rollback-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/membership-contract-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-acceptance-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-cleanup-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-vault-rollback-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-coordinator-sanitized.json
            orbit360-platform/runtime-build.json
          if-no-files-found: warn
          retention-days: 7

      - name: Actualizar estado observable en PR 5
        if: always()
        uses: actions/github-script@v7
        env:
          TARGET_PR: "5"
          DIAGNOSTIC_PATH: orbit360-platform/runtime-gate-crm-v20260716/provider-authorization-diagnostic-sanitized.json
          ORPHAN_PATH: orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-orphan-vault-rollback-sanitized.json
          CURRENT_ROLLBACK_PATH: orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-vault-rollback-sanitized.json
          E2E_PATH: orbit360-platform/runtime-gate-crm-v20260716/importers-e2e-acceptance-sanitized.json
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
          GATE_OUTCOME: ${{ steps.integrated_gate.outcome }}
        with:
          script: |
            const fs = require('fs');
            const read = (path, fallback) => fs.existsSync(path) ? JSON.parse(fs.readFileSync(path, 'utf8')) : fallback;
            const diagnostic = read(process.env.DIAGNOSTIC_PATH, { classification: 'EVIDENCE_MISSING', deploymentClassification: 'EVIDENCE_MISSING', providerAuthorizationReady: false, checks: {} });
            const orphan = read(process.env.ORPHAN_PATH, {});
            const currentRollback = read(process.env.CURRENT_ROLLBACK_PATH, {});
            const e2e = read(process.env.E2E_PATH, { stage: 'not_executed', predicates: {}, ok: false });
            const predicates = e2e.predicates || {};
            const start = '<!-- ORBIT360_M1_V4_FINAL_START -->';
            const end = '<!-- ORBIT360_M1_V4_FINAL_END -->';
            const block = `${start}
            ## Gate integral M1 v4 · evidencia sanitizada

            \`\`\`txt
            run: ${process.env.RUN_ID}
            HEAD evaluado: ${process.env.HEAD_SHA}
            proveedor remoto: ${diagnostic.deploymentClassification || 'UNKNOWN'}
            autorización proveedor: ${diagnostic.classification || 'UNKNOWN'}
            redeploy proveedor: false
            gate outcome: ${process.env.GATE_OUTCOME || 'not_executed'}
            etapa E2E: ${e2e.stage || 'missing'}
            ok: ${e2e.ok === true}
            \`\`\`

            - Revisión remota vigente: **${diagnostic.deploymentClassification === 'DEPLOYMENT_CONFIRMED_CURRENT'}**
            - Cuatro Functions activas: **${diagnostic.checks?.allFunctionsActive === true}**
            - Residuo anterior retirado: **${orphan.vaultRecordDeleted === true && orphan.transientVersionDestroyed === true && orphan.otherRecordsPreserved === true}**
            - Autenticación navegador: **${predicates.browserAuthReady === true}**
            - Rol activo resuelto: **${predicates.activeRoleResolved === true}**
            - Tenant resuelto: **${predicates.tenantResolved === true}**
            - Gate legal satisfecho: **${predicates.legalGateSatisfied === true}**
            - Proveedor invocado: **${predicates.providerInvoked === true}**
            - Confirmación remota: **${predicates.remoteConfirmationObserved === true || predicates.remoteConfirmation === true}**
            - Referencia opaca: **${predicates.opaqueReferenceObserved === true || predicates.storeWriteObserved === true}**
            - Read-after-write: **${predicates.readAfterWriteObserved === true || predicates.readAfterWriteOk === true}**
            - Auditoría de éxito: **${predicates.auditSuccessObserved === true}**
            - Auditoría de rechazo: **${predicates.auditFailureObserved === true}**
            - Secretos en store operativo: **${predicates.plaintextSecretsInOperationalStore === true}**
            - Rollback actual — registro eliminado: **${currentRollback.vaultRecordDeleted === true}**
            - Rollback actual — versión destruida: **${currentRollback.transientVersionDestroyed === true}**
            - Rollback integral: **${predicates.rollbackOk === true}**
            - Hosting productivo, main o merge: **false**
            ${end}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number(process.env.TARGET_PR);
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            const current = pr.body || '';
            const pattern = new RegExp(`${start}[\\s\\S]*?${end}`, 'm');
            const body = pattern.test(current) ? current.replace(pattern, block) : `${current.trim()}\n\n${block}\n`;
            await github.rest.pulls.update({ owner, repo, pull_number, body });

      - name: Limpiar cuenta temporal
        if: always()
        shell: bash
        run: rm -f "${RUNNER_TEMP}/orbit360-firebase-lab.json"

      - name: Resumen de alcance
        if: always()
        shell: bash
        run: |
          {
            echo "## Importadores E2E · rollback verificado"
            echo ""
            echo "Gate: importers-e2e-acceptance-lab-v20260720"
            echo ""
            echo "Commit validado: ${ORBIT360_VALIDATED_SHA}"
            echo ""
            echo "No provider redeploy"
            echo ""
            echo "No production, main or merge"
          } >> "$GITHUB_STEP_SUMMARY"
