name: Orbit 360 · Gate final read-only Cliente 360 y Aseguradoras

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'tools/orbit360-authorize-final-block1-gate-readonly-v20260721.json'

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

concurrency:
  group: orbit360-final-block1-readonly-v1
  cancel-in-progress: false

env:
  EXPECTED_FIREBASE_PROJECT_ID: ays-orbit-360-lab
  FIREBASE_PROJECT_ID: ays-orbit-360-lab
  ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  ORBIT360_HOSTING_CHANNEL: orbit360-ays-lab
  ORBIT360_FINAL_GATE_AUTHORIZATION_ID: final-block1-readonly-gate-v1
  ORBIT360_PREVIEW_URL: https://ays-orbit-360-lab--orbit360-ays-lab-fj1zxnk2.web.app
  ORBIT360_LAB_LOGIN_EMAIL: orbit.lab@demo.com
  ORBIT360_LAB_LOGIN_PASSWORD: ${{ secrets.ORBIT360_LAB_LOGIN_PASSWORD }}
  SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
  SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
  SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

jobs:
  final-readonly-gate:
    name: Cliente 360 + Aseguradoras · gate final único sin deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout SHA exacto
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validar autorización final sin credenciales
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "$ORBIT360_BRANCH"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          MARKER='tools/orbit360-authorize-final-block1-gate-readonly-v20260721.json'
          FREEZE='tools/orbit360-incident-freeze-v20260721.json'
          INVENTORY_REF='orbit360-platform/docs/evidence/post-recovery-inventory-29868538689-sanitized.json'
          test -f "$MARKER" && test -f "$FREEZE" && test -f "$INVENTORY_REF"
          test "$(jq -r '.authorizationId' "$MARKER")" = "$ORBIT360_FINAL_GATE_AUTHORIZATION_ID"
          test "$(jq -r '.action' "$MARKER")" = 'unique_final_block1_gate_readonly'
          test "$(jq -r '.allowedExecutions' "$MARKER")" = '1'
          test "$(jq -r '.writesAllowed' "$MARKER")" = 'false'
          test "$(jq -r '.deployAllowed' "$MARKER")" = 'false'
          test "$(jq -r '.status' "$FREEZE")" = 'FINAL_BLOCK1_GATE_READONLY_AUTHORIZED'
          test "$(jq -r '.finalGateAuthorization.authorizationId' "$FREEZE")" = "$ORBIT360_FINAL_GATE_AUTHORIZATION_ID"
          test "$(jq -r '.finalGateAuthorization.active' "$FREEZE")" = 'true'
          test "$(jq -r '.finalGateAuthorization.deployAllowed' "$FREEZE")" = 'false'
          test "$(jq -r '.inventoryEvidence.ok' "$FREEZE")" = 'true'
          test "$(jq -r '.inventoryEvidence.runId' "$FREEZE")" = '29868538689'
          test "$(jq -r '.ok' "$INVENTORY_REF")" = 'true'
          test "$(jq -r '.inventory.validReferences' "$INVENTORY_REF")" = '91'
          test "$(jq -r '.inventory.pendingReferences' "$INVENTORY_REF")" = '2'
          test "$(jq -r '.inventory.uniqueValidReferences' "$INVENTORY_REF")" = '91'
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
          node --check tools/orbit360-runtime-check-client360-v20260716.mjs
          node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          node --check tools/orbit360-gate-environment-v20260717.mjs

      - name: Preflight vinculante · contrato final
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"
          test "$(jq -r '.status' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = 'GO_GATE_CONTRACT'

      - name: Validación estática · owners y sintaxis
        shell: bash
        run: |
          set -euo pipefail
          node --check orbit360-platform/sw.js
          node --check orbit360-platform/core/pwa.js
          node --check orbit360-platform/core/backend-lab-loader.js
          node --check orbit360-platform/core/router.js
          node --check orbit360-platform/core/legal.js
          node --check orbit360-platform/core/access-scope.js
          node --check orbit360-platform/core/backend-lab-init.js
          node --check orbit360-platform/core/client-canonical-view-projection-v20260716.js
          node --check orbit360-platform/core/session-multirol-visibility-v20260716.js
          node --check orbit360-platform/modules/cliente360.js
          node --check orbit360-platform/modules/aseguradoras.js
          node --check orbit360-platform/modules/calidad.js
          node --check orbit360-platform/modules/aseguradoras-v1202-import-bridge.js
          node orbit360-platform/tools/orbit360-block0-architecture-gate-v20260717.js
          node orbit360-platform/tools/orbit360-aseguradoras-owner-contract-v20260717.js
          node tools/orbit360-validar-recuperacion-frontend-conocimiento-v20260716.mjs

      - name: Resolver identidad LAB
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          test -n "$SERVICE_ACCOUNT"
          test ${#ORBIT360_LAB_LOGIN_PASSWORD} -ge 12
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab-final-gate.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$EXPECTED_FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencias read-only
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save firebase-admin@13 playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Verificar conteos y conocimiento LAB sin escribir
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-verify-lab-data-counts.mjs
          node tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs
          test "$(jq -r '.counts.clientes' orbit360-platform/lab-data-counts.json)" = '414'
          test "$(jq -r '.counts.aseguradoras' orbit360-platform/lab-data-counts.json)" = '26'
          test "$(jq -r '.counts.asesores' orbit360-platform/lab-data-counts.json)" = '7'

      - name: Verificar canal LAB existente sin deploy
        id: runtime
        shell: bash
        run: |
          set -euo pipefail
          DIAG_DIR='orbit360-platform/runtime-gate-crm-v20260716'
          mkdir -p "$DIAG_DIR"
          BUILD_JSON="$(curl -fsSL --retry 6 --retry-delay 2 --retry-all-errors -H 'Cache-Control: no-cache' "${ORBIT360_PREVIEW_URL}/runtime-build.json?finalGate=${GITHUB_RUN_ID}")"
          DEPLOYED_SHA="$(printf '%s' "$BUILD_JSON" | jq -r '.commit // empty')"
          DEPLOYED_RUNTIME="$(printf '%s' "$BUILD_JSON" | jq -r '.runtimeVersion // empty')"
          DEPLOYED_GATE="$(printf '%s' "$BUILD_JSON" | jq -r '.gateId // empty')"
          test "$DEPLOYED_SHA" != ''
          test "$DEPLOYED_RUNTIME" != ''
          test "$DEPLOYED_GATE" != ''
          git cat-file -e "${DEPLOYED_SHA}^{commit}"
          RUNTIME_FILES=(
            orbit360-platform/ays-lab-preview.html
            orbit360-platform/index.html
            orbit360-platform/sw.js
            orbit360-platform/core/pwa.js
            orbit360-platform/core/backend-lab-loader.js
            orbit360-platform/core/backend-lab-init.js
            orbit360-platform/core/backend-lab-auth-guard.js
            orbit360-platform/data/store-firestore-lab.local.js
            orbit360-platform/core/router.js
            orbit360-platform/core/legal.js
            orbit360-platform/core/access-scope.js
            orbit360-platform/core/client-canonical-view-projection-v20260716.js
            orbit360-platform/core/router-tenant-config-bootstrap.js
            orbit360-platform/core/client-insurer-visual-contract-v20260720.js
            orbit360-platform/styles/client-insurer-visual-contract-v20260720.css
            orbit360-platform/modules/cliente360.js
            orbit360-platform/modules/aseguradoras.js
            orbit360-platform/modules/aseguradoras-v1197-ux-bridge.js
            orbit360-platform/modules/aseguradoras-v1202-resources-bridge.js
            orbit360-platform/modules/aseguradoras-v1202-import-bridge.js
            orbit360-platform/modules/calidad.js
            orbit360-platform/data/tenant-runtime-config-index.js
            orbit360-platform/core/backend-lab-canonical-view-sync.js
          )
          CHANGED="$(git diff --name-only "$DEPLOYED_SHA" "$GITHUB_SHA" -- "${RUNTIME_FILES[@]}")"
          test -z "$CHANGED"
          jq -n \
            --arg deployedSha "$DEPLOYED_SHA" \
            --arg deployedRuntime "$DEPLOYED_RUNTIME" \
            --arg deployedGate "$DEPLOYED_GATE" \
            --arg url "$ORBIT360_PREVIEW_URL" \
            '{schemaVersion:"orbit360-existing-lab-runtime-readonly-v1",ok:true,deployedSha:$deployedSha,deployedRuntime:$deployedRuntime,deployedGate:$deployedGate,url:$url,runtimeGraphChanged:false,deployExecuted:false,containsPII:false,containsSecrets:false}' \
            > "$DIAG_DIR/existing-runtime-sanitized.json"
          echo "runtime=$DEPLOYED_RUNTIME" >> "$GITHUB_OUTPUT"
          echo "sha=$DEPLOYED_SHA" >> "$GITHUB_OUTPUT"
          echo "ORBIT360_EXPECTED_RUNTIME=$DEPLOYED_RUNTIME" >> "$GITHUB_ENV"
          echo "ORBIT360_EXPECTED_COMMIT=$DEPLOYED_SHA" >> "$GITHUB_ENV"

      - name: Gate final único · tres vistas
        id: joint_gate
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-gate-runtime-crm-v20260716.mjs

      - name: Validar resultado sanitizado
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          REPORT='orbit360-platform/runtime-gate-crm-v20260716/resultado-sanitizado.json'
          test -f "$REPORT"
          jq -e '
            .ok == true and
            .gateId == "block1-client360-insurers-lab-v20260717" and
            .contractVersion == "1.0.27" and
            .containsPII == false and
            .containsSecrets == false and
            .checks.desktopDirection == true and
            .checks.tabletOperativo == true and
            .checks.mobileAsesor == true and
            .checks.realClientCount == true and
            .checks.realInsurerCount == true and
            .checks.realAdvisorCount == true and
            .checks.insurerReadMode == true and
            .checks.insurerKnowledgeVisible == true
          ' "$REPORT" >/dev/null
          test '${{ steps.joint_gate.outcome }}' = 'success'

      - name: Subir evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-final-block1-readonly-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
            orbit360-platform/lab-data-counts.json
            orbit360-platform/lab-aseguradoras-knowledge-inventory.json
            orbit360-platform/runtime-gate-crm-v20260716/existing-runtime-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/resultado-sanitizado.json
            orbit360-platform/runtime-gate-aseguradoras-v20260716/resultado-sanitizado.json
            orbit360-platform/docs/evidence/post-recovery-inventory-29868538689-sanitized.json
          if-no-files-found: error
          retention-days: 30

      - name: Publicar estado final
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          state=success
          description='M1 gate final read-only aprobado; revisión visual única habilitada'
          if [ "${{ job.status }}" != success ]; then
            state=failure
            description='M1 gate final falló; evidencia preservada y STOP THE LINE'
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context='orbit360/final-block1-readonly-v1' \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >/dev/null
