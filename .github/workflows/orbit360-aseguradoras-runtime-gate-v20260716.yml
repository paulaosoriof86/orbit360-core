name: Orbit 360 · M1 edit mode root patch · VALIDATION_ONLY

on:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths: ['tools/orbit360-m1-edit-mode-root-validation-request-v20260722.json']

permissions:
  contents: read
  statuses: write

concurrency:
  group: orbit360-m1-edit-mode-root-static-v1
  cancel-in-progress: false

env:
  ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  ORBIT360_GATE_PHASE: static_preflight
  ORBIT360_REQUEST_FILE: tools/orbit360-m1-edit-mode-root-validation-request-v20260722.json
  ORBIT360_REQUEST_ID: m1-edit-mode-root-static-validation-v1

jobs:
  static-validation:
    name: M1 edit mode · STATIC_PATCH_VALIDATED
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Checkout SHA exacto
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validar solicitud inmutable
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "${ORBIT360_BRANCH}"
          test "${GITHUB_RUN_ATTEMPT}" = '1'
          node <<'NODE'
          const fs=require('fs'),cp=require('child_process');
          const r=JSON.parse(fs.readFileSync(process.env.ORBIT360_REQUEST_FILE,'utf8'));
          const f=JSON.parse(fs.readFileSync('tools/orbit360-incident-freeze-v20260721.json','utf8'));
          const head=cp.execFileSync('git',['rev-parse','HEAD'],{encoding:'utf8'}).trim();
          const parent=cp.execFileSync('git',['rev-parse','HEAD^'],{encoding:'utf8'}).trim();
          const a=f.staticAuthorization||{},bad=[];
          if(r.schemaVersion!=='orbit360-m1-edit-mode-root-validation-request-v1'||r.requestId!==process.env.ORBIT360_REQUEST_ID)bad.push('request');
          if(r.gateId!==process.env.ORBIT360_GATE_ID||r.branch!==process.env.ORBIT360_BRANCH||r.contractVersion!=='1.0.39')bad.push('scope');
          if(r.patchCommit!==parent||r.allowedExecutions!==1||r.validationOnly!==true)bad.push('binding');
          if(r.secrets!==false||r.firestoreRead!==false||r.vaultRead!==false||r.writes!==false||r.runtime!==false||r.browser!==false||r.deploy!==false||r.functionsDeploy!==false||r.rulesDeploy!==false||r.production!==false||r.reimport!==false)bad.push('capabilities');
          if(f.status!=='M1_EDIT_ROOT_PATCH_READY_STATIC_VALIDATION_AUTHORIZED_ONCE'||a.authorizationId!==process.env.ORBIT360_REQUEST_ID||a.active!==true||a.consumed!==false||a.allowedExecutions!==1||a.phase!=='STATIC_PREFLIGHT')bad.push('freeze');
          if(!f.bindingTenantDecision||f.bindingTenantDecision.expectedActiveInsurers!==26||f.bindingTenantDecision.futureDeactivation!=='MANUAL_WITH_REASON_ONLY')bad.push('tenant-decision');
          if(bad.length)throw new Error('REQUEST_INVALID:'+bad.join(','));
          const outDir='orbit360-platform/runtime-gate-crm-v20260716';fs.mkdirSync(outDir,{recursive:true});
          fs.writeFileSync(`${outDir}/edit-mode-static-request-sanitized.json`,JSON.stringify({schemaVersion:r.schemaVersion,requestId:r.requestId,gateId:r.gateId,contractVersion:r.contractVersion,patchCommit:r.patchCommit,requestCommit:head,validationOnly:true,expectedInsurers:26,expectedActiveInsurers:26,manualDeactivationOnly:true,secrets:false,firestoreRead:false,vaultRead:false,writes:false,runtime:false,browser:false,deploy:false,functionsDeploy:false,rulesDeploy:false,production:false,reimport:false,containsPII:false,containsSecrets:false},null,2)+'\n');
          NODE

      - name: Validar sintaxis del patch
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node --check tools/orbit360-validar-gate-contracts-engine-capabilities-v20260722.mjs
          node --check orbit360-platform/core/client-insurer-edit-owner-v20260722.js
          node --check orbit360-platform/core/client-insurer-visual-stability-barrier-v20260721.js
          node --check orbit360-platform/core/router-tenant-config-bootstrap.js
          node --check orbit360-platform/data/tenant-alianzas-soluciones-insurers-p10.js
          node --check orbit360-platform/data/academia-v1230-operational-directory-v20260722.js
          node --check orbit360-platform/tools/orbit360-m1-edit-mode-root-contract-v20260722.js

      - name: Ejecutar preflight canónico
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "${ORBIT360_GATE_ID}" > orbit360-platform/runtime-gate-crm-v20260716/edit-mode-preflight.json
          jq -e '.status=="GO_GATE_CONTRACT" and .contractVersion=="1.0.39" and .executionPhase=="STATIC_PREFLIGHT" and .canonicalOwnerScope=="overlay_replace" and .runtimeContractScope=="overlay_replace" and .capabilityProfile.secrets==false and .capabilityProfile.firestoreRead==false and .capabilityProfile.writes==false and .capabilityProfile.runtime==false and .capabilityProfile.browser==false and .capabilityProfile.deploy==false and .capabilityProfile.functionsDeploy==false and .capabilityProfile.rulesDeploy==false and .capabilityProfile.production==false and .sourceTransformed==false and .operationalWrites==0' orbit360-platform/runtime-gate-crm-v20260716/edit-mode-preflight.json >/dev/null

      - name: Validar contrato raíz de edición
        shell: bash
        run: |
          set -euo pipefail
          node orbit360-platform/tools/orbit360-m1-edit-mode-root-contract-v20260722.js > orbit360-platform/runtime-gate-crm-v20260716/edit-mode-root-contract.json
          jq -e '.status=="PASS" and .contractVersion=="1.0.39" and .checksPassed==.checksTotal and .firestoreRead==false and .operationalWrites==0 and .deploy==false' orbit360-platform/runtime-gate-crm-v20260716/edit-mode-root-contract.json >/dev/null

      - name: Cerrar evidencia sanitizada
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs=require('fs'),d='orbit360-platform/runtime-gate-crm-v20260716';
          const read=n=>{try{return JSON.parse(fs.readFileSync(`${d}/${n}`,'utf8'))}catch{return null}};
          const p=read('edit-mode-preflight.json'),c=read('edit-mode-root-contract.json');
          const ok=!!(p&&p.status==='GO_GATE_CONTRACT'&&c&&c.status==='PASS'&&c.checksPassed===c.checksTotal);
          fs.writeFileSync(`${d}/edit-mode-static-summary.json`,JSON.stringify({schemaVersion:'orbit360-m1-edit-mode-root-static-v1',generatedAt:new Date().toISOString(),ok,status:ok?'STATIC_PATCH_VALIDATED':'STATIC_PATCH_FAILED',contractVersion:'1.0.39',preflight:p&&p.status||'NOT_RUN',rootContract:c&&c.status||'NOT_RUN',checksPassed:c&&c.checksPassed||0,checksTotal:c&&c.checksTotal||0,expectedInsurers:26,expectedActiveInsurers:26,manualDeactivationOnly:true,secrets:false,firestoreRead:false,vaultRead:false,writes:false,runtime:false,browser:false,deploy:false,functionsDeploy:false,rulesDeploy:false,production:false,reimport:false,containsPII:false,containsSecrets:false},null,2)+'\n');
          if(!ok)process.exitCode=41;
          NODE

      - name: Subir evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-m1-edit-mode-root-static-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/edit-mode-static-request-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
            orbit360-platform/runtime-gate-crm-v20260716/edit-mode-preflight.json
            orbit360-platform/runtime-gate-crm-v20260716/edit-mode-root-contract.json
            orbit360-platform/runtime-gate-crm-v20260716/edit-mode-static-summary.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publicar estado canónico
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          state=failure; description='M1 edit root static validation failed'
          if [ -f orbit360-platform/runtime-gate-crm-v20260716/edit-mode-static-summary.json ] && [ "$(jq -r '.ok' orbit360-platform/runtime-gate-crm-v20260716/edit-mode-static-summary.json)" = true ]; then state=success; description='M1 edit root STATIC_PATCH_VALIDATED'; fi
          curl --fail-with-body -sS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -d "$(jq -n --arg state "$state" --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --arg description "$description" '{state:$state,target_url:$target_url,description:$description,context:"orbit360/m1-edit-mode-root-static-v1"}')"
