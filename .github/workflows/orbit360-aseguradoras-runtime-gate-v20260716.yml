name: Orbit 360 · M1 directorio dinámico 1.0.40 · VALIDATION_ONLY_RETRY

on:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths: ['tools/orbit360-m1-dynamic-directory-static-preflight-retry-request-v20260723.json']

permissions:
  contents: read
  statuses: write

concurrency:
  group: orbit360-m1-dynamic-directory-static-preflight-retry-v1
  cancel-in-progress: false

env:
  ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  ORBIT360_GATE_PHASE: static_preflight
  ORBIT360_REQUEST_FILE: tools/orbit360-m1-dynamic-directory-static-preflight-retry-request-v20260723.json
  ORBIT360_REQUEST_ID: m1-dynamic-directory-static-preflight-retry-v1
  VALIDATED_PATCH_COMMIT: 6145e3b0a4173c582617bfc26dbfdc0c55b88b86

jobs:
  static-preflight-retry:
    name: M1 directorio dinámico · GO_STATIC_1_0_40_RETRY
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Checkout SHA exacto
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validar solicitud inmutable y autorización corregida
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "${ORBIT360_BRANCH}"
          test "${GITHUB_RUN_ATTEMPT}" = '1'
          node <<'NODE'
          const fs=require('fs'),cp=require('child_process');
          const r=JSON.parse(fs.readFileSync(process.env.ORBIT360_REQUEST_FILE,'utf8'));
          const f=JSON.parse(fs.readFileSync('tools/orbit360-incident-freeze-v20260721.json','utf8'));
          const head=cp.execFileSync('git',['rev-parse','HEAD'],{encoding:'utf8'}).trim();
          const parent=cp.execFileSync('git',['rev-parse','HEAD^'],{encoding:'utf8'}).trim();
          const a=f.staticPreflightRetryAuthorization||{},c=f.commitClosure||{},failed=f.failedStaticPreflight||{},bad=[];
          if(r.schemaVersion!=='orbit360-m1-dynamic-directory-static-preflight-retry-request-v1'||r.requestId!==process.env.ORBIT360_REQUEST_ID)bad.push('request');
          if(r.gateId!==process.env.ORBIT360_GATE_ID||r.branch!==process.env.ORBIT360_BRANCH||r.contractVersion!=='1.0.40')bad.push('scope');
          if(r.staticRetryAlignmentCommit!==parent||r.allowedExecutions!==1||r.validationOnlyRetry!==true)bad.push('binding');
          if(r.validatedPatchCommit!==process.env.VALIDATED_PATCH_COMMIT||r.commitClosureRunId!==30011170586||r.failedStaticRunId!==30011766401)bad.push('evidence');
          if(r.secrets!==false||r.firestoreRead!==false||r.vaultRead!==false||r.operationalWrites!==false||r.runtime!==false||r.browser!==false||r.deploy!==false||r.repositoryWrite!==false||r.functionsDeploy!==false||r.rulesDeploy!==false||r.production!==false||r.reimport!==false)bad.push('capabilities');
          if(f.status!=='M1_STATIC_PREFLIGHT_VALIDATOR_STALE_CORRECTED_RETRY_AUTHORIZED_ONCE'||f.stateClarification.nextAction!=='RUN_CORRECTED_CANONICAL_STATIC_PREFLIGHT_RETRY_ONCE')bad.push('freeze');
          if(a.authorizationId!==process.env.ORBIT360_REQUEST_ID||a.active!==true||a.consumed!==false||a.allowedExecutions!==1||a.validatedPatchCommit!==process.env.VALIDATED_PATCH_COMMIT||a.validatorCorrectionOnly!==true)bad.push('authorization');
          if(c.status!=='VALIDATED_PATCH_COMMITTED'||c.patchCommit!==process.env.VALIDATED_PATCH_COMMIT||c.checksPassed!==23||c.checksTotal!==23)bad.push('commit-closure');
          if(failed.runId!==30011766401||failed.canonicalChecksPassed!==151||failed.canonicalChecksTotal!==155||failed.failedChecks!==4||failed.classification!=='VALIDATOR_STALE')bad.push('failed-static-evidence');
          try{cp.execFileSync('git',['merge-base','--is-ancestor',process.env.VALIDATED_PATCH_COMMIT,parent]);}catch{bad.push('patch-ancestor');}
          if(bad.length)throw new Error('REQUEST_INVALID:'+bad.join(','));
          const d='orbit360-platform/runtime-gate-crm-v20260716';fs.mkdirSync(d,{recursive:true});
          fs.writeFileSync(`${d}/dynamic-directory-static-retry-request-sanitized.json`,JSON.stringify({schemaVersion:r.schemaVersion,requestId:r.requestId,contractVersion:r.contractVersion,staticRetryAlignmentCommit:r.staticRetryAlignmentCommit,requestCommit:head,validatedPatchCommit:r.validatedPatchCommit,commitClosureRunId:r.commitClosureRunId,failedStaticRunId:r.failedStaticRunId,validatorCorrectionOnly:true,checksExpected:23,validationOnlyRetry:true,secrets:false,firestoreRead:false,vaultRead:false,operationalWrites:false,runtime:false,browser:false,deploy:false,repositoryWrite:false,functionsDeploy:false,rulesDeploy:false,production:false,reimport:false,containsPII:false,containsSecrets:false},null,2)+'\n');
          NODE

      - name: Verificar patch congelado y cuatro correcciones contractuales
        shell: bash
        run: |
          set -euo pipefail
          git diff --quiet "${VALIDATED_PATCH_COMMIT}..HEAD" -- \
            orbit360-platform/modules/aseguradoras.js \
            orbit360-platform/core/client-insurer-edit-owner-v20260722.js \
            orbit360-platform/core/client-insurer-operational-directory-owner-v20260722.js \
            orbit360-platform/core/router-tenant-config-bootstrap.js \
            orbit360-platform/data/academia-v1230-operational-directory-v20260722.js \
            orbit360-platform/data/store.js \
            orbit360-platform/data/store-firestore-lab.local.js \
            orbit360-platform/core/auth.js \
            orbit360-platform/core/importa.js \
            firestore.rules
          ! grep -F 'runtime-gate-crm-v20260716/dynamic-directory-patch-sanitized.json' tools/orbit360-gate-contract-overlay-v20260718.json
          ! grep -F 'runtime-gate-crm-v20260716/dynamic-directory-contract-v3-sanitized.json' tools/orbit360-gate-contract-overlay-v20260718.json
          grep -F "visualContractDeliveryRevision: '20260723.8'" tools/orbit360-gate-contract-overlay-v20260718.json

      - name: Ejecutar preflight canónico corregido
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node --check tools/orbit360-validar-gate-contracts-engine-capabilities-v20260722.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "${ORBIT360_GATE_ID}" > orbit360-platform/runtime-gate-crm-v20260716/dynamic-directory-static-retry-preflight.json
          jq -e '.status=="GO_GATE_CONTRACT" and .contractVersion=="1.0.40" and .executionPhase=="STATIC_PREFLIGHT" and .canonicalOwnerScope=="overlay_replace" and .runtimeContractScope=="overlay_replace" and .failed==0 and .capabilityProfile.secrets==false and .capabilityProfile.firestoreRead==false and .capabilityProfile.writes==false and .capabilityProfile.runtime==false and .capabilityProfile.browser==false and .capabilityProfile.deploy==false and .capabilityProfile.functionsDeploy==false and .capabilityProfile.rulesDeploy==false and .capabilityProfile.production==false and .sourceTransformed==false and .dataAccess==false and .secretAccess==false and .operationalWrites==0 and .runtimeExecuted==false and .browserExecuted==false and .deployExecuted==false' orbit360-platform/runtime-gate-crm-v20260716/dynamic-directory-static-retry-preflight.json >/dev/null

      - name: Ejecutar contrato dinámico 23 de 23
        shell: bash
        run: |
          set -euo pipefail
          node --check orbit360-platform/tools/orbit360-m1-dynamic-directory-contract-v3-v20260723.cjs
          node orbit360-platform/tools/orbit360-m1-dynamic-directory-contract-v3-v20260723.cjs > orbit360-platform/runtime-gate-crm-v20260716/dynamic-directory-static-retry-contract.json
          jq -e '.ok==true and .status=="DYNAMIC_DIRECTORY_CONTRACT_V3_PASS" and .contractVersion=="1.0.40" and .total==23 and .passed==23 and .failed==0 and .rootCauseCorrection.unterminatedBootstrapCommentFixed==true and .rootCauseCorrection.validatorRootPlatformFixed==true' orbit360-platform/runtime-gate-crm-v20260716/dynamic-directory-static-retry-contract.json >/dev/null

      - name: Cerrar evidencia sanitizada
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs=require('fs'),d='orbit360-platform/runtime-gate-crm-v20260716';
          const read=n=>{try{return JSON.parse(fs.readFileSync(`${d}/${n}`,'utf8'))}catch{return null}};
          const p=read('dynamic-directory-static-retry-preflight.json'),c=read('dynamic-directory-static-retry-contract.json');
          const ok=!!(p&&p.status==='GO_GATE_CONTRACT'&&p.contractVersion==='1.0.40'&&p.executionPhase==='STATIC_PREFLIGHT'&&p.failed===0&&c&&c.status==='DYNAMIC_DIRECTORY_CONTRACT_V3_PASS'&&c.passed===23&&c.failed===0);
          fs.writeFileSync(`${d}/dynamic-directory-static-retry-summary.json`,JSON.stringify({schemaVersion:'orbit360-m1-dynamic-directory-static-preflight-retry-v1',generatedAt:new Date().toISOString(),ok,status:ok?'GO_STATIC_DYNAMIC_DIRECTORY_1_0_40':'STATIC_DYNAMIC_DIRECTORY_RETRY_FAILED',contractVersion:'1.0.40',validatedPatchCommit:process.env.VALIDATED_PATCH_COMMIT,canonicalPreflight:p&&p.status||'NOT_RUN',canonicalChecksPassed:p&&p.passed||0,canonicalChecksTotal:p&&p.total||0,canonicalFailed:p&&p.failed||0,dynamicContract:c&&c.status||'NOT_RUN',dynamicChecksPassed:c&&c.passed||0,dynamicChecksTotal:c&&c.total||0,secrets:false,firestoreRead:false,vaultRead:false,operationalWrites:false,runtime:false,browser:false,deploy:false,repositoryWrite:false,functionsDeploy:false,rulesDeploy:false,production:false,reimport:false,containsPII:false,containsSecrets:false},null,2)+'\n');
          if(!ok)process.exitCode=41;
          NODE

      - name: Subir evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-m1-dynamic-directory-static-retry-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/dynamic-directory-static-retry-request-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
            orbit360-platform/runtime-gate-crm-v20260716/dynamic-directory-static-retry-preflight.json
            orbit360-platform/runtime-gate-crm-v20260716/dynamic-directory-static-retry-contract.json
            orbit360-platform/runtime-gate-crm-v20260716/dynamic-directory-static-retry-summary.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publicar estado estático corregido
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          state=failure; description='1.0.40 corrected static retry failed'
          if [ -f orbit360-platform/runtime-gate-crm-v20260716/dynamic-directory-static-retry-summary.json ] && [ "$(jq -r '.ok' orbit360-platform/runtime-gate-crm-v20260716/dynamic-directory-static-retry-summary.json)" = true ]; then state=success; description='1.0.40 GO static dynamic directory 23/23'; fi
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -f state="$state" -f context='orbit360/m1-dynamic-directory-static-retry-v1' -f description="$description" -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
