name: Orbit 360 Clientes y Aseguradoras Runtime Gate 20260716

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - "orbit360-platform/**"
      - "tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs"
      - "tools/orbit360-runtime-check-client360-v20260716.mjs"
      - "tools/orbit360-gate-runtime-crm-v20260716.mjs"
      - "tools/orbit360-gate-runtime-aseguradoras-v20260716-v3.mjs"
      - "tools/orbit360-validar-recuperacion-frontend-conocimiento-v20260716.mjs"
      - ".github/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml"
  pull_request:
    branches:
      - main
    paths:
      - "orbit360-platform/**"
      - "tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs"
      - "tools/orbit360-runtime-check-client360-v20260716.mjs"
      - "tools/orbit360-gate-runtime-crm-v20260716.mjs"
      - "tools/orbit360-gate-runtime-aseguradoras-v20260716-v3.mjs"
      - "tools/orbit360-validar-recuperacion-frontend-conocimiento-v20260716.mjs"
      - ".github/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: orbit360-clientes-aseguradoras-runtime-gate-v20260716
  cancel-in-progress: true

jobs:
  runtime_gate:
    name: Cliente 360 y Aseguradoras · tres vistas · datos A&S
    runs-on: ubuntu-latest
    env:
      EXPECTED_FIREBASE_PROJECT_ID: ays-orbit-360-lab
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      ORBIT360_LAB_LOGIN_EMAIL: orbit.lab@demo.com
      ORBIT360_LAB_LOGIN_PASSWORD: ${{ secrets.ORBIT360_LAB_LOGIN_PASSWORD }}
      SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4

      - name: Bloquear rama, archivos o proyecto incorrectos
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          test "$BRANCH" = "ays/backend-tenant-lab-v99-20260703"
          test -f orbit360-platform/ays-lab-preview.html
          test -f orbit360-platform/modules/cliente360.js
          test -f orbit360-platform/core/client-canonical-view-projection-v20260716.js
          test -f orbit360-platform/modules/aseguradoras.js
          test -f orbit360-platform/modules/aseguradoras-candidate-actions.js
          test -f orbit360-platform/modules/aseguradoras-frontend-projection-v20260716.js
          test -f tools/orbit360-runtime-check-client360-v20260716.mjs
          test -f tools/orbit360-gate-runtime-crm-v20260716.mjs

      - name: Validación estática, contratos y sintaxis
        shell: bash
        run: |
          set -euo pipefail
          node --check orbit360-platform/core/pwa.js
          node --check orbit360-platform/core/backend-lab-init.js
          node --check orbit360-platform/core/client-canonical-view-projection-v20260716.js
          node --check orbit360-platform/core/session-multirol-visibility-v20260716.js
          node --check orbit360-platform/modules/cliente360.js
          node --check orbit360-platform/modules/aseguradoras.js
          node --check orbit360-platform/modules/aseguradoras-candidate-actions.js
          node --check orbit360-platform/modules/aseguradoras-frontend-projection-v20260716.js
          node --check tools/orbit360-runtime-check-client360-v20260716.mjs
          node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
          node --check tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs
          node --check tools/orbit360-validar-recuperacion-frontend-conocimiento-v20260716.mjs
          node tools/orbit360-validar-recuperacion-frontend-conocimiento-v20260716.mjs

      - name: Resolver cuenta de servicio LAB
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then echo "BLOQUEO_SECRET_LAB"; exit 42; fi
          if [ ${#ORBIT360_LAB_LOGIN_PASSWORD} -lt 12 ]; then echo "BLOQUEO_LOGIN_LAB"; exit 46; fi
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          PROJECT_ID="$(jq -r '.project_id // empty' "$KEY_FILE")"
          test "$PROJECT_ID" = "$EXPECTED_FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencia backend LAB
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save firebase-admin@13

      - name: Sincronizar usuario LAB, asesores y conteos
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-ensure-lab-user.mjs
          node tools/orbit360-verify-lab-data-counts.mjs
          node tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs

      - name: Sellar commit exacto del runtime LAB
        shell: bash
        run: |
          set -euo pipefail
          printf '{"schemaVersion":"orbit360-runtime-build-v1","commit":"%s","run":"%s","branch":"%s"}\n' \
            "$GITHUB_SHA" "$GITHUB_RUN_ID" "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}" \
            > orbit360-platform/runtime-build.json

      - name: Publicar y verificar canal LAB canónico
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_JSON="${RUNNER_TEMP}/firebase-lab-preview.json"
          npx --yes firebase-tools@latest hosting:channel:deploy orbit360-ays-lab \
            --project "$FIREBASE_PROJECT_ID" \
            --expires 30d \
            --non-interactive \
            --json | tee "$DEPLOY_JSON"

          URL="$(jq -r '.. | strings | select(test("^https://[^/]*--orbit360-ays-lab[^/]*\\.(web\\.app|firebaseapp\\.com)$"))' "$DEPLOY_JSON" | head -n 1)"
          if [ -z "$URL" ]; then
            echo "BLOQUEO_URL_CANAL_LAB_NO_ENCONTRADA"
            jq -r '.. | strings | select(test("^https://"))' "$DEPLOY_JSON" || true
            exit 47
          fi
          case "$URL" in
            *--orbit360-ays-lab*) ;;
            *) echo "BLOQUEO_URL_NO_CORRESPONDE_AL_CANAL_LAB"; exit 48 ;;
          esac

          BUILD_JSON="$(curl -fsSL --retry 6 --retry-delay 2 --retry-all-errors "$URL/runtime-build.json")"
          DEPLOYED_SHA="$(printf '%s' "$BUILD_JSON" | jq -r '.commit // empty')"
          DEPLOYED_RUN="$(printf '%s' "$BUILD_JSON" | jq -r '.run // empty')"
          test "$DEPLOYED_SHA" = "$GITHUB_SHA"
          test "$DEPLOYED_RUN" = "$GITHUB_RUN_ID"
          curl -fsSL --retry 6 --retry-delay 2 --retry-all-errors "$URL/core/backend-lab-loader.js" | grep -q 'Backend LAB loader'
          curl -fsSL --retry 6 --retry-delay 2 --retry-all-errors "$URL/ays-lab-preview.html" | grep -q 'orbit-preview-version'

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "ORBIT360_PREVIEW_URL=$URL" >> "$GITHUB_ENV"
          echo "ORBIT360_EXPECTED_COMMIT=$GITHUB_SHA" >> "$GITHUB_ENV"

      - name: Instalar navegador del gate visual
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Gate conjunto · Cliente 360 y Aseguradoras · tres vistas
        id: joint_gate
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-gate-runtime-crm-v20260716.mjs

      - name: Publicar evidencia sanitizada sin capturas ni PII
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-clientes-aseguradoras-runtime-gate-v20260716-${{ github.run_id }}
          path: |
            orbit360-platform/lab-data-counts.json
            orbit360-platform/lab-aseguradoras-knowledge-inventory.json
            orbit360-platform/runtime-build.json
            orbit360-platform/runtime-gate-crm-v20260716/resultado-sanitizado.json
            orbit360-platform/runtime-gate-aseguradoras-v20260716/resultado-sanitizado.json
          if-no-files-found: warn
          retention-days: 7

      - name: Resumen
        if: always()
        shell: bash
        run: |
          {
            echo "## Orbit 360 · Gate conjunto Cliente 360 + Aseguradoras"
            echo ""
            echo "Rama: ays/backend-tenant-lab-v99-20260703"
            echo ""
            echo "Proyecto: ays-orbit-360-lab"
            echo ""
            echo "Commit: ${GITHUB_SHA}"
            echo ""
            echo "Run: ${GITHUB_RUN_ID}"
            echo ""
            echo "Canal LAB verificado: ${ORBIT360_PREVIEW_URL:-no disponible}"
            echo ""
            echo "Gate conjunto: ${{ steps.joint_gate.outcome }}"
            echo ""
            echo "Clientes esperados: 414 · Aseguradoras esperadas: 26"
            echo ""
            echo "Pólizas, vehículos y cobros se reportan como conteos; no se infieren ni se escriben desde la fuente Clientes."
            echo ""
            echo "Sin producción, sin main, sin merge y sin capturas de datos personales."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publicar resultado sanitizado en PR 5
        if: always() && github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPORT="orbit360-platform/runtime-gate-crm-v20260716/resultado-sanitizado.json"
          INVENTORY="orbit360-platform/lab-aseguradoras-knowledge-inventory.json"
          COUNTS="orbit360-platform/lab-data-counts.json"
          if [ -f "$REPORT" ]; then
            OK="$(jq -r '.ok // false' "$REPORT")"
            ERROR_CODE="$(jq -r '(.error // "") | split(":")[0] | gsub("[\\r\\n]"; " ")' "$REPORT")"
            FAILED_CHECKS="$(jq -r '[.checks // {} | to_entries[] | select(.value != true) | .key] | join(",")' "$REPORT")"
          else
            OK="false"
            ERROR_CODE="RESULTADO_NO_GENERADO"
            FAILED_CHECKS="resultado"
          fi
          if [ "$OK" != "true" ] && [ -z "$ERROR_CODE" ]; then ERROR_CODE="GATE_FALSE_SIN_ERROR"; fi
          if [ -z "$FAILED_CHECKS" ]; then FAILED_CHECKS="ninguno"; fi
          CLIENTS="$(test -f "$COUNTS" && jq -r '.counts.clientes // 0' "$COUNTS" || echo 0)"
          INSURERS="$(test -f "$COUNTS" && jq -r '.counts.aseguradoras // 0' "$COUNTS" || echo 0)"
          ADVISORS="$(test -f "$COUNTS" && jq -r '.counts.asesores // 0' "$COUNTS" || echo 0)"
          SYNC="$(test -f "$INVENTORY" && jq -r '.gates.operationalSyncComplete // false' "$INVENTORY" || echo false)"
          printf -v BODY '%s\n\n- Commit: %s\n- Run: %s\n- Canal LAB: %s\n- Gate conjunto: **%s**\n- Conteos LAB: clientes **%s**, aseguradoras **%s**, asesores **%s**\n- Conocimiento Aseguradoras persistido operativamente: **%s**\n- Código de bloqueo: %s\n- Checks no aprobados: %s\n- Evidencia: artefacto sanitizado del run, sin PII, secretos ni documentos fuente.\n- Alcance: LAB únicamente; sin producción, merge ni main.' \
            '## Resultado automático sanitizado · Cliente 360 + Aseguradoras' \
            "$GITHUB_SHA" "$GITHUB_RUN_ID" "${ORBIT360_PREVIEW_URL:-no disponible}" "$OK" "$CLIENTS" "$INSURERS" "$ADVISORS" "$SYNC" "$ERROR_CODE" "$FAILED_CHECKS"
          gh api "repos/${GITHUB_REPOSITORY}/issues/5/comments" -f body="$BODY" >/dev/null

      - name: Cerrar resultado conjunto
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test '${{ steps.joint_gate.outcome }}' = 'success'
