name: Orbit 360 · Directorio operativo 1.0.38 · VALIDATION_ONLY

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'tools/orbit360-m1-operational-directory-static-scope-validation-request-v20260722.json'

permissions:
  contents: read
  statuses: write

concurrency:
  group: orbit360-m1-operational-directory-static-scope-validation-v1
  cancel-in-progress: false

env:
  ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  ORBIT360_GATE_PHASE: static_preflight
  ORBIT360_REQUEST_FILE: tools/orbit360-m1-operational-directory-static-scope-validation-request-v20260722.json
  ORBIT360_REQUEST_ID: m1-operational-directory-static-scope-validation-v1
  ORBIT360_METHOD_DECISION_ID: paula-20260722-operational-directory-root-repair

jobs:
  validate-only:
    name: Validar alcance reconciliado 1.0.38 · cero transformación
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout SHA exacto
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validar solicitud inmutable de alcance
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "${ORBIT360_BRANCH}"
          test -f "${ORBIT360_REQUEST_FILE}"
          node <<'NODE'
          const fs = require('fs');
          const cp = require('child_process');
          const request = JSON.parse(fs.readFileSync(process.env.ORBIT360_REQUEST_FILE, 'utf8'));
          const head = cp.execFileSync('git', ['rev-parse', 'HEAD'], { encoding:'utf8' }).trim();
          const parent = cp.execFileSync('git', ['rev-parse', 'HEAD^'], { encoding:'utf8' }).trim();
          const failures = [];
          if (request.schemaVersion !== 'orbit360-static-scope-validation-request-v1') failures.push('schema');
          if (request.requestId !== process.env.ORBIT360_REQUEST_ID) failures.push('request_id');
          if (request.gateId !== process.env.ORBIT360_GATE_ID) failures.push('gate_id');
          if (request.branch !== process.env.ORBIT360_BRANCH) failures.push('branch');
          if (request.contractVersion !== '1.0.38') failures.push('contract');
          if (request.validatorPatchCommit !== parent) failures.push('validator_patch_parent');
          if (request.validationOnly !== true || request.scopeReconciled !== true) failures.push('validation_scope');
          if (request.dataAccess !== false || request.secretAccess !== false || request.writes !== false || request.runtime !== false || request.browser !== false || request.deploy !== false) failures.push('capabilities');
          if (failures.length) throw new Error('REQUEST_INVALID:' + failures.join(','));
          fs.mkdirSync('orbit360-platform/runtime-gate-crm-v20260716', { recursive:true });
          fs.writeFileSync('orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-request-sanitized.json', JSON.stringify({
            schemaVersion: request.schemaVersion,
            requestId: request.requestId,
            gateId: request.gateId,
            contractVersion: request.contractVersion,
            productPatchCommit: request.productPatchCommit,
            validatorPatchCommit: request.validatorPatchCommit,
            requestCommit: head,
            validationOnly: true,
            scopeReconciled: true,
            dataAccess: false,
            secretAccess: false,
            writes: false,
            runtime: false,
            browser: false,
            deploy: false,
            containsPII: false,
            containsSecrets: false
          }, null, 2) + '\n');
          NODE

      - name: Preflight contractual 1.0.38 con alcance explícito
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "${ORBIT360_GATE_ID}" | tee orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-preflight.json
          grep -q '"status": "GO_GATE_CONTRACT"' orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-preflight.json
          grep -q '"canonicalOwnerScope": "overlay_replace"' orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-preflight.json
          grep -q '"runtimeContractScope": "overlay_replace"' orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-preflight.json

      - name: Contrato conductual de directorio operativo
        shell: bash
        run: |
          set -euo pipefail
          node orbit360-platform/tools/orbit360-m1-operational-directory-contract-v20260722.js | tee orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-operational-directory.json
          grep -q '"status": "PASS"' orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-operational-directory.json

      - name: Arquitectura base preservada
        shell: bash
        run: |
          set -euo pipefail
          node orbit360-platform/tools/orbit360-block0-architecture-gate-v20260717.js | tee orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-architecture.json
          grep -q '"status": "GO_STATIC_ARCHITECTURE"' orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-architecture.json

      - name: Cerrar evidencia sanitizada
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const dir = 'orbit360-platform/runtime-gate-crm-v20260716';
          const read = name => { try { return JSON.parse(fs.readFileSync(`${dir}/${name}`, 'utf8')); } catch (_) { return null; } };
          const preflight = read('static-scope-validation-preflight.json');
          const contract = read('static-scope-validation-operational-directory.json');
          const architecture = read('static-scope-validation-architecture.json');
          const ok = !!(preflight && preflight.status === 'GO_GATE_CONTRACT' && preflight.canonicalOwnerScope === 'overlay_replace' && preflight.runtimeContractScope === 'overlay_replace' && contract && contract.status === 'PASS' && architecture && architecture.status === 'GO_STATIC_ARCHITECTURE');
          fs.writeFileSync(`${dir}/static-scope-validation-summary.json`, JSON.stringify({
            schemaVersion:'orbit360-m1-operational-directory-static-scope-validation-v1',
            generatedAt:new Date().toISOString(),
            ok,
            contractVersion:'1.0.38',
            gateContract:preflight && preflight.status || 'NOT_RUN',
            canonicalOwnerScope:preflight && preflight.canonicalOwnerScope || 'NOT_RUN',
            runtimeContractScope:preflight && preflight.runtimeContractScope || 'NOT_RUN',
            operationalDirectoryContract:contract && contract.status || 'NOT_RUN',
            architecture:architecture && architecture.status || 'NOT_RUN',
            validationOnly:true,
            sourceTransformed:false,
            dataAccess:false,
            secretAccess:false,
            writes:false,
            runtime:false,
            browser:false,
            deploy:false,
            functionsDeployed:false,
            rulesDeployed:false,
            productionTouched:false,
            containsPII:false,
            containsSecrets:false
          }, null, 2) + '\n');
          NODE

      - name: Subir evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-m1-operational-directory-static-scope-validation-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-request-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
            orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-preflight.json
            orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-operational-directory.json
            orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-architecture.json
            orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-summary.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publicar estado canónico
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          state=failure
          description='1.0.38 scope validation failed'
          if [ -f orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-summary.json ] && [ "$(jq -r '.ok' orbit360-platform/runtime-gate-crm-v20260716/static-scope-validation-summary.json)" = "true" ]; then
            state=success
            description='1.0.38 scope validation passed'
          fi
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "$(jq -n --arg state "$state" --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --arg description "$description" '{state:$state,target_url:$target_url,description:$description,context:"orbit360/m1-operational-directory-static-scope-validation-v1"}')"
