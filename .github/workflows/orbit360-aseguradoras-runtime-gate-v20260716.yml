name: Orbit 360 Aseguradoras Runtime Gate 20260716

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - "orbit360-platform/**"
      - "tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs"
      - "tools/orbit360-gate-runtime-aseguradoras-v20260716-v2.mjs"
      - "tools/orbit360-validar-recuperacion-frontend-conocimiento-v20260716.mjs"
      - ".github/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml"
  pull_request:
    branches:
      - main
    paths:
      - "orbit360-platform/**"
      - "tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs"
      - "tools/orbit360-gate-runtime-aseguradoras-v20260716-v2.mjs"
      - "tools/orbit360-validar-recuperacion-frontend-conocimiento-v20260716.mjs"
      - ".github/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orbit360-aseguradoras-runtime-gate-v20260716
  cancel-in-progress: true

jobs:
  runtime_gate:
    name: Inventario LAB y gate de tres vistas
    runs-on: ubuntu-latest
    env:
      EXPECTED_FIREBASE_PROJECT_ID: ays-orbit-360-lab
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      ORBIT360_LAB_LOGIN_EMAIL: orbit.lab@demo.com
      ORBIT360_LAB_LOGIN_PASSWORD: ${{ secrets.ORBIT360_LAB_LOGIN_PASSWORD }}
      SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4

      - name: Bloquear rama o proyecto incorrectos
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          test "$BRANCH" = "ays/backend-tenant-lab-v99-20260703"
          test -f orbit360-platform/ays-lab-preview.html
          test -f orbit360-platform/modules/aseguradoras.js
          test -f orbit360-platform/modules/aseguradoras-frontend-projection-v20260716.js
          test -f orbit360-platform/data/tenant-config/alianzas-soluciones.aseguradoras-knowledge-summary-v20260716.js
          test -f tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs
          test -f tools/orbit360-gate-runtime-aseguradoras-v20260716-v2.mjs
          test -f tools/orbit360-validar-recuperacion-frontend-conocimiento-v20260716.mjs

      - name: Validación estática y sintaxis
        shell: bash
        run: |
          set -euo pipefail
          node --check orbit360-platform/core/pwa.js
          node --check orbit360-platform/modules/aseguradoras.js
          node --check orbit360-platform/modules/aseguradoras-frontend-projection-v20260716.js
          node --check orbit360-platform/data/tenant-config/alianzas-soluciones.aseguradoras-knowledge-summary-v20260716.js
          node --check tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs
          node --check tools/orbit360-gate-runtime-aseguradoras-v20260716-v2.mjs
          node --check tools/orbit360-validar-recuperacion-frontend-conocimiento-v20260716.mjs
          node tools/orbit360-validar-recuperacion-frontend-conocimiento-v20260716.mjs

      - name: Resolver cuenta de servicio LAB
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then echo "BLOQUEO_SECRET_LAB"; exit 42; fi
          if [ ${#ORBIT360_LAB_LOGIN_PASSWORD} -lt 12 ]; then echo "BLOQUEO_LOGIN_LAB"; exit 46; fi
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          PROJECT_ID="$(jq -r '.project_id // empty' "$KEY_FILE")"
          test "$PROJECT_ID" = "$EXPECTED_FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencias de gate
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save firebase-admin@13 playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Sincronizar usuario LAB e inventariar conocimiento
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-ensure-lab-user.mjs
          node tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs

      - name: Publicar canal temporal de gate
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          npx --yes firebase-tools@latest hosting:channel:deploy orbit360-ays-gate \
            --project "$FIREBASE_PROJECT_ID" \
            --expires 7d \
            --non-interactive \
            --json | tee "${RUNNER_TEMP}/firebase-gate-preview.json"
          URL="$(jq -r '.. | strings | select(test("^https://.*\\.(web\\.app|firebaseapp\\.com)$"))' "${RUNNER_TEMP}/firebase-gate-preview.json" | head -n 1)"
          test -n "$URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "ORBIT360_PREVIEW_URL=$URL" >> "$GITHUB_ENV"

      - name: Gate Dirección escritorio, Operativo tableta y Asesor móvil
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-gate-runtime-aseguradoras-v20260716-v2.mjs

      - name: Publicar evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-aseguradoras-runtime-gate-v20260716
          path: |
            orbit360-platform/lab-aseguradoras-knowledge-inventory.json
            orbit360-platform/runtime-gate-aseguradoras-v20260716/
          if-no-files-found: warn
          retention-days: 7

      - name: Resumen
        if: always()
        shell: bash
        run: |
          {
            echo "## Orbit 360 · Aseguradoras · gate runtime"
            echo ""
            echo "Rama: ays/backend-tenant-lab-v99-20260703"
            echo ""
            echo "Proyecto: ays-orbit-360-lab"
            echo ""
            echo "Canal temporal: ${ORBIT360_PREVIEW_URL:-no disponible}"
            echo ""
            echo "Sin producción, sin main y sin merge."
          } >> "$GITHUB_STEP_SUMMARY"
