name: Orbit 360 · Entrega visual M1 Hosting LAB

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'tools/orbit360-m1-hosting-delivery-request-v2-20260722.json'

permissions:
  actions: read
  contents: read
  statuses: write

concurrency:
  group: orbit360-final-block1-hosting-delivery-v2
  cancel-in-progress: false

env:
  ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  ORBIT360_GATE_PHASE: lab_hosting_delivery
  ORBIT360_REQUEST_FILE: tools/orbit360-m1-hosting-delivery-request-v2-20260722.json
  ORBIT360_REQUEST_MODEL: immutable-request-bound-to-parent-head-and-run-attempt-v1
  ORBIT360_METHOD_DECISION_ID: paula-20260722-visualization-before-m2
  EXPECTED_FIREBASE_PROJECT_ID: ays-orbit-360-lab
  FIREBASE_PROJECT_ID: ays-orbit-360-lab
  ORBIT360_HOSTING_CHANNEL: orbit360-ays-lab
  ORBIT360_FINAL_GATE_POLICY: no_final_gate_rerun

jobs:
  targeted-hosting-delivery:
    name: Publicar o recuperar frontend correctivo · Hosting LAB
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout SHA exacto
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validar solicitud, freeze y evidencia estática
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "$ORBIT360_BRANCH"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "${GITHUB_RUN_ATTEMPT}" = '1'
          REQUEST="$ORBIT360_REQUEST_FILE"
          FREEZE='tools/orbit360-incident-freeze-v20260721.json'
          INVENTORY='orbit360-platform/docs/evidence/post-recovery-inventory-29868538689-sanitized.json'
          test -f "$REQUEST" && test -f "$FREEZE" && test -f "$INVENTORY"
          test "$(jq -r '.schemaVersion' "$REQUEST")" = 'orbit360-gate-execution-request-v1'
          test "$(jq -r '.requestModel' "$REQUEST")" = "$ORBIT360_REQUEST_MODEL"
          test "$(jq -r '.methodologicalDecisionId' "$REQUEST")" = "$ORBIT360_METHOD_DECISION_ID"
          test "$(jq -r '.gateId' "$REQUEST")" = "$ORBIT360_GATE_ID"
          test "$(jq -r '.phase' "$REQUEST")" = 'LAB_HOSTING_DELIVERY'
          test "$(jq -r '.parentHead' "$REQUEST")" = "$(git rev-parse HEAD^)"
          test "$(jq -r '.allowedExecutions' "$REQUEST")" = '1'
          test "$(jq -r '.previousAttempt.runId' "$REQUEST")" = '29963097060'
          test "$(jq -r '.previousAttempt.classification' "$REQUEST")" = 'PIPELINE_MECHANISM_FAILURE'
          test "$(jq -r '.secretsAllowed' "$REQUEST")" = 'true'
          test "$(jq -r '.deployAllowed' "$REQUEST")" = 'true'
          test "$(jq -r '.deploymentScope' "$REQUEST")" = 'hosting_channel_only'
          test "$(jq -r '.firebaseProjectId' "$REQUEST")" = "$EXPECTED_FIREBASE_PROJECT_ID"
          test "$(jq -r '.hostingChannel' "$REQUEST")" = "$ORBIT360_HOSTING_CHANNEL"
          test "$(jq -r '.firestoreReadAllowed' "$REQUEST")" = 'false'
          test "$(jq -r '.writesAllowed' "$REQUEST")" = 'false'
          test "$(jq -r '.runtimeAllowed' "$REQUEST")" = 'false'
          test "$(jq -r '.browserAllowed' "$REQUEST")" = 'false'
          test "$(jq -r '.functionsDeployAllowed' "$REQUEST")" = 'false'
          test "$(jq -r '.rulesDeployAllowed' "$REQUEST")" = 'false'
          test "$(jq -r '.productionAllowed' "$REQUEST")" = 'false'
          test "$(jq -r '.finalGateRerunAllowed' "$REQUEST")" = 'false'
          test "$(jq -r '.status' "$FREEZE")" = 'HOSTING_DELIVERY_V1_PIPELINE_MECHANISM_FAILURE_RETRY_AUTHORIZED'
          test "$(jq -r '.methodologicalDecision.id' "$FREEZE")" = "$ORBIT360_METHOD_DECISION_ID"
          test "$(jq -r '.hostingDeliveryV1.runId' "$FREEZE")" = '29963097060'
          test "$(jq -r '.hostingDeliveryV1.classification' "$FREEZE")" = 'PIPELINE_MECHANISM_FAILURE'
          test "$(jq -r '.hostingDeliveryV1.preflightStatus' "$FREEZE")" = 'GO_GATE_CONTRACT'
          test "$(jq -r '.staticPreflightV2.status' "$FREEZE")" = 'PASS'
          test "$(jq -r '.staticPreflightV2.runId' "$FREEZE")" = "$(jq -r '.staticPreflight.runId' "$REQUEST")"
          test "$(jq -r '.inventoryEvidence.ok' "$FREEZE")" = 'true'
          test "$(jq -r '.ok' "$INVENTORY")" = 'true'

      - name: Verificar artefacto estático y ausencia de drift funcional
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          REQUEST="$ORBIT360_REQUEST_FILE"
          STATIC_RUN_ID="$(jq -r '.staticPreflight.runId' "$REQUEST")"
          STATIC_ARTIFACT_ID="$(jq -r '.staticPreflight.artifactId' "$REQUEST")"
          STATIC_ARTIFACT_DIGEST="$(jq -r '.staticPreflight.artifactDigest' "$REQUEST")"
          STATIC_HEAD="$(jq -r '.staticPreflight.executionHead' "$REQUEST")"
          git cat-file -e "${STATIC_HEAD}^{commit}"
          git diff --quiet "$STATIC_HEAD" "HEAD^" -- orbit360-platform ':!orbit360-platform/docs/**'
          META="$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${STATIC_ARTIFACT_ID}")"
          test "$(printf '%s' "$META" | jq -r '.workflow_run.id')" = "$STATIC_RUN_ID"
          test "$(printf '%s' "$META" | jq -r '.digest')" = "$STATIC_ARTIFACT_DIGEST"
          test "$(printf '%s' "$META" | jq -r '.expired')" = 'false'
          mkdir -p "${RUNNER_TEMP}/static-evidence"
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${STATIC_ARTIFACT_ID}/zip" > "${RUNNER_TEMP}/static-evidence.zip"
          unzip -q "${RUNNER_TEMP}/static-evidence.zip" -d "${RUNNER_TEMP}/static-evidence"
          FINAL_STATIC="$(find "${RUNNER_TEMP}/static-evidence" -name final-static-preflight-sanitized.json -print -quit)"
          test -n "$FINAL_STATIC"
          jq -e --arg head "$STATIC_HEAD" --argjson run "$STATIC_RUN_ID" '.ok == true and .commit == $head and .runId == $run and .executionPhase == "STATIC_PREFLIGHT" and .gateContractStatus == "GO_GATE_CONTRACT" and .visualRemediationStatus == "PASS" and .visualChecks == "29_OF_29" and .architectureStatus == "GO_STATIC_ARCHITECTURE" and .finalGateRerun == false' "$FINAL_STATIC" >/dev/null

      - name: Preflight canónico de fase Hosting LAB
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node --check tools/orbit360-validar-gate-contracts-engine-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"
          test "$(jq -r '.status' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = 'GO_GATE_CONTRACT'
          test "$(jq -r '.executionPhase' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = 'LAB_HOSTING_DELIVERY'
          node tools/orbit360-verificar-integridad-script-hosting-v20260721.mjs --local-only
          test "$(jq -r '.ok' orbit360-platform/runtime-gate-crm-v20260716/script-integrity-sanitized.json)" = 'true'

      - name: Resolver identidad LAB para entrega visual
        env:
          SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
          SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
          SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          test -n "$SERVICE_ACCOUNT"
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab-visual-review.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$EXPECTED_FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Inspeccionar canal existente
        shell: bash
        run: |
          set -euo pipefail
          CHANNEL_JSON="${RUNNER_TEMP}/firebase-channel-list.json"
          CHANNEL_ERR="${RUNNER_TEMP}/firebase-channel-list.stderr"
          set +e
          npx --yes firebase-tools@latest hosting:channel:list --project "$FIREBASE_PROJECT_ID" --non-interactive --json > "$CHANNEL_JSON" 2> "$CHANNEL_ERR"
          CHANNEL_STATUS=$?
          set -e
          node - "$CHANNEL_JSON" "$ORBIT360_HOSTING_CHANNEL" > "${RUNNER_TEMP}/existing-channel-url.txt" <<'NODE'
          const fs=require('fs');
          const [file,channel]=process.argv.slice(2);
          let value={};try{value=JSON.parse(fs.readFileSync(file,'utf8'))}catch{}
          const urls=[];const walk=x=>{if(typeof x==='string'&&/^https:\/\//.test(x))urls.push(x);else if(Array.isArray(x))x.forEach(walk);else if(x&&typeof x==='object')Object.values(x).forEach(walk)};walk(value);
          process.stdout.write(urls.find(x=>x.includes(channel))||'');
          NODE
          EXISTING_URL="$(cat "${RUNNER_TEMP}/existing-channel-url.txt")"
          jq -n --argjson status "$CHANNEL_STATUS" --arg url "$EXISTING_URL" '{schemaVersion:"orbit360-hosting-channel-inspection-v1",commandExitCode:$status,channelUrl:$url,containsPII:false,containsSecrets:false}' > orbit360-platform/runtime-gate-crm-v20260716/hosting-channel-inspection-sanitized.json
          if [ -n "$EXISTING_URL" ]; then
            EXISTING_BUILD="$(curl -fsSL --retry 3 --retry-delay 2 -H 'Cache-Control: no-cache' "$EXISTING_URL/runtime-build.json?inspect=$GITHUB_RUN_ID" || true)"
            EXISTING_COMMIT="$(printf '%s' "$EXISTING_BUILD" | jq -r '.commit // empty' 2>/dev/null || true)"
            PREVIOUS_HEAD="$(jq -r '.previousAttempt.executionHead' "$ORBIT360_REQUEST_FILE")"
            if [ "$EXISTING_COMMIT" = "$PREVIOUS_HEAD" ]; then
              echo "ORBIT360_PREVIEW_URL=$EXISTING_URL" >> "$GITHUB_ENV"
              echo "ORBIT360_PUBLISHED_COMMIT=$EXISTING_COMMIT" >> "$GITHUB_ENV"
              echo "ORBIT360_REUSED_EXISTING=true" >> "$GITHUB_ENV"
            fi
          fi

      - name: Publicar frontend solo si falta el build
        if: ${{ env.ORBIT360_REUSED_EXISTING != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          jq -n --arg commit "$GITHUB_SHA" --arg run "$GITHUB_RUN_ID" --arg gateId "$ORBIT360_GATE_ID" '{schemaVersion:"orbit360-runtime-build-v5-visual-review",commit:$commit,runId:($run|tonumber),gateId:$gateId,deploymentScope:"targeted_lab_frontend_visual_review_only",finalGateRerun:false,hostingOnly:true,deployExecuted:true,writesExecuted:false,browserExecuted:false,functionsDeployed:false,rulesDeployed:false,productionTouched:false}' > orbit360-platform/runtime-build.json
          DEPLOY_JSON="${RUNNER_TEMP}/firebase-lab-preview.json"
          DEPLOY_ERR="${RUNNER_TEMP}/firebase-lab-preview.stderr"
          set +e
          npx --yes firebase-tools@latest hosting:channel:deploy "$ORBIT360_HOSTING_CHANNEL" --project "$FIREBASE_PROJECT_ID" --expires 30d --non-interactive --json > "$DEPLOY_JSON" 2> "$DEPLOY_ERR"
          DEPLOY_STATUS=$?
          set -e
          jq -n --argjson status "$DEPLOY_STATUS" '{schemaVersion:"orbit360-firebase-hosting-command-v1",exitCode:$status,containsPII:false,containsSecrets:false}' > orbit360-platform/runtime-gate-crm-v20260716/firebase-hosting-command-sanitized.json
          if [ "$DEPLOY_STATUS" -ne 0 ]; then
            sed -E 's/(private_key|client_email|token|authorization)[^ ]*/[REDACTED]/Ig' "$DEPLOY_ERR" | tail -200 > orbit360-platform/runtime-gate-crm-v20260716/firebase-hosting-error-sanitized.txt
            exit "$DEPLOY_STATUS"
          fi
          node - "$DEPLOY_JSON" "$ORBIT360_HOSTING_CHANNEL" > "${RUNNER_TEMP}/deployed-url.txt" <<'NODE'
          const fs=require('fs');
          const [file,channel]=process.argv.slice(2);
          let value={};try{value=JSON.parse(fs.readFileSync(file,'utf8'))}catch{}
          const urls=[];const walk=x=>{if(typeof x==='string'&&/^https:\/\//.test(x))urls.push(x);else if(Array.isArray(x))x.forEach(walk);else if(x&&typeof x==='object')Object.values(x).forEach(walk)};walk(value);
          process.stdout.write(urls.find(x=>x.includes(channel))||urls.find(x=>/web\.app|firebaseapp\.com/.test(x))||'');
          NODE
          URL="$(cat "${RUNNER_TEMP}/deployed-url.txt")"
          if [ -z "$URL" ]; then
            npx --yes firebase-tools@latest hosting:channel:list --project "$FIREBASE_PROJECT_ID" --non-interactive --json > "${RUNNER_TEMP}/firebase-channel-list-after.json"
            node - "${RUNNER_TEMP}/firebase-channel-list-after.json" "$ORBIT360_HOSTING_CHANNEL" > "${RUNNER_TEMP}/deployed-url.txt" <<'NODE'
            const fs=require('fs');const [file,channel]=process.argv.slice(2);let value={};try{value=JSON.parse(fs.readFileSync(file,'utf8'))}catch{};const urls=[];const walk=x=>{if(typeof x==='string'&&/^https:\/\//.test(x))urls.push(x);else if(Array.isArray(x))x.forEach(walk);else if(x&&typeof x==='object')Object.values(x).forEach(walk)};walk(value);process.stdout.write(urls.find(x=>x.includes(channel))||'');
            NODE
            URL="$(cat "${RUNNER_TEMP}/deployed-url.txt")"
          fi
          test -n "$URL"
          echo "ORBIT360_PREVIEW_URL=$URL" >> "$GITHUB_ENV"
          echo "ORBIT360_PUBLISHED_COMMIT=$GITHUB_SHA" >> "$GITHUB_ENV"
          echo "ORBIT360_REUSED_EXISTING=false" >> "$GITHUB_ENV"

      - name: Verificar build e integridad exacta publicada
        shell: bash
        run: |
          set -euo pipefail
          test -n "${ORBIT360_PREVIEW_URL:-}"
          BUILD_JSON="$(curl -fsSL --retry 6 --retry-delay 2 --retry-all-errors -H 'Cache-Control: no-cache' "$ORBIT360_PREVIEW_URL/runtime-build.json?visualReview=$GITHUB_RUN_ID")"
          test "$(printf '%s' "$BUILD_JSON" | jq -r '.commit // empty')" = "$ORBIT360_PUBLISHED_COMMIT"
          test "$(printf '%s' "$BUILD_JSON" | jq -r '.gateId // empty')" = "$ORBIT360_GATE_ID"
          test "$(printf '%s' "$BUILD_JSON" | jq -r '.finalGateRerun')" = 'false'
          node tools/orbit360-verificar-integridad-script-hosting-v20260721.mjs
          test "$(jq -r '.ok' orbit360-platform/runtime-gate-crm-v20260716/script-integrity-sanitized.json)" = 'true'
          test "$(jq -r '.exactMatch' orbit360-platform/runtime-gate-crm-v20260716/script-integrity-sanitized.json)" = 'true'
          jq -n --arg url "$ORBIT360_PREVIEW_URL" --arg commit "$ORBIT360_PUBLISHED_COMMIT" --arg run "$GITHUB_RUN_ID" --arg reused "${ORBIT360_REUSED_EXISTING:-false}" '{schemaVersion:"orbit360-targeted-lab-visual-review-v3",ok:true,url:$url,publishedCommit:$commit,runId:($run|tonumber),reusedExistingDeployment:($reused=="true"),deploymentScope:"targeted_lab_frontend_visual_review_only",finalGateRerun:false,hostingOnly:true,writesExecuted:false,browserExecuted:false,functionsDeployed:false,rulesDeployed:false,productionTouched:false,containsPII:false,containsSecrets:false}' > orbit360-platform/runtime-gate-crm-v20260716/targeted-deploy-sanitized.json

      - name: Subir evidencia sanitizada de visualización
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-m1-targeted-hosting-visualization-v2-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
            orbit360-platform/runtime-gate-crm-v20260716/script-integrity-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/hosting-channel-inspection-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/firebase-hosting-command-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/firebase-hosting-error-sanitized.txt
            orbit360-platform/runtime-gate-crm-v20260716/targeted-deploy-sanitized.json
            orbit360-platform/runtime-build.json
            tools/orbit360-m1-hosting-delivery-request-v2-20260722.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publicar estado canónico
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          state=success
          description='Frontend correctivo disponible para revisión visual'
          if [ "${{ job.status }}" != success ]; then state=failure; description='Entrega Hosting LAB v2 falló; STOP THE LINE'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -f state="$state" -f context='orbit360/m1-targeted-hosting-visualization-v2' -f description="$description" -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >/dev/null
