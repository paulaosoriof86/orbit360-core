name: Orbit 360 Secure Credentials Account Capability 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-secure-credentials-account-capability-v20260720.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: orbit360-secure-credentials-account-capability-v20260720
  cancel-in-progress: false

jobs:
  capability:
    name: Credenciales Aseguradoras · capacidad de cuentas existentes
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      SA_PRIMARY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ALTERNATE: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "ays/backend-tenant-lab-v99-20260703"
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Instalar Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ays-orbit-360-lab

      - name: Probar capacidades sin modificar IAM ni servicios
        shell: bash
        run: |
          set -euo pipefail
          OUT="orbit360-platform/runtime-gate-crm-v20260716/credential-provider-account-capability-sanitized.json"
          mkdir -p "$(dirname "$OUT")"
          TMP="${RUNNER_TEMP}/orbit360-account-capability"
          mkdir -p "$TMP"

          PERMISSIONS_JSON='[
            "serviceusage.services.enable",
            "serviceusage.services.get",
            "serviceusage.services.list",
            "iam.serviceAccounts.create",
            "iam.serviceAccounts.get",
            "iam.serviceAccounts.setIamPolicy",
            "resourcemanager.projects.getIamPolicy",
            "resourcemanager.projects.setIamPolicy",
            "secretmanager.secrets.create",
            "secretmanager.secrets.get",
            "secretmanager.secrets.setIamPolicy",
            "secretmanager.versions.add",
            "cloudfunctions.functions.create",
            "cloudfunctions.functions.get",
            "cloudfunctions.functions.update",
            "firebase.projects.get",
            "firebasehosting.sites.get",
            "firebasehosting.sites.update"
          ]'

          RESULTS='[]'
          SELECTED=''

          test_candidate() {
            local slot="$1"
            local raw="$2"
            local present=false
            local jsonValid=false
            local projectMatch=false
            local authOk=false
            local permissionsReadable=false
            local key="$TMP/${slot}.json"
            local response="$TMP/${slot}-permissions.json"
            local allowed='[]'

            if [ -n "$raw" ]; then
              present=true
              printf '%s' "$raw" > "$key"
              chmod 600 "$key"
              if jq -e '.type == "service_account" and (.project_id | type == "string") and (.client_email | type == "string")' "$key" >/dev/null 2>&1; then
                jsonValid=true
                if [ "$(jq -r '.project_id' "$key")" = "$FIREBASE_PROJECT_ID" ]; then projectMatch=true; fi
              fi
            fi

            if [ "$jsonValid" = true ] && [ "$projectMatch" = true ]; then
              if gcloud auth activate-service-account --key-file="$key" --project="$FIREBASE_PROJECT_ID" >/dev/null 2>&1; then
                authOk=true
                TOKEN="$(gcloud auth print-access-token 2>/dev/null || true)"
                if [ -n "$TOKEN" ]; then
                  BODY="$(jq -n --argjson permissions "$PERMISSIONS_JSON" '{permissions:$permissions}')"
                  CODE="$(curl -sS -o "$response" -w '%{http_code}' \
                    -X POST "https://cloudresourcemanager.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}:testIamPermissions" \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H 'Content-Type: application/json; charset=utf-8' \
                    --data "$BODY" || true)"
                  if [ "$CODE" = "200" ] && jq -e '.permissions | type == "array"' "$response" >/dev/null 2>&1; then
                    permissionsReadable=true
                    allowed="$(jq -c '.permissions // []' "$response")"
                  fi
                fi
              fi
            fi

            has_permission() {
              jq -e --arg p "$1" 'index($p) != null' <<< "$allowed" >/dev/null 2>&1 && echo true || echo false
            }

            local canEnable="$(has_permission serviceusage.services.enable)"
            local canCreateSa="$(has_permission iam.serviceAccounts.create)"
            local canSetSaIam="$(has_permission iam.serviceAccounts.setIamPolicy)"
            local canSetProjectIam="$(has_permission resourcemanager.projects.setIamPolicy)"
            local canCreateSecret="$(has_permission secretmanager.secrets.create)"
            local canSetSecretIam="$(has_permission secretmanager.secrets.setIamPolicy)"
            local canAddVersion="$(has_permission secretmanager.versions.add)"
            local canCreateFunction="$(has_permission cloudfunctions.functions.create)"
            local canUpdateFunction="$(has_permission cloudfunctions.functions.update)"
            local canUpdateHosting="$(has_permission firebasehosting.sites.update)"
            local deploymentCapable=false

            if [ "$canEnable" = true ] && [ "$canCreateSa" = true ] && [ "$canSetSaIam" = true ] && \
               [ "$canSetProjectIam" = true ] && [ "$canCreateSecret" = true ] && [ "$canSetSecretIam" = true ] && \
               [ "$canAddVersion" = true ] && [ "$canCreateFunction" = true ] && [ "$canUpdateFunction" = true ] && \
               [ "$canUpdateHosting" = true ]; then
              deploymentCapable=true
              if [ -z "$SELECTED" ]; then SELECTED="$slot"; fi
            fi

            RESULTS="$(jq -c \
              --arg slot "$slot" \
              --argjson present "$present" \
              --argjson jsonValid "$jsonValid" \
              --argjson projectMatch "$projectMatch" \
              --argjson authOk "$authOk" \
              --argjson permissionsReadable "$permissionsReadable" \
              --argjson canEnableServices "$canEnable" \
              --argjson canCreateServiceAccount "$canCreateSa" \
              --argjson canSetServiceAccountIam "$canSetSaIam" \
              --argjson canSetProjectIam "$canSetProjectIam" \
              --argjson canCreateSecret "$canCreateSecret" \
              --argjson canSetSecretIam "$canSetSecretIam" \
              --argjson canAddSecretVersion "$canAddVersion" \
              --argjson canCreateFunction "$canCreateFunction" \
              --argjson canUpdateFunction "$canUpdateFunction" \
              --argjson canUpdateHosting "$canUpdateHosting" \
              --argjson deploymentCapable "$deploymentCapable" \
              '. + [{slot:$slot,present:$present,jsonValid:$jsonValid,projectMatch:$projectMatch,authOk:$authOk,permissionsReadable:$permissionsReadable,capabilities:{canEnableServices:$canEnableServices,canCreateServiceAccount:$canCreateServiceAccount,canSetServiceAccountIam:$canSetServiceAccountIam,canSetProjectIam:$canSetProjectIam,canCreateSecret:$canCreateSecret,canSetSecretIam:$canSetSecretIam,canAddSecretVersion:$canAddSecretVersion,canCreateFunction:$canCreateFunction,canUpdateFunction:$canUpdateFunction,canUpdateHosting:$canUpdateHosting},deploymentCapable:$deploymentCapable}]' <<< "$RESULTS")"

            rm -f "$key" "$response"
          }

          test_candidate primary "${SA_PRIMARY:-}"
          test_candidate alternate "${SA_ALTERNATE:-}"
          test_candidate default "${SA_DEFAULT:-}"

          classification="NO_EXISTING_ACCOUNT_CAN_DEPLOY_PROVIDER"
          if [ -n "$SELECTED" ]; then classification="EXISTING_ACCOUNT_CAN_DEPLOY_PROVIDER"; fi

          jq -n \
            --arg schemaVersion "orbit360-credential-provider-account-capability-v1" \
            --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg classification "$classification" \
            --arg selectedSlot "$SELECTED" \
            --argjson candidates "$RESULTS" \
            '{schemaVersion:$schemaVersion,generatedAt:$generatedAt,readOnly:true,containsSecrets:false,containsEmails:false,containsProjectKeys:false,classification:$classification,selectedSlot:$selectedSlot,candidates:$candidates}' > "$OUT"

          cat "$OUT"

      - name: Publicar evidencia sanitizada
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-secure-credentials-account-capability-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/credential-provider-account-capability-sanitized.json
          if-no-files-found: error
          retention-days: 7

      - name: Comentar resultado sanitizado en PR 5
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILE="orbit360-platform/runtime-gate-crm-v20260716/credential-provider-account-capability-sanitized.json"
          node <<'NODE' > /tmp/orbit360-account-capability-comment.md
          const fs = require('fs');
          const d = JSON.parse(fs.readFileSync('orbit360-platform/runtime-gate-crm-v20260716/credential-provider-account-capability-sanitized.json','utf8'));
          const lines = [
            '### Capacidad sanitizada · cuentas de servicio ya configuradas',
            '',
            '- Solo lectura: `' + d.readOnly + '`',
            '- Clasificación: **' + d.classification + '**',
            '- Cuenta seleccionada: `' + (d.selectedSlot || 'ninguna') + '`',
            '- Run: `' + process.env.GITHUB_RUN_ID + '`',
            ''
          ];
          for (const c of d.candidates) {
            lines.push('- `' + c.slot + '`: presente=' + c.present + ', proyecto=' + c.projectMatch + ', auth=' + c.authOk + ', permisos_legibles=' + c.permissionsReadable + ', capaz_de_desplegar=' + c.deploymentCapable + ', habilitar_servicios=' + c.capabilities.canEnableServices);
          }
          lines.push('', 'No se publicaron correos, claves, JSON, tokens ni identificadores de cuentas.');
          process.stdout.write(lines.join('\n'));
          NODE
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body-file /tmp/orbit360-account-capability-comment.md
