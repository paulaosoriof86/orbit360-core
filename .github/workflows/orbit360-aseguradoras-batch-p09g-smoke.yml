name: Orbit 360 Aseguradoras Batch P09g Smoke

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js'
      - 'orbit360-platform/core/aseguradoras-batch-orchestrator-p09g.js'
      - 'orbit360-platform/core/aseguradoras-runtime-bootstrap-p09f.js'
      - 'orbit360-platform/modules/aseguradoras-knowledge-panel-p09f.js'
      - 'tools/orbit360-test-aseguradoras-batch-orchestrator-p09g.mjs'
      - 'tools/orbit360-test-aseguradoras-runtime-bootstrap-p09f.mjs'
      - 'tools/orbit360-test-aseguradoras-knowledge-panel-p09f.mjs'
      - '.github/workflows/orbit360-aseguradoras-batch-p09g-smoke.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js'
      - 'orbit360-platform/core/aseguradoras-batch-orchestrator-p09g.js'
      - 'orbit360-platform/core/aseguradoras-runtime-bootstrap-p09f.js'
      - 'orbit360-platform/modules/aseguradoras-knowledge-panel-p09f.js'
      - 'tools/orbit360-test-aseguradoras-batch-orchestrator-p09g.mjs'
      - 'tools/orbit360-test-aseguradoras-runtime-bootstrap-p09f.mjs'
      - 'tools/orbit360-test-aseguradoras-knowledge-panel-p09f.mjs'
      - '.github/workflows/orbit360-aseguradoras-batch-p09g-smoke.yml'

permissions:
  contents: read

jobs:
  batch-p09g:
    name: Lote controlado de once fuentes P0.9g
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check syntax
        run: |
          node --check orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js
          node --check orbit360-platform/core/aseguradoras-batch-orchestrator-p09g.js
          node --check orbit360-platform/core/aseguradoras-runtime-bootstrap-p09f.js
          node --check orbit360-platform/modules/aseguradoras-knowledge-panel-p09f.js
          node --check tools/orbit360-test-aseguradoras-batch-orchestrator-p09g.mjs
          node --check tools/orbit360-test-aseguradoras-runtime-bootstrap-p09f.mjs
          node --check tools/orbit360-test-aseguradoras-knowledge-panel-p09f.mjs

      - name: Run controlled batch smoke
        run: node tools/orbit360-test-aseguradoras-batch-orchestrator-p09g.mjs

      - name: Run bootstrap smoke
        run: node tools/orbit360-test-aseguradoras-runtime-bootstrap-p09f.mjs

      - name: Run read-only panel smoke
        run: node tools/orbit360-test-aseguradoras-knowledge-panel-p09f.mjs

      - name: Guard batch inventory and tenant scope
        run: |
          grep -q "ays_aseguradoras_knowledge_batch_2026_v1" orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js
          grep -q "tenantId: 'alianzas-soluciones'" orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js
          grep -q "Aseguradora Rural" orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js
          grep -q "Seguros Columna" orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js
          grep -q "ays_aseguate_auto_binding_set_v1" orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js
          grep -q "ays_aseguate_microbus_binding_set_v1" orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js
          grep -q "ays_universales_riesgo_plus_binding_set_v1" orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js

      - name: Guard no direct writes, network or local storage
        run: |
          if grep -RniE '(Orbit\.store\.(insert|update|remove|setPref)|localStorage|sessionStorage|fetch\(|XMLHttpRequest)' \
            orbit360-platform/core/aseguradoras-batch-orchestrator-p09g.js \
            orbit360-platform/modules/aseguradoras-knowledge-panel-p09f.js \
            orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js; then
            echo 'Direct write, network, or local storage detected'
            exit 1
          fi
          if grep -RniE "(apiKey|clientSecret|privateKey|signedUrl)[[:space:]]*[:=][[:space:]]*['\"][^'\"]+['\"]" \
            orbit360-platform/core/aseguradoras-batch-orchestrator-p09g.js \
            orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js; then
            echo 'Assigned secret or signed URL value detected'
            exit 1
          fi

      - name: Guard zero enablement and double confirmation
        run: |
          if grep -RniE '(enabledCotizador|enabledComparativo|enablesCotizador|enablesComparativo)[[:space:]]*:[[:space:]]*true' \
            orbit360-platform/core/aseguradoras-batch-orchestrator-p09g.js \
            orbit360-platform/data/tenant-alianzas-soluciones-source-batch-p09g.js; then
            echo 'Unexpected module enablement detected'
            exit 1
          fi
          grep -q 'BATCH_PERSISTENCE_CONFIRMATION_REQUIRED' orbit360-platform/core/aseguradoras-batch-orchestrator-p09g.js
          grep -q 'SOURCE_PERSISTENCE_CONFIRMATION_REQUIRED' orbit360-platform/core/aseguradoras-batch-orchestrator-p09g.js
          grep -q 'documents_ready_knowledge_incomplete' orbit360-platform/core/aseguradoras-batch-orchestrator-p09g.js
          grep -q 'incomplete_known_missing_knowledge' orbit360-platform/core/aseguradoras-batch-orchestrator-p09g.js

      - name: Run backend LAB validator if available
        run: |
          if [ -f tools/orbit360-validar-backend-lab-contrato.mjs ]; then
            node tools/orbit360-validar-backend-lab-contrato.mjs
          else
            echo 'Validator not present; skipping.'
          fi