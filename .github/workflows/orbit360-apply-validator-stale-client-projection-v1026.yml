name: Orbit 360 Apply Validator Stale Client Projection 1.0.26

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-apply-validator-stale-client-projection-v1026.yml"

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: orbit360-apply-validator-stale-client-projection-v1026
  cancel-in-progress: false

jobs:
  patch_preflight_dispatch:
    name: Corregir VALIDATOR_STALE · preflight · gate oficial una vez
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BRANCH: ays/backend-tenant-lab-v99-20260703
      GATE_ID: block1-client360-insurers-lab-v20260717
      OFFICIAL_WORKFLOW: orbit360-aseguradoras-runtime-gate-v20260716.yml
    steps:
      - name: Checkout rama obligatoria
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 0

      - name: Aplicar corrección coordinada 1.0.26
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "$BRANCH"
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';

          const read = p => fs.readFileSync(p, 'utf8');
          const write = (p, v) => { fs.mkdirSync(path.dirname(p), { recursive: true }); fs.writeFileSync(p, v, 'utf8'); };
          const replaceOnce = (text, from, to, label) => {
            if (!text.includes(from)) throw new Error(`PATCH_SOURCE_MISSING:${label}`);
            return text.replace(from, to);
          };
          const unique = values => [...new Set((values || []).filter(Boolean))];

          const validatorPath = 'tools/orbit360-runtime-check-client360-v20260716.mjs';
          let validator = read(validatorPath);
          validator = replaceOnce(
            validator,
            "const EXPECTED_TABS = ['resumen','polizas','vehiculos','cobros','recibos','renovaciones','siniestros','comisiones','correos','historial'];",
            "const EXPECTED_TABS = ['resumen','polizas','vehiculos','cobros','recibos','renovaciones','siniestros','comisiones','correos','historial'];\nconst EXPECTED_CLIENT_PROJECTION_VERSION = '20260717.1';\nconst EXPECTED_CLIENT_PROJECTION_BRIDGE = '20260717.1-temporal';",
            'validator_constants'
          );
          validator = replaceOnce(
            validator,
            "    const row = id && Orbit.store.get('clientes', id);\n    return row ? {\n      canonical: row.__canonicalViewProjection || '',",
            "    const row = id && Orbit.store.get('clientes', id);\n    const helper = Orbit.clientProjection || {};\n    const bridge = Orbit.clientCanonicalViewProjectionV20260716 || {};\n    return row ? {\n      canonical: row.__canonicalViewProjection || '',\n      helperVersion: helper.version || '',\n      temporaryBridge: bridge.temporaryInPlaceBridge === true,",
            'validator_projection_evidence'
          );
          validator = replaceOnce(
            validator,
            "  assert(projection && projection.canonical === '20260716.1', 'CLIENT_CANONICAL_PROJECTION_MISSING', label);\n  assert(projection.hasName && projection.hasType && projection.hasState && projection.hasLabelsArray, 'CLIENT_CANONICAL_FIELDS_INCOMPLETE', label);",
            "  assert(projection && projection.helperVersion === EXPECTED_CLIENT_PROJECTION_VERSION, 'CLIENT_CANONICAL_HELPER_VERSION_MISMATCH', `${label}:${projection && projection.helperVersion || 'missing'}`);\n  assert(projection.canonical === EXPECTED_CLIENT_PROJECTION_BRIDGE, 'CLIENT_CANONICAL_PROJECTION_MISSING', `${label}:${projection.canonical || 'missing'}`);\n  assert(projection.temporaryBridge, 'CLIENT_CANONICAL_TEMPORARY_BRIDGE_NOT_DECLARED', label);\n  assert(projection.hasName && projection.hasType && projection.hasState && projection.hasLabelsArray, 'CLIENT_CANONICAL_FIELDS_INCOMPLETE', label);",
            'validator_assertion'
          );
          write(validatorPath, validator);

          const gateRuntimePath = 'tools/orbit360-gate-runtime-crm-v20260716.mjs';
          let gateRuntime = read(gateRuntimePath);
          gateRuntime = replaceOnce(gateRuntime, "schemaVersion:'orbit360-runtime-gate-joint-v25-single-bootstrap-owner'", "schemaVersion:'orbit360-runtime-gate-joint-v26-validator-parity'", 'gate_schema');
          gateRuntime = replaceOnce(gateRuntime, "contractVersion:'1.0.25'", "contractVersion:'1.0.26'", 'gate_contract');
          write(gateRuntimePath, gateRuntime);

          const workflowPath = '.github/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml';
          let workflow = read(workflowPath);
          workflow = replaceOnce(
            workflow,
            '      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717\n      ORBIT360_EXPECTED_RUNTIME: 20260717-2',
            '      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717\n      ORBIT360_CONTRACT_VERSION: 1.0.26\n      ORBIT360_EXPECTED_RUNTIME: 20260717-2',
            'workflow_contract_env'
          );
          workflow = replaceOnce(workflow, "        if: always() && github.event_name == 'push'", "        if: always() && github.event_name != 'pull_request'", 'workflow_comment_dispatch');
          workflow = replaceOnce(
            workflow,
            '            echo "Runtime: ${ORBIT360_EXPECTED_RUNTIME}"',
            '            echo "Contrato: ${ORBIT360_CONTRACT_VERSION}"\n            echo ""\n            echo "Runtime: ${ORBIT360_EXPECTED_RUNTIME}"',
            'workflow_summary_contract'
          );
          write(workflowPath, workflow);

          const docPath = 'orbit360-platform/docs/BLOQUE1-VALIDATOR-STALE-PROYECCION-CLIENTE360-20260719.md';
          write(docPath, `# Bloque 1 · VALIDATOR_STALE en proyección Cliente 360 · 2026-07-19

## Clasificación

- Tipo: VALIDATOR_STALE.
- Gate: block1-client360-insurers-lab-v20260717.
- Fuente: run oficial 29668369152, contrato 1.0.25.
- Primer fallo: desktop_direction_client360.
- Código: CLIENT_CANONICAL_PROJECTION_MISSING.

## Evidencia observada

El runtime mostró 414 clientes, scope Dirección=all, 414 filas visibles, KPI correcto y ficha con nombre, tipo, estado, etiquetas y estado pendiente_polizas. La proyección activa declaró:

- Orbit.clientProjection.version = 20260717.1;
- __canonicalViewProjection = 20260717.1-temporal;
- temporaryInPlaceBridge = true.

El validador seguía exigiendo literalmente 20260716.1. Por tanto, el producto estaba correcto y el contrato de validación estaba obsoleto.

## Causa raíz

La proyección canónica evolucionó el 17 de julio y conservó un puente in-place temporal para renderers antiguos. El validador del 16 de julio no evolucionó junto con ese contrato y confundió una versión vigente con ausencia de proyección.

## Corrección 1.0.26

1. Congelar Cliente 360, Aseguradoras, Store, Auth, Router, reglas y datos.
2. Validar por separado la versión del helper 20260717.1 y el marcador temporal 20260717.1-temporal.
3. Exigir que temporaryInPlaceBridge sea explícitamente true.
4. Mantener las pruebas de campos, estado, tabs, scopes y conteos sin relajarlas.
5. Actualizar registro, overlay, workflow, runtime gate, CHANGELOG y documentación juntos.
6. Permitir que workflow_dispatch publique el resultado sanitizado en PR #5.
7. Ejecutar el preflight vinculante y el gate oficial una sola vez.

## Impacto

- Producto: sin cambios.
- Datos: sin cambios; 414 clientes, 26 aseguradoras y 7 asesores preservados.
- Backend protegido: sin cambios.
- Producción/main/merge: no.

## Claude

Clasificación: REPLICABLE_CLAUDE_ACUMULADO.

Regla reusable: los validadores deben comprobar contratos semánticos y versiones declaradas por el owner; un puente temporal debe validarse como puente, no equipararse a ausencia de proyección. Las versiones de owner, bridge, validator, registry, workflow y Academia cambian juntas.

## Academia

ACADEMIA_ACTUALIZAR: enseñar la diferencia entre defecto funcional y validador obsoleto. Un gate rojo no autoriza modificar producto cuando la evidencia funcional está correcta y el literal esperado quedó atrás.

## Estado

Pendiente únicamente evidencia sanitizada ok:true del contrato 1.0.26.
`);

          const changelogPath = 'orbit360-platform/CHANGELOG.md';
          let changelog = read(changelogPath);
          const entry = `## [Gate M1 1.0.26] — 2026-07-19 · Paridad del validador Cliente 360\n- Clasificado VALIDATOR_STALE tras el run 29668369152: 414 clientes, KPI, ficha y campos canónicos correctos; el validador exigía el marcador obsoleto 20260716.1.\n- Se validan por separado el owner 20260717.1 y el puente temporal 20260717.1-temporal, sin modificar producto, datos ni backend protegido.\n- workflow_dispatch publica ahora evidencia sanitizada en PR #5.\n\n`;
          changelog = changelog.replace('# Changelog · Orbit 360 Plataforma\n\n', '# Changelog · Orbit 360 Plataforma\n\n' + entry);
          write(changelogPath, changelog);

          const registryPath = 'tools/orbit360-gate-contract-registry-v20260717.json';
          const registry = JSON.parse(read(registryPath));
          registry.issuedAt = '2026-07-19';
          registry.retiredRuntimeArtifacts = unique([...(registry.retiredRuntimeArtifacts || []),
            '.github/workflows/orbit360-dispatch-official-m1-once-v20260719.yml',
            '.github/workflows/orbit360-apply-validator-stale-client-projection-v1026.yml'
          ]);
          const owner = (registry.canonicalOwners || []).find(item => item.id === 'clientProjection');
          if (!owner) throw new Error('CLIENT_PROJECTION_OWNER_MISSING');
          owner.requiredTokens = unique([...(owner.requiredTokens || []),
            "version: '20260717.1'",
            "row.__canonicalViewProjection = '20260717.1-temporal'",
            'temporaryInPlaceBridge: true'
          ]);
          const gate = (registry.gates || []).find(item => item.gateId === 'block1-client360-insurers-lab-v20260717');
          if (!gate) throw new Error('GATE_MISSING');
          gate.contractVersion = '1.0.26';
          gate.diagnosticRevision = 'client-projection-validator-parity-v1';
          gate.status = 'ACTIVE_VALIDATOR_STALE_FIX';
          gate.diagnosticRule = 'Validate the canonical Client 360 helper version and its explicitly declared temporary in-place bridge separately. A current temporary bridge is not missing projection.';
          gate.requiredFiles = unique([...(gate.requiredFiles || []), docPath]);
          gate.reconciliation = {
            date: '2026-07-19',
            classifications: ['VALIDATOR_STALE'],
            sourceRunId: 29668369152,
            sourceContractVersion: '1.0.25',
            failedStage: 'desktop_direction_client360',
            errorCode: 'CLIENT_CANONICAL_PROJECTION_MISSING',
            rootCause: 'The runtime exposed the current canonical helper 20260717.1 and the intentional temporary bridge marker 20260717.1-temporal, while the validator still required the obsolete literal 20260716.1.',
            corrections: [
              'freeze Cliente 360, Aseguradoras, Store, Auth, Router, rules and data',
              'validate helper and temporary bridge versions independently',
              'require the temporary bridge declaration explicitly',
              'publish workflow_dispatch results to PR 5',
              'update registry, overlay, validator, workflow, CHANGELOG, Claude and Academia together',
              'run binding preflight and official gate exactly once'
            ],
            openEvidence: ['1.0.26 sanitized ok:true across Dirección desktop, Operativo tablet and Asesor móvil'],
            preserved: ['Orbit.store API','core/auth.js','core/router.js','Firestore rules','Cliente 360 renderer','Aseguradoras renderer','414 clientes','26 aseguradoras','7 asesores']
          };
          if (gate.executionBudget && gate.executionBudget.evidence) {
            gate.executionBudget.evidence.sourceContractVersion = '1.0.25';
            gate.executionBudget.evidence.failedStage = 'desktop_direction_client360';
            gate.executionBudget.evidence.validatorExpectedProjection = '20260716.1';
            gate.executionBudget.evidence.runtimeHelperVersion = '20260717.1';
            gate.executionBudget.evidence.runtimeTemporaryBridge = '20260717.1-temporal';
            gate.executionBudget.evidence.mechanismFinding = 'Functional evidence passed through the first client detail projection fields; only the obsolete validator literal failed.';
            gate.executionBudget.interpretation = 'Version 1.0.26 changes only validation parity and result publication. Product, data and protected backend remain frozen.';
            gate.executionBudget.exhaustionPolicy = 'Execute 1.0.26 once after GO_GATE_CONTRACT. If a new stage fails, stop and classify that first failure before any additional change.';
          }
          const contracts = gate.runtimeVersionContracts || [];
          const gateContract = contracts.find(item => item.path === gateRuntimePath);
          if (!gateContract) throw new Error('GATE_RUNTIME_CONTRACT_MISSING');
          gateContract.requiredTokens = unique((gateContract.requiredTokens || []).map(token => token === "contractVersion:'1.0.25'" ? "contractVersion:'1.0.26'" : token));
          let validatorContract = contracts.find(item => item.path === validatorPath);
          if (!validatorContract) {
            validatorContract = { path: validatorPath, requiredTokens: [] };
            contracts.push(validatorContract);
          }
          validatorContract.requiredTokens = unique([...(validatorContract.requiredTokens || []),
            "EXPECTED_CLIENT_PROJECTION_VERSION = '20260717.1'",
            "EXPECTED_CLIENT_PROJECTION_BRIDGE = '20260717.1-temporal'",
            'CLIENT_CANONICAL_HELPER_VERSION_MISMATCH',
            'CLIENT_CANONICAL_TEMPORARY_BRIDGE_NOT_DECLARED'
          ]);
          const workflowContract = contracts.find(item => item.path === workflowPath);
          if (!workflowContract) throw new Error('WORKFLOW_CONTRACT_MISSING');
          workflowContract.requiredTokens = unique([...(workflowContract.requiredTokens || []),
            'ORBIT360_CONTRACT_VERSION: 1.0.26',
            "github.event_name != 'pull_request'"
          ]);
          gate.runtimeVersionContracts = contracts;
          gate.executionDispatch = {
            mode: 'workflow_dispatch',
            uniqueExecution: true,
            dispatchAfterRetirement: true,
            purpose: 'Execute contract 1.0.26 once after the stale validator and temporary patch/dispatcher workflows are retired.'
          };
          write(registryPath, JSON.stringify(registry, null, 2) + '\n');

          const overlayPath = 'tools/orbit360-gate-contract-overlay-v20260718.json';
          const overlay = JSON.parse(read(overlayPath));
          overlay.issuedAt = '2026-07-19';
          overlay.classification = 'VALIDATOR_STALE';
          overlay.diagnosticRevision = 'client-projection-validator-parity-v1';
          overlay.contractRevision = '1.0.26-client-projection-validator-parity-v1';
          overlay.sourceRunId = 29668369152;
          overlay.sourceHead = process.env.GITHUB_SHA || '';
          overlay.firstFailedStage = 'desktop_direction_client360';
          overlay.requiredFiles = unique([...(overlay.requiredFiles || []), validatorPath, docPath]);
          overlay.runtimeGraphFiles = unique([...(overlay.runtimeGraphFiles || []), validatorPath]);
          const overlayOwners = new Map((overlay.canonicalOwners || []).map(item => [item.id, item]));
          overlayOwners.set('clientProjectionValidator', {
            id: 'clientProjectionValidator',
            path: validatorPath,
            requiredTokens: [
              "EXPECTED_CLIENT_PROJECTION_VERSION = '20260717.1'",
              "EXPECTED_CLIENT_PROJECTION_BRIDGE = '20260717.1-temporal'",
              'CLIENT_CANONICAL_HELPER_VERSION_MISMATCH',
              'CLIENT_CANONICAL_TEMPORARY_BRIDGE_NOT_DECLARED'
            ]
          });
          overlay.canonicalOwners = [...overlayOwners.values()];
          const overlayContracts = new Map((overlay.runtimeVersionContracts || []).map(item => [item.path, item]));
          overlayContracts.set(validatorPath, {
            path: validatorPath,
            requiredTokens: [
              "EXPECTED_CLIENT_PROJECTION_VERSION = '20260717.1'",
              "EXPECTED_CLIENT_PROJECTION_BRIDGE = '20260717.1-temporal'",
              'CLIENT_CANONICAL_HELPER_VERSION_MISMATCH',
              'CLIENT_CANONICAL_TEMPORARY_BRIDGE_NOT_DECLARED'
            ]
          });
          const currentGateOverlay = overlayContracts.get(gateRuntimePath) || { path: gateRuntimePath, requiredTokens: [] };
          currentGateOverlay.requiredTokens = unique([...(currentGateOverlay.requiredTokens || []), "contractVersion:'1.0.26'"]);
          overlayContracts.set(gateRuntimePath, currentGateOverlay);
          const currentWorkflowOverlay = overlayContracts.get(workflowPath) || { path: workflowPath, requiredTokens: [] };
          currentWorkflowOverlay.requiredTokens = unique([...(currentWorkflowOverlay.requiredTokens || []), 'ORBIT360_CONTRACT_VERSION: 1.0.26', "github.event_name != 'pull_request'"]);
          overlayContracts.set(workflowPath, currentWorkflowOverlay);
          overlay.runtimeVersionContracts = [...overlayContracts.values()];
          overlay.preserved = unique([...(overlay.preserved || []), 'core/router.js', 'Cliente 360 canonical projection owner 20260717.1', 'temporary bridge 20260717.1-temporal']);
          write(overlayPath, JSON.stringify(overlay, null, 2) + '\n');
          NODE

          git rm -f .github/workflows/orbit360-dispatch-official-m1-once-v20260719.yml
          git rm -f .github/workflows/orbit360-apply-validator-stale-client-projection-v1026.yml

      - name: Verificar alcance y preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          ALLOWED='^(.github/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml|.github/workflows/orbit360-dispatch-official-m1-once-v20260719.yml|.github/workflows/orbit360-apply-validator-stale-client-projection-v1026.yml|tools/orbit360-runtime-check-client360-v20260716.mjs|tools/orbit360-gate-runtime-crm-v20260716.mjs|tools/orbit360-gate-contract-registry-v20260717.json|tools/orbit360-gate-contract-overlay-v20260718.json|orbit360-platform/CHANGELOG.md|orbit360-platform/docs/BLOQUE1-VALIDATOR-STALE-PROYECCION-CLIENTE360-20260719.md)$'
          CHANGED="$(git status --short | sed -E 's/^.. //')"
          test -n "$CHANGED"
          while IFS= read -r file; do
            test -z "$file" || echo "$file" | grep -Eq "$ALLOWED"
          done <<< "$CHANGED"
          ! git status --short | grep -E 'orbit360-platform/(data/store\.js|data/store-firestore-lab\.local\.js|core/auth\.js|core/router\.js|modules/cliente360\.js|modules/aseguradoras\.js)|firestore\.rules'
          node --check tools/orbit360-runtime-check-client360-v20260716.mjs
          node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$GATE_ID"
          test "$(jq -r '.status' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = "GO_GATE_CONTRACT"

      - name: Commit único de control 1.0.26
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "orbit360-gate-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .
          git commit -m "fix(block1): alinear validador de proyección 1.0.26 [skip ci]"
          git push origin "HEAD:${BRANCH}"
          echo "PATCH_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Despachar gate oficial exactamente una vez
        uses: actions/github-script@v7
        env:
          PATCH_SHA: ${{ env.PATCH_SHA }}
        with:
          script: |
            const workflow = process.env.OFFICIAL_WORKFLOW;
            const branch = process.env.BRANCH;
            const patchSha = process.env.PATCH_SHA;
            const startedAt = Date.now();
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflow,
              ref: branch
            });
            let run = null;
            for (let attempt = 0; attempt < 30; attempt += 1) {
              await new Promise(resolve => setTimeout(resolve, 1500));
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow,
                branch,
                event: 'workflow_dispatch',
                per_page: 20
              });
              run = (runs.data.workflow_runs || []).find(item => item.head_sha === patchSha && new Date(item.created_at).getTime() >= startedAt - 5000);
              if (run) break;
            }
            const body = [
              '## M1 · contrato 1.0.26 despachado',
              '',
              '- Clasificación corregida: **VALIDATOR_STALE**',
              `- Commit de control: \`${patchSha}\``,
              `- Workflow oficial: \`${workflow}\``,
              `- Run: \`${run ? run.id : 'no observado'}\``,
              '- Número de despachos solicitados: **1**',
              '- Producto, datos y backend protegido modificados: **no**',
              '- Producción, main o merge: **no**'
            ];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 5,
              body: body.join('\n')
            });
            if (!run) core.setFailed('OFFICIAL_M1_1026_RUN_NOT_OBSERVED');
            else core.notice(`OFFICIAL_M1_1026_RUN_ID:${run.id}`);
