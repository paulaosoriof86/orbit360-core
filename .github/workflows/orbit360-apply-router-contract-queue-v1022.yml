name: Orbit 360 Apply Router Contract Queue 1.0.22

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-apply-router-contract-queue-v1022.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: orbit360-apply-router-contract-queue-v1022
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2
      - name: Aplicar corrección de propiedad y cola
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "ays/backend-tenant-lab-v99-20260703"
          node --check tools/orbit360-patch-router-contract-queue-v1022.mjs
          node --check tools/orbit360-patch-gate-registry-v1022.mjs
          node tools/orbit360-patch-router-contract-queue-v1022.mjs
          node tools/orbit360-patch-gate-registry-v1022.mjs
          node -e "const fs=require('fs');fs.appendFileSync('orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-PWA-CONTROL-RUNTIME-SIGNALS-20260718.md',Buffer.from('','base64').toString('utf8'));"
          rm -f tools/orbit360-patch-router-contract-queue-v1022.mjs tools/orbit360-patch-gate-registry-v1022.mjs
      - name: Validar sintaxis, alcance y preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          node --check orbit360-platform/core/router.js
          node --check orbit360-platform/core/backend-lab-canonical-view-sync.js
          node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717
          rm -rf orbit360-platform/runtime-gate-crm-v20260716
          allowed='^(orbit360-platform/core/router\.js|orbit360-platform/core/backend-lab-canonical-view-sync\.js|tools/orbit360-gate-runtime-crm-v20260716\.mjs|tools/orbit360-gate-contract-registry-v20260717\.json|orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-PWA-CONTROL-RUNTIME-SIGNALS-20260718\.md|tools/orbit360-patch-router-contract-queue-v1022\.mjs|tools/orbit360-patch-gate-registry-v1022\.mjs)$'
          unexpected="$(git status --short | sed -E 's/^.. //' | grep -Ev "$allowed" || true)"
          test -z "$unexpected" || { echo "$unexpected"; exit 1; }
      - name: Publicar cierre 1.0.22 sin disparar gate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(block1): enforce Router-owned contract queue 1.0.22 [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
