name: Orbit 360 Provider Revision Diagnostic Read Only LAB 20260720
run-name: M1 diagnóstico read-only proveedor · ${{ github.sha }}

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-deploy-secure-provider-role-fix-lab-v20260720.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: orbit360-provider-revision-diagnostic-readonly-v20260720
  cancel-in-progress: true

env:
  FIREBASE_PROJECT_ID: ays-orbit-360-lab
  ORBIT360_PROVIDER_AUTH_DIAGNOSTIC: orbit360-platform/runtime-gate-crm-v20260716/provider-authorization-diagnostic-sanitized.json
  ORBIT360_REFERENCE_DEPLOY_RUN_ID: "29781660851"
  ORBIT360_REFERENCE_DEPLOY_START: "2026-07-20T21:49:46Z"
  ORBIT360_REFERENCE_DEPLOY_END: "2026-07-20T21:53:15Z"

jobs:
  diagnose_readonly:
    name: Proveedor seguro LAB · revisiones e IAM en modo lectura
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout SHA inmutable
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Preflight contractual y prohibición de despliegue
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = "push"
          test "$GITHUB_REF_NAME" = "ays/backend-tenant-lab-v99-20260703"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$FIREBASE_PROJECT_ID" = "ays-orbit-360-lab"
          node tools/orbit360-validar-gate-contracts-v20260717.mjs importers-e2e-acceptance-lab-v20260720
          node --check tools/orbit360-diagnose-credential-provider-auth-v20260720-v2.mjs
          node <<'NODE'
          const fs = require('fs');
          const path = '.github/workflows/orbit360-deploy-secure-provider-role-fix-lab-v20260720.yml';
          const source = fs.readFileSync(path, 'utf8');
          const forbiddenCommands = [
            ['firebase', 'deploy'].join(' '),
            ['gcloud', 'functions', 'deploy'].join(' '),
            ['gcloud', 'run', 'deploy'].join(' ')
          ];
          for (const command of forbiddenCommands) {
            if (source.includes(command)) throw new Error(`READ_ONLY_WORKFLOW_CONTAINS_FORBIDDEN_COMMAND_${command.replace(/\s+/g, '_')}`);
          }
          if (!source.includes("mode: read_only")) throw new Error('READ_ONLY_EVIDENCE_TOKEN_MISSING');
          console.log('ORBIT360_PROVIDER_REVISION_READONLY_PREFLIGHT_OK');
          NODE

      - name: Resolver cuenta LAB después del preflight
        shell: bash
        env:
          SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
          SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
          SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then echo "BLOQUEO_SECRET_LAB"; exit 42; fi
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          PROJECT_ID="$(jq -r '.project_id // empty' "$KEY_FILE")"
          test "$PROJECT_ID" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencias de diagnóstico
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save firebase-admin@13 google-auth-library@9
          node -e "require('firebase-admin'); require('google-auth-library'); console.log('READ_ONLY_DIAGNOSTIC_DEPENDENCIES_OK')"

      - name: Leer cuatro Functions, revisiones, tráfico e IAM
        id: diagnostic
        shell: bash
        run: node tools/orbit360-diagnose-credential-provider-auth-v20260720-v2.mjs

      - name: Validar evidencia sanitizada read-only
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = process.env.ORBIT360_PROVIDER_AUTH_DIAGNOSTIC;
          const report = JSON.parse(fs.readFileSync(path, 'utf8'));
          const accepted = new Set([
            'DEPLOYMENT_CONFIRMED_CURRENT',
            'DEPLOYMENT_PARTIAL',
            'DEPLOYMENT_NOT_APPLIED',
            'DEPLOYMENT_REVISION_INCONSISTENT'
          ]);
          if (report.mode !== 'read_only') throw new Error('DIAGNOSTIC_MODE_NOT_READ_ONLY');
          if (report.functionIds?.length !== 4 || report.functions?.length !== 4) throw new Error('FOUR_FUNCTIONS_EVIDENCE_REQUIRED');
          if (!accepted.has(report.deploymentClassification)) throw new Error(`DEPLOYMENT_CLASSIFICATION_INVALID_${report.deploymentClassification || 'EMPTY'}`);
          if (report.containsPII !== false || report.containsSecrets !== false) throw new Error('SANITIZATION_CONTRACT_FAILED');
          if (report.diagnosticComplete !== true || report.ok !== true) throw new Error('READ_ONLY_DIAGNOSTIC_INCOMPLETE');
          console.log(`ORBIT360_PROVIDER_REVISION_DIAGNOSTIC_OK:${report.deploymentClassification}`);
          NODE

      - name: Publicar evidencia sanitizada
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-provider-revision-readonly-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/provider-authorization-diagnostic-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
          if-no-files-found: error
          retention-days: 7

      - name: Actualizar diagnóstico observable en PR 5
        uses: actions/github-script@v7
        env:
          TARGET_PR: "5"
          EVIDENCE_PATH: orbit360-platform/runtime-gate-crm-v20260716/provider-authorization-diagnostic-sanitized.json
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync(process.env.EVIDENCE_PATH, 'utf8'));
            const checks = report.checks || {};
            const functions = Array.isArray(report.functions) ? report.functions : [];
            const start = '<!-- ORBIT360_PROVIDER_REVISION_READONLY_START -->';
            const end = '<!-- ORBIT360_PROVIDER_REVISION_READONLY_END -->';
            const rows = functions.map((item) =>
              `- ${item.functionId}: estado **${item.state || 'desconocido'}**, actualizada en ventana **${item.updatedDuringReferenceRun === true}**, revisión lista **${item.cloudRun?.latestReadyMatchesCreated === true}**, IAM callable **${item.cloudRunIam?.publicInvoker === true}**`
            ).join('\n');
            const block = `${start}
            ## Diagnóstico read-only de revisiones del proveedor seguro

            \`\`\`txt
            run: ${process.env.RUN_ID}
            HEAD evaluado: ${process.env.HEAD_SHA}
            modo: read_only
            deploy de referencia: ${report.referenceDeployRun?.runId || '—'}
            clasificación despliegue: ${report.deploymentClassification || 'UNCLASSIFIED'}
            clasificación autorización: ${report.classification || 'UNCLASSIFIED'}
            ok diagnóstico: ${report.ok === true}
            \`\`\`

            - Functions descritas: **${checks.allFunctionsDescribed === true}**
            - Functions activas: **${checks.allFunctionsActive === true}**
            - Entry points correctos: **${checks.allEntryPointsMatch === true}**
            - Cuentas ejecutoras correctas: **${checks.allRuntimeServiceAccountsMatch === true}**
            - Revisiones listas: **${checks.allLatestRevisionsReady === true}**
            - IAM legible: **${checks.allCloudRunIamReadable === true}**
            - Ingreso callable: **${checks.allCallableIngress === true}**
            - Functions actualizadas durante el run de referencia: **${Number(checks.functionsUpdatedDuringReferenceRun || 0)}/4**
            - Membresía autoriza: **${checks.membershipAuthorizationWouldPass === true}**

            ${rows}

            No deploy. No provider invocation. No operational writes.
            ${end}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number(process.env.TARGET_PR);
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            const current = pr.body || '';
            const pattern = new RegExp(`${start}[\\s\\S]*?${end}`, 'm');
            const body = pattern.test(current) ? current.replace(pattern, block) : `${current.trim()}\n\n${block}\n`;
            await github.rest.pulls.update({ owner, repo, pull_number, body });

      - name: Limpiar cuenta temporal
        if: always()
        shell: bash
        run: rm -f "${RUNNER_TEMP}/orbit360-firebase-lab.json"

      - name: Resumen de alcance
        if: always()
        shell: bash
        run: |
          {
            echo "## Provider revision diagnostic"
            echo ""
            echo "mode: read_only"
            echo ""
            echo "No deploy. No provider invocation. No operational writes."
          } >> "$GITHUB_STEP_SUMMARY"
