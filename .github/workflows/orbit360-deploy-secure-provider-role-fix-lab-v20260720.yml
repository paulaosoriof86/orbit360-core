name: Orbit 360 Deploy Secure Provider Role Fix LAB 20260720
run-name: M1 deploy proveedor roles · ${{ github.sha }}

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-deploy-secure-provider-role-fix-lab-v20260720.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: orbit360-deploy-secure-provider-role-fix-lab-v20260720
  cancel-in-progress: true

env:
  FIREBASE_PROJECT_ID: ays-orbit-360-lab
  ORBIT360_PROVIDER_AUTH_DIAGNOSTIC: orbit360-platform/runtime-gate-crm-v20260716/provider-authorization-diagnostic-sanitized.json
  ORBIT360_DEPLOY_EVIDENCE: orbit360-platform/runtime-gate-crm-v20260716/provider-role-fix-deploy-sanitized.json

jobs:
  deploy_verify:
    name: Proveedor seguro LAB · preflight, deploy y diagnóstico
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout SHA inmutable
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Preflight contractual antes de secretos
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = "push"
          test "$GITHUB_REF_NAME" = "ays/backend-tenant-lab-v99-20260703"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$FIREBASE_PROJECT_ID" = "ays-orbit-360-lab"
          node tools/orbit360-validar-gate-contracts-v20260717.mjs importers-e2e-acceptance-lab-v20260720
          node --check functions/index.js
          node --check tools/orbit360-diagnose-credential-provider-auth-v20260720-v2.mjs
          node tools/orbit360-test-role-normalization-callback-arity-v20260720.mjs
          echo "ORBIT360_PROVIDER_ROLE_FIX_PREFLIGHT_OK"

      - name: Resolver cuenta LAB después del preflight
        shell: bash
        env:
          SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
          SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
          SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then echo "BLOQUEO_SECRET_LAB"; exit 42; fi
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          PROJECT_ID="$(jq -r '.project_id // empty' "$KEY_FILE")"
          test "$PROJECT_ID" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencias de diagnóstico
        shell: bash
        run: npm install --no-save firebase-admin@13 google-auth-library@9

      - name: Desplegar solo cuatro Functions del proveedor LAB
        id: deploy
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npx firebase-tools deploy \
            --only functions:orbit360ImportInsurerCredentials,functions:orbit360CredentialStatus,functions:orbit360RevealInsurerCredential,functions:orbit360CopyInsurerCredential \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive \
            --json > "${RUNNER_TEMP}/provider-deploy.json"

      - name: Diagnosticar autorización y revisión desplegada
        id: diagnostic
        if: always()
        continue-on-error: true
        shell: bash
        run: node tools/orbit360-diagnose-credential-provider-auth-v20260720-v2.mjs

      - name: Construir evidencia sanitizada
        if: always()
        shell: bash
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          DIAGNOSTIC_OUTCOME: ${{ steps.diagnostic.outcome }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const diagnosticPath = process.env.ORBIT360_PROVIDER_AUTH_DIAGNOSTIC;
          const diagnostic = fs.existsSync(diagnosticPath)
            ? JSON.parse(fs.readFileSync(diagnosticPath, 'utf8'))
            : { classification: 'DIAGNOSTIC_EVIDENCE_MISSING', checks: {}, errors: {} };
          const evidence = {
            schemaVersion: 'orbit360-provider-role-fix-deploy-evidence-v1',
            projectId: process.env.FIREBASE_PROJECT_ID,
            environment: 'LAB',
            runId: process.env.RUN_ID,
            commit: process.env.HEAD_SHA,
            deployedFunctions: [
              'orbit360ImportInsurerCredentials',
              'orbit360CredentialStatus',
              'orbit360RevealInsurerCredential',
              'orbit360CopyInsurerCredential'
            ],
            deployOutcome: process.env.DEPLOY_OUTCOME,
            diagnosticOutcome: process.env.DIAGNOSTIC_OUTCOME,
            diagnosticClassification: diagnostic.classification || 'UNCLASSIFIED',
            checks: diagnostic.checks || {},
            cloudRunIamReadable: diagnostic.cloudRunIam?.readable === true,
            containsPII: false,
            containsSecrets: false,
            productionTouched: false,
            hostingTouched: false,
            firestoreRulesTouched: false,
            ok: process.env.DEPLOY_OUTCOME === 'success' &&
              process.env.DIAGNOSTIC_OUTCOME === 'success' &&
              diagnostic.classification === 'PROVIDER_AUTHORIZATION_LAYER_READY'
          };
          fs.mkdirSync('orbit360-platform/runtime-gate-crm-v20260716', { recursive: true });
          fs.writeFileSync(process.env.ORBIT360_DEPLOY_EVIDENCE, `${JSON.stringify(evidence, null, 2)}\n`, 'utf8');
          NODE

      - name: Publicar evidencias sanitizadas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-provider-role-fix-deploy-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/provider-role-fix-deploy-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/provider-authorization-diagnostic-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
          if-no-files-found: error
          retention-days: 7

      - name: Actualizar estado observable en PR 5
        if: always()
        uses: actions/github-script@v7
        env:
          TARGET_PR: "5"
          EVIDENCE_PATH: orbit360-platform/runtime-gate-crm-v20260716/provider-role-fix-deploy-sanitized.json
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');
            const start = '<!-- ORBIT360_PROVIDER_ROLE_FIX_DEPLOY_START -->';
            const end = '<!-- ORBIT360_PROVIDER_ROLE_FIX_DEPLOY_END -->';
            const evidence = fs.existsSync(process.env.EVIDENCE_PATH)
              ? JSON.parse(fs.readFileSync(process.env.EVIDENCE_PATH, 'utf8'))
              : { deployOutcome: 'missing', diagnosticOutcome: 'missing', diagnosticClassification: 'EVIDENCE_MISSING', checks: {}, ok: false };
            const checks = evidence.checks || {};
            const block = `${start}
            ## Deploy LAB del fix de normalización de roles

            \`\`\`txt
            run: ${process.env.RUN_ID}
            HEAD desplegado: ${process.env.HEAD_SHA}
            ambiente: LAB
            Functions: 4
            deploy: ${evidence.deployOutcome}
            diagnóstico: ${evidence.diagnosticOutcome}
            clasificación: ${evidence.diagnosticClassification}
            ok: ${evidence.ok === true}
            \`\`\`

            - Membresía autorizaría la operación: **${checks.membershipAuthorizationWouldPass === true}**
            - Function activa: **${checks.functionActive === true}**
            - Cuenta ejecutora coincide: **${checks.runtimeServiceAccountMatches === true}**
            - Ingreso callable invocable: **${checks.publicCallableIngress === true}**
            - Política IAM legible: **${evidence.cloudRunIamReadable === true}**
            - Hosting desplegado: **false**
            - Reglas Firestore desplegadas: **false**
            - Producción tocada: **false**
            - Secretos publicados: **false**
            ${end}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number(process.env.TARGET_PR);
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            const current = pr.body || '';
            const pattern = new RegExp(`${start}[\\s\\S]*?${end}`, 'm');
            const body = pattern.test(current) ? current.replace(pattern, block) : `${current.trim()}\n\n${block}\n`;
            await github.rest.pulls.update({ owner, repo, pull_number, body });

      - name: Limpiar cuenta temporal
        if: always()
        shell: bash
        run: rm -f "${RUNNER_TEMP}/orbit360-firebase-lab.json" "${RUNNER_TEMP}/provider-deploy.json"

      - name: Sellar resultado
        if: always()
        shell: bash
        run: |
          node -e "const e=require('./orbit360-platform/runtime-gate-crm-v20260716/provider-role-fix-deploy-sanitized.json'); if(e.ok!==true) process.exit(70); console.log('ORBIT360_PROVIDER_ROLE_FIX_DEPLOY_OK')"
