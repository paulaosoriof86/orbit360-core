name: Orbit 360 · M1 binding static preflight 1.0.37
on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - '.github/workflows/orbit360-m1-static-preflight-1-0-37-v20260722.yml'
permissions:
  contents: write
concurrency:
  group: orbit360-m1-static-preflight-1-0-37-v20260722
  cancel-in-progress: false
jobs:
  preflight:
    if: github.repository == 'paulaosoriof86/orbit360-core' && github.ref == 'refs/heads/ays/backend-tenant-lab-v99-20260703'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify single-use authorization
        run: |
          node <<'NODE'
          const fs=require('fs');
          const a=JSON.parse(fs.readFileSync('tools/orbit360-authorize-final-block1-gate-readonly-v20260721.json','utf8'));
          const ok=a.action==='final_block1_static_preflight_1_0_37_only' && a.active===true && a.consumed===false && a.allowedExecutions===1 && a.expectedContractVersion==='1.0.37' && a.runtimeAllowed===false && a.browserAllowed===false && a.firestoreReadAllowed===false && a.vaultReadAllowed===false && a.secretsAllowed===false && a.writesAllowed===false && a.deployAllowed===false && a.functionsDeployAllowed===false && a.rulesDeployAllowed===false && a.productionAllowed===false;
          if(!ok) throw new Error('STATIC_PREFLIGHT_AUTHORIZATION_INVALID');
          NODE
      - name: Execute binding static preflight only
        run: |
          set +e
          ORBIT360_BRANCH=ays/backend-tenant-lab-v99-20260703 node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717 > /tmp/gate.json
          echo $? > /tmp/gate.code
          node orbit360-platform/tools/orbit360-block0-architecture-gate-v20260717.js > /tmp/architecture.json
          echo $? > /tmp/architecture.code
          node orbit360-platform/tools/orbit360-m1-visual-remediation-contract-v20260722.js > /tmp/remediation.json
          echo $? > /tmp/remediation.code
          exit 0
      - name: Consume authorization, record evidence and retire workflow
        run: |
          node <<'NODE'
          const fs=require('fs');
          const path=require('path');
          const read=p=>JSON.parse(fs.readFileSync(p,'utf8'));
          const gate=read('/tmp/gate.json');
          const architecture=read('/tmp/architecture.json');
          const remediation=read('/tmp/remediation.json');
          const gateCode=+fs.readFileSync('/tmp/gate.code','utf8').trim();
          const architectureCode=+fs.readFileSync('/tmp/architecture.code','utf8').trim();
          const remediationCode=+fs.readFileSync('/tmp/remediation.code','utf8').trim();
          const gateOk=gateCode===0&&gate.status==='GO_GATE_CONTRACT'&&gate.contractVersion==='1.0.37'&&gate.failed===0;
          const architectureOk=architectureCode===0&&architecture.status==='GO_STATIC_ARCHITECTURE'&&architecture.failed===0;
          const remediationOk=remediationCode===0&&remediation.status==='PASS'&&remediation.failed===0&&remediation.passed===29&&remediation.writes===0&&!remediation.runtimeExecuted&&!remediation.browserExecuted&&!remediation.deployExecuted;
          const ok=gateOk&&architectureOk&&remediationOk;
          const authPath='tools/orbit360-authorize-final-block1-gate-readonly-v20260721.json';
          const freezePath='tools/orbit360-incident-freeze-v20260721.json';
          const auth=read(authPath);
          const freeze=read(freezePath);
          const evidence={
            schemaVersion:'orbit360-m1-binding-static-preflight-1-0-37-proof-v1',
            issuedAt:new Date().toISOString(),
            repository:'paulaosoriof86/orbit360-core',
            branch:'ays/backend-tenant-lab-v99-20260703',
            pullRequest:5,
            gateId:'block1-client360-insurers-lab-v20260717',
            contractVersion:'1.0.37',
            status:ok?'PASS':'FAIL',
            gateContract:{status:gate.status,contractVersion:gate.contractVersion,total:gate.total,passed:gate.passed,failed:gate.failed,classification:gate.classification||null,overlayRevision:gate.overlayRevision||'',evidencePath:gate.evidencePath||''},
            architecture:{status:architecture.status,total:architecture.total,passed:architecture.passed,failed:architecture.failed},
            visualRemediation:{status:remediation.status,total:remediation.total,passed:remediation.passed,failed:remediation.failed,revision:remediation.revision},
            execution:{operationalWrites:0,firestoreReads:0,firestoreWrites:0,secretsRead:false,vaultRead:false,runtimeExecuted:false,browserExecuted:false,deployExecuted:false,functionsDeployed:false,rulesDeployed:false,productionTouched:false,mainTouched:false,mergeExecuted:false},
            containsPII:false,
            containsSecrets:false
          };
          const evidencePath='orbit360-platform/docs/evidence/m1-binding-static-preflight-1-0-37-20260722-sanitized.json';
          fs.mkdirSync(path.dirname(evidencePath),{recursive:true});
          fs.writeFileSync(evidencePath,JSON.stringify(evidence,null,2)+'\n');
          auth.schemaVersion='orbit360-final-block1-static-preflight-consumed-v11-visual-remediation-1-0-37';
          auth.authorizationRevision=11;
          auth.action='final_block1_static_preflight_1_0_37_consumed';
          auth.active=false;
          auth.consumed=true;
          auth.allowedExecutions=0;
          auth.preflightEvidence={status:evidence.status,path:evidencePath,gateContractStatus:gate.status,gateContractVersion:gate.contractVersion,gateChecksPassed:gate.passed,gateChecksFailed:gate.failed,architectureStatus:architecture.status,visualRemediationStatus:remediation.status,visualRemediationChecksPassed:remediation.passed,visualRemediationChecksFailed:remediation.failed};
          fs.writeFileSync(authPath,JSON.stringify(auth,null,2)+'\n');
          freeze.schemaVersion=ok?'orbit360-incident-freeze-v56-binding-preflight-passed-corrective-delivery-pending':'orbit360-incident-freeze-v56-binding-preflight-failed-stop-line';
          freeze.updatedAt='2026-07-22';
          freeze.status=ok?'BINDING_STATIC_PREFLIGHT_1_0_37_PASSED_CORRECTIVE_LAB_DELIVERY_AUTHORIZATION_PENDING':'STOP_THE_LINE_STATIC_PREFLIGHT_1_0_37_FAILED';
          freeze.bindingStaticPreflight={status:evidence.status,contractVersion:'1.0.37',path:evidencePath,gateContractStatus:gate.status,gateContractChecksPassed:gate.passed,gateContractChecksFailed:gate.failed,architectureStatus:architecture.status,visualRemediationStatus:remediation.status,visualRemediationChecksPassed:remediation.passed,visualRemediationChecksFailed:remediation.failed,writesExecuted:false,runtimeExecuted:false,browserExecuted:false,deployExecuted:false};
          freeze.allowedActions=ok?['prepare_single_use_corrective_hosting_lab_delivery_authorization']:[];
          freeze.stateClarification=Object.assign({},freeze.stateClarification,{m1BindingPreflight:ok?'PASS':'FAIL',m1CorrectiveLabDelivery:'PENDING_SEPARATE_SINGLE_USE_AUTHORIZATION',m1Closed:false,gateRerunAuthorized:false,runtimeAuthorized:false,deployAuthorized:false,productionTouched:false,reimportRequired:false});
          freeze.nextAllowedStep=ok?'Prepare one separate single-use authorization for corrective Hosting LAB delivery of the exact critical assets under contract 1.0.37. Do not rerun the final gate. Before browser review, verify remote bytes and SHA-256 against the authorized HEAD.':'Stop retries. Diagnose the first failed static check from the recorded evidence before modifying any other layer.';
          fs.writeFileSync(freezePath,JSON.stringify(freeze,null,2)+'\n');
          fs.rmSync('.github/workflows/orbit360-m1-static-preflight-1-0-37-v20260722.yml',{force:true});
          NODE
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(m1): consumir preflight vinculante 1.0.37'
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
