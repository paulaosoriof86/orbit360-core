name: Orbit 360 Apply Auth-Gated Snapshots 20260718

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - "tools/orbit360-patch-auth-gated-snapshots-v20260718.mjs"
      - ".github/workflows/orbit360-apply-auth-gated-snapshots-v20260718.yml"

permissions:
  contents: write

concurrency:
  group: orbit360-apply-auth-gated-snapshots-v20260718
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 0

      - name: Verificar rama y HEAD
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "ays/backend-tenant-lab-v99-20260703"
          git status --short

      - name: Aplicar parche exacto auth-gated
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/orbit360-patch-auth-gated-snapshots-v20260718.mjs
          node tools/orbit360-patch-auth-gated-snapshots-v20260718.mjs
          node --check orbit360-platform/data/store-firestore-lab.local.js
          ! grep -Fq "setTimeout(attachSnapshots, 0)" orbit360-platform/data/store-firestore-lab.local.js
          ! grep -Fq "setTimeout(attachSnapshots, 1200)" orbit360-platform/data/store-firestore-lab.local.js
          ! grep -Fq "setTimeout(attachSnapshots, 3500)" orbit360-platform/data/store-firestore-lab.local.js
          grep -Fq "function canonicalAuthUser()" orbit360-platform/data/store-firestore-lab.local.js
          grep -Fq "state.status = 'waiting-auth'" orbit360-platform/data/store-firestore-lab.local.js
          grep -Fq "__authGatedSnapshots: true" orbit360-platform/data/store-firestore-lab.local.js
          git diff --check
          test -n "$(git diff -- orbit360-platform/data/store-firestore-lab.local.js)"

      - name: Commit limpio y retirar mecanismo temporal
        shell: bash
        run: |
          set -euo pipefail
          rm tools/orbit360-patch-auth-gated-snapshots-v20260718.mjs
          rm .github/workflows/orbit360-apply-auth-gated-snapshots-v20260718.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add orbit360-platform/data/store-firestore-lab.local.js tools/orbit360-patch-auth-gated-snapshots-v20260718.mjs .github/workflows/orbit360-apply-auth-gated-snapshots-v20260718.yml
          git diff --cached --check
          git commit -m "fix(block1): gate LAB snapshots after canonical auth [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
