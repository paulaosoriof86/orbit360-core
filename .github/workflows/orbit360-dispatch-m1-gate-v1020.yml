name: Orbit 360 Dispatch M1 Gate 1.0.20

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-dispatch-m1-gate-v1020.yml"

permissions:
  actions: write
  contents: read

concurrency:
  group: orbit360-dispatch-m1-gate-v1020
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Despachar una sola ejecución del gate M1
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          response_code="$(curl -sS -o /tmp/dispatch-response.txt -w '%{http_code}' \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml/dispatches" \
            -d '{"ref":"ays/backend-tenant-lab-v99-20260703"}')"
          test "$response_code" = "204" || { cat /tmp/dispatch-response.txt; exit 1; }
          echo "ORBIT360_M1_GATE_DISPATCHED_ONCE"
