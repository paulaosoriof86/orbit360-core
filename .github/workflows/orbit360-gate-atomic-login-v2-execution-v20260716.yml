name: Orbit 360 Atomic Login V2 Gate 20260716

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-gate-atomic-login-v2-execution-v20260716.yml"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: orbit360-atomic-login-v2-gate-v20260716
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_FIREBASE_PROJECT_ID: ays-orbit-360-lab
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      ORBIT360_LAB_LOGIN_EMAIL: orbit.lab@demo.com
      ORBIT360_LAB_LOGIN_PASSWORD: ${{ secrets.ORBIT360_LAB_LOGIN_PASSWORD }}
      SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Publicar inicio
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf -v BODY '## Gate atómico V2 iniciado\n\n- Commit: %s\n- Run: %s\n- Alcance: LAB; sin producción, merge ni main.' "$GITHUB_SHA" "$GITHUB_RUN_ID"
          gh api "repos/${GITHUB_REPOSITORY}/issues/5/comments" -f body="$BODY" >/dev/null

      - uses: actions/checkout@v4

      - name: Validar sintaxis
        run: |
          set -euo pipefail
          test "$GITHUB_REF_NAME" = "ays/backend-tenant-lab-v99-20260703"
          node --check tools/orbit360-gate-visual-clientes-aseguradoras-v20260716-v2.mjs
          node tools/orbit360-validar-recuperacion-frontend-conocimiento-v20260716.mjs

      - name: Resolver credencial LAB
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          test -n "$SERVICE_ACCOUNT"
          test ${#ORBIT360_LAB_LOGIN_PASSWORD} -ge 12
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$EXPECTED_FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Verificar usuario y datos LAB
        run: |
          set -euo pipefail
          test -n "${GOOGLE_APPLICATION_CREDENTIALS:-}"
          npm install --no-save firebase-admin@13
          node tools/orbit360-ensure-lab-user.mjs
          node tools/orbit360-verify-lab-data-counts.mjs
          node tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs

      - name: Publicar canal exacto
        run: |
          set -euo pipefail
          printf '{"schemaVersion":"orbit360-runtime-build-v1","commit":"%s","run":"%s","branch":"%s"}\n' "$GITHUB_SHA" "$GITHUB_RUN_ID" "$GITHUB_REF_NAME" > orbit360-platform/runtime-build.json
          OUT="${RUNNER_TEMP}/deploy.json"
          npx --yes firebase-tools@latest hosting:channel:deploy orbit360-ays-lab --project "$FIREBASE_PROJECT_ID" --expires 30d --non-interactive --json | tee "$OUT"
          URL="$(jq -r '.. | strings | select(test("^https://[^/]*--orbit360-ays-lab[^/]*\\.(web\\.app|firebaseapp\\.com)$"))' "$OUT" | head -n1)"
          test -n "$URL"
          BUILD="$(curl -fsSL --retry 6 --retry-delay 2 --retry-all-errors "$URL/runtime-build.json")"
          test "$(printf '%s' "$BUILD" | jq -r '.commit // empty')" = "$GITHUB_SHA"
          test "$(printf '%s' "$BUILD" | jq -r '.run // empty')" = "$GITHUB_RUN_ID"
          echo "ORBIT360_PREVIEW_URL=$URL" >> "$GITHUB_ENV"

      - name: Ejecutar gate visual conjunto
        id: visual
        continue-on-error: true
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium
          node tools/orbit360-gate-visual-clientes-aseguradoras-v20260716-v2.mjs

      - name: Subir evidencia
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-atomic-login-v2-gate-${{ github.run_id }}
          path: |
            orbit360-platform/lab-data-counts.json
            orbit360-platform/lab-aseguradoras-knowledge-inventory.json
            orbit360-platform/runtime-build.json
            orbit360-platform/runtime-gate-crm-v20260716/resultado-sanitizado.json
            orbit360-platform/runtime-gate-aseguradoras-v20260716/resultado-sanitizado.json
          if-no-files-found: warn
          retention-days: 7

      - name: Publicar cierre
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          R="orbit360-platform/runtime-gate-crm-v20260716/resultado-sanitizado.json"
          OK="$(test -f "$R" && jq -r '.ok // false' "$R" || echo false)"
          STAGE="$(test -f "$R" && jq -r '.stage // "sin_etapa"' "$R" || echo resultado_no_generado)"
          CODE="$(test -f "$R" && jq -r '(.error // "") | split(":")[0]' "$R" || echo RESULTADO_NO_GENERADO)"
          printf -v BODY '## Resultado gate atómico V2\n\n- Commit: %s\n- Run: %s\n- Gate: **%s**\n- Etapa: %s\n- Código: %s\n- Canal: %s\n- Evidencia sanitizada; LAB sin producción, merge ni main.' "$GITHUB_SHA" "$GITHUB_RUN_ID" "$OK" "$STAGE" "$CODE" "${ORBIT360_PREVIEW_URL:-no disponible}"
          gh api "repos/${GITHUB_REPOSITORY}/issues/5/comments" -f body="$BODY" >/dev/null
          test "$OK" = true
