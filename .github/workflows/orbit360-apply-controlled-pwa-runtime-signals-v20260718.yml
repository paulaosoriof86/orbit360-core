# final-apply-trigger: 2026-07-18T16:14Z
name: Orbit 360 Apply Controlled PWA Runtime Signals 20260718

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-apply-controlled-pwa-runtime-signals-v20260718.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: orbit360-apply-controlled-pwa-runtime-signals-v20260718
  cancel-in-progress: false

jobs:
  apply:
    name: Aplicar cierre atómico validado PWA + señales runtime 1.0.19
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2

      - name: Corregir mecanismo temporal y ejecutar transformación
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "ays/backend-tenant-lab-v99-20260703"
          node --check tools/orbit360-patch-controlled-pwa-runtime-signals-v20260718.mjs
          node --check tools/orbit360-close-controlled-pwa-runtime-signals-v20260718.mjs
          node - <<'NODE'
          const fs = require('fs');
          const path = 'tools/orbit360-patch-controlled-pwa-runtime-signals-v20260718.mjs';
          let source = fs.readFileSync(path, 'utf8');
          const from = "files[fileKey] = files[fileKey].replace(from, to);";
          const to = "files[fileKey] = files[fileKey].replace(from, () => to);";
          const count = source.split(from).length - 1;
          if (count !== 1) throw new Error('PATCH_REPLACER_MATCH_COUNT:' + count);
          source = source.replace(from, to);
          fs.writeFileSync(path, source, 'utf8');
          NODE
          node --check tools/orbit360-patch-controlled-pwa-runtime-signals-v20260718.mjs
          node tools/orbit360-close-controlled-pwa-runtime-signals-v20260718.mjs

      - name: Alinear ejecución única del gate y contrato
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const workflowPath = '.github/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml';
          const registryPath = 'tools/orbit360-gate-contract-registry-v20260717.json';
          const docPath = 'orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-PWA-CONTROL-RUNTIME-SIGNALS-20260718.md';
          let workflow = fs.readFileSync(workflowPath, 'utf8');
          const oldGroup = 'group: orbit360-clientes-aseguradoras-runtime-gate-v20260717-' + '$' + '{{ github.event_name }}';
          const newGroup = 'group: orbit360-clientes-aseguradoras-runtime-gate-v20260717';
          const count = workflow.split(oldGroup).length - 1;
          if (count !== 1) throw new Error('GATE_CONCURRENCY_MATCH_COUNT:' + count);
          workflow = workflow.replace(oldGroup, newGroup);
          fs.writeFileSync(workflowPath, workflow, 'utf8');

          const registry = JSON.parse(fs.readFileSync(registryPath, 'utf8'));
          const gate = registry.gates.find(item => item.gateId === 'block1-client360-insurers-lab-v20260717');
          if (!gate || gate.contractVersion !== '1.0.19') throw new Error('GATE_CONTRACT_NOT_1019');
          gate.executionConcurrency = {
            group: 'orbit360-clientes-aseguradoras-runtime-gate-v20260717',
            cancelInProgress: true,
            purpose: 'Collapse push and pull_request triggers into one active gate execution.'
          };
          const wfContract = gate.runtimeVersionContracts.find(item => item.path === workflowPath);
          if (!wfContract) throw new Error('WORKFLOW_CONTRACT_MISSING');
          wfContract.requiredTokens = [...new Set(wfContract.requiredTokens.concat([
            newGroup,
            'cancel-in-progress: true'
          ]))];
          fs.writeFileSync(registryPath, JSON.stringify(registry, null, 2) + '\n', 'utf8');

          let doc = fs.readFileSync(docPath, 'utf8');
          doc += '\n## Ejecución única del gate\n\nLos disparos push y pull_request comparten un solo grupo de concurrencia con cancelación del intento anterior. Esto evita dos ejecuciones paralelas del mismo cierre y conserva la regla de un único gate activo.\n';
          fs.writeFileSync(docPath, doc, 'utf8');
          NODE

      - name: Retirar staging temporal en el mismo cierre
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/orbit360-patch-controlled-pwa-runtime-signals-v20260718.mjs
          rm -f tools/orbit360-close-controlled-pwa-runtime-signals-v20260718.mjs
          rm -f .github/workflows/orbit360-apply-controlled-pwa-runtime-signals-v20260718.yml

      - name: Validar sintaxis, alcance y contrato vinculante
        shell: bash
        run: |
          set -euo pipefail
          node --check orbit360-platform/sw.js
          node --check orbit360-platform/core/pwa.js
          node --check orbit360-platform/core/router.js
          node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717
          rm -rf orbit360-platform/runtime-gate-crm-v20260716

          allowed='^(orbit360-platform/core/pwa\.js|orbit360-platform/core/router\.js|orbit360-platform/sw\.js|tools/orbit360-gate-bootstrap-auth-legal-v20260717\.mjs|tools/orbit360-gate-runtime-crm-v20260716\.mjs|tools/orbit360-gate-contract-registry-v20260717\.json|orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-PWA-CONTROL-RUNTIME-SIGNALS-20260718\.md|tools/orbit360-patch-controlled-pwa-runtime-signals-v20260718\.mjs|tools/orbit360-close-controlled-pwa-runtime-signals-v20260718\.mjs|\.github/workflows/orbit360-apply-controlled-pwa-runtime-signals-v20260718\.yml|\.github/workflows/orbit360-aseguradoras-runtime-gate-v20260716\.yml)$'
          unexpected="$(git status --short | sed -E 's/^.. //' | grep -Ev "$allowed" || true)"
          test -z "$unexpected" || { echo "UNEXPECTED_FILES"; echo "$unexpected"; exit 1; }

      - name: Commit y push del cierre 1.0.19
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          test -n "$(git status --short)"
          git commit -m "fix(block1): control PWA and externalize runtime signals 1.0.19"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
