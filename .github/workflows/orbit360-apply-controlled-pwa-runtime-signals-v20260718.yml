name: Orbit 360 Apply Controlled PWA Runtime Signals 20260718

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-apply-controlled-pwa-runtime-signals-v20260718.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: orbit360-apply-controlled-pwa-runtime-signals-v20260718
  cancel-in-progress: false

jobs:
  apply:
    name: Aplicar cierre atómico PWA + señales runtime 1.0.19
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2

      - name: Verificar base y ejecutar transformación controlada
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "ays/backend-tenant-lab-v99-20260703"
          test -f tools/orbit360-patch-controlled-pwa-runtime-signals-v20260718.mjs
          test -f tools/orbit360-close-controlled-pwa-runtime-signals-v20260718.mjs
          node --check tools/orbit360-patch-controlled-pwa-runtime-signals-v20260718.mjs
          node --check tools/orbit360-close-controlled-pwa-runtime-signals-v20260718.mjs
          node tools/orbit360-close-controlled-pwa-runtime-signals-v20260718.mjs

      - name: Retirar staging temporal en el mismo cierre
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/orbit360-patch-controlled-pwa-runtime-signals-v20260718.mjs
          rm -f tools/orbit360-close-controlled-pwa-runtime-signals-v20260718.mjs
          rm -f .github/workflows/orbit360-apply-controlled-pwa-runtime-signals-v20260718.yml

      - name: Validar sintaxis, alcance y contrato vinculante
        shell: bash
        run: |
          set -euo pipefail
          node --check orbit360-platform/sw.js
          node --check orbit360-platform/core/pwa.js
          node --check orbit360-platform/core/router.js
          node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717

          allowed='^(orbit360-platform/core/pwa\.js|orbit360-platform/core/router\.js|orbit360-platform/sw\.js|tools/orbit360-gate-bootstrap-auth-legal-v20260717\.mjs|tools/orbit360-gate-runtime-crm-v20260716\.mjs|tools/orbit360-gate-contract-registry-v20260717\.json|orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-PWA-CONTROL-RUNTIME-SIGNALS-20260718\.md|tools/orbit360-patch-controlled-pwa-runtime-signals-v20260718\.mjs|tools/orbit360-close-controlled-pwa-runtime-signals-v20260718\.mjs|\.github/workflows/orbit360-apply-controlled-pwa-runtime-signals-v20260718\.yml)$'
          unexpected="$(git status --short | sed -E 's/^.. //' | grep -Ev "$allowed" || true)"
          test -z "$unexpected" || { echo "UNEXPECTED_FILES"; echo "$unexpected"; exit 1; }

      - name: Commit y push del cierre 1.0.19
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          test -n "$(git status --short)"
          git commit -m "fix(block1): control PWA and externalize runtime signals 1.0.19"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
