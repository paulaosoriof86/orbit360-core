# ledger-finalization-trigger: 2026-07-18T16:42Z
name: Orbit 360 Finalize Temporary Pipeline Ledger 20260718

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-apply-controlled-pwa-runtime-signals-v20260718.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: orbit360-finalize-temporary-pipeline-ledger-v20260718
  cancel-in-progress: false

jobs:
  finalize:
    name: Finalizar ledger temporal 1.0.19
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2

      - name: Actualizar registro y documentación del retiro
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const registryPath = 'tools/orbit360-gate-contract-registry-v20260717.json';
          const docPath = 'orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-PWA-CONTROL-RUNTIME-SIGNALS-20260718.md';
          const workflowPath = '.github/workflows/orbit360-apply-controlled-pwa-runtime-signals-v20260718.yml';
          const registry = JSON.parse(fs.readFileSync(registryPath, 'utf8'));
          registry.temporaryPipelineArtifacts = [];
          registry.retiredRuntimeArtifacts = [...new Set([].concat(registry.retiredRuntimeArtifacts || [], workflowPath))];
          const gate = registry.gates.find(item => item.gateId === 'block1-client360-insurers-lab-v20260717');
          if (!gate || gate.contractVersion !== '1.0.19') throw new Error('GATE_CONTRACT_NOT_1019');
          gate.executionDispatch = {
            mode: 'workflow_dispatch',
            uniqueExecution: true,
            dispatchAfterRetirement: true,
            purpose: 'Execute the same gate once against the clean HEAD after all temporary pipeline artifacts are removed.'
          };
          gate.reconciliation.corrections = [...new Set(gate.reconciliation.corrections.concat([
            'publish validated content without workflow-scope mutation',
            'retire temporary pipeline workflow before the unique gate dispatch',
            'dispatch the existing gate exactly once against the clean branch HEAD'
          ]))];
          fs.writeFileSync(registryPath, JSON.stringify(registry, null, 2) + '\n', 'utf8');

          let doc = fs.readFileSync(docPath, 'utf8');
          if (!doc.includes('## Publicación y retiro del mecanismo temporal')) {
            doc += '\n## Publicación y retiro del mecanismo temporal\n\nEl contenido 1.0.19 fue validado y publicado sin mutar workflows mediante GITHUB_TOKEN. El workflow temporal se registra como retirado y debe eliminarse antes de ejecutar el gate. La ejecución final se solicita una sola vez mediante workflow_dispatch sobre el HEAD limpio.\n';
          }
          fs.writeFileSync(docPath, doc, 'utf8');
          NODE
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs

      - name: Commit y push del ledger final
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/orbit360-gate-contract-registry-v20260717.json orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-PWA-CONTROL-RUNTIME-SIGNALS-20260718.md
          test -n "$(git status --short)"
          git commit -m "docs(block1): finalize 1.0.19 pipeline retirement ledger [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
