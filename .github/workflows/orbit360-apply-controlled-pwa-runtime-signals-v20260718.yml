# validation-diagnostic-trigger: 2026-07-18T16:08Z
name: Orbit 360 Diagnose Runtime Closure Validation 20260718

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-apply-controlled-pwa-runtime-signals-v20260718.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orbit360-diagnose-runtime-closure-validation-v20260718
  cancel-in-progress: false

jobs:
  diagnose:
    name: Diagnosticar validación del cierre 1.0.19
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2

      - name: Transformar y capturar cada validación
        id: diagnostic
        shell: bash
        run: |
          set +e
          mkdir -p orbit360-validation-diagnostic/logs
          node tools/orbit360-close-controlled-pwa-runtime-signals-v20260718.mjs > orbit360-validation-diagnostic/logs/00-transform.log 2>&1
          TRANSFORM=$?
          if [ "$TRANSFORM" -eq 0 ]; then
            rm -f tools/orbit360-patch-controlled-pwa-runtime-signals-v20260718.mjs
            rm -f tools/orbit360-close-controlled-pwa-runtime-signals-v20260718.mjs
            rm -f .github/workflows/orbit360-apply-controlled-pwa-runtime-signals-v20260718.yml
          fi

          run_check() {
            local key="$1"
            shift
            "$@" > "orbit360-validation-diagnostic/logs/${key}.log" 2>&1
            echo $? > "orbit360-validation-diagnostic/logs/${key}.exit"
          }

          if [ "$TRANSFORM" -eq 0 ]; then
            run_check 01-sw node --check orbit360-platform/sw.js
            run_check 02-pwa node --check orbit360-platform/core/pwa.js
            run_check 03-router node --check orbit360-platform/core/router.js
            run_check 04-helper node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
            run_check 05-executor node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
            run_check 06-preflight-syntax node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
            run_check 07-preflight node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717
          fi

          git status --short > orbit360-validation-diagnostic/status.txt
          allowed='^(orbit360-platform/core/pwa\.js|orbit360-platform/core/router\.js|orbit360-platform/sw\.js|tools/orbit360-gate-bootstrap-auth-legal-v20260717\.mjs|tools/orbit360-gate-runtime-crm-v20260716\.mjs|tools/orbit360-gate-contract-registry-v20260717\.json|orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-PWA-CONTROL-RUNTIME-SIGNALS-20260718\.md|tools/orbit360-patch-controlled-pwa-runtime-signals-v20260718\.mjs|tools/orbit360-close-controlled-pwa-runtime-signals-v20260718\.mjs|\.github/workflows/orbit360-apply-controlled-pwa-runtime-signals-v20260718\.yml)$'
          sed -E 's/^.. //' orbit360-validation-diagnostic/status.txt | grep -Ev "$allowed" > orbit360-validation-diagnostic/unexpected.txt || true
          if [ -s orbit360-validation-diagnostic/unexpected.txt ]; then SCOPE=1; else SCOPE=0; fi

          TRANSFORM="$TRANSFORM" SCOPE="$SCOPE" node - <<'NODE'
          const fs = require('fs');
          const dir = 'orbit360-validation-diagnostic';
          const clean = value => String(value || '')
            .replace(/\/home\/runner\/work\/[^\s]+/g, '[workspace]')
            .replace(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/gi, '[email]')
            .slice(-12000);
          const read = path => fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '';
          const checks = {};
          for (const file of fs.readdirSync(dir + '/logs')) {
            if (!file.endsWith('.exit')) continue;
            const key = file.replace(/\.exit$/, '');
            checks[key] = {
              exit: Number(read(dir + '/logs/' + file).trim()),
              log: clean(read(dir + '/logs/' + key + '.log'))
            };
          }
          const result = {
            ok: false,
            classification: 'PIPELINE_MECHANISM_FAILURE',
            transformExit: Number(process.env.TRANSFORM || 0),
            scopeExit: Number(process.env.SCOPE || 0),
            transformLog: clean(read(dir + '/logs/00-transform.log')),
            checks,
            status: clean(read(dir + '/status.txt')),
            unexpected: clean(read(dir + '/unexpected.txt'))
          };
          fs.writeFileSync(dir + '/diagnostic.json', JSON.stringify(result, null, 2));
          NODE
          echo "diagnostic_ready=1" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publicar diagnóstico sanitizado
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-diagnostic-runtime-closure-validation-v20260718
          path: orbit360-validation-diagnostic/diagnostic.json
          if-no-files-found: error
          retention-days: 3

      - name: Marcar corrida diagnóstica
        shell: bash
        run: exit 1
