name: Orbit 360 Apply Deterministic Runtime Loader 1.0.24

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-apply-deterministic-runtime-loader-v1024.yml"

permissions:
  contents: write

concurrency:
  group: orbit360-apply-deterministic-runtime-loader-v1024
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 1

      - name: Aplicar corte determinista y actualizar contrato
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');

          const routerPath = 'orbit360-platform/core/router.js';
          let router = fs.readFileSync(routerPath, 'utf8');
          const before = `      let script = document.querySelector('script[' + item.marker + ']');
          let settled = false;
          let poll = null;
          let cutoff = null;
          function finish(status) {
            if (settled) return;
            settled = true;
            if (poll) clearInterval(poll);
            if (cutoff) clearTimeout(cutoff);
            state.status = status;
            state.ready = contractReady(item);
            state.finishedAt = Date.now();
            runtimeSignal(state.ready ? 'contract-ready' : 'contract-terminal', item.marker + (state.ready ? '' : ':' + status));
            next();
          }
          function checkReady() {
            if (contractReady(item)) finish('ready');
          }
          function attach(node) {
            node.addEventListener('load', function () { state.loadEvent = true; runtimeSignal('contract-loaded', item.marker); checkReady(); }, { once: true });
            node.addEventListener('error', function () { state.errorEvent = true; runtimeSignal('contract-load-error', item.marker); finish('error'); }, { once: true });
          }

          if (!script) {
            script = document.createElement('script');
            script.src = src;
            script.async = true;
            script.setAttribute(item.marker, '1');
            state.status = 'loading';
            runtimeSignal('contract-requested', item.marker);
            attach(script);
            document.head.appendChild(script);
          } else {
            state.status = 'existing-marker';
            attach(script);
          }

          poll = setInterval(checkReady, 100);
          cutoff = setTimeout(function () {
            finish(contractReady(item) ? 'ready' : 'timeout');
          }, 15000);
          checkReady();`;

          const after = `      let settled = false;
          let poll = null;
          let cutoff = null;
          let controller = null;
          function finish(status) {
            if (settled) return;
            settled = true;
            if (poll) clearInterval(poll);
            if (cutoff) clearTimeout(cutoff);
            if (controller) { try { controller.abort(); } catch (e) {} controller = null; }
            state.status = status;
            state.ready = contractReady(item);
            state.finishedAt = Date.now();
            runtimeSignal(state.ready ? 'contract-ready' : 'contract-terminal', item.marker + (state.ready ? '' : ':' + status));
            next();
          }
          function checkReady() {
            if (contractReady(item)) finish('ready');
          }
          function executeDeterministically(source, target) {
            if (settled) return;
            const script = document.createElement('script');
            script.setAttribute(item.marker, '1');
            script.setAttribute('data-orbit-runtime-owner', 'router');
            script.textContent = String(source || '') + '\\n//# sourceURL=' + target;
            state.executionMode = 'fetch-inline';
            state.status = 'executing';
            document.head.appendChild(script);
            state.loadEvent = true;
            runtimeSignal('contract-loaded', item.marker);
            checkReady();
          }
          function loadDeterministically() {
            const target = new URL(src, window.location.href).href;
            const fetchOptions = { credentials: 'same-origin', cache: 'no-store' };
            if (typeof AbortController === 'function') {
              controller = new AbortController();
              fetchOptions.signal = controller.signal;
            }
            state.status = 'fetching';
            state.executionMode = 'fetch-inline';
            runtimeSignal('contract-requested', item.marker);
            fetch(target, fetchOptions).then(function (response) {
              state.httpStatus = response.status;
              if (!response.ok) throw new Error('HTTP_' + response.status);
              return response.text();
            }).then(function (source) {
              controller = null;
              executeDeterministically(source, target);
            }).catch(function (error) {
              state.errorEvent = true;
              state.errorCode = String(error && (error.name || error.message) || 'load-error').replace(/[^a-z0-9_-]/gi, '').slice(0, 80);
              runtimeSignal('contract-load-error', item.marker);
              finish('error');
            });
          }

          poll = setInterval(checkReady, 100);
          cutoff = setTimeout(function () {
            finish(contractReady(item) ? 'ready' : 'timeout');
          }, 15000);
          loadDeterministically();
          checkReady();`;

          if (!router.includes(before)) throw new Error('ROUTER_TARGET_BLOCK_NOT_FOUND');
          router = router.replace(before, after);
          fs.writeFileSync(routerPath, router, 'utf8');

          const gatePath = 'tools/orbit360-gate-runtime-crm-v20260716.mjs';
          let gateSource = fs.readFileSync(gatePath, 'utf8');
          gateSource = gateSource.replace("schemaVersion:'orbit360-runtime-gate-joint-v23-external-contract-observer'", "schemaVersion:'orbit360-runtime-gate-joint-v24-deterministic-runtime-loader'");
          gateSource = gateSource.replace("contractVersion:'1.0.23'", "contractVersion:'1.0.24'");
          if (!gateSource.includes("contractVersion:'1.0.24'")) throw new Error('GATE_VERSION_NOT_UPDATED');
          fs.writeFileSync(gatePath, gateSource, 'utf8');

          const registryPath = 'tools/orbit360-gate-contract-registry-v20260717.json';
          const registry = JSON.parse(fs.readFileSync(registryPath, 'utf8'));
          const owner = registry.canonicalOwners.find(item => item.id === 'router');
          if (!owner) throw new Error('ROUTER_OWNER_NOT_FOUND');
          owner.requiredTokens = owner.requiredTokens.filter(token => !["script.async = true", "state.status = 'existing-marker'"].includes(token));
          for (const token of [
            "fetch(target, fetchOptions)",
            "script.textContent = String(source || '')",
            "data-orbit-runtime-owner",
            "state.executionMode = 'fetch-inline'",
            "runtimeSignal('contract-requested', item.marker)",
            "runtimeSignal('contract-loaded', item.marker)",
            "runtimeSignal('contract-load-error', item.marker)"
          ]) if (!owner.requiredTokens.includes(token)) owner.requiredTokens.push(token);

          const gate = registry.gates.find(item => item.gateId === 'block1-client360-insurers-lab-v20260717');
          if (!gate) throw new Error('GATE_NOT_FOUND');
          gate.contractVersion = '1.0.24';
          gate.diagnosticRevision = 'router-deterministic-fetch-inline-v1';
          gate.status = 'ACTIVE_FUNCTIONAL_FIX';
          gate.diagnosticRule = 'The Router is the sole owner of runtime contract order. Fetch each same-origin contract, execute it synchronously as an inline script with sourceURL, emit sanitized requested/loaded/error signals, and advance only after the canonical owner is ready. Do not use the global async=false queue or uncancelled Runtime.evaluate polling.';
          gate.executionBudget.deterministicContractExecutionMode = 'fetch_inline_script';
          gate.executionBudget.runtimeContractExecutionTimeoutMs = 15000;
          gate.executionBudget.evidence = {
            sourceContractVersion: '1.0.23',
            passedStages: [
              'canonical_auth_ui_ready',
              'canonical_owner_handoff_ready',
              'canonical_pwa_controller_ready',
              'canonical_runtime_scripts_syntax_ready',
              'canonical_runtime_contract_loader_started',
              'canonical_client_projection_ready'
            ],
            failedStage: 'canonical_tenant_insurer_core_ready',
            tenantCoreRequestedSignal: true,
            tenantCoreHttpStatus: 200,
            tenantCoreRequestFinished: true,
            tenantCoreStaticSyntax: true,
            tenantCoreBrowserParsed: false,
            tenantCoreLoadedSignal: false,
            nextContractRequested: false,
            pageErrors: 0,
            runtimeExceptions: 0,
            mechanismFinding: 'The Router inserted the contract as an external async script. Network completion did not guarantee prompt browser execution: the response finished with HTTP 200, but no scriptParsed, load signal, owner or next-contract request appeared before the owner deadline.'
          };
          gate.executionBudget.interpretation = 'Version 1.0.24 corrects only Router-owned runtime contract execution. It preserves explicit next() ordering while removing dependence on browser scheduling of external async scripts. Store, Auth, rules, data and renderers remain frozen.';
          gate.executionBudget.exhaustionPolicy = 'Run the binding preflight and execute 1.0.24 once. If canonical_tenant_insurer_core_ready fails again, stop retries and inspect only deterministic fetch, inline execution, sourceURL parse evidence and Router runtime state. Do not touch Store, Auth, data, rules or renderers.';
          gate.executionBudget.acceptancePolicy = 'Only a sanitized result with ok:true closes M1.';
          gate.reconciliation = {
            date: '2026-07-18',
            classifications: ['FUNCTIONAL_DEFECT'],
            scope: 'Router-owned runtime contract execution only',
            rootCause: 'Explicit next() controlled insertion order but external script.async=true still delegated execution timing to the browser. The 1.0.23 evidence proved that tenant-insurer-config-p10.js completed with HTTP 200 and valid syntax yet remained unparsed and emitted no load/ready signal within the owner deadline.',
            corrections: [
              'keep Router as the sole owner of contract order',
              'fetch each same-origin runtime contract with a cancellable bounded request',
              'execute fetched source synchronously in the global page context with sourceURL',
              'emit requested, loaded, ready, terminal and load-error signals from one owner',
              'retain the 15000 ms contract cutoff and 900000 ms global watchdog',
              'preserve fail-closed behavior and execute the same gate once after GO_GATE_CONTRACT'
            ],
            openEvidence: ['1.0.24 sanitized ok:true across Dirección desktop, Operativo tablet and Asesor móvil'],
            preserved: [
              'Orbit.store API',
              'core/auth.js',
              'backend-lab-canonical-view-sync ownership guard',
              'Firestore rules',
              'Cliente 360 renderer',
              'Aseguradoras renderer',
              '414 clientes',
              '26 aseguradoras',
              '7 asesores'
            ]
          };
          fs.writeFileSync(registryPath, JSON.stringify(registry, null, 2) + '\n', 'utf8');

          const docPath = 'orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-CARGADOR-DETERMINISTA-CONTRATOS-20260718.md';
          fs.writeFileSync(docPath, `# Bloque 1 · Causa raíz y corte determinista 1.0.24\n\nFecha: 2026-07-18\n\nGate: \`block1-client360-insurers-lab-v20260717\`\n\n## Clasificación\n\n\`FUNCTIONAL_DEFECT\` limitado al cargador propietario del Router.\n\n## Evidencia 1.0.23\n\nEl contrato \`tenant-insurer-config-p10.js\` fue solicitado, respondió HTTP 200, terminó su descarga y pasó sintaxis estática. No produjo \`Debugger.scriptParsed\`, señal \`contract-loaded\`, owner canónico ni solicitud del contrato siguiente dentro del límite. Auth, handoff, PWA, loader y proyección de Cliente 360 ya estaban aprobados.\n\n## Causa raíz\n\nLa secuencia \`next()\` controlaba el orden de inserción, pero \`script.async=true\` delegaba al navegador el momento de ejecución. La descarga podía finalizar sin que el contrato ejecutara oportunamente.\n\n## Corrección\n\nEl Router obtiene cada contrato same-origin con \`fetch\` acotado y cancelable, ejecuta el texto de forma síncrona en el contexto global mediante un script inline con \`sourceURL\`, comprueba el owner y solo entonces avanza. No usa la cola global \`async=false\` ni evaluadores repetidos.\n\n## Carriles\n\n- A: Cliente 360, Aseguradoras y UX preservados.\n- B: cambio exclusivo en Router, registro y gate; Store, Auth, reglas y backend protegido permanecen intactos.\n- C: 414 clientes, 26 aseguradoras y 7 asesores sin reimportación.\n\n## Claude y Academia\n\n- Claude: \`BACKEND_PROTEGIDO_NO_CLAUDE\`.\n- Patrón reusable: separar orden de contratos, transporte y ejecución determinista; una descarga HTTP 200 no equivale a owner listo.\n- Academia: explicar la diferencia entre orden de inserción, descarga, parseo, ejecución y readiness, y clasificar este caso como defecto funcional del cargador, no como defecto de los módulos consumidores.\n\n## Salida\n\nPreflight vinculante primero; mismo gate una sola vez; cierre exclusivamente con evidencia sanitizada \`ok:true\`.\n`, 'utf8');

          const academyPath = 'orbit360-platform/docs/ACADEMIA-BLOQUE1-GATES-CAUSA-RAIZ-20260718.md';
          fs.writeFileSync(academyPath, `# Academia Orbit 360 · Gates y causa raíz · Bloque 1\n\n## Caso 1.0.24\n\nUna respuesta HTTP 200 solo confirma transporte. Para declarar un contrato runtime listo deben existir parseo/ejecución, owner canónico y señal de avance.\n\nClasificación aplicada: \`FUNCTIONAL_DEFECT\` del cargador cuando el Router delega el momento de ejecución a un script externo asíncrono; \`VALIDATOR_STALE\` solo cuando el producto ya está listo y el observador duplica o bloquea la evidencia; \`PIPELINE_MECHANISM_FAILURE\` cuando el propio gate genera la congestión.\n\nPatrón reusable: un único owner controla orden, transporte, ejecución, readiness y señales; consumidores como Cliente 360 y Aseguradoras no deben compensar fallos del bootstrap.\n`, 'utf8');
          NODE

          rm -f .github/workflows/orbit360-apply-deterministic-runtime-loader-v1024.yml

      - name: Validar sintaxis y preflight vinculante
        shell: bash
        env:
          ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
        run: |
          set -euo pipefail
          node --check orbit360-platform/core/router.js
          node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
          node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717

      - name: Publicar corte único 1.0.24
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add orbit360-platform/core/router.js \
            tools/orbit360-gate-runtime-crm-v20260716.mjs \
            tools/orbit360-gate-contract-registry-v20260717.json \
            orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-CARGADOR-DETERMINISTA-CONTRATOS-20260718.md \
            orbit360-platform/docs/ACADEMIA-BLOQUE1-GATES-CAUSA-RAIZ-20260718.md \
            .github/workflows/orbit360-apply-deterministic-runtime-loader-v1024.yml
          git commit -m "fix(block1): deterministic runtime contract execution 1.0.24"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
