name: Orbit 360 Dispatch M1 1.0.23

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-dispatch-m1-v1023.yml"

permissions:
  actions: write
  contents: write

concurrency:
  group: orbit360-dispatch-m1-v1023
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2
      - name: Despachar exactamente una corrida y registrar su ID
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run orbit360-aseguradoras-runtime-gate-v20260716.yml --repo "$GITHUB_REPOSITORY" --ref ays/backend-tenant-lab-v99-20260703
          sleep 5
          gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow orbit360-aseguradoras-runtime-gate-v20260716.yml \
            --event workflow_dispatch \
            --branch ays/backend-tenant-lab-v99-20260703 \
            --limit 10 \
            --json databaseId,status,conclusion,headSha,createdAt,event,workflowName \
            --jq "[.[] | select(.headSha == \"$GITHUB_SHA\")][0] | {runId:.databaseId,status,conclusion,headSha,createdAt,event,workflowName,contractVersion:\"1.0.23\"}" \
            > .github/orbit360-m1-gate-v1023-status.json
          test "$(jq -r '.runId // empty' .github/orbit360-m1-gate-v1023-status.json)" != ""
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/orbit360-m1-gate-v1023-status.json
          git commit -m "chore(block1): record unique M1 gate 1.0.23 run [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
