name: Orbit 360 B1 Main Thread Diagnostic 20260718

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-main-thread-diagnostic-b1-v20260718.yml"
      - "tools/orbit360-diagnosticar-hilo-principal-b1-v20260718.mjs"
      - "orbit360-platform/modules/portal-v1142-copyfix.js"
  pull_request:
    branches:
      - main
    types:
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: orbit360-b1-main-thread-diagnostic-v20260718
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'ays/backend-tenant-lab-v99-20260703'
    name: Diagnóstico aislado del hilo principal · sin gate ni deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      ORBIT360_EXPECTED_RUNTIME: 20260717-2
      ORBIT360_PREVIEW_URL: https://ays-orbit-360-lab--orbit360-ays-lab-fj1zxnk2.web.app
      ORBIT360_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
      ORBIT360_TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}

    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Preflight vinculante antes del navegador
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          test "$BRANCH" = "ays/backend-tenant-lab-v99-20260703"
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Instalar navegador diagnóstico
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Ejecutar diagnóstico externo en tres variantes
        id: diagnostic
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-diagnosticar-hilo-principal-b1-v20260718.mjs

      - name: Clasificar capa causal con fallback obligatorio
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { existsSync, readFileSync, mkdirSync, writeFileSync } from 'node:fs';
          import { dirname } from 'node:path';

          const reportPath = 'orbit360-platform/runtime-gate-crm-v20260716/main-thread-diagnostic-sanitized.json';
          const outputPath = 'orbit360-platform/runtime-gate-crm-v20260716/main-thread-classification-sanitized.json';
          let report = { variants: [] };
          let evidenceProduced = false;
          if (existsSync(reportPath)) {
            try {
              report = JSON.parse(readFileSync(reportPath, 'utf8'));
              evidenceProduced = true;
            } catch {
              evidenceProduced = false;
            }
          }

          const variants = Object.fromEntries((report.variants || []).map(item => [item.name, item]));
          const bare = variants.bare;
          const cdp = variants['cdp-debugger'];
          const observer = variants['gate-observer'];
          let classification = 'PIPELINE_MECHANISM_FAILURE';
          let finding = 'DIAGNOSTIC_EVIDENCE_NOT_PRODUCED';
          if (evidenceProduced && (!bare || !cdp || !observer)) {
            finding = 'DIAGNOSTIC_VARIANT_MISSING';
          } else if (evidenceProduced && bare.responseReady !== true) {
            classification = 'FUNCTIONAL_DEFECT';
            finding = 'BARE_BROWSER_MAIN_THREAD_NOT_RESPONSIVE';
          } else if (evidenceProduced && (cdp.responseReady !== true || observer.responseReady !== true)) {
            finding = 'INSTRUMENTATION_CAUSES_OR_EXPOSES_BROWSER_CONTROL_BLOCK';
          } else if (evidenceProduced) {
            finding = 'MAIN_THREAD_RESPONSIVE_AFTER_PORTAL_IDEMPOTENCE_FIX';
          }

          const orderedNames = ['bare', 'cdp-debugger', 'gate-observer'];
          const summary = {
            schemaVersion: 'orbit360-main-thread-classification-v3-explicit-trigger',
            generatedAt: new Date().toISOString(),
            containsPII: false,
            containsSecrets: false,
            gateId: 'block1-client360-insurers-lab-v20260717',
            contractVersion: '1.0.25',
            sourceCommit: process.env.ORBIT360_SOURCE_COMMIT || process.env.GITHUB_SHA || '',
            runId: process.env.GITHUB_RUN_ID || '',
            runAttempt: process.env.GITHUB_RUN_ATTEMPT || '',
            trigger: process.env.GITHUB_EVENT_NAME || '',
            evidenceProduced,
            classification,
            finding,
            variants: orderedNames.map(name => ({
              name,
              responseReady: variants[name]?.responseReady === true,
              probeError: String(variants[name]?.probeError || '').slice(0, 180),
              topFunction: String(variants[name]?.profileTop?.[0]?.functionName || '').slice(0, 120),
              topPath: String(variants[name]?.profileTop?.[0]?.path || '').slice(0, 160),
              pausedFunction: String(variants[name]?.pausedFrames?.[0]?.functionName || '').slice(0, 120),
              pausedPath: String(variants[name]?.pausedFrames?.[0]?.path || '').slice(0, 160)
            })),
            officialGateExecuted: false,
            deployOrSyncExecuted: false,
            nextAction: finding === 'MAIN_THREAD_RESPONSIVE_AFTER_PORTAL_IDEMPOTENCE_FIX'
              ? 'Run the binding preflight and the official M1 gate exactly once.'
              : classification === 'FUNCTIONAL_DEFECT'
                ? 'Stop. Inspect only the first bare-browser product frame; do not change gate or budgets.'
                : 'Stop. Correct only the diagnostic execution/observability mechanism; do not rerun the official gate.'
          };
          mkdirSync(dirname(outputPath), { recursive: true });
          writeFileSync(outputPath, JSON.stringify(summary, null, 2) + '\n');
          console.log(`ORBIT360_MAIN_THREAD_CLASSIFICATION:${JSON.stringify(summary)}`);
          NODE

      - name: Publicar evidencia sanitizada como artefacto
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-b1-main-thread-diagnostic-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
            orbit360-platform/runtime-gate-crm-v20260716/main-thread-diagnostic-sanitized.json
            orbit360-platform/runtime-gate-crm-v20260716/main-thread-classification-sanitized.json
          if-no-files-found: warn
          retention-days: 7

      - name: Resumen del corte causal
        if: always()
        shell: bash
        run: |
          REPORT="orbit360-platform/runtime-gate-crm-v20260716/main-thread-classification-sanitized.json"
          {
            echo "## Orbit 360 · Diagnóstico aislado del hilo principal"
            echo ""
            echo "Gate no ejecutado. Sin deploy, sin sincronización y sin cambios de producto."
            echo ""
            if [ -f "$REPORT" ]; then
              echo "Clasificación: $(jq -r '.classification' "$REPORT")"
              echo ""
              echo "Hallazgo: $(jq -r '.finding' "$REPORT")"
              echo ""
              jq -r '.variants[] | "- \(.name): responseReady=\(.responseReady), probeError=\(.probeError)"' "$REPORT"
            else
              echo "Bloqueo: no se produjo clasificación de cierre."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Persistir resultado durable y comentar PR 5
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          RESULT_PATH: orbit360-platform/runtime-gate-crm-v20260716/main-thread-classification-sanitized.json
          DURABLE_PATH: .github/diagnostic-results/orbit360-b1-main-thread-latest.json
        with:
          script: |
            const fs = require('fs');
            const resultPath = process.env.RESULT_PATH;
            const durablePath = process.env.DURABLE_PATH;
            const targetBranch = process.env.ORBIT360_TARGET_BRANCH || context.ref.replace('refs/heads/', '');
            const sourceCommit = process.env.ORBIT360_SOURCE_COMMIT || context.sha;
            let result;
            try {
              result = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
            } catch (error) {
              result = {
                schemaVersion: 'orbit360-main-thread-classification-v3-explicit-trigger',
                generatedAt: new Date().toISOString(),
                containsPII: false,
                containsSecrets: false,
                gateId: 'block1-client360-insurers-lab-v20260717',
                contractVersion: '1.0.25',
                sourceCommit,
                runId: String(context.runId),
                runAttempt: String(process.env.GITHUB_RUN_ATTEMPT || ''),
                trigger: context.eventName,
                evidenceProduced: false,
                classification: 'PIPELINE_MECHANISM_FAILURE',
                finding: 'DIAGNOSTIC_CLASSIFICATION_NOT_PRODUCED',
                variants: [],
                officialGateExecuted: false,
                deployOrSyncExecuted: false,
                nextAction: 'Stop. Correct only the diagnostic execution/observability mechanism; do not rerun the official gate.'
              };
            }
            result.sourceCommit = sourceCommit;
            result.runId = String(context.runId);
            result.runAttempt = String(process.env.GITHUB_RUN_ATTEMPT || '');
            result.trigger = context.eventName;
            const serialized = JSON.stringify(result, null, 2) + '\n';

            try {
              let currentSha;
              try {
                const current = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: durablePath,
                  ref: targetBranch
                });
                currentSha = current.data.sha;
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: durablePath,
                message: `chore(block1): publicar resultado diagnóstico ${context.runId} [skip ci]`,
                content: Buffer.from(serialized).toString('base64'),
                branch: targetBranch,
                sha: currentSha
              });
            } catch (error) {
              core.warning(`No se pudo persistir el resultado durable: ${error.message}`);
            }

            const variants = Array.isArray(result.variants) ? result.variants : [];
            const lines = [
              '## Diagnóstico aislado B1 · resultado post-fix',
              '',
              `- Run: \`${context.runId}\``,
              `- Commit probado: \`${sourceCommit}\``,
              `- Disparador: \`${context.eventName}\``,
              '- Gate oficial ejecutado: **no**',
              '- Deploy o sincronización: **no**',
              `- Evidencia producida: **${result.evidenceProduced === true}**`,
              `- Clasificación: **${result.classification}**`,
              `- Hallazgo: \`${result.finding}\``,
              '',
              '### Variantes',
              ...variants.map(item => `- \`${item.name}\`: responseReady=\`${item.responseReady === true}\`; probeError=\`${item.probeError || ''}\`; top=\`${item.topFunction || ''}\` \`${item.topPath || ''}\``),
              '',
              `Siguiente acción vinculante: ${result.nextAction}`
            ];
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 5,
                body: lines.join('\n')
              });
            } catch (error) {
              core.warning(`No se pudo publicar el comentario: ${error.message}`);
            }
