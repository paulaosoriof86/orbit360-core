name: Orbit 360 Diagnose Core Execution 1.0.25 V3

on:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths: [".github/workflows/orbit360-diagnose-core-execution-v1025-v3.yml"]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 1

      - name: Instalar navegador
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1

      - name: Capturar evidencia externa
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');
          const { chromium } = require('playwright');
          const output = '.github/orbit360-v1025-core-execution-diagnostic-v3.json';
          const origin = 'https://ays-orbit-360-lab--orbit360-ays-lab-fj1zxnk2.web.app';
          const corePath = '/core/tenant-insurer-config-p10.js';
          const canonical = origin + '/index.html?orbitBackend=firestore-lab&tenant=alianzas-soluciones&runtime=20260717-2#/aseguradoras';
          const hash = value => crypto.createHash('sha256').update(value).digest('hex');
          const safe = value => String(value || '').replace(/https?:\/\/[^/\s]+/g, '').replace(/[A-Za-z0-9_-]{48,}/g, '[redacted]').replace(/\s+/g, ' ').trim().slice(0, 320);

          (async () => {
            const report = {
              schemaVersion: 'orbit360-core-execution-diagnostic-v3',
              contractVersion: '1.0.25',
              containsPII: false,
              containsSecrets: false,
              repository: {},
              direct: {},
              platform: { requested:false, response:false, finished:false, parsed:false, loadedSignal:false, readySignal:false, body:null },
              isolatedNoServiceWorker: {},
              isolatedControlled: {},
              diagnosticError: '',
              conclusion: ''
            };
            let browser = null;
            try {
              const repoBody = fs.readFileSync('orbit360-platform/core/tenant-insurer-config-p10.js');
              report.repository = { bytes:repoBody.length, sha256:hash(repoBody) };
              const directResponse = await fetch(origin + corePath, { cache:'no-store' });
              const directBody = Buffer.from(await directResponse.arrayBuffer());
              report.direct = { status:directResponse.status, bytes:directBody.length, sha256:hash(directBody), matchesRepository:hash(directBody)===report.repository.sha256 };

              browser = await chromium.launch({ headless:true });
              const context = await browser.newContext();
              const page = await context.newPage();
              const cdp = await context.newCDPSession(page);
              await cdp.send('Debugger.enable');
              cdp.on('Debugger.scriptParsed', event => {
                try { if (new URL(event.url).pathname === corePath) report.platform.parsed = true; } catch {}
              });
              page.on('console', message => {
                const text = String(message.text() || '');
                if (text === 'ORBIT360_RUNTIME_SIGNAL:contract-loaded:data-orbit-tenant-insurer-config-core-v20260717') report.platform.loadedSignal = true;
                if (text === 'ORBIT360_RUNTIME_SIGNAL:contract-ready:data-orbit-tenant-insurer-config-core-v20260717') report.platform.readySignal = true;
              });
              let resolveCore;
              const observed = new Promise(resolve => { resolveCore = resolve; });
              page.on('request', request => { try { if (new URL(request.url()).pathname === corePath) report.platform.requested = true; } catch {} });
              page.on('requestfinished', request => { try { if (new URL(request.url()).pathname === corePath) report.platform.finished = true; } catch {} });
              page.on('response', async response => {
                try {
                  if (new URL(response.url()).pathname !== corePath) return;
                  report.platform.response = true;
                  report.platform.status = response.status();
                  report.platform.fromServiceWorker = Boolean(response.fromServiceWorker && response.fromServiceWorker());
                  const body = Buffer.from(await response.body());
                  report.platform.body = { bytes:body.length, sha256:hash(body), matchesRepository:hash(body)===report.repository.sha256, matchesDirect:hash(body)===report.direct.sha256 };
                } catch (error) {
                  report.platform.body = { error:safe(error && error.message || error) };
                } finally { resolveCore(); }
              });
              await page.goto(canonical, { waitUntil:'commit', timeout:30000 }).catch(error => { report.platform.navigationError = safe(error && error.message || error); });
              await Promise.race([observed, new Promise(resolve => setTimeout(resolve, 25000))]);
              await new Promise(resolve => setTimeout(resolve, 4000));

              const noSwContext = await browser.newContext({ serviceWorkers:'block' });
              const noSwPage = await noSwContext.newPage();
              await noSwPage.setContent('<!doctype html><html><head></head><body></body></html>');
              report.isolatedNoServiceWorker = await noSwPage.evaluate(async url => {
                window.Orbit = {};
                return await Promise.race([
                  new Promise(resolve => {
                    const script = document.createElement('script');
                    script.src = url;
                    script.onload = () => resolve({ loaded:true, owner:Boolean(window.Orbit && Orbit.tenantInsurerConfigP10) });
                    script.onerror = () => resolve({ loaded:false, owner:false, error:'script-error' });
                    document.head.appendChild(script);
                  }),
                  new Promise(resolve => setTimeout(() => resolve({ loaded:false, owner:false, error:'timeout' }), 12000))
                ]);
              }, origin + corePath).catch(error => ({ loaded:false, owner:false, error:safe(error && error.message || error) }));
              await noSwContext.close();

              const controlledPage = await context.newPage();
              await controlledPage.goto(origin + '/runtime-build.json', { waitUntil:'domcontentloaded', timeout:15000 }).catch(error => { report.isolatedControlled.navigationError = safe(error && error.message || error); });
              report.isolatedControlled.controller = await controlledPage.evaluate(() => Boolean(navigator.serviceWorker && navigator.serviceWorker.controller)).catch(() => false);
              report.isolatedControlled.execution = await controlledPage.evaluate(async url => {
                window.Orbit = {};
                return await Promise.race([
                  new Promise(resolve => {
                    const script = document.createElement('script');
                    script.src = url;
                    script.onload = () => resolve({ loaded:true, owner:Boolean(window.Orbit && Orbit.tenantInsurerConfigP10) });
                    script.onerror = () => resolve({ loaded:false, owner:false, error:'script-error' });
                    (document.head || document.documentElement).appendChild(script);
                  }),
                  new Promise(resolve => setTimeout(() => resolve({ loaded:false, owner:false, error:'timeout' }), 12000))
                ]);
              }, origin + corePath).catch(error => ({ loaded:false, owner:false, error:safe(error && error.message || error) }));
              await controlledPage.close();
              await context.close();
            } catch (error) {
              report.diagnosticError = safe(error && (error.stack || error.message) || error);
            } finally {
              if (browser) await browser.close().catch(() => {});
              const bodyMatches = Boolean(report.platform.body && report.platform.body.matchesRepository === true);
              const noSwOk = Boolean(report.isolatedNoServiceWorker.loaded && report.isolatedNoServiceWorker.owner);
              const controlled = report.isolatedControlled.execution || {};
              const controlledOk = Boolean(controlled.loaded && controlled.owner);
              if (report.platform.body && report.platform.body.matchesRepository === false) report.conclusion = 'SERVICE_WORKER_BODY_MISMATCH';
              else if (bodyMatches && noSwOk && controlledOk && !report.platform.parsed) report.conclusion = 'ROUTER_ORDERED_QUEUE_EXECUTION_STALL';
              else if (noSwOk && !controlledOk) report.conclusion = 'SERVICE_WORKER_EXECUTION_FAILURE';
              else if (!noSwOk) report.conclusion = 'CORE_SCRIPT_ISOLATED_EXECUTION_FAILURE';
              else report.conclusion = 'INSUFFICIENT_DIAGNOSTIC_EVIDENCE';
              fs.writeFileSync(output, JSON.stringify(report, null, 2) + '\n', 'utf8');
            }
          })().catch(error => {
            fs.writeFileSync(output, JSON.stringify({schemaVersion:'orbit360-core-execution-diagnostic-v3',contractVersion:'1.0.25',containsPII:false,containsSecrets:false,diagnosticError:safe(error&&error.message||error),conclusion:'DIAGNOSTIC_MECHANISM_FAILURE'}, null, 2) + '\n', 'utf8');
          });
          NODE

          rm -f .github/workflows/orbit360-diagnose-core-execution-v1025.yml
          rm -f .github/workflows/orbit360-diagnose-core-execution-v1025-v3.yml

      - name: Persistir diagnóstico sanitizado
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "diag(block1): persist core execution evidence v3 [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
