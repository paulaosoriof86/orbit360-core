name: Orbit 360 Dispatch M1 1.0.22

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-dispatch-m1-v1022.yml"

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar workflow_dispatch una vez
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh workflow run orbit360-aseguradoras-runtime-gate-v20260716.yml --repo "$GITHUB_REPOSITORY" --ref ays/backend-tenant-lab-v99-20260703
