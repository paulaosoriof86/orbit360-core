name: Orbit 360 Observe Bootstrap Timeline 1.0.23

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-observe-bootstrap-timeline-v1023.yml"

permissions:
  actions: read
  contents: write

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2
      - name: Registrar estado sin ejecutar otra medición
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh run list --repo "$GITHUB_REPOSITORY" --workflow orbit360-measure-bootstrap-timeline-v1023.yml --branch ays/backend-tenant-lab-v99-20260703 --limit 10 --json databaseId,status,conclusion,headSha,createdAt,event,workflowName \
            --jq '[.[] | select(.headSha == "f8188ab9321f80fd40a2e4be0649d48cd64d1456")][0] | {runId:.databaseId,status,conclusion,headSha,createdAt,event,workflowName}' \
            > .github/orbit360-bootstrap-timeline-v1023-status.json
          test "$(jq -r '.runId // empty' .github/orbit360-bootstrap-timeline-v1023-status.json)" != ""
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/orbit360-bootstrap-timeline-v1023-status.json
          git commit -m "chore(block1): record valid bootstrap timeline status [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
