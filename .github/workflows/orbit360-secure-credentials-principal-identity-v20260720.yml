name: Orbit 360 Secure Credentials Principal Identity 20260720

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-secure-credentials-principal-identity-v20260720.yml"

permissions:
  contents: read

jobs:
  identity:
    name: Credenciales Aseguradoras · identidad del principal existente
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      SA_PRIMARY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Preflight vinculante
        run: |
          set -euo pipefail
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Extraer solo identidad no secreta
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SA_PRIMARY:-}"
          KEY="${RUNNER_TEMP}/orbit360-primary.json"
          printf '%s' "$SA_PRIMARY" > "$KEY"
          chmod 600 "$KEY"
          jq -e '.type == "service_account" and .project_id == "ays-orbit-360-lab" and (.client_email | type == "string")' "$KEY" >/dev/null
          mkdir -p orbit360-platform/runtime-gate-crm-v20260716
          jq '{schemaVersion:"orbit360-deployer-principal-identity-v1",projectId:.project_id,principalEmail:.client_email,principalType:.type,containsPrivateKey:false,containsSecret:false}' "$KEY" \
            > orbit360-platform/runtime-gate-crm-v20260716/deployer-principal-identity.json
          rm -f "$KEY"

      - name: Publicar identidad no secreta
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-secure-credentials-principal-identity-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/deployer-principal-identity.json
          if-no-files-found: error
          retention-days: 3
