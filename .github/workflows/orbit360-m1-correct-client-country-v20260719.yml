name: Orbit 360 M1 Correct Client Country 20260719

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-m1-correct-client-country-v20260719.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: orbit360-m1-correct-client-country-v20260719
  cancel-in-progress: true

jobs:
  correct:
    name: M1 · corregir país desde código regional fuente
    runs-on: ubuntu-latest
    env:
      EXPECTED_FIREBASE_PROJECT_ID: ays-orbit-360-lab
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4

      - name: Preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          test "$BRANCH" = "ays/backend-tenant-lab-v99-20260703"
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"

      - name: Resolver cuenta de servicio LAB
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then echo "BLOQUEO_SECRET_LAB"; exit 42; fi
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          PROJECT_ID="$(jq -r '.project_id // empty' "$KEY_FILE")"
          test "$PROJECT_ID" = "$EXPECTED_FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencia backend LAB
        shell: bash
        run: npm install --no-save firebase-admin@13

      - name: Normalizar país y moneda con trazabilidad exacta
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p orbit360-platform/runtime-gate-crm-v20260716
          node --input-type=module <<'NODE'
          import { writeFileSync } from 'node:fs';
          import { applicationDefault, getApps, initializeApp } from 'firebase-admin/app';
          import { FieldValue, getFirestore } from 'firebase-admin/firestore';

          const PROJECT_ID = 'ays-orbit-360-lab';
          const TENANT_ID = 'alianzas-soluciones';
          const OUTPUT = 'orbit360-platform/runtime-gate-crm-v20260716/client-country-correction-sanitized.json';
          const TOTAL = 414;
          const CO_ROWS = new Set([153,154,155,156,157,158,159,160,166,180,194,195,202,412,433,438]);
          const PENDING_ROWS = new Set([53,109,147,167,243,249,251,258,259,262,263,264,265,273,274,297,299,300,302,306,308,312,313,314,315,316,319,320,323,324,325,326,327,328,329,330,333,336,337,341,342,343,345,354,357,360,363,366,367,369,371,391,402,404,405,413,417,419,422,423,424,427,431,432]);

          function clean(value) { return String(value == null ? '' : value).trim(); }
          function normalizeCountry(value) {
            const text = clean(value).toUpperCase();
            if (text === 'GT' || text === 'GUATEMALA') return 'GT';
            if (text === 'CO' || text === 'COLOMBIA') return 'CO';
            if (/REQUIERE|VALIDACION|PENDIENTE|SIN_DATO/.test(text.replace(/\s+/g,'_'))) return 'REQUIERE_VALIDACION';
            return text ? 'OTHER' : 'BLANK';
          }
          function sourceRow(data) {
            const a = Number(data?.trazabilidad?.fila);
            const b = Number(data?._migration?.sourceRow);
            return Number.isInteger(a) && Number.isInteger(b) && a === b ? a : null;
          }
          function desired(row) {
            if (CO_ROWS.has(row)) return { pais: 'CO', moneda: 'COP', fuente: 'cod_region_57' };
            if (PENDING_ROWS.has(row)) return { pais: 'REQUIERE_VALIDACION', moneda: '', fuente: 'cod_region_ausente_o_no_confiable' };
            return { pais: 'GT', moneda: 'GTQ', fuente: 'cod_region_502' };
          }
          function aggregate(items, selector) {
            const out = { GT: 0, CO: 0, REQUIERE_VALIDACION: 0, OTHER: 0, BLANK: 0 };
            items.forEach(item => { const key = selector(item); out[key] = (out[key] || 0) + 1; });
            return out;
          }
          function write(result) {
            writeFileSync(OUTPUT, `${JSON.stringify(result, null, 2)}\n`);
            console.log(`CLIENT_COUNTRY_CORRECTION:${JSON.stringify({ok:result.ok,status:result.status,plan:result.planCountry,before:result.beforeCountry,after:result.afterCountry,changed:result.changed})}`);
          }

          const projectId = process.env.FIREBASE_PROJECT_ID || process.env.GCLOUD_PROJECT || '';
          if (projectId !== PROJECT_ID) throw new Error('BLOQUEO_PROYECTO_LAB');
          const app = getApps()[0] || initializeApp({ credential: applicationDefault(), projectId: PROJECT_ID });
          const db = getFirestore(app);
          const root = db.collection('tenantId').doc(TENANT_ID);
          const collection = root.collection('clientes');
          const snapshot = await collection.get();
          const docs = snapshot.docs;
          const rows = new Set();
          const plan = [];
          const result = {
            schemaVersion: 'orbit360-client-country-correction-v2-source-region',
            generatedAt: new Date().toISOString(), projectId: PROJECT_ID, tenantId: TENANT_ID,
            totalClients: docs.length, sourceRule: 'Cod. Región 502→GT/GTQ; 57→CO/COP; faltante/no confiable→REQUIERE_VALIDACION',
            readOnlyPreflight: true, auditAndRollback: true, containsPII: false, containsSecrets: false,
            ok: false, status: 'initializing'
          };

          try {
            if (docs.length !== TOTAL) throw new Error(`UNEXPECTED_CLIENT_TOTAL:${docs.length}`);
            for (const doc of docs) {
              const data = doc.data() || {};
              const row = sourceRow(data);
              if (row === null || row < 2 || row > 441) throw new Error('TRACE_ROW_INVALID');
              if (rows.has(row)) throw new Error(`TRACE_ROW_DUPLICATE:${row}`);
              rows.add(row);
              plan.push({ doc, data, row, after: desired(row) });
            }
            result.beforeCountry = aggregate(plan, item => normalizeCountry(item.data.pais));
            result.planCountry = aggregate(plan, item => item.after.pais);
            if (result.planCountry.CO !== 16) throw new Error(`SOURCE_PLAN_CO_MISMATCH:${result.planCountry.CO}`);
            if (Object.values(result.planCountry).reduce((a,b) => a+b,0) !== TOTAL) throw new Error('SOURCE_PLAN_TOTAL_MISMATCH');
            const allowed = plan.every(item => ['GT','CO','REQUIERE_VALIDACION'].includes(normalizeCountry(item.data.pais)));
            if (!allowed) throw new Error(`CURRENT_COUNTRY_VALUE_UNEXPECTED:${JSON.stringify(result.beforeCountry)}`);

            const changes = plan.filter(item =>
              normalizeCountry(item.data.pais) !== item.after.pais || clean(item.data.moneda) !== item.after.moneda
            );
            result.changed = changes.length;
            if (changes.length) {
              const batch = db.batch();
              const auditRef = root.collection('auditLog').doc('m1_client_country_source_region_20260719_v2');
              batch.set(auditRef, {
                schemaVersion: 'orbit360-client-country-correction-audit-v2', tenantId: TENANT_ID,
                action: 'normalize_country_from_source_region_code', classification: 'DATA_CONTRACT_FAILURE',
                sourceRule: result.sourceRule, createdAt: FieldValue.serverTimestamp(), beforeCounts: result.beforeCountry,
                plannedCounts: result.planCountry, rollbackAvailable: true,
                rollback: changes.map(item => ({ id: item.doc.id, fila: item.row, pais: clean(item.data.pais), moneda: clean(item.data.moneda) })),
                containsPII: false, containsSecrets: false
              }, { merge: false });
              for (const item of changes) {
                const pending = item.after.pais === 'REQUIERE_VALIDACION';
                batch.update(item.doc.ref, {
                  pais: item.after.pais, moneda: item.after.moneda,
                  paisRequiereValidacion: pending, monedaRequiereValidacion: pending,
                  paisFuente: item.after.fuente,
                  'trazabilidad.pais': item.after.pais,
                  'trazabilidad.moneda': item.after.moneda,
                  'trazabilidad.paisFuente': item.after.fuente,
                  'trazabilidad.paisCorregidoEn': FieldValue.serverTimestamp(),
                  '_migration.country': item.after.pais,
                  '_migration.currency': item.after.moneda,
                  '_migration.countrySource': item.after.fuente
                }, { lastUpdateTime: item.doc.updateTime });
              }
              await batch.commit();
              result.status = 'corrected_with_audit_and_rollback';
            } else {
              result.status = 'already_correct';
            }

            const afterSnapshot = await collection.get();
            result.afterCountry = aggregate(afterSnapshot.docs, doc => normalizeCountry(doc.data()?.pais));
            if (JSON.stringify(result.afterCountry) !== JSON.stringify(result.planCountry)) {
              throw new Error(`POSTCONDITION_MISMATCH:${JSON.stringify(result.afterCountry)}`);
            }
            result.ok = true;
            write(result);
          } catch (error) {
            result.status = 'blocked';
            result.errorCode = String(error?.message || error).replace(/[^A-Za-z0-9:{}_,./-]/g,'').slice(0,240);
            try {
              const afterSnapshot = await collection.get();
              result.afterCountry = aggregate(afterSnapshot.docs, doc => normalizeCountry(doc.data()?.pais));
            } catch {}
            write(result);
            process.exit(54);
          }
          NODE

      - name: Publicar evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-client-country-correction-${{ github.run_id }}
          path: orbit360-platform/runtime-gate-crm-v20260716/client-country-correction-sanitized.json
          if-no-files-found: warn
          retention-days: 7

      - name: Publicar resumen en PR 5
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          FILE="orbit360-platform/runtime-gate-crm-v20260716/client-country-correction-sanitized.json"
          if [ -f "$FILE" ]; then
            OK="$(jq -r '.ok // false' "$FILE")"; STATUS="$(jq -r '.status // "sin_resultado"' "$FILE")"
            CHANGED="$(jq -r '.changed // 0' "$FILE")"; BEFORE="$(jq -c '.beforeCountry // {}' "$FILE")"
            PLAN="$(jq -c '.planCountry // {}' "$FILE")"; AFTER="$(jq -c '.afterCountry // {}' "$FILE")"
            CODE="$(jq -r '.errorCode // "ninguno"' "$FILE")"
          else
            OK=false; STATUS=sin_resultado; CHANGED=0; BEFORE='{}'; PLAN='{}'; AFTER='{}'; CODE=evidencia_no_generada
          fi
          printf -v BODY '%s\n\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s' \
            '## Resultado sanitizado · país Cliente 360 desde código regional' \
            "- Commit: ${GITHUB_SHA:0:7} · Run: ${GITHUB_RUN_ID}" \
            "- Estado: ${STATUS} · Aprobado: ${OK}" \
            "- Registros modificados: ${CHANGED}" \
            "- Antes: ${BEFORE}" \
            "- Plan fuente: ${PLAN}" \
            "- Después: ${AFTER}" \
            "- Código: ${CODE}" \
            '- LAB con auditoría y rollback; sin PII, producción, merge ni main.'
          gh api "repos/${GITHUB_REPOSITORY}/issues/5/comments" -f body="$BODY"
