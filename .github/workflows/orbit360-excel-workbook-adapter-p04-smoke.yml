name: Orbit 360 Excel Workbook Adapter P04 Smoke

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'orbit360-platform/core/document-source-contract-p04.js'
      - 'orbit360-platform/core/excel-workbook-adapter-p04.js'
      - 'orbit360-platform/core/cotizacion-esquema-aseguradora-p0.js'
      - 'tools/orbit360-inspect-excel-p04.py'
      - 'tools/orbit360-create-excel-p04-fixture.py'
      - 'tools/orbit360-test-inspect-excel-p04.py'
      - 'tools/orbit360-test-excel-p04-e2e.mjs'
      - 'tools/orbit360-test-excel-workbook-adapter-p04.mjs'
      - 'tools/orbit360-test-excel-workbook-adapter-p04-schema.mjs'
      - '.github/workflows/orbit360-excel-workbook-adapter-p04-smoke.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'orbit360-platform/core/document-source-contract-p04.js'
      - 'orbit360-platform/core/excel-workbook-adapter-p04.js'
      - 'orbit360-platform/core/cotizacion-esquema-aseguradora-p0.js'
      - 'tools/orbit360-inspect-excel-p04.py'
      - 'tools/orbit360-create-excel-p04-fixture.py'
      - 'tools/orbit360-test-inspect-excel-p04.py'
      - 'tools/orbit360-test-excel-p04-e2e.mjs'
      - 'tools/orbit360-test-excel-workbook-adapter-p04.mjs'
      - 'tools/orbit360-test-excel-workbook-adapter-p04-schema.mjs'
      - '.github/workflows/orbit360-excel-workbook-adapter-p04-smoke.yml'

permissions:
  contents: read

jobs:
  excel-workbook-adapter-p04:
    name: Inventario Excel Aseguradoras P0.4
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check JavaScript syntax
        run: |
          node --check orbit360-platform/core/document-source-contract-p04.js
          node --check orbit360-platform/core/excel-workbook-adapter-p04.js
          node --check tools/orbit360-test-excel-workbook-adapter-p04.mjs
          node --check tools/orbit360-test-excel-workbook-adapter-p04-schema.mjs
          node --check tools/orbit360-test-excel-p04-e2e.mjs

      - name: Check Python syntax
        run: |
          python -m py_compile tools/orbit360-inspect-excel-p04.py
          python -m py_compile tools/orbit360-create-excel-p04-fixture.py
          python -m py_compile tools/orbit360-test-inspect-excel-p04.py

      - name: Run isolated adapter smoke
        run: node tools/orbit360-test-excel-workbook-adapter-p04.mjs

      - name: Run real schema compatibility smoke
        run: node tools/orbit360-test-excel-workbook-adapter-p04-schema.mjs

      - name: Run safe OOXML inspector smoke
        run: python tools/orbit360-test-inspect-excel-p04.py

      - name: Run inspector to adapter end-to-end smoke
        run: |
          mkdir -p "$RUNNER_TEMP/orbit360-p04"
          python tools/orbit360-create-excel-p04-fixture.py "$RUNNER_TEMP/orbit360-p04/cotizador-fixture.xlsm"
          python tools/orbit360-inspect-excel-p04.py "$RUNNER_TEMP/orbit360-p04/cotizador-fixture.xlsm" --output "$RUNNER_TEMP/orbit360-p04/inventory.json"
          node tools/orbit360-test-excel-p04-e2e.mjs "$RUNNER_TEMP/orbit360-p04/inventory.json"

      - name: Guard no direct parser or storage writes in browser core
        run: |
          if grep -RniE '(XLSX\.read|ExcelJS|SheetJS|localStorage|sessionStorage|Orbit\.store\.(insert|update|remove)|eval\(|new Function|XMLHttpRequest|fetch\()' \
            orbit360-platform/core/document-source-contract-p04.js \
            orbit360-platform/core/excel-workbook-adapter-p04.js; then
            echo 'Direct parser, direct storage, or executable code path detected'
            exit 1
          fi

      - name: Guard inspector isolation
        run: |
          if grep -niE '(subprocess|os\.system|eval\(|exec\(|win32com|xlwings|libreoffice|requests|urllib\.request|http\.client|socket\.)' \
            tools/orbit360-inspect-excel-p04.py; then
            echo 'Executable, desktop automation, or network path detected in inspector'
            exit 1
          fi
          if grep -niE '(openpyxl|pandas|polars|sheetjs|exceljs)' tools/orbit360-inspect-excel-p04.py; then
            echo 'Unexpected third-party parser dependency detected'
            exit 1
          fi

      - name: Guard macros formulas and values remain disabled
        run: |
          grep -q 'executeMacros: false' orbit360-platform/core/excel-workbook-adapter-p04.js
          grep -q 'calculateFormulas: false' orbit360-platform/core/excel-workbook-adapter-p04.js
          grep -q 'includeCellValues: false' orbit360-platform/core/excel-workbook-adapter-p04.js
          grep -q 'includeBinaryPayload: false' orbit360-platform/core/excel-workbook-adapter-p04.js
          grep -q '"macrosExecuted": False' tools/orbit360-inspect-excel-p04.py
          grep -q '"formulasExecuted": False' tools/orbit360-inspect-excel-p04.py
          grep -q '"containsCellValues": False' tools/orbit360-inspect-excel-p04.py
          grep -q '"containsBinaryPayload": False' tools/orbit360-inspect-excel-p04.py

      - name: Run backend LAB validator if available
        run: |
          if [ -f tools/orbit360-validar-backend-lab-contrato.mjs ]; then
            node tools/orbit360-validar-backend-lab-contrato.mjs
          else
            echo 'Validator not present; skipping.'
          fi