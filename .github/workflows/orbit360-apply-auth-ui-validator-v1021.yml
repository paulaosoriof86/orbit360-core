name: Orbit 360 Apply Auth UI Validator 1.0.21

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-apply-auth-ui-validator-v1021.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: orbit360-apply-auth-ui-validator-v1021
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2
      - name: Aplicar reconciliación Auth UI
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "ays/backend-tenant-lab-v99-20260703"
          node --check tools/orbit360-patch-auth-ui-validator-v1021.mjs
          node --check tools/orbit360-patch-gate-registry-v1021.mjs
          node tools/orbit360-patch-auth-ui-validator-v1021.mjs
          node tools/orbit360-patch-gate-registry-v1021.mjs
          node -e "const fs=require('fs');fs.appendFileSync('orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-PWA-CONTROL-RUNTIME-SIGNALS-20260718.md',Buffer.from('','base64').toString('utf8'));"
          rm -f tools/orbit360-patch-auth-ui-validator-v1021.mjs tools/orbit360-patch-gate-registry-v1021.mjs
      - name: Validar sintaxis y preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717
          rm -rf orbit360-platform/runtime-gate-crm-v20260716
          allowed='^(tools/orbit360-gate-bootstrap-auth-legal-v20260717\.mjs|tools/orbit360-gate-runtime-crm-v20260716\.mjs|tools/orbit360-gate-contract-registry-v20260717\.json|orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-PWA-CONTROL-RUNTIME-SIGNALS-20260718\.md|tools/orbit360-patch-auth-ui-validator-v1021\.mjs|tools/orbit360-patch-gate-registry-v1021\.mjs)$'
          unexpected="$(git status --short | sed -E 's/^.. //' | grep -Ev "$allowed" || true)"
          test -z "$unexpected" || { echo "$unexpected"; exit 1; }
      - name: Publicar cierre 1.0.21 sin disparar el gate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(block1): reconcile stale Auth UI validator 1.0.21 [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
