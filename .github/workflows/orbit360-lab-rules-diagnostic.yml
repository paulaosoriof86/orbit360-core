name: Orbit 360 LAB Rules Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/orbit360-lab-dispatch-trigger.txt"

permissions:
  contents: read

jobs:
  diagnose_rules:
    name: Diagnose Firestore rules deployment
    runs-on: ubuntu-latest
    env:
      EXPECTED_FIREBASE_PROJECT_ID: ays-orbit-360-lab
      SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout authorized backend branch
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703

      - name: Resolve authorized LAB credentials
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT=""
          if [ -n "${SA_ORBIT360_LAB:-}" ]; then SERVICE_ACCOUNT="$SA_ORBIT360_LAB"; fi
          if [ -z "$SERVICE_ACCOUNT" ] && [ -n "${SA_ORBIT_360_LAB:-}" ]; then SERVICE_ACCOUNT="$SA_ORBIT_360_LAB"; fi
          if [ -z "$SERVICE_ACCOUNT" ] && [ -n "${SA_DEFAULT:-}" ]; then SERVICE_ACCOUNT="$SA_DEFAULT"; fi
          test -n "$SERVICE_ACCOUNT"
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          PROJECT_ID="$(jq -r '.project_id // empty' "$KEY_FILE")"
          test "$PROJECT_ID" = "$EXPECTED_FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

      - name: Attempt Firestore rules deployment
        id: rules
        shell: bash
        run: |
          set +e
          LOG_FILE="${RUNNER_TEMP}/firestore-rules-deploy.log"
          npx --yes firebase-tools@latest deploy --only firestore:rules --project "$FIREBASE_PROJECT_ID" --non-interactive > "$LOG_FILE" 2>&1
          CODE=$?
          CATEGORY="ok"
          if [ "$CODE" -ne 0 ]; then
            if grep -Eqi 'permission|forbidden|not authorized|403|iam' "$LOG_FILE"; then CATEGORY="permission_denied";
            elif grep -Eqi 'syntax|parse|compile|invalid rules' "$LOG_FILE"; then CATEGORY="rules_invalid";
            elif grep -Eqi 'project|not found|does not exist' "$LOG_FILE"; then CATEGORY="project_mismatch";
            else CATEGORY="deploy_failed"; fi
          fi
          echo "category=$CATEGORY" >> "$GITHUB_OUTPUT"
          echo "exit_code=$CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: RULES_OK
        if: steps.rules.outputs.category == 'ok'
        run: echo "Firestore rules deployment succeeded."

      - name: BLOCKED_RULES_PERMISSION_DENIED
        if: steps.rules.outputs.category == 'permission_denied'
        run: exit 1

      - name: BLOCKED_RULES_INVALID
        if: steps.rules.outputs.category == 'rules_invalid'
        run: exit 1

      - name: BLOCKED_RULES_PROJECT_MISMATCH
        if: steps.rules.outputs.category == 'project_mismatch'
        run: exit 1

      - name: BLOCKED_RULES_DEPLOY_FAILED
        if: steps.rules.outputs.category == 'deploy_failed'
        run: exit 1
