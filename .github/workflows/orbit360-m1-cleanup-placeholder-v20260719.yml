name: Orbit 360 M1 Cleanup Placeholder Aseguradora 20260719

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - "tools/orbit360-cleanup-lab-placeholder-insurer-v20260719.mjs"
      - ".github/workflows/orbit360-m1-cleanup-placeholder-v20260719.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: orbit360-m1-cleanup-placeholder-v20260719
  cancel-in-progress: true

jobs:
  cleanup:
    name: M1 · limpiar placeholder accidental con rollback
    runs-on: ubuntu-latest
    env:
      EXPECTED_FIREBASE_PROJECT_ID: ays-orbit-360-lab
      FIREBASE_PROJECT_ID: ays-orbit-360-lab
      ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717
      SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4

      - name: Preflight vinculante
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          test "$BRANCH" = "ays/backend-tenant-lab-v99-20260703"
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"
          node --check tools/orbit360-cleanup-lab-placeholder-insurer-v20260719.mjs

      - name: Resolver cuenta de servicio LAB
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then echo "BLOQUEO_SECRET_LAB"; exit 42; fi
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          PROJECT_ID="$(jq -r '.project_id // empty' "$KEY_FILE")"
          test "$PROJECT_ID" = "$EXPECTED_FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencia backend LAB
        shell: bash
        run: npm install --no-save firebase-admin@13

      - name: Limpiar placeholder exacto y verificar conteos
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-cleanup-lab-placeholder-insurer-v20260719.mjs
          node tools/orbit360-verify-lab-data-counts.mjs

      - name: Publicar evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-m1-placeholder-cleanup-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/placeholder-cleanup-sanitized.json
            orbit360-platform/lab-data-counts.json
          if-no-files-found: warn
          retention-days: 7

      - name: Publicar resultado sanitizado en PR 5
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          FILE="orbit360-platform/runtime-gate-crm-v20260716/placeholder-cleanup-sanitized.json"
          if [ -f "$FILE" ]; then
            STATUS="$(jq -r '.status // "sin_resultado"' "$FILE")"
            OK="$(jq -r '.ok // false' "$FILE")"
            BEFORE="$(jq -r '.beforeCount // "—"' "$FILE")"
            AFTER="$(jq -r '.afterCount // "—"' "$FILE")"
            RELATIONS="$(jq -r '.relationCount // "—"' "$FILE")"
            ERROR_CODE="$(jq -r '.errorCode // "ninguno"' "$FILE")"
          else
            STATUS="sin_resultado"
            OK="false"
            BEFORE="—"
            AFTER="—"
            RELATIONS="—"
            ERROR_CODE="evidencia_no_generada"
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          printf -v BODY '%s\n\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s' \
            '## Resultado sanitizado · limpieza M1' \
            "- Commit: ${SHORT_SHA}" \
            "- Run: ${GITHUB_RUN_ID}" \
            "- Estado: ${STATUS}" \
            "- Aprobado: ${OK}" \
            "- Conteo antes/después: ${BEFORE} → ${AFTER}" \
            "- Relaciones encontradas: ${RELATIONS}" \
            "- Código: ${ERROR_CODE}" \
            '- Alcance: LAB; con auditoría y rollback; sin producción, merge ni main.'
          gh api "repos/${GITHUB_REPOSITORY}/issues/5/comments" -f body="$BODY"
