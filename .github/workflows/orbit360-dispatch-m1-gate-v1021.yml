name: Orbit 360 Dispatch M1 Gate 1.0.21

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-dispatch-m1-gate-v1021.yml"

permissions:
  actions: write
  contents: write

concurrency:
  group: orbit360-dispatch-m1-gate-v1021
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2
      - name: Despachar exactamente una corrida M1
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          STARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CODE="$(curl -sS -o /tmp/dispatch.txt -w '%{http_code}' -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml/dispatches" \
            -d '{"ref":"ays/backend-tenant-lab-v99-20260703"}')"
          test "$CODE" = "204" || { cat /tmp/dispatch.txt; exit 1; }
          sleep 4
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml/runs?event=workflow_dispatch&branch=ays%2Fbackend-tenant-lab-v99-20260703&per_page=10" \
            > /tmp/runs.json
          jq --arg started "$STARTED_AT" '[.workflow_runs[] | select(.created_at >= $started)][0] | {runId:.id,status,conclusion,headSha:.head_sha,createdAt:.created_at,event,workflowName:.name,contractVersion:"1.0.21"}' /tmp/runs.json > .github/orbit360-m1-gate-v1021-status.json
          test "$(jq -r '.runId // empty' .github/orbit360-m1-gate-v1021-status.json)" != ""
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/orbit360-m1-gate-v1021-status.json
          git commit -m "chore(block1): record unique M1 gate 1.0.21 run [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
