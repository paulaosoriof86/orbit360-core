name: Orbit 360 A&S LAB Temporary Dispatcher

on:
  pull_request_target:
    types: [edited]

permissions:
  contents: read

jobs:
  dispatch_lab_preview:
    if: >-
      github.event.pull_request.number == 5 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'ays/backend-tenant-lab-v99-20260703'
    uses: paulaosoriof86/orbit360-core/.github/workflows/orbit360-ays-lab-preview.yml@ays/backend-tenant-lab-v99-20260703
    with:
      source_ref: ays/backend-tenant-lab-v99-20260703
    secrets: inherit
