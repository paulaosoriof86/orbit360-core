name: Orbit 360 · M2 root cause static · VALIDATOR_STALE_ONCE
on:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths: ['tools/orbit360-m2-existing-identity-root-cause-static-request-v20260724.json']
permissions:
  contents: read
  statuses: write
concurrency:
  group: orbit360-m2-root-cause-static-v1
  cancel-in-progress: false
env:
  ORBIT360_GATE_ID: block2-product-readonly-runtime-v20260723
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  ORBIT360_REQUEST_FILE: tools/orbit360-m2-existing-identity-root-cause-static-request-v20260724.json
jobs:
  root-cause-static:
    name: M2 · Root cause static · No Secrets · No Firebase
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout SHA exacto
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2
          persist-credentials: false
      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validar solicitud estática inmutable
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "${ORBIT360_BRANCH}"
          test "${GITHUB_RUN_ATTEMPT}" = '1'
          node <<'NODE'
          const fs=require('fs'),cp=require('child_process');
          const r=JSON.parse(fs.readFileSync(process.env.ORBIT360_REQUEST_FILE,'utf8'));
          const parent=cp.execFileSync('git',['rev-parse','HEAD^'],{encoding:'utf8'}).trim();
          const bad=[];
          if(r.schemaVersion!=='orbit360-m2-existing-identity-root-cause-static-request-v1'||r.contractVersion!=='2.2.1')bad.push('schema');
          if(r.gateId!==process.env.ORBIT360_GATE_ID||r.branch!==process.env.ORBIT360_BRANCH||r.authorizedBaseCommit!==parent)bad.push('binding');
          if(r.explicitAuthorization!==true||r.allowedExecutions!==1||r.staticOnly!==true)bad.push('authorization');
          for(const key of ['secretAccess','firebaseAccess','firestoreRead','runtime','writes','rulesChange','deploy','imports','policies','m3','mergeMain'])if(r[key]!==false)bad.push(key);
          if(r.containsPII!==false||r.containsSecrets!==false)bad.push('evidence');
          if(bad.length)throw new Error('REQUEST_INVALID:'+bad.join(','));
          NODE
      - name: Preflight canónico y causa raíz estática
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/orbit360-m2-existing-identity-root-cause-static-v20260724.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "${ORBIT360_GATE_ID}"
          node tools/orbit360-m2-existing-identity-root-cause-static-v20260724.mjs
          jq -e '.status=="GO_GATE_CONTRACT" and .contractVersion=="2.2.1" and .failed==0 and .secretAccess==false and .firestoreRead==false and .runtimeExecuted==false and .rulesApplied==false' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json >/dev/null
          jq -e '.ok==true and .status=="M2_ROOT_CAUSE_STATIC_PROVEN" and .classification=="VALIDATOR_STALE" and .rootCauseProven==true and .rootCauseCode=="AUTH_DEMO_MARKER_REJECTED_AUTHORIZED_EXISTING_IDENTITY" and .snapshotsExcludedAsFirstCause==true and .correctedValidatorFailClosed==true and .secretAccess==false and .firebaseAccess==false and .firestoreRead==false and .runtimeExecuted==false and .rulesChanged==false and .configurationWrites==0 and .operationalWrites==0' orbit360-platform/runtime-gate-crm-v20260716/m2-existing-identity-root-cause-static-summary.json >/dev/null
      - name: Subir evidencia estática sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-m2-root-cause-static-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
            orbit360-platform/runtime-gate-crm-v20260716/m2-existing-identity-root-cause-static-summary.json
          if-no-files-found: warn
          retention-days: 30
      - name: Publicar estado observable sanitizado
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          summary='orbit360-platform/runtime-gate-crm-v20260716/m2-existing-identity-root-cause-static-summary.json'
          state=failure; description='M2 root cause static proof failed'
          if [ -f "$summary" ] && [ "$(jq -r '.ok // false' "$summary")" = true ]; then state=success; description='M2 root cause proven: VALIDATOR_STALE'; fi
          payload="$(jq -n --arg state "$state" --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --arg description "$description" '{state:$state,target_url:$target_url,description:$description,context:"orbit360/m2-root-cause-static-v1"}')"
          curl --fail-with-body -sS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -d "$payload"
