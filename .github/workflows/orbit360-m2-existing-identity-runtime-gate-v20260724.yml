name: Orbit 360 · M2 existing identity runtime · AUTHORIZED_ONCE
on:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths: ['tools/orbit360-m2-existing-identity-runtime-request-v20260724.json']
permissions:
  contents: read
  statuses: write
concurrency:
  group: orbit360-m2-existing-identity-runtime-v2
  cancel-in-progress: false
env:
  ORBIT360_GATE_ID: block2-product-readonly-runtime-v20260723
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  ORBIT360_REQUEST_FILE: tools/orbit360-m2-existing-identity-runtime-request-v20260724.json
  ORBIT360_EXISTING_FIREBASE_PROJECT_ID: ays-orbit-360-lab
jobs:
  existing-identity-runtime:
    name: M2 · Existing identity runtime · No Rules · No Writes
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout SHA exacto
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2
          persist-credentials: false
      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validar autorización inmutable sin acceso externo
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "${ORBIT360_BRANCH}"
          test "${GITHUB_RUN_ATTEMPT}" = '1'
          node <<'NODE'
          const fs=require('fs'),cp=require('child_process');
          const r=JSON.parse(fs.readFileSync(process.env.ORBIT360_REQUEST_FILE,'utf8'));
          const parent=cp.execFileSync('git',['rev-parse','HEAD^'],{encoding:'utf8'}).trim();
          const bad=[];
          if(r.schemaVersion!=='orbit360-m2-existing-identity-runtime-request-v2'||r.contractVersion!=='2.2.1')bad.push('schema');
          if(r.gateId!==process.env.ORBIT360_GATE_ID||r.branch!==process.env.ORBIT360_BRANCH||r.authorizedBaseCommit!==parent)bad.push('binding');
          if(r.explicitAuthorization!==true||r.allowedExecutions!==1||r.readOnlyRuntime!==true)bad.push('authorization');
          if(r.expectedProjectId!==process.env.ORBIT360_EXISTING_FIREBASE_PROJECT_ID)bad.push('project');
          if(r.createProject!==false||r.createAuthUser!==false||r.updateAuthUser!==false||r.createMembership!==false||r.updateMembership!==false||r.applyRules!==false||r.configurationWrites!==false||r.operationalWrites!==false||r.hostingDeploy!==false||r.functionsDeploy!==false||r.imports!==false||r.policies!==false||r.m3!==false||r.mergeMain!==false)bad.push('scope');
          if(bad.length)throw new Error('REQUEST_INVALID:'+bad.join(','));
          NODE
      - name: Preflight canónico antes de secretos
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "${ORBIT360_GATE_ID}"
          jq -e '.status=="GO_GATE_CONTRACT" and .contractVersion=="2.2.1" and .failed==0 and .secretAccess==false and .firestoreRead==false and .runtimeExecuted==false and .rulesApplied==false' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json >/dev/null
      - name: Resolver cuenta existente después del preflight
        env:
          SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
          SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
          SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-${SA_ORBIT_360_LAB:-${SA_DEFAULT:-}}}"
          test -n "$SERVICE_ACCOUNT"
          KEY_FILE="${RUNNER_TEMP}/orbit360-existing-identity-runtime.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$ORBIT360_EXISTING_FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"
          echo "ORBIT360_TEMP_KEY_FILE=$KEY_FILE" >> "$GITHUB_ENV"
      - name: Instalar dependencias runtime controladas
        shell: bash
        run: npm install --no-save --ignore-scripts firebase-admin@13 firebase google-auth-library@9
      - name: Ejecutar runtime con identidad existente en solo lectura
        shell: bash
        run: node tools/orbit360-m2-existing-identity-runtime-v20260724.mjs
      - name: Subir evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-m2-existing-identity-runtime-${{ github.run_id }}
          path: |
            orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json
            orbit360-platform/runtime-gate-crm-v20260716/m2-existing-identity-runtime-summary.json
          if-no-files-found: warn
          retention-days: 30
      - name: Publicar estado observable sanitizado
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          summary='orbit360-platform/runtime-gate-crm-v20260716/m2-existing-identity-runtime-summary.json'
          state=failure; description='M2 existing identity runtime failed'
          if [ -f "$summary" ] && [ "$(jq -r '.ok // false' "$summary")" = true ]; then state=success; description='M2 existing identity runtime validated read-only'; fi
          payload="$(jq -n --arg state "$state" --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --arg description "$description" '{state:$state,target_url:$target_url,description:$description,context:"orbit360/m2-existing-identity-runtime-v2"}')"
          curl --fail-with-body -sS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -d "$payload"
      - name: Limpiar material efímero
        if: always()
        shell: bash
        run: rm -f "${ORBIT360_TEMP_KEY_FILE:-}"
