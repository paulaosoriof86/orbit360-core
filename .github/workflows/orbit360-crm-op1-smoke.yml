name: Orbit 360 CRM OP1 Smoke

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'orbit360-platform/core/access-scope.js'
      - 'orbit360-platform/core/document-viewer.js'
      - 'orbit360-platform/modules/crm-v1198-operational-bridge.js'
      - 'orbit360-platform/modules/calidad.js'
      - 'orbit360-platform/modules/portal-v1198-scope-viewer-bridge.js'
      - 'orbit360-platform/modules/cliente360.js'
      - 'tools/orbit360-validar-crm-op1.mjs'
      - '.github/workflows/orbit360-crm-op1-smoke.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'orbit360-platform/core/access-scope.js'
      - 'orbit360-platform/core/document-viewer.js'
      - 'orbit360-platform/modules/crm-v1198-operational-bridge.js'
      - 'orbit360-platform/modules/calidad.js'
      - 'orbit360-platform/modules/portal-v1198-scope-viewer-bridge.js'
      - 'orbit360-platform/modules/cliente360.js'
      - 'tools/orbit360-validar-crm-op1.mjs'
      - '.github/workflows/orbit360-crm-op1-smoke.yml'

permissions:
  contents: read

jobs:
  crm-static-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate CRM OP-1
        run: node tools/orbit360-validar-crm-op1.mjs orbit360-platform

      - name: Validate protected backend contract
        run: node tools/orbit360-validar-backend-lab-contrato.mjs

      - name: Guard Calidad before Policy import
        run: |
          grep -q 'soloVig: false' orbit360-platform/modules/calidad.js
          grep -q 'Pendiente de pólizas / sin vigente' orbit360-platform/modules/calidad.js
          grep -q 'Todos los asesores' orbit360-platform/modules/calidad.js

      - name: Guard honest communication
        run: |
          grep -q 'No se ha confirmado ningún envío' orbit360-platform/modules/calidad.js
          if grep -nE 'campaña.*enviada|recordatorios enviados' orbit360-platform/modules/calidad.js; then
            echo 'False sent state detected in Calidad'
            exit 1
          fi
