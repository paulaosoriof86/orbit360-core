name: Orbit 360 Tariff Rule Proposal P06 Smoke

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'orbit360-platform/core/document-source-contract-p04.js'
      - 'orbit360-platform/core/tariff-rule-proposal-p06.js'
      - 'tools/orbit360-test-tariff-rule-proposal-p06.mjs'
      - '.github/workflows/orbit360-tariff-rule-proposal-p06-smoke.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'orbit360-platform/core/document-source-contract-p04.js'
      - 'orbit360-platform/core/tariff-rule-proposal-p06.js'
      - 'tools/orbit360-test-tariff-rule-proposal-p06.mjs'
      - '.github/workflows/orbit360-tariff-rule-proposal-p06-smoke.yml'

permissions:
  contents: read

jobs:
  tariff-rule-proposal-p06:
    name: Reglas tarifarias multiproducto P0.6
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check syntax
        run: |
          node --check orbit360-platform/core/tariff-rule-proposal-p06.js
          node --check tools/orbit360-test-tariff-rule-proposal-p06.mjs

      - name: Run synthetic multiproduct smoke
        run: node tools/orbit360-test-tariff-rule-proposal-p06.mjs

      - name: Guard no operational writes or hardcoded insurer data
        run: |
          if grep -RniE '(Orbit\.store\.(insert|update|remove|setPref)|localStorage|sessionStorage|fetch\(|XMLHttpRequest|eval\(|new Function)' \
            orbit360-platform/core/tariff-rule-proposal-p06.js; then
            echo 'Direct write, network, local storage, or executable path detected'
            exit 1
          fi
          if grep -RniE '(BAM|Banrural|Bantrab|Columna|AseGuate|Aseguradora Guatemalteca)' \
            orbit360-platform/core/tariff-rule-proposal-p06.js \
            tools/orbit360-test-tariff-rule-proposal-p06.mjs; then
            echo 'Tenant/insurer-specific values detected in reusable contract or smoke'
            exit 1
          fi

      - name: Guard second gate and single-output routing
        run: |
          grep -q 'requiresSecondGateForEnablement: true' orbit360-platform/core/tariff-rule-proposal-p06.js
          grep -q 'enabledCotizador: false' orbit360-platform/core/tariff-rule-proposal-p06.js
          grep -q 'enabledComparativo: false' orbit360-platform/core/tariff-rule-proposal-p06.js
          grep -q 'rendersSingleVehicleOrRisk' orbit360-platform/core/tariff-rule-proposal-p06.js
          grep -q 'DOBLE_IMPUESTO_RIESGO' orbit360-platform/core/tariff-rule-proposal-p06.js
          grep -q 'RUTAS_SALIDA_EN_CONFLICTO' orbit360-platform/core/tariff-rule-proposal-p06.js

      - name: Run backend LAB validator if available
        run: |
          if [ -f tools/orbit360-validar-backend-lab-contrato.mjs ]; then
            node tools/orbit360-validar-backend-lab-contrato.mjs
          else
            echo 'Validator not present; skipping.'
          fi