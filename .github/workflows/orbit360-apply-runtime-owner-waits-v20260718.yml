name: Orbit 360 Apply Runtime Owner Waits 20260718

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - "tools/orbit360-patch-runtime-owner-waits-v20260718.mjs"
      - ".github/workflows/orbit360-apply-runtime-owner-waits-v20260718.yml"

permissions:
  contents: write

concurrency:
  group: orbit360-apply-runtime-owner-waits-v20260718
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 0

      - name: Aplicar parche exacto de owners runtime
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "ays/backend-tenant-lab-v99-20260703"
          node --check tools/orbit360-patch-runtime-owner-waits-v20260718.mjs
          node tools/orbit360-patch-runtime-owner-waits-v20260718.mjs
          node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
          grep -Fq "waitForRuntimeContractOwner" tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          grep -Fq "contractVersion:'1.0.17'" tools/orbit360-gate-runtime-crm-v20260716.mjs
          ! grep -Fq "canonical_tenant_insurer_core_ready', () => page.waitForFunction" tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
          git diff --check
          test -n "$(git diff -- tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs tools/orbit360-gate-runtime-crm-v20260716.mjs)"

      - name: Commit limpio y retirar mecanismo temporal
        shell: bash
        run: |
          set -euo pipefail
          rm tools/orbit360-patch-runtime-owner-waits-v20260718.mjs
          rm .github/workflows/orbit360-apply-runtime-owner-waits-v20260718.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs tools/orbit360-gate-runtime-crm-v20260716.mjs tools/orbit360-patch-runtime-owner-waits-v20260718.mjs .github/workflows/orbit360-apply-runtime-owner-waits-v20260718.yml
          git diff --cached --check
          git commit -m "fix(block1): align runtime owner waits with Router [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
