name: Orbit 360 · Control acotado importador y recuperación

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'tools/orbit360-authorize-preflight-only-v20260721.json'
      - 'tools/orbit360-authorize-exact-recovery-dryrun-v20260721.json'
      - 'tools/orbit360-authorize-exact-recovery-write-v20260721.json'
      - 'tools/orbit360-authorize-post-recovery-inventory-v20260721.json'

permissions:
  contents: read
  statuses: write

concurrency:
  group: orbit360-importer-bounded-control-v1
  cancel-in-progress: false

env:
  ORBIT360_GATE_ID: block1-real-insurer-directories-lab-v20260720
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  FIREBASE_PROJECT_ID: ays-orbit-360-lab
  ORBIT360_HOSTING_CHANNEL: orbit360-ays-lab
  ORBIT360_PREFLIGHT_AUTHORIZATION_ID: data-contract-68plus2new-preflight-only-v1
  ORBIT360_DRYRUN_AUTHORIZATION_ID: exact-bank-reference-recovery-dryrun-68plus2new-v1
  ORBIT360_WRITE_AUTHORIZATION_ID: exact-bank-reference-recovery-write-68plus2new-v1
  ORBIT360_INVENTORY_AUTHORIZATION_ID: post-recovery-inventory-readonly-v1

jobs:
  bounded-control:
    name: Control acotado · preflight, dry-run, recuperación o inventario
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout SHA exacto
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolver marcador único
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          CHANGED="$(git show --pretty='' --name-only "$GITHUB_SHA")"
          PREFLIGHT='tools/orbit360-authorize-preflight-only-v20260721.json'
          DRYRUN='tools/orbit360-authorize-exact-recovery-dryrun-v20260721.json'
          WRITE='tools/orbit360-authorize-exact-recovery-write-v20260721.json'
          INVENTORY='tools/orbit360-authorize-post-recovery-inventory-v20260721.json'
          preflight_count="$(printf '%s\n' "$CHANGED" | grep -cx "$PREFLIGHT" || true)"
          dryrun_count="$(printf '%s\n' "$CHANGED" | grep -cx "$DRYRUN" || true)"
          write_count="$(printf '%s\n' "$CHANGED" | grep -cx "$WRITE" || true)"
          inventory_count="$(printf '%s\n' "$CHANGED" | grep -cx "$INVENTORY" || true)"
          test $((preflight_count + dryrun_count + write_count + inventory_count)) -eq 1
          if [ "$preflight_count" -eq 1 ]; then
            echo 'mode=preflight_only' >> "$GITHUB_OUTPUT"
            echo "marker=$PREFLIGHT" >> "$GITHUB_OUTPUT"
          elif [ "$dryrun_count" -eq 1 ]; then
            echo 'mode=exact_dryrun' >> "$GITHUB_OUTPUT"
            echo "marker=$DRYRUN" >> "$GITHUB_OUTPUT"
          elif [ "$write_count" -eq 1 ]; then
            echo 'mode=exact_write' >> "$GITHUB_OUTPUT"
            echo "marker=$WRITE" >> "$GITHUB_OUTPUT"
          else
            echo 'mode=post_recovery_inventory' >> "$GITHUB_OUTPUT"
            echo "marker=$INVENTORY" >> "$GITHUB_OUTPUT"
          fi

      - name: Validar autorización vinculante sin credenciales
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "$ORBIT360_BRANCH"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          FREEZE='tools/orbit360-incident-freeze-v20260721.json'
          MARKER='${{ steps.scope.outputs.marker }}'
          MODE='${{ steps.scope.outputs.mode }}'
          DRYRUN_SCRIPT='tools/orbit360-dryrun-recuperar-referencias-bancarias-exacto-v20260721.mjs'
          WRITE_SCRIPT='tools/orbit360-recuperar-referencias-bancarias-atomico-v20260721.mjs'
          INVENTORY_SCRIPT='tools/orbit360-inventariar-cuentas-protegidas-aseguradoras-lab-v20260721.mjs'
          MANIFEST='tools/orbit360-bank-reference-recovery-map-v20260721.json'
          test -f "$FREEZE" && test -f "$MARKER" && test -f "$DRYRUN_SCRIPT" && test -f "$WRITE_SCRIPT" && test -f "$INVENTORY_SCRIPT" && test -f "$MANIFEST"
          test "$(jq -r '.allowedExecutions' "$MARKER")" = '1'
          case "$MODE" in
            preflight_only)
              test "$(jq -r '.writesAllowed' "$MARKER")" = 'false'
              test "$(jq -r '.status' "$FREEZE")" = 'DATA_CONTRACT_CORRECTION_PREFLIGHT_ONLY_AUTHORIZED'
              test "$(jq -r '.preflightAuthorization.authorizationId' "$FREEZE")" = "$ORBIT360_PREFLIGHT_AUTHORIZATION_ID"
              test "$(jq -r '.preflightAuthorization.active' "$FREEZE")" = 'true'
              test "$(jq -r '.authorizationId' "$MARKER")" = "$ORBIT360_PREFLIGHT_AUTHORIZATION_ID"
              test "$(jq -r '.action' "$MARKER")" = 'central_preflight_only'
              ;;
            exact_dryrun)
              test "$(jq -r '.writesAllowed' "$MARKER")" = 'false'
              test "$(jq -r '.status' "$FREEZE")" = 'BOUNDED_EXACT_RECOVERY_DRYRUN_AUTHORIZED'
              test "$(jq -r '.runtimeAuthorization.authorizationId' "$FREEZE")" = "$ORBIT360_DRYRUN_AUTHORIZATION_ID"
              test "$(jq -r '.runtimeAuthorization.active' "$FREEZE")" = 'true'
              test "$(jq -r '.authorizationId' "$MARKER")" = "$ORBIT360_DRYRUN_AUTHORIZATION_ID"
              test "$(jq -r '.action' "$MARKER")" = 'exact_recovery_readonly_dry_run'
              ;;
            exact_write)
              test "$(jq -r '.writesAllowed' "$MARKER")" = 'true'
              test "$(jq -r '.status' "$FREEZE")" = 'BOUNDED_EXACT_RECOVERY_WRITE_AUTHORIZED'
              test "$(jq -r '.writeAuthorization.authorizationId' "$FREEZE")" = "$ORBIT360_WRITE_AUTHORIZATION_ID"
              test "$(jq -r '.writeAuthorization.active' "$FREEZE")" = 'true'
              test "$(jq -r '.writeAuthorization.allowedExecutions' "$FREEZE")" = '1'
              test "$(jq -r '.authorizationId' "$MARKER")" = "$ORBIT360_WRITE_AUTHORIZATION_ID"
              test "$(jq -r '.action' "$MARKER")" = 'exact_recovery_atomic_write'
              ;;
            post_recovery_inventory)
              test "$(jq -r '.writesAllowed' "$MARKER")" = 'false'
              test "$(jq -r '.runtimeAllowed' "$MARKER")" = 'true'
              test "$(jq -r '.status' "$FREEZE")" = 'POST_RECOVERY_INVENTORY_READONLY_AUTHORIZED'
              test "$(jq -r '.inventoryAuthorization.authorizationId' "$FREEZE")" = "$ORBIT360_INVENTORY_AUTHORIZATION_ID"
              test "$(jq -r '.inventoryAuthorization.active' "$FREEZE")" = 'true'
              test "$(jq -r '.inventoryAuthorization.writesAllowed' "$FREEZE")" = 'false'
              test "$(jq -r '.inventoryAuthorization.secretManagerWritesAllowed' "$FREEZE")" = 'false'
              test "$(jq -r '.authorizationId' "$MARKER")" = "$ORBIT360_INVENTORY_AUTHORIZATION_ID"
              test "$(jq -r '.action' "$MARKER")" = 'post_recovery_readonly_inventory'
              ;;
          esac
          node --check "$DRYRUN_SCRIPT"
          node --check "$WRITE_SCRIPT"
          node --check "$INVENTORY_SCRIPT"
          node --check tools/orbit360-validar-importador-aseguradoras-atomico-v20260721.mjs
          node --check tools/orbit360-validar-recuperacion-referencias-atomica-v20260721.mjs

      - name: Preflight central vinculante antes de secrets o runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p orbit360-bounded-control-evidence
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID" > orbit360-bounded-control-evidence/preflight.json
          cp orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json orbit360-bounded-control-evidence/preflight-sanitizado.json
          test "$(jq -r '.status' orbit360-bounded-control-evidence/preflight-sanitizado.json)" = 'GO_GATE_CONTRACT'

      - name: Ejecutar validador estático del modo autorizado
        if: ${{ steps.scope.outputs.mode != 'preflight_only' }}
        shell: bash
        run: |
          set -euo pipefail
          MODE='${{ steps.scope.outputs.mode }}'
          if [ "$MODE" = 'exact_write' ]; then
            node tools/orbit360-validar-recuperacion-referencias-atomica-v20260721.mjs > orbit360-bounded-control-evidence/static-validator.json
            cp orbit360-platform/runtime-incident-importer-20260721/atomic-recovery-static-validator-sanitized.json orbit360-bounded-control-evidence/static-validator-sanitized.json
            test "$(jq -r '.ok' orbit360-bounded-control-evidence/static-validator-sanitized.json)" = 'true'
          elif [ "$MODE" = 'post_recovery_inventory' ]; then
            node --check tools/orbit360-inventariar-cuentas-protegidas-aseguradoras-lab-v20260721.mjs
            ! grep -Eq '\.(set|update|create|delete)\s*\(' tools/orbit360-inventariar-cuentas-protegidas-aseguradoras-lab-v20260721.mjs
            jq -n '{schemaVersion:"orbit360-post-recovery-inventory-static-v1",ok:true,mode:"static_no_runtime",writesExecuted:false,runtimeExecuted:false,containsPII:false,containsSecrets:false}' > orbit360-bounded-control-evidence/static-validator-sanitized.json
          else
            node tools/orbit360-validar-importador-aseguradoras-atomico-v20260721.mjs > orbit360-bounded-control-evidence/static-validator.json
            cp orbit360-platform/runtime-incident-importer-20260721/static-importer-atomicity-sanitized.json orbit360-bounded-control-evidence/static-validator-sanitized.json
            test "$(jq -r '.ok' orbit360-bounded-control-evidence/static-validator-sanitized.json)" = 'true'
          fi
          test "$(jq -r '.runtimeExecuted' orbit360-bounded-control-evidence/static-validator-sanitized.json)" = 'false'

      - name: Resolver identidad LAB
        if: ${{ steps.scope.outputs.mode != 'preflight_only' }}
        env:
          SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
          SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
          SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          test -n "$SERVICE_ACCOUNT"
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab-bounded.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencias mínimas reproducibles
        if: ${{ steps.scope.outputs.mode != 'preflight_only' }}
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save firebase-admin@13 @google-cloud/secret-manager@6.2.0

      - name: Ejecutar inventario post-recuperación read-only
        if: ${{ steps.scope.outputs.mode == 'post_recovery_inventory' }}
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-inventariar-cuentas-protegidas-aseguradoras-lab-v20260721.mjs > orbit360-bounded-control-evidence/inventory-stdout-sanitized.json
          REPORT='orbit360-platform/runtime-incident-importer-20260721/post-recovery-inventory-sanitized.json'
          test -f "$REPORT"
          cp "$REPORT" orbit360-bounded-control-evidence/post-recovery-inventory-sanitized.json
          jq -e '
            .ok == true and
            .mode == "read_only_post_recovery_inventory" and
            .writesExecuted == false and
            .firestoreWritesExecuted == false and
            .secretManagerWritesExecuted == false and
            .deployExecuted == false and
            .migrationExecuted == false and
            .containsPII == false and
            .containsSecrets == false and
            .counts.clients == 414 and
            .counts.insurers == 26 and
            .counts.advisors == 7 and
            .inventory.totalCuentaResources == 107 and
            .inventory.protectedBankRows == 93 and
            .inventory.validReferences == 91 and
            .inventory.pendingReferences == 2 and
            .inventory.uniqueValidReferences == 91 and
            .inventory.invalidReferences == 0 and
            .inventory.duplicateReferences == 0 and
            .inventory.rawProtectedValues == 0 and
            .inventory.country.GT.insurers == 13 and
            .inventory.country.CO.insurers == 13 and
            .inventory.country.CO.pendingReferences == 0 and
            .inventory.vault.rows == 91 and
            .inventory.vault.valuesPresent == 91 and
            .failedCheckIds == []
          ' "$REPORT" >/dev/null

      - name: Ejecutar dry-run exacto read-only
        if: ${{ steps.scope.outputs.mode == 'exact_dryrun' }}
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-dryrun-recuperar-referencias-bancarias-exacto-v20260721.mjs > orbit360-bounded-control-evidence/dry-run-stdout-sanitized.json
          REPORT='orbit360-platform/runtime-incident-importer-20260721/bank-reference-recovery-exact-dry-run-sanitized.json'
          cp "$REPORT" orbit360-bounded-control-evidence/dry-run-sanitized.json
          test "$(jq -r '.ok' "$REPORT")" = 'true'

      - name: Ejecutar recuperación atómica única y lectura posterior
        if: ${{ steps.scope.outputs.mode == 'exact_write' }}
        shell: bash
        run: |
          set -uo pipefail
          REPORT='orbit360-platform/runtime-incident-importer-20260721/bank-reference-recovery-atomic-write-sanitized.json'
          set +e
          node tools/orbit360-recuperar-referencias-bancarias-atomico-v20260721.mjs > orbit360-bounded-control-evidence/write-stdout-sanitized.json 2> orbit360-bounded-control-evidence/write-stderr-sanitized.log
          EXIT_CODE=$?
          set -e
          test -f "$REPORT"
          cp "$REPORT" orbit360-bounded-control-evidence/atomic-write-sanitized.json
          if [ "$EXIT_CODE" -ne 0 ]; then exit "$EXIT_CODE"; fi
          test "$(jq -r '.ok' "$REPORT")" = 'true'

      - name: Subir evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-${{ steps.scope.outputs.mode }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: orbit360-bounded-control-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Publicar resultado del control acotado
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          MODE='${{ steps.scope.outputs.mode }}'
          state=success
          case "$MODE" in
            preflight_only)
              context='orbit360/data-contract-preflight-68plus2new-v1'
              description='Preflight estático GO; cero secrets y cero runtime'
              ;;
            exact_dryrun)
              context='orbit360/exact-recovery-dryrun-68plus2new-v3'
              description='Dry-run read-only aprobado; escritura bloqueada'
              ;;
            exact_write)
              context='orbit360/atomic-recovery-write-68plus2new-v1'
              description='68 referencias restauradas; 2 nuevas pendientes preservadas'
              ;;
            *)
              context='orbit360/post-recovery-inventory-readonly-v1'
              description='Inventario read-only: 414/26/7, 91 válidas y 2 pendientes'
              ;;
          esac
          if [ "${{ job.status }}" != success ]; then
            state=failure
            description="$MODE falló; evidencia preservada y STOP THE LINE"
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -f state="$state" -f context="$context" -f description="$description" -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >/dev/null
