name: Orbit 360 · Preflight y dry-run exacto acotados

# Un solo workflow canónico. Cada ejecución requiere un marcador distinto.
# El modo preflight no recibe secrets ni accede a Firestore o bóveda.
on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'tools/orbit360-authorize-preflight-only-v20260721.json'
      - 'tools/orbit360-authorize-exact-recovery-dryrun-v20260721.json'

permissions:
  contents: read
  statuses: write

concurrency:
  group: orbit360-importer-bounded-control-v1
  cancel-in-progress: false

env:
  ORBIT360_GATE_ID: block1-real-insurer-directories-lab-v20260720
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  FIREBASE_PROJECT_ID: ays-orbit-360-lab
  ORBIT360_HOSTING_CHANNEL: orbit360-ays-lab
  ORBIT360_PREFLIGHT_AUTHORIZATION_ID: data-contract-68plus2new-preflight-only-v1
  ORBIT360_DRYRUN_AUTHORIZATION_ID: exact-bank-reference-recovery-dryrun-68plus2new-v1
  ORBIT360_EXPECTED_RESTORES: 68
  ORBIT360_EXPECTED_NEW_PENDING: 2
  ORBIT360_EXPECTED_DUPLICATE_REMOVALS: 0
  ORBIT360_EXPECTED_FINAL_BANK_ROWS: 93
  ORBIT360_EXPECTED_FINAL_REFERENCES: 91
  ORBIT360_EXPECTED_FINAL_PENDING: 2

jobs:
  bounded-control:
    name: Control acotado · preflight o dry-run exacto
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout SHA exacto
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolver marcador único
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          CHANGED="$(git show --pretty='' --name-only "$GITHUB_SHA")"
          PREFLIGHT='tools/orbit360-authorize-preflight-only-v20260721.json'
          DRYRUN='tools/orbit360-authorize-exact-recovery-dryrun-v20260721.json'
          preflight_count="$(printf '%s\n' "$CHANGED" | grep -cx "$PREFLIGHT" || true)"
          dryrun_count="$(printf '%s\n' "$CHANGED" | grep -cx "$DRYRUN" || true)"
          test $((preflight_count + dryrun_count)) -eq 1
          if [ "$preflight_count" -eq 1 ]; then
            echo 'mode=preflight_only' >> "$GITHUB_OUTPUT"
            echo "marker=$PREFLIGHT" >> "$GITHUB_OUTPUT"
          else
            echo 'mode=exact_dryrun' >> "$GITHUB_OUTPUT"
            echo "marker=$DRYRUN" >> "$GITHUB_OUTPUT"
          fi

      - name: Validar autorización vinculante sin credenciales
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "$ORBIT360_BRANCH"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          FREEZE='tools/orbit360-incident-freeze-v20260721.json'
          MARKER='${{ steps.scope.outputs.marker }}'
          MODE='${{ steps.scope.outputs.mode }}'
          SCRIPT='tools/orbit360-dryrun-recuperar-referencias-bancarias-exacto-v20260721.mjs'
          MANIFEST='tools/orbit360-bank-reference-recovery-map-v20260721.json'
          test -f "$FREEZE" && test -f "$MARKER" && test -f "$SCRIPT" && test -f "$MANIFEST"
          test "$(jq -r '.writesAllowed' "$MARKER")" = 'false'
          test "$(jq -r '.allowedExecutions' "$MARKER")" = '1'
          if [ "$MODE" = 'preflight_only' ]; then
            test "$(jq -r '.status' "$FREEZE")" = 'DATA_CONTRACT_CORRECTION_PREFLIGHT_ONLY_AUTHORIZED'
            test "$(jq -r '.preflightAuthorization.authorizationId' "$FREEZE")" = "$ORBIT360_PREFLIGHT_AUTHORIZATION_ID"
            test "$(jq -r '.preflightAuthorization.active' "$FREEZE")" = 'true'
            test "$(jq -r '.preflightAuthorization.secretsAllowed' "$FREEZE")" = 'false'
            test "$(jq -r '.preflightAuthorization.firestoreReadAllowed' "$FREEZE")" = 'false'
            test "$(jq -r '.preflightAuthorization.vaultReadAllowed' "$FREEZE")" = 'false'
            test "$(jq -r '.runtimeAuthorization.active' "$FREEZE")" = 'false'
            test "$(jq -r '.authorizationId' "$MARKER")" = "$ORBIT360_PREFLIGHT_AUTHORIZATION_ID"
            test "$(jq -r '.action' "$MARKER")" = 'central_preflight_only'
          else
            test "$(jq -r '.status' "$FREEZE")" = 'BOUNDED_EXACT_RECOVERY_DRYRUN_AUTHORIZED'
            test "$(jq -r '.runtimeAuthorization.authorizationId' "$FREEZE")" = "$ORBIT360_DRYRUN_AUTHORIZATION_ID"
            test "$(jq -r '.runtimeAuthorization.active' "$FREEZE")" = 'true'
            test "$(jq -r '.runtimeAuthorization.writesAllowed' "$FREEZE")" = 'false'
            test "$(jq -r '.runtimeAuthorization.script' "$FREEZE")" = "$SCRIPT"
            test "$(jq -r '.runtimeAuthorization.manifest' "$FREEZE")" = "$MANIFEST"
            test "$(jq -r '.authorizationId' "$MARKER")" = "$ORBIT360_DRYRUN_AUTHORIZATION_ID"
            test "$(jq -r '.action' "$MARKER")" = 'exact_recovery_readonly_dry_run'
            test "$(jq -r '.expected.restores' "$MARKER")" = "$ORBIT360_EXPECTED_RESTORES"
            test "$(jq -r '.expected.newPendingRowsPreserved' "$MARKER")" = "$ORBIT360_EXPECTED_NEW_PENDING"
            test "$(jq -r '.expected.duplicateRemovals' "$MARKER")" = "$ORBIT360_EXPECTED_DUPLICATE_REMOVALS"
            test "$(jq -r '.expected.finalBankRows' "$MARKER")" = "$ORBIT360_EXPECTED_FINAL_BANK_ROWS"
            test "$(jq -r '.expected.finalValidReferences' "$MARKER")" = "$ORBIT360_EXPECTED_FINAL_REFERENCES"
            test "$(jq -r '.expected.finalPendingReferences' "$MARKER")" = "$ORBIT360_EXPECTED_FINAL_PENDING"
          fi
          node --check "$SCRIPT"
          node --check tools/orbit360-validar-importador-aseguradoras-atomico-v20260721.mjs

      - name: Preflight central vinculante antes de secrets o runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p orbit360-bounded-control-evidence
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID" > orbit360-bounded-control-evidence/preflight.json
          cp orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json orbit360-bounded-control-evidence/preflight-sanitizado.json
          test "$(jq -r '.status' orbit360-bounded-control-evidence/preflight-sanitizado.json)" = 'GO_GATE_CONTRACT'
          jq '{status,classification,gateId,contractVersion,diagnosticRevision,overlayRevision,total,passed,failed,failedCheckIds,containsPII,containsSecrets}' orbit360-bounded-control-evidence/preflight-sanitizado.json

      - name: Ejecutar validador estático canónico
        if: ${{ steps.scope.outputs.mode == 'exact_dryrun' }}
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-validar-importador-aseguradoras-atomico-v20260721.mjs > orbit360-bounded-control-evidence/static-validator.json
          cp orbit360-platform/runtime-incident-importer-20260721/static-importer-atomicity-sanitized.json orbit360-bounded-control-evidence/static-importer-atomicity-sanitized.json
          test "$(jq -r '.ok' orbit360-bounded-control-evidence/static-importer-atomicity-sanitized.json)" = 'true'
          test "$(jq -r '.runtimeExecuted' orbit360-bounded-control-evidence/static-importer-atomicity-sanitized.json)" = 'false'

      - name: Resolver identidad LAB de solo lectura
        if: ${{ steps.scope.outputs.mode == 'exact_dryrun' }}
        env:
          SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
          SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
          SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          test -n "$SERVICE_ACCOUNT"
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab-exact-dryrun.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencias mínimas reproducibles
        if: ${{ steps.scope.outputs.mode == 'exact_dryrun' }}
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save firebase-admin@13 @google-cloud/secret-manager@6.2.0

      - name: Ejecutar una sola vez el dry-run exacto y preservar siempre su evidencia
        if: ${{ steps.scope.outputs.mode == 'exact_dryrun' }}
        shell: bash
        run: |
          set -uo pipefail
          REPORT='orbit360-platform/runtime-incident-importer-20260721/bank-reference-recovery-exact-dry-run-sanitized.json'
          STDOUT='orbit360-bounded-control-evidence/dry-run-stdout-sanitized.json'
          STDERR='orbit360-bounded-control-evidence/dry-run-stderr-sanitized.log'
          set +e
          node tools/orbit360-dryrun-recuperar-referencias-bancarias-exacto-v20260721.mjs > "$STDOUT" 2> "$STDERR"
          DRYRUN_EXIT=$?
          set -e
          test -f "$REPORT"
          cp "$REPORT" orbit360-bounded-control-evidence/bank-reference-recovery-exact-dry-run-sanitized.json
          jq '{
            ok,
            classification,
            errorCode,
            errorDetailHash,
            mode,
            writesExecuted,
            deployExecuted,
            migrationExecuted,
            before,
            proposal,
            simulatedAfter,
            failedCheckIds: (.checks // {} | to_entries | map(select(.value != true) | .key)),
            containsPII,
            containsSecrets,
            nextAllowedAction
          }' "$REPORT" > orbit360-bounded-control-evidence/dry-run-result-summary-sanitized.json
          if [ "$DRYRUN_EXIT" -ne 0 ]; then
            exit "$DRYRUN_EXIT"
          fi
          jq -e '
            .ok == true and
            .mode == "read_only_exact_manifest_dry_run" and
            .writesExecuted == false and
            .deployExecuted == false and
            .migrationExecuted == false and
            .containsPII == false and
            .containsSecrets == false and
            .before.clients == 414 and
            .before.insurers == 26 and
            .before.advisors == 7 and
            .before.bankRows == 93 and
            .before.validReferences == 23 and
            .before.pendingReferences == 70 and
            .before.vaultRows == 91 and
            .before.rawProtectedValues == 0 and
            .proposal.restores == 68 and
            .proposal.newPendingRowsPreserved == 2 and
            .proposal.duplicateRemovals == 0 and
            .proposal.creates == 0 and
            .proposal.deletes == 0 and
            .proposal.reorderChanges == 0 and
            .proposal.affectedDocuments == 13 and
            .proposal.nonReferenceFieldChanges == 0 and
            .proposal.traceFieldChanges == 0 and
            .proposal.colombiaDocumentChanges == 0 and
            .simulatedAfter.bankRows == 93 and
            .simulatedAfter.validReferences == 91 and
            .simulatedAfter.pendingReferences == 2 and
            .simulatedAfter.duplicateFingerprints == 0 and
            .authorizationRequiredForWrite == true
          ' "$REPORT" >/dev/null

      - name: Subir evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-${{ steps.scope.outputs.mode }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: orbit360-bounded-control-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Publicar resultado del control acotado
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          MODE='${{ steps.scope.outputs.mode }}'
          state=success
          if [ "$MODE" = 'preflight_only' ]; then
            context='orbit360/data-contract-preflight-68plus2new-v1'
            description='Preflight 68+2 nuevas GO; cero secrets y cero runtime'
          else
            context='orbit360/exact-recovery-dryrun-68plus2new-v3'
            description='Dry-run 68 restores + 2 nuevas aprobado; escritura bloqueada'
          fi
          if [ "${{ job.status }}" != success ]; then
            state=failure
            description="$MODE falló; evidencia preservada y STOP THE LINE"
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -f state="$state" -f context="$context" -f description="$description" -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >/dev/null
