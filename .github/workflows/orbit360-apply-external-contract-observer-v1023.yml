name: Orbit 360 Diagnose External Contract Observer 1.0.23

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-apply-external-contract-observer-v1023.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2

      - name: Ejecutar transformación y controles aislados
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/orbit360-v1023-diagnostic
          node --check tools/orbit360-patch-external-contract-observer-v1023.mjs > /tmp/orbit360-v1023-diagnostic/00-check-patch.log 2>&1
          CHECK_PATCH=$?
          node --check tools/orbit360-patch-gate-registry-v1023.mjs > /tmp/orbit360-v1023-diagnostic/01-check-registry-patch.log 2>&1
          CHECK_REGISTRY_PATCH=$?
          TRANSFORM=99
          if [ "$CHECK_PATCH" -eq 0 ] && [ "$CHECK_REGISTRY_PATCH" -eq 0 ]; then
            node tools/orbit360-patch-external-contract-observer-v1023.mjs > /tmp/orbit360-v1023-diagnostic/02-transform-helper.log 2>&1
            TRANSFORM_HELPER=$?
            if [ "$TRANSFORM_HELPER" -eq 0 ]; then
              node tools/orbit360-patch-gate-registry-v1023.mjs > /tmp/orbit360-v1023-diagnostic/03-transform-registry.log 2>&1
              TRANSFORM=$?
            else
              TRANSFORM=$TRANSFORM_HELPER
            fi
          fi
          if [ "$TRANSFORM" -eq 0 ]; then
            node - <<'NODE'
          const fs = require('fs');
          const path = 'tools/orbit360-gate-contract-registry-v20260717.json';
          const workflow = '.github/workflows/orbit360-apply-external-contract-observer-v1023.yml';
          const registry = JSON.parse(fs.readFileSync(path, 'utf8'));
          registry.retiredRuntimeArtifacts = [].concat(registry.retiredRuntimeArtifacts || []).filter(item => item !== workflow);
          registry.temporaryPipelineArtifacts = [{path:workflow,classification:'TEMPORAL_RETIRO',purpose:'Diagnose and publish 1.0.23.',retirementGate:'block1-client360-insurers-lab-v20260717'}];
          fs.writeFileSync(path, JSON.stringify(registry, null, 2) + '\n');
          NODE
          fi

          run_check() {
            local key="$1"
            shift
            "$@" > "/tmp/orbit360-v1023-diagnostic/${key}.log" 2>&1
            echo $? > "/tmp/orbit360-v1023-diagnostic/${key}.exit"
          }

          if [ "$TRANSFORM" -eq 0 ]; then
            run_check 10-helper-syntax node --check tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
            run_check 11-runtime-syntax node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
            run_check 12-preflight-syntax node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
            run_check 13-no-evaluation-timeout bash -c '! grep -Fq "resolve({ evaluationTimeout: true })" tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs'
            run_check 14-no-false-timeout bash -c '! grep -Fq "setTimeout(() => resolve(false), 1000)" tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs'
            run_check 15-loader-token grep -Fq RUNTIME_CONTRACT_LOADER_EXTERNAL_EVIDENCE_MISSING tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
            run_check 16-projection-token grep -Fq CLIENT_PROJECTION_EXTERNAL_EVIDENCE_MISSING tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
            run_check 17-owner-token grep -Fq "code + '_EXTERNAL_EVIDENCE_MISSING'" tools/orbit360-gate-bootstrap-auth-legal-v20260717.mjs
            run_check 18-preflight node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717
          fi
          git status --short > /tmp/orbit360-v1023-diagnostic/status.txt

          CHECK_PATCH="$CHECK_PATCH" CHECK_REGISTRY_PATCH="$CHECK_REGISTRY_PATCH" TRANSFORM="$TRANSFORM" node - <<'NODE'
          const fs = require('fs');
          const dir = '/tmp/orbit360-v1023-diagnostic';
          const read = p => fs.existsSync(p) ? fs.readFileSync(p, 'utf8') : '';
          const clean = value => String(value || '').replace(/\/home\/runner\/work\/[^\s]+/g, '[workspace]').replace(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/gi, '[email]').slice(-8000);
          const checks = {};
          for (const file of fs.readdirSync(dir)) {
            if (!file.endsWith('.exit')) continue;
            const key = file.replace(/\.exit$/, '');
            checks[key] = {exit:Number(read(dir + '/' + file).trim()),log:clean(read(dir + '/' + key + '.log'))};
          }
          const result = {
            schemaVersion:'orbit360-v1023-validation-diagnostic-v1',
            containsPII:false,
            containsSecrets:false,
            classification:'PIPELINE_MECHANISM_FAILURE',
            checkPatch:Number(process.env.CHECK_PATCH),
            checkRegistryPatch:Number(process.env.CHECK_REGISTRY_PATCH),
            transformExit:Number(process.env.TRANSFORM),
            checks,
            transformHelperLog:clean(read(dir + '/02-transform-helper.log')),
            transformRegistryLog:clean(read(dir + '/03-transform-registry.log')),
            status:clean(read(dir + '/status.txt'))
          };
          fs.writeFileSync('/tmp/orbit360-v1023-validation-diagnostic.json', JSON.stringify(result, null, 2) + '\n');
          NODE

          git reset --hard HEAD
          cp /tmp/orbit360-v1023-validation-diagnostic.json .github/orbit360-v1023-validation-diagnostic.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/orbit360-v1023-validation-diagnostic.json
          git commit -m "chore(block1): record 1.0.23 validation diagnostic [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
          exit 1
