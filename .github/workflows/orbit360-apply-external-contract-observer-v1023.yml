name: Orbit 360 Finalize External Observer Ledger 1.0.23

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - ".github/workflows/orbit360-apply-external-contract-observer-v1023.yml"

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 2
      - name: Sellar retiro del pipeline temporal
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const path = 'tools/orbit360-gate-contract-registry-v20260717.json';
          const workflow = '.github/workflows/orbit360-apply-external-contract-observer-v1023.yml';
          const registry = JSON.parse(fs.readFileSync(path, 'utf8'));
          const gate = [].concat(registry.gates || []).find(item => item.gateId === 'block1-client360-insurers-lab-v20260717');
          if (!gate || gate.contractVersion !== '1.0.23') throw new Error('GATE_1023_NOT_ACTIVE');
          registry.temporaryPipelineArtifacts = [].concat(registry.temporaryPipelineArtifacts || []).filter(item => item && item.path !== workflow);
          registry.retiredRuntimeArtifacts = [...new Set([].concat(registry.retiredRuntimeArtifacts || [], workflow))];
          gate.executionDispatch = {
            mode: 'workflow_dispatch',
            uniqueExecution: true,
            dispatchAfterRetirement: true,
            purpose: 'Execute 1.0.23 once after the temporary apply workflow is removed.'
          };
          fs.writeFileSync(path, JSON.stringify(registry, null, 2) + '\n', 'utf8');
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/orbit360-gate-contract-registry-v20260717.json
          git commit -m "docs(block1): seal 1.0.23 observer retirement ledger [skip ci]"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
