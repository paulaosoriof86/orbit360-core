name: Orbit 360 Aseguradoras OP2 Smoke

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'orbit360-platform/core/aseguradoras-op2-*.js'
      - 'orbit360-platform/core/insurer-directory-import-v1202*.js'
      - 'orbit360-platform/modules/aseguradoras*.js'
      - 'orbit360-platform/data/academia-v1217-aseguradoras-op2.js'
      - 'orbit360-platform/styles/aseguradoras-op2-v1217.css'
      - 'tools/orbit360-validar-aseguradoras-op2-v1220.mjs'
      - 'tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs'
      - 'tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs'
      - 'tools/orbit360-validar-cuarentena-hojas-aseguradoras-v1219.mjs'
      - 'tools/orbit360-validar-alias-directorios-aseguradoras-v1219.mjs'
      - 'tools/orbit360-validar-copy-importador-aseguradoras-v1220.mjs'
      - 'tools/orbit360-smoke-visual-aseguradoras-op2.mjs'
      - 'tools/orbit360-smoke-op2-plataformas-focused-v1218.mjs'
      - 'tools/orbit360-validar-smoke-op2-plataformas-focused-v1218.mjs'
      - 'tools/orbit360-validar-resume-evidence-op1-op2-v1218.mjs'
      - 'tools/orbit360-run-operacion-op1-op2-visual.ps1'
      - 'tools/orbit360-run-aseguradoras-op2-plataformas-resume.ps1'
      - 'tools/orbit360-aplicar-cachebust-cotizador-comparativo-v1215.ps1'
      - '.github/workflows/orbit360-aseguradoras-op2-smoke.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'orbit360-platform/core/aseguradoras-op2-*.js'
      - 'orbit360-platform/core/insurer-directory-import-v1202*.js'
      - 'orbit360-platform/modules/aseguradoras*.js'
      - 'orbit360-platform/data/academia-v1217-aseguradoras-op2.js'
      - 'orbit360-platform/styles/aseguradoras-op2-v1217.css'
      - 'tools/orbit360-validar-aseguradoras-op2-v1220.mjs'
      - 'tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs'
      - 'tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs'
      - 'tools/orbit360-validar-cuarentena-hojas-aseguradoras-v1219.mjs'
      - 'tools/orbit360-validar-alias-directorios-aseguradoras-v1219.mjs'
      - 'tools/orbit360-validar-copy-importador-aseguradoras-v1220.mjs'
      - 'tools/orbit360-smoke-visual-aseguradoras-op2.mjs'
      - 'tools/orbit360-smoke-op2-plataformas-focused-v1218.mjs'
      - 'tools/orbit360-validar-smoke-op2-plataformas-focused-v1218.mjs'
      - 'tools/orbit360-validar-resume-evidence-op1-op2-v1218.mjs'
      - 'tools/orbit360-run-operacion-op1-op2-visual.ps1'
      - 'tools/orbit360-run-aseguradoras-op2-plataformas-resume.ps1'
      - 'tools/orbit360-aplicar-cachebust-cotizador-comparativo-v1215.ps1'
      - '.github/workflows/orbit360-aseguradoras-op2-smoke.yml'

permissions:
  contents: read
  statuses: write

jobs:
  aseguradoras-static-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check validator syntax
        run: |
          node --check tools/orbit360-validar-aseguradoras-op2-v1220.mjs
          node --check tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs
          node --check tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs
          node --check tools/orbit360-validar-cuarentena-hojas-aseguradoras-v1219.mjs
          node --check tools/orbit360-validar-alias-directorios-aseguradoras-v1219.mjs
          node --check tools/orbit360-validar-copy-importador-aseguradoras-v1220.mjs
          node --check tools/orbit360-smoke-op2-plataformas-focused-v1218.mjs
          node --check tools/orbit360-validar-smoke-op2-plataformas-focused-v1218.mjs
          node --check tools/orbit360-validar-resume-evidence-op1-op2-v1218.mjs

      - name: Contract group - access and roles
        run: node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group access

      - name: Contract group - importer and source separation
        run: node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group import

      - name: Contract group - operational copy and write gate
        run: node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group copy

      - name: Contract group - sheet quarantine
        run: node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group quarantine

      - name: Contract group - identity and duplicate control
        run: node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group alias

      - name: Contract group - directory UX and resources
        run: node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group ux

      - name: Contract group - migration and permissions
        run: node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group migration

      - name: Contract group - Academy and responsive
        run: node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group academy

      - name: Contract group - syntax storage and protected baseline
        run: node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group technical

      - name: Validate resource access policy v1.220
        run: node tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs orbit360-platform

      - name: Validate workbook sheet quarantine v1.219
        run: node tools/orbit360-validar-cuarentena-hojas-aseguradoras-v1219.mjs .

      - name: Validate identity versions and probable updates v1.220
        run: node tools/orbit360-validar-alias-directorios-aseguradoras-v1219.mjs .

      - name: Validate operational importer copy v1.220
        run: node tools/orbit360-validar-copy-importador-aseguradoras-v1220.mjs .

      - name: Validate focused platform harness
        run: node tools/orbit360-validar-smoke-op2-plataformas-focused-v1218.mjs .

      - name: Validate JSONL evidence reuse runner
        run: node tools/orbit360-validar-resume-evidence-op1-op2-v1218.mjs .

      - name: Validate protected backend
        run: node tools/orbit360-validar-backend-lab-contrato.mjs

      - name: Guard zero manual visual runner
        run: |
          grep -q 'dir-plataformas-desktop' tools/orbit360-smoke-visual-aseguradoras-op2.mjs
          grep -q 'op-plataformas-tablet' tools/orbit360-smoke-visual-aseguradoras-op2.mjs
          grep -q 'ase-plataformas-mobile' tools/orbit360-smoke-visual-aseguradoras-op2.mjs
          grep -q 'results.jsonl' tools/orbit360-run-aseguradoras-op2-plataformas-resume.ps1
          grep -q '12 reutilizados + 3 focalizados = 15/15' tools/orbit360-run-aseguradoras-op2-plataformas-resume.ps1
          grep -q 'Resolve-Port' tools/orbit360-run-aseguradoras-op2-plataformas-resume.ps1
          if grep -q 'Stop-Process' tools/orbit360-run-operacion-op1-op2-visual.ps1 tools/orbit360-run-aseguradoras-op2-plataformas-resume.ps1; then
            echo 'Los runners no deben cerrar otras aplicaciones.'
            exit 1
          fi

      - name: Publish verified success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context='orbit360/aseguradoras-op2-v1220' \
            -f description='Contratos OP2 v1.220 aprobados'

      - name: Publish verified failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=failure \
            -f context='orbit360/aseguradoras-op2-v1220' \
            -f description='Revisar contrato OP2 fallido'
