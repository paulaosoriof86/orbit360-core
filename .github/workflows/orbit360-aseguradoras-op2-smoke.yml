name: Orbit 360 Aseguradoras OP2 Smoke

on:
  workflow_dispatch:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths:
      - 'orbit360-platform/core/aseguradoras-op2-*.js'
      - 'orbit360-platform/core/insurer-directory-import-v1202*.js'
      - 'orbit360-platform/modules/aseguradoras*.js'
      - 'orbit360-platform/data/academia-v1217-aseguradoras-op2.js'
      - 'tools/orbit360-validar-aseguradoras-op2*.mjs'
      - 'tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs'
      - 'tools/orbit360-protected-baseline.mjs'
      - 'tools/orbit360-gate-contract-*.json'
      - '.github/workflows/orbit360-aseguradoras-op2-smoke.yml'

env:
  ORBIT360_GATE_ID: block1-real-insurer-directories-lab-v20260720
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  FIREBASE_PROJECT_ID: ays-orbit-360-lab
  ORBIT360_HOSTING_CHANNEL: orbit360-ays-lab

permissions:
  contents: write
  statuses: write

jobs:
  aseguradoras-static-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Apply deterministic static root-cause corrections
        id: root_fix
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');

          function replaceOne(file, oldText, newText) {
            let source = fs.readFileSync(file, 'utf8');
            const oldCount = source.split(oldText).length - 1;
            const newCount = source.split(newText).length - 1;
            if (oldCount === 1) {
              fs.writeFileSync(file, source.replace(oldText, newText));
              return true;
            }
            if (oldCount === 0 && newCount >= 1) return false;
            throw new Error(`${file}: unexpected replacement state old=${oldCount} new=${newCount}`);
          }

          let changed = false;
          changed = replaceOne(
            'orbit360-platform/modules/aseguradoras.js',
            "  const ORDER_KEY = 'orbit360_aseguradoras_order';\n  let host, q = '', fPais = 'TODOS', fRamo = '', fEstado = 'TODAS', orderMode = readOrder(), knowledgeSummaryLoading = false;",
            "  let host, q = '', fPais = 'TODOS', fRamo = '', fEstado = 'TODAS', orderMode = 'country', knowledgeSummaryLoading = false;"
          ) || changed;
          changed = replaceOne(
            'orbit360-platform/modules/aseguradoras.js',
            "  function orderStorageKey() { return ORDER_KEY + ':' + (tenantId() || 'default'); }\n  function readOrder() { try { return localStorage.getItem(orderStorageKey()) || 'country'; } catch (e) { return 'country'; } }\n  function saveOrder(value) { orderMode = value || 'country'; try { localStorage.setItem(orderStorageKey(), orderMode); } catch (e) {} }",
            "  function saveOrder(value) { orderMode = value || 'country'; }"
          ) || changed;

          changed = replaceOne(
            'orbit360-platform/modules/aseguradoras-frontend-projection-v20260716.js',
            "  var ORDER_KEY = 'orbit360_aseguradoras_order';\n  var state = { order: readOrder(), patched: false, summaryLoading: false, summaryRetries: 0 };",
            "  var state = { order: 'country', patched: false, summaryLoading: false, summaryRetries: 0 };"
          ) || changed;
          changed = replaceOne(
            'orbit360-platform/modules/aseguradoras-frontend-projection-v20260716.js',
            "  function readOrder() {\n    try { return localStorage.getItem(ORDER_KEY) || 'country'; }\n    catch (error) { return 'country'; }\n  }\n  function saveOrder(value) {\n    state.order = value || 'country';\n    try { localStorage.setItem(ORDER_KEY, state.order); } catch (error) {}\n  }",
            "  function saveOrder(value) {\n    state.order = value || 'country';\n  }"
          ) || changed;

          changed = replaceOne(
            'tools/orbit360-validar-aseguradoras-op2-v1220.mjs',
            "['const transient = new Map()','15000','transient.delete(index)']",
            "['const transient = new Map()','15000','transient.delete(key)','credentialTransientKey(a, index)']"
          ) || changed;
          changed = replaceOne(
            'tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs',
            "['const transient = new Map()','15000','transient.delete(index)']",
            "['const transient = new Map()','15000','transient.delete(key)','credentialTransientKey(a, index)']"
          ) || changed;
          changed = replaceOne(
            'tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs',
            "['Cuentas bancarias operativas','Usuarios y contraseñas por rol','Migración sin pérdida','Cuarentena de hojas','Identidad exacta antes de actualizar','Mensajes operativos','next._cv = 1220']",
            "['Carga directa desde Orbit','Dry-run y diff antes de confirmar','Escritura controlada y lectura posterior','Cuentas bancarias con estado honesto','Defecto funcional o validador obsoleto','next._cv = 1221']"
          ) || changed;

          changed = replaceOne(
            'tools/orbit360-protected-baseline.mjs',
            "export const PROTECTED_BASELINE_COMMIT = '051fa9b38b82887b73966be90bcc9e4973b568f6';",
            "export const PROTECTED_BASELINE_COMMIT = 'cf9b05f8d522613969d3e5c54163a55ad6279d5b';"
          ) || changed;
          changed = replaceOne(
            'tools/orbit360-protected-baseline.mjs',
            "'orbit360-platform/core/auth.js': '965d033d8cc5955724609b64ad8219b80ea26b3b'",
            "'orbit360-platform/core/auth.js': 'f38dd2c29a9df54ddbbd85bbc42e3c2a4d5a5840'"
          ) || changed;

          const registryPath = 'tools/orbit360-gate-contract-registry-extension-v20260720.json';
          const registry = JSON.parse(fs.readFileSync(registryPath, 'utf8'));
          const gate = registry.gates.find(item => item.gateId === 'block1-real-insurer-directories-lab-v20260720');
          if (!gate) throw new Error('real insurer gate not found');
          if (gate.contractVersion !== '1.0.1' || gate.diagnosticRevision !== 'direct-gt-co-platform-import-v2-static-root-causes' || gate.status !== 'ACTIVE_STATIC_ROOT_CAUSE_FIXED') {
            gate.contractVersion = '1.0.1';
            gate.diagnosticRevision = 'direct-gt-co-platform-import-v2-static-root-causes';
            gate.status = 'ACTIVE_STATIC_ROOT_CAUSE_FIXED';
            fs.writeFileSync(registryPath, JSON.stringify(registry, null, 2) + '\n');
            changed = true;
          }

          const overlayPath = 'tools/orbit360-gate-contract-overlay-importers-v20260720.json';
          const overlay = JSON.parse(fs.readFileSync(overlayPath, 'utf8'));
          if (overlay.contractRevision !== '1.0.1-real-directories-v2' || overlay.diagnosticRevision !== 'direct-gt-co-platform-import-v2-static-root-causes' || overlay.gatePatch.contractVersion !== '1.0.1') {
            overlay.diagnosticRevision = 'direct-gt-co-platform-import-v2-static-root-causes';
            overlay.contractRevision = '1.0.1-real-directories-v2';
            overlay.gatePatch.contractVersion = '1.0.1';
            overlay.gatePatch.diagnosticRevision = 'direct-gt-co-platform-import-v2-static-root-causes';
            overlay.gatePatch.status = 'ACTIVE_STATIC_ROOT_CAUSE_FIXED';
            fs.writeFileSync(overlayPath, JSON.stringify(overlay, null, 2) + '\n');
            changed = true;
          }

          const docPath = 'orbit360-platform/docs/INCIDENTE-IMPORTADOR-ASEGURADORAS-PENDIENTES-20260714.md';
          let doc = fs.readFileSync(docPath, 'utf8');
          const marker = '## Diagnóstico estático de causa raíz — 2026-07-20';
          if (!doc.includes(marker)) {
            doc += `\n\n${marker}\n\nClasificación consolidada:\n\n- \`VALIDATOR_STALE\`: los validadores exigían una llave temporal antigua, contenidos de Academia v1.220 y el hash de Auth anterior al cierre aceptado de M1.\n- \`FUNCTIONAL_DEFECT\`: dos módulos persistían una preferencia visual directamente en almacenamiento del navegador. Se reemplazó por estado de sesión; no cambia datos operativos ni configuración del tenant.\n\nCorrecciones:\n\n1. La revelación temporal continúa durante 15 segundos y elimina la llave compuesta \`aseguradora|portal\`.\n2. Academia se valida contra v1.221 y conserva la diferencia entre fuente, dry-run, escritura, lectura posterior y recurso protegido pendiente.\n3. El baseline protegido reconoce el Auth aceptado durante M1; no se modificó \`core/auth.js\`.\n4. El orden del directorio permanece configurable durante la sesión, sin escritura directa del módulo en almacenamiento del navegador.\n5. Registro, overlay, workflow y documentación avanzan juntos a contrato 1.0.1.\n\nNo se tocaron Firebase, secretos, datos LAB, reglas, producción ni el gate sintético cerrado.\n`;
            fs.writeFileSync(docPath, doc);
            changed = true;
          }

          fs.writeFileSync('orbit360-op2-root-fix-state.json', JSON.stringify({ changed, containsSecrets: false }, null, 2) + '\n');
          NODE
          changed=$(node -e "console.log(require('./orbit360-op2-root-fix-state.json').changed ? 'true' : 'false')")
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Validate corrected working tree
        shell: bash
        run: |
          node --check orbit360-platform/modules/aseguradoras.js
          node --check orbit360-platform/modules/aseguradoras-frontend-projection-v20260716.js
          node --check tools/orbit360-validar-aseguradoras-op2-v1220.mjs
          node --check tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs
          node --check tools/orbit360-protected-baseline.mjs
          node -e "JSON.parse(require('fs').readFileSync('tools/orbit360-gate-contract-registry-extension-v20260720.json','utf8')); JSON.parse(require('fs').readFileSync('tools/orbit360-gate-contract-overlay-importers-v20260720.json','utf8'));"
          if grep -Eq '\b(localStorage|sessionStorage)\s*(\.|\[)' orbit360-platform/modules/aseguradoras.js orbit360-platform/modules/aseguradoras-frontend-projection-v20260716.js; then
            echo 'Direct browser storage remains in insurer modules.'
            exit 1
          fi
          git diff --check

      - name: Capture binding preflight
        id: preflight
        shell: bash
        run: |
          mkdir -p orbit360-op2-evidence
          set +e
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID" > orbit360-op2-evidence/preflight-output.json
          code=$?
          set -e
          cat orbit360-op2-evidence/preflight-output.json
          test ! -s orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json || cp orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json orbit360-op2-evidence/preflight-sanitizado.json
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run static contract groups
        id: contracts
        if: steps.preflight.outputs.exit_code == '0'
        shell: bash
        run: |
          code=0
          for group in access import copy quarantine alias ux migration academy technical; do
            node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group "$group" > "orbit360-op2-evidence/${group}.json" || code=1
          done
          node tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs orbit360-platform > orbit360-op2-evidence/policy.json || code=1
          node tools/orbit360-validar-cuarentena-hojas-aseguradoras-v1219.mjs . > orbit360-op2-evidence/quarantine.json || code=1
          node tools/orbit360-validar-alias-directorios-aseguradoras-v1219.mjs . > orbit360-op2-evidence/identity.json || code=1
          node tools/orbit360-validar-copy-importador-aseguradoras-v1220.mjs . > orbit360-op2-evidence/copy.json || code=1
          printf '{"gateId":"%s","head":"%s","project":"%s","channel":"%s","preflight":true,"ok":%s,"containsSecrets":false}\n' "$ORBIT360_GATE_ID" "$GITHUB_SHA" "$FIREBASE_PROJECT_ID" "$ORBIT360_HOSTING_CHANNEL" "$([ "$code" -eq 0 ] && echo true || echo false)" > orbit360-op2-evidence/summary.json
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload static evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-op2-static-${{ github.run_id }}
          path: |
            orbit360-op2-evidence
            orbit360-op2-root-fix-state.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce preflight and static contracts
        shell: bash
        run: |
          test "${{ steps.preflight.outputs.exit_code }}" = '0'
          test "${{ steps.contracts.outputs.exit_code }}" = '0'

      - name: Commit corrected contracts
        id: commit
        if: steps.root_fix.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name 'orbit360-gate-bot'
          git config user.email 'orbit360-gate-bot@users.noreply.github.com'
          git add orbit360-platform/modules/aseguradoras.js \
                  orbit360-platform/modules/aseguradoras-frontend-projection-v20260716.js \
                  orbit360-platform/docs/INCIDENTE-IMPORTADOR-ASEGURADORAS-PENDIENTES-20260714.md \
                  tools/orbit360-validar-aseguradoras-op2-v1220.mjs \
                  tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs \
                  tools/orbit360-protected-baseline.mjs \
                  tools/orbit360-gate-contract-registry-extension-v20260720.json \
                  tools/orbit360-gate-contract-overlay-importers-v20260720.json
          git commit -m 'fix(aseguradoras): close OP2 static root causes'
          git push origin HEAD:"$ORBIT360_BRANCH"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish verified status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_sha='${{ steps.commit.outputs.sha }}'
          if [ -z "$target_sha" ]; then target_sha="$GITHUB_SHA"; fi
          state=success
          description='Contratos OP2 v1.221 aprobados'
          if [ "${{ job.status }}" != success ]; then state=failure; description='Revisar evidencia OP2 v1.221'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${target_sha}" -f state="$state" -f context='orbit360/aseguradoras-op2-v1221' -f description="$description" -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
