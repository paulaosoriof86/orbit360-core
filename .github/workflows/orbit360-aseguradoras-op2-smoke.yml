name: Orbit 360 Aseguradoras OP2 Smoke

on:
  workflow_dispatch:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths:
      - 'orbit360-platform/core/aseguradoras-op2-*.js'
      - 'orbit360-platform/core/insurer-directory-import-v1202*.js'
      - 'orbit360-platform/modules/aseguradoras*.js'
      - 'orbit360-platform/data/academia-v1217-aseguradoras-op2.js'
      - 'orbit360-platform/styles/aseguradoras-op2-v1217.css'
      - 'tools/orbit360-validar-aseguradoras-op2*.mjs'
      - 'tools/orbit360-validar-*aseguradoras*.mjs'
      - 'tools/orbit360-smoke-*aseguradoras*.mjs'
      - '.github/workflows/orbit360-aseguradoras-op2-smoke.yml'
  pull_request:
    branches: [main]
    paths:
      - 'orbit360-platform/core/aseguradoras-op2-*.js'
      - 'orbit360-platform/core/insurer-directory-import-v1202*.js'
      - 'orbit360-platform/modules/aseguradoras*.js'
      - 'orbit360-platform/data/academia-v1217-aseguradoras-op2.js'
      - 'tools/orbit360-validar-aseguradoras-op2*.mjs'
      - '.github/workflows/orbit360-aseguradoras-op2-smoke.yml'

permissions:
  contents: read
  statuses: write

jobs:
  aseguradoras-static-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Execute contracts and preserve evidence
        id: contracts
        shell: bash
        run: |
          mkdir -p orbit360-op2-contract-evidence
          exit_code=0
          node --check tools/orbit360-validar-aseguradoras-op2-v1220.mjs || exit_code=1
          node --check tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs || exit_code=1
          for group in access import copy quarantine alias ux migration academy technical; do
            set +e
            node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group "$group" > "orbit360-op2-contract-evidence/${group}.json"
            code=$?
            set -e
            cat "orbit360-op2-contract-evidence/${group}.json"
            if [ "$code" -ne 0 ]; then exit_code=1; fi
          done
          validators=(
            "tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs orbit360-platform"
            "tools/orbit360-validar-cuarentena-hojas-aseguradoras-v1219.mjs ."
            "tools/orbit360-validar-alias-directorios-aseguradoras-v1219.mjs ."
            "tools/orbit360-validar-copy-importador-aseguradoras-v1220.mjs ."
            "tools/orbit360-validar-smoke-op2-plataformas-focused-v1218.mjs ."
            "tools/orbit360-validar-resume-evidence-op1-op2-v1218.mjs ."
            "tools/orbit360-validar-backend-lab-contrato.mjs"
          )
          index=0
          for command in "${validators[@]}"; do
            set +e
            bash -lc "node $command" > "orbit360-op2-contract-evidence/extra-${index}.json" 2>&1
            code=$?
            set -e
            cat "orbit360-op2-contract-evidence/extra-${index}.json"
            if [ "$code" -ne 0 ]; then exit_code=1; fi
            index=$((index + 1))
          done
          grep -q 'dir-plataformas-desktop' tools/orbit360-smoke-visual-aseguradoras-op2.mjs || exit_code=1
          grep -q 'op-plataformas-tablet' tools/orbit360-smoke-visual-aseguradoras-op2.mjs || exit_code=1
          grep -q 'ase-plataformas-mobile' tools/orbit360-smoke-visual-aseguradoras-op2.mjs || exit_code=1
          printf '{"schemaVersion":"orbit360-op2-static-contract-v1","head":"%s","ok":%s,"containsSecrets":false}\n' "$GITHUB_SHA" "$([ "$exit_code" -eq 0 ] && echo true || echo false)" > orbit360-op2-contract-evidence/summary.json
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload static contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-op2-static-contract-${{ github.run_id }}
          path: orbit360-op2-contract-evidence
          if-no-files-found: error
          retention-days: 7

      - name: Enforce contracts
        if: steps.contracts.outputs.exit_code != '0'
        run: exit 1

      - name: Publish success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -f state=success -f context='orbit360/aseguradoras-op2-v1221' -f description='Contratos OP2 v1.221 aprobados' -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Publish failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -f state=failure -f context='orbit360/aseguradoras-op2-v1221' -f description='Revisar evidencia OP2 v1.221' -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
