name: Orbit 360 Directorios Reales Aseguradoras LAB

on:
  workflow_dispatch:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - '.github/workflows/orbit360-aseguradoras-op2-smoke.yml'
      - 'orbit360-platform/core/aseguradoras-op2-*.js'
      - 'orbit360-platform/core/insurer-directory-import-v1202*.js'
      - 'orbit360-platform/core/importa-write-p0.js'
      - 'orbit360-platform/core/insurer-secure-target-bridge-v20260720.js'
      - 'orbit360-platform/core/aseguradoras-credentials-provider-lab-v20260720.js'
      - 'orbit360-platform/modules/aseguradoras*.js'
      - 'orbit360-platform/data/academia-v1217-aseguradoras-op2.js'
      - 'tools/orbit360-aseguradoras-import-readiness-v20260720.mjs'
      - 'tools/orbit360-validar-aseguradoras-op2*.mjs'
      - 'tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs'
      - 'tools/orbit360-protected-baseline.mjs'
      - 'tools/orbit360-gate-contract-*.json'

permissions:
  contents: read
  statuses: write
  issues: write

concurrency:
  group: orbit360-real-insurer-directories-lab
  cancel-in-progress: true

env:
  ORBIT360_GATE_ID: block1-real-insurer-directories-lab-v20260720
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  FIREBASE_PROJECT_ID: ays-orbit-360-lab
  ORBIT360_HOSTING_CHANNEL: orbit360-ays-lab
  ORBIT360_EXPECTED_RUNTIME: 20260717-2
  ORBIT360_LAB_LOGIN_EMAIL: orbit.lab@demo.com

jobs:
  real-directories-readiness:
    name: Contrato único · preview LAB · importador real
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ORBIT360_LAB_LOGIN_PASSWORD: ${{ secrets.ORBIT360_LAB_LOGIN_PASSWORD }}
      SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout rama autorizada
        uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 1

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Preflight vinculante del gate único
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "$ORBIT360_BRANCH"
          node --check tools/orbit360-validar-gate-contracts-v20260717.mjs
          mkdir -p orbit360-real-directories-evidence
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID" \
            > orbit360-real-directories-evidence/preflight.json
          cp orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json \
            orbit360-real-directories-evidence/preflight-sanitizado.json

      - name: Validar contratos estáticos vigentes
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/orbit360-aseguradoras-import-readiness-v20260720.mjs
          code=0
          for group in access import copy quarantine alias ux migration academy technical; do
            node tools/orbit360-validar-aseguradoras-op2-group-v1220.mjs orbit360-platform --group "$group" \
              > "orbit360-real-directories-evidence/${group}.json" || code=1
          done
          node tools/orbit360-validar-politica-recursos-aseguradoras-v1218.mjs orbit360-platform \
            > orbit360-real-directories-evidence/policy.json || code=1
          node tools/orbit360-validar-cuarentena-hojas-aseguradoras-v1219.mjs . \
            > orbit360-real-directories-evidence/quarantine.json || code=1
          node tools/orbit360-validar-alias-directorios-aseguradoras-v1219.mjs . \
            > orbit360-real-directories-evidence/identity.json || code=1
          node tools/orbit360-validar-copy-importador-aseguradoras-v1220.mjs . \
            > orbit360-real-directories-evidence/copy.json || code=1
          test "$code" = 0

      - name: Resolver credenciales exclusivas de LAB
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          test -n "$SERVICE_ACCOUNT"
          test ${#ORBIT360_LAB_LOGIN_PASSWORD} -ge 12
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          PROJECT_ID="$(jq -r '.project_id // empty' "$KEY_FILE")"
          test "$PROJECT_ID" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar dependencias del gate
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save firebase-admin@13 playwright@1.52.0

      - name: Inventario LAB previo de solo lectura
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-verify-lab-data-counts.mjs
          node tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs

      - name: Sellar build exacto del preview
        shell: bash
        run: |
          set -euo pipefail
          printf '{"schemaVersion":"orbit360-runtime-build-v2","commit":"%s","run":"%s","branch":"%s","gateId":"%s","runtimeVersion":"%s"}\n' \
            "$GITHUB_SHA" "$GITHUB_RUN_ID" "$GITHUB_REF_NAME" "$ORBIT360_GATE_ID" "$ORBIT360_EXPECTED_RUNTIME" \
            > orbit360-platform/runtime-build.json

      - name: Publicar y verificar preview LAB
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_JSON="${RUNNER_TEMP}/firebase-lab-preview.json"
          npx --yes firebase-tools@latest hosting:channel:deploy "$ORBIT360_HOSTING_CHANNEL" \
            --project "$FIREBASE_PROJECT_ID" \
            --expires 30d \
            --non-interactive \
            --json | tee "$DEPLOY_JSON"
          URL="$(jq -r '.. | strings | select(test("^https://[^/]*--orbit360-ays-lab[^/]*\\.(web\\.app|firebaseapp\\.com)$"))' "$DEPLOY_JSON" | head -n 1)"
          test -n "$URL"
          case "$URL" in *--orbit360-ays-lab*) ;; *) exit 48 ;; esac
          BUILD_EXACT=false
          for attempt in $(seq 1 20); do
            BUILD_JSON="$(curl -fsSL --connect-timeout 10 --max-time 20 -H 'Cache-Control: no-cache' "${URL}/runtime-build.json?run=${GITHUB_RUN_ID}&attempt=${attempt}" 2>/dev/null || true)"
            DEPLOYED_SHA="$(printf '%s' "$BUILD_JSON" | jq -r '.commit // empty' 2>/dev/null || true)"
            DEPLOYED_GATE="$(printf '%s' "$BUILD_JSON" | jq -r '.gateId // empty' 2>/dev/null || true)"
            if [ "$DEPLOYED_SHA" = "$GITHUB_SHA" ] && [ "$DEPLOYED_GATE" = "$ORBIT360_GATE_ID" ]; then
              BUILD_EXACT=true
              break
            fi
            sleep 2
          done
          test "$BUILD_EXACT" = true
          jq -n \
            --arg url "$URL" \
            --arg commit "$GITHUB_SHA" \
            --arg gateId "$ORBIT360_GATE_ID" \
            '{schemaVersion:"orbit360-lab-preview-v1",containsPII:false,containsSecrets:false,ok:true,url:$url,commit:$commit,gateId:$gateId}' \
            > orbit360-real-directories-evidence/deploy-sanitizado.json
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "ORBIT360_PREVIEW_URL=$URL" >> "$GITHUB_ENV"
          echo "ORBIT360_EXPECTED_COMMIT=$GITHUB_SHA" >> "$GITHUB_ENV"

      - name: Instalar Chromium
        shell: bash
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium

      - name: Readiness real del importador desde Orbit
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-aseguradoras-import-readiness-v20260720.mjs

      - name: Consolidar evidencia sanitizada
        if: always()
        shell: bash
        run: |
          mkdir -p orbit360-real-directories-evidence
          cp orbit360-platform/lab-data-counts.json orbit360-real-directories-evidence/lab-data-counts.json 2>/dev/null || true
          cp orbit360-platform/lab-aseguradoras-knowledge-inventory.json orbit360-real-directories-evidence/lab-aseguradoras-knowledge-inventory.json 2>/dev/null || true
          cp orbit360-platform/runtime-build.json orbit360-real-directories-evidence/runtime-build.json 2>/dev/null || true
          cp orbit360-platform/runtime-gate-real-insurer-directories-v20260720/resultado-sanitizado.json \
            orbit360-real-directories-evidence/readiness-sanitizado.json 2>/dev/null || true

      - name: Subir evidencia
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-real-insurer-directories-${{ github.run_id }}
          path: orbit360-real-directories-evidence
          if-no-files-found: error
          retention-days: 7

      - name: Publicar resultado sanitizado en PR 5
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RESULT="orbit360-real-directories-evidence/readiness-sanitizado.json"
          COUNTS="orbit360-real-directories-evidence/lab-data-counts.json"
          OK="$(test -f "$RESULT" && jq -r '.ok // false' "$RESULT" || echo false)"
          CLIENTS="$(test -f "$COUNTS" && jq -r '.counts.clientes // 0' "$COUNTS" || echo 0)"
          INSURERS="$(test -f "$COUNTS" && jq -r '.counts.aseguradoras // 0' "$COUNTS" || echo 0)"
          ADVISORS="$(test -f "$COUNTS" && jq -r '.counts.asesores // 0' "$COUNTS" || echo 0)"
          URL='${{ steps.deploy.outputs.url }}'
          ERROR="$(test -f "$RESULT" && jq -r '.error // ""' "$RESULT" | cut -c1-240 || echo RESULTADO_NO_GENERADO)"
          printf -v BODY '## Readiness directorios reales Aseguradoras\n\n- Gate: `%s`\n- Commit: `%s`\n- Run: `%s`\n- Preview LAB: %s\n- Readiness: **%s**\n- Conteos previos: clientes **%s**, aseguradoras **%s**, asesores **%s**\n- Error sanitizado: `%s`\n- Siguiente acción: cargar Guatemala una sola vez desde Orbit; Colombia permanece en espera.\n- Alcance: LAB únicamente; sin producción, main, merge ni escritura de directorios.' \
            "$ORBIT360_GATE_ID" "$GITHUB_SHA" "$GITHUB_RUN_ID" "${URL:-no disponible}" "$OK" "$CLIENTS" "$INSURERS" "$ADVISORS" "${ERROR:-ninguno}"
          gh api "repos/${GITHUB_REPOSITORY}/issues/5/comments" -f body="$BODY" >/dev/null

      - name: Publicar estado del gate
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          state=success
          description='Preview LAB e importador listos para GT'
          if [ "${{ job.status }}" != success ]; then state=failure; description='Revisar evidencia del gate único'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context='orbit360/aseguradoras-real-directories-v20260720' \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
