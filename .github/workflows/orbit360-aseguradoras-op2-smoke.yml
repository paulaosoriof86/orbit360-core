name: Orbit 360 Aseguradoras OP2 Smoke

on:
  push:
    branches:
      - ays/backend-tenant-lab-v99-20260703
    paths:
      - 'orbit360-platform/core/aseguradoras-op2-role-visibility.js'
      - 'orbit360-platform/core/aseguradoras-op2-source-guard.js'
      - 'orbit360-platform/core/insurer-directory-import-v1202.js'
      - 'orbit360-platform/core/insurer-directory-import-v1202-security.js'
      - 'orbit360-platform/modules/aseguradoras-v1197-ux-bridge.js'
      - 'orbit360-platform/modules/aseguradoras-v1202-resources-bridge.js'
      - 'orbit360-platform/modules/aseguradoras-op2-closure-bridge.js'
      - 'orbit360-platform/data/academia-v1217-aseguradoras-op2.js'
      - 'orbit360-platform/styles/aseguradoras-op2-v1217.css'
      - 'tools/orbit360-validar-aseguradoras-op2.mjs'
      - 'tools/orbit360-smoke-visual-aseguradoras-op2.mjs'
      - 'tools/orbit360-run-operacion-op1-op2-visual.ps1'
      - '.github/workflows/orbit360-aseguradoras-op2-smoke.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'orbit360-platform/core/aseguradoras-op2-role-visibility.js'
      - 'orbit360-platform/core/aseguradoras-op2-source-guard.js'
      - 'orbit360-platform/core/insurer-directory-import-v1202.js'
      - 'orbit360-platform/core/insurer-directory-import-v1202-security.js'
      - 'orbit360-platform/modules/aseguradoras-v1197-ux-bridge.js'
      - 'orbit360-platform/modules/aseguradoras-v1202-resources-bridge.js'
      - 'orbit360-platform/modules/aseguradoras-op2-closure-bridge.js'
      - 'orbit360-platform/data/academia-v1217-aseguradoras-op2.js'
      - 'orbit360-platform/styles/aseguradoras-op2-v1217.css'
      - 'tools/orbit360-validar-aseguradoras-op2.mjs'
      - 'tools/orbit360-smoke-visual-aseguradoras-op2.mjs'
      - 'tools/orbit360-run-operacion-op1-op2-visual.ps1'
      - '.github/workflows/orbit360-aseguradoras-op2-smoke.yml'

permissions:
  contents: read

jobs:
  aseguradoras-static-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JavaScript syntax
        run: |
          node --check tools/orbit360-validar-aseguradoras-op2.mjs
          node --check tools/orbit360-smoke-visual-aseguradoras-op2.mjs
          node --check orbit360-platform/core/aseguradoras-op2-role-visibility.js
          node --check orbit360-platform/core/aseguradoras-op2-source-guard.js
          node --check orbit360-platform/modules/aseguradoras-op2-closure-bridge.js
          node --check orbit360-platform/data/academia-v1217-aseguradoras-op2.js

      - name: Validate Aseguradoras OP-2
        run: node tools/orbit360-validar-aseguradoras-op2.mjs orbit360-platform

      - name: Validate protected backend
        run: node tools/orbit360-validar-backend-lab-contrato.mjs

      - name: Guard roles without privilege expansion
        run: |
          grep -Fq "ensure('Operativo', ['aseguradoras'])" orbit360-platform/core/aseguradoras-op2-role-visibility.js
          grep -Fq "ensure('Asesor', ['aseguradoras'])" orbit360-platform/core/aseguradoras-op2-role-visibility.js
          grep -Fq 'sensitiveAccessUnchanged: true' orbit360-platform/core/aseguradoras-op2-role-visibility.js
          grep -Fq 'insurerWritePermissionUnchanged: true' orbit360-platform/core/aseguradoras-op2-role-visibility.js

      - name: Guard probable duplicates
        run: |
          grep -q 'duplicado_probable_dentro_del_archivo' orbit360-platform/core/aseguradoras-op2-source-guard.js
          grep -q 'duplicado_probable_con_directorio' orbit360-platform/core/aseguradoras-op2-source-guard.js
          grep -q 'distance(x, y) <= 1' orbit360-platform/core/aseguradoras-op2-source-guard.js

      - name: Guard sensitive resources
        run: |
          grep -q 'function sanitizePortal' orbit360-platform/modules/aseguradoras-op2-closure-bridge.js
          grep -q 'function sanitizeAccount' orbit360-platform/modules/aseguradoras-op2-closure-bridge.js
          grep -q 'delete out.usuario' orbit360-platform/modules/aseguradoras-op2-closure-bridge.js
          grep -q 'delete out.numero' orbit360-platform/modules/aseguradoras-op2-closure-bridge.js
          grep -q 'rawPersisted:false' orbit360-platform/modules/aseguradoras-op2-closure-bridge.js
          if grep -q "audit('guardar_ficha_aseguradora'" orbit360-platform/modules/aseguradoras-op2-closure-bridge.js; then
            echo 'False save audit detected'
            exit 1
          fi

      - name: Guard Academy update without duplicate courses
        run: |
          grep -q 'cur_dir_aseg_dir_v1202' orbit360-platform/data/academia-v1217-aseguradoras-op2.js
          grep -q 'cur_dir_aseg_op_v1202' orbit360-platform/data/academia-v1217-aseguradoras-op2.js
          grep -q 'cur_dir_aseg_asesor_v1202' orbit360-platform/data/academia-v1217-aseguradoras-op2.js
          if grep -q "Orbit.store.insert('cursos'" orbit360-platform/data/academia-v1217-aseguradoras-op2.js; then
            echo 'Duplicate course insertion detected'
            exit 1
          fi

      - name: Guard visual matrix and common runner
        run: |
          grep -q 'dir-directorio-desktop' tools/orbit360-smoke-visual-aseguradoras-op2.mjs
          grep -q 'op-directorio-tablet' tools/orbit360-smoke-visual-aseguradoras-op2.mjs
          grep -q 'ase-directorio-mobile' tools/orbit360-smoke-visual-aseguradoras-op2.mjs
          grep -Fq -- '--port 5000' tools/orbit360-run-operacion-op1-op2-visual.ps1
          grep -q 'orbit360-smoke-visual-crm-op1.mjs' tools/orbit360-run-operacion-op1-op2-visual.ps1
          grep -q 'orbit360-smoke-visual-aseguradoras-op2.mjs' tools/orbit360-run-operacion-op1-op2-visual.ps1
