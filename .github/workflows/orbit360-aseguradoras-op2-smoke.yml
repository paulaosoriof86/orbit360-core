name: Orbit 360 Directorios Reales Aseguradoras LAB

"on":
  workflow_dispatch:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths:
      - '.github/workflows/orbit360-aseguradoras-op2-smoke.yml'
      - 'functions/**'
      - 'orbit360-platform/core/aseguradoras-op2-*.js'
      - 'orbit360-platform/core/aseguradoras-bank-accounts-provider-lab-v20260721.js'
      - 'orbit360-platform/core/backend-lab-init.js'
      - 'orbit360-platform/core/insurer-directory-import-v1202*.js'
      - 'orbit360-platform/data/academia-v1217-aseguradoras-op2.js'
      - 'tools/orbit360-migrar-cuentas-aseguradoras-vault-lab-v20260721-v2.mjs'
      - 'tools/orbit360-validar-proveedor-cuentas-aseguradoras-lab-v20260721.mjs'
      - 'tools/orbit360-aseguradoras-import-readiness-v20260720.mjs'
      - 'tools/orbit360-gate-contract-*.json'

permissions:
  contents: read
  statuses: write
  issues: write

concurrency:
  group: orbit360-real-insurer-directories-lab
  cancel-in-progress: true

env:
  ORBIT360_GATE_ID: block1-real-insurer-directories-lab-v20260720
  ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
  FIREBASE_PROJECT_ID: ays-orbit-360-lab
  ORBIT360_HOSTING_CHANNEL: orbit360-ays-lab
  ORBIT360_EXPECTED_RUNTIME: 20260721-1
  ORBIT360_LAB_LOGIN_EMAIL: orbit.lab@demo.com
  ORBIT360_EXPECTED_BANK_ACCOUNTS: 91
  ORBIT360_FIREBASE_TOOLS_VERSION: 15.24.0

jobs:
  gate:
    name: Gate único · proveedor bancario · preview · importador
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ORBIT360_LAB_LOGIN_PASSWORD: ${{ secrets.ORBIT360_LAB_LOGIN_PASSWORD }}
      SA_ORBIT360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT360_LAB }}
      SA_ORBIT_360_LAB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORBIT_360_LAB }}
      SA_DEFAULT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout SHA exacto
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Preparar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Preflight vinculante antes de credenciales
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF_NAME" = "$ORBIT360_BRANCH"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          mkdir -p orbit360-real-directories-evidence
          node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID" > orbit360-real-directories-evidence/preflight.json
          cp orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json orbit360-real-directories-evidence/preflight-sanitizado.json

      - name: Resolver credenciales exclusivas de LAB
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_ACCOUNT="${SA_ORBIT360_LAB:-}"
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_ORBIT_360_LAB:-}"; fi
          if [ -z "$SERVICE_ACCOUNT" ]; then SERVICE_ACCOUNT="${SA_DEFAULT:-}"; fi
          test -n "$SERVICE_ACCOUNT"
          test ${#ORBIT360_LAB_LOGIN_PASSWORD} -ge 12
          KEY_FILE="${RUNNER_TEMP}/orbit360-firebase-lab.json"
          printf '%s' "$SERVICE_ACCOUNT" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          test "$(jq -r '.project_id // empty' "$KEY_FILE")" = "$FIREBASE_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Instalar toolchain reproducible y validar exports
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save firebase-admin@13 google-auth-library@9 playwright@1.52.0 xlsx@0.18.5 firebase-tools@"$ORBIT360_FIREBASE_TOOLS_VERSION" @google-cloud/secret-manager@6.2.0
          npm --prefix functions install --no-audit --no-fund
          npm --prefix functions run check
          node <<'NODE'
          const fs = require('fs');
          const version = JSON.parse(fs.readFileSync('node_modules/firebase-tools/package.json','utf8')).version;
          if (version !== process.env.ORBIT360_FIREBASE_TOOLS_VERSION) throw new Error(`FIREBASE_TOOLS_VERSION_${version}`);
          const exportsMap = require('./functions/bootstrap');
          const names = ['orbit360ImportInsurerBankAccounts','orbit360BankAccountStatus','orbit360RevealInsurerBankAccount','orbit360CopyInsurerBankAccount'];
          const missing = names.filter((name) => typeof exportsMap[name] !== 'function');
          if (missing.length) throw new Error(`BANK_FUNCTION_EXPORTS_MISSING:${missing.join(',')}`);
          console.log(JSON.stringify({ok:true,node:process.version,firebaseTools:version,exports:names.length,containsSecrets:false}));
          NODE

      - name: Desplegar proveedor bancario únicamente en LAB
        shell: bash
        run: |
          set -euo pipefail
          RAW="${RUNNER_TEMP}/bank-functions-deploy.log"
          set +e
          npx firebase deploy --only functions:orbit360ImportInsurerBankAccounts,functions:orbit360BankAccountStatus,functions:orbit360RevealInsurerBankAccount,functions:orbit360CopyInsurerBankAccount --project "$FIREBASE_PROJECT_ID" --non-interactive --json >"$RAW" 2>&1
          CODE=$?
          set -e
          tail -n 80 "$RAW" | sed -E 's/[[:alnum:]_.%+-]+@[[:alnum:].-]+\.[A-Za-z]{2,}/<redacted-email>/g; s/[0-9]{8,}/<redacted-id>/g' > orbit360-real-directories-evidence/bank-functions-deploy-tail-sanitizado.txt
          jq -n --argjson ok "$([ "$CODE" = 0 ] && echo true || echo false)" --argjson exitCode "$CODE" --arg node "$(node --version)" --arg firebaseTools "$ORBIT360_FIREBASE_TOOLS_VERSION" '{schemaVersion:"orbit360-bank-functions-deploy-v2",ok:$ok,exitCode:$exitCode,node:$node,firebaseTools:$firebaseTools,containsPII:false,containsSecrets:false}' > orbit360-real-directories-evidence/bank-functions-deploy-sanitizado.json
          cat orbit360-real-directories-evidence/bank-functions-deploy-sanitizado.json
          cat orbit360-real-directories-evidence/bank-functions-deploy-tail-sanitizado.txt
          test "$CODE" = 0

      - name: Migrar cuentas heredadas y verificar cero texto plano
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-migrar-cuentas-aseguradoras-vault-lab-v20260721-v2.mjs
          cp orbit360-platform/lab-bank-account-migration.json orbit360-real-directories-evidence/lab-bank-account-migration.json
          test "$(jq -r '.ok // false' orbit360-platform/lab-bank-account-migration.json)" = true
          test "$(jq -r '.after.rawCount // -1' orbit360-platform/lab-bank-account-migration.json)" = 0
          test "$(jq -r '.after.refCount // 0' orbit360-platform/lab-bank-account-migration.json)" -ge "$ORBIT360_EXPECTED_BANK_ACCOUNTS"

      - name: Preservar conteos e inventario
        shell: bash
        run: |
          set -euo pipefail
          node tools/orbit360-verify-lab-data-counts.mjs
          node tools/orbit360-inventariar-aseguradoras-knowledge-lab-v20260716.mjs
          cp orbit360-platform/lab-data-counts.json orbit360-real-directories-evidence/lab-data-counts.json
          cp orbit360-platform/lab-aseguradoras-knowledge-inventory.json orbit360-real-directories-evidence/lab-aseguradoras-knowledge-inventory.json
          test "$(jq -r '.counts.clientes' orbit360-platform/lab-data-counts.json)" = 414
          test "$(jq -r '.counts.aseguradoras' orbit360-platform/lab-data-counts.json)" = 26
          test "$(jq -r '.counts.asesores' orbit360-platform/lab-data-counts.json)" = 7

      - name: Publicar preview LAB exacto
        id: preview
        shell: bash
        run: |
          set -euo pipefail
          printf '{"schemaVersion":"orbit360-runtime-build-v2","commit":"%s","run":"%s","branch":"%s","gateId":"%s","runtimeVersion":"%s"}\n' "$GITHUB_SHA" "$GITHUB_RUN_ID" "$ORBIT360_BRANCH" "$ORBIT360_GATE_ID" "$ORBIT360_EXPECTED_RUNTIME" > orbit360-platform/runtime-build.json
          OUT="${RUNNER_TEMP}/preview.json"
          npx firebase hosting:channel:deploy "$ORBIT360_HOSTING_CHANNEL" --project "$FIREBASE_PROJECT_ID" --expires 30d --non-interactive --json | tee "$OUT"
          URL="$(jq -r '.. | strings | select(test("^https://[^/]*--orbit360-ays-lab[^/]*\\.(web\\.app|firebaseapp\\.com)$"))' "$OUT" | head -n1)"
          test -n "$URL"
          for attempt in $(seq 1 20); do
            BUILD="$(curl -fsSL -H 'Cache-Control: no-cache' "${URL}/runtime-build.json?run=${GITHUB_RUN_ID}&attempt=${attempt}" 2>/dev/null || true)"
            if [ "$(printf '%s' "$BUILD" | jq -r '.commit // empty' 2>/dev/null)" = "$GITHUB_SHA" ]; then break; fi
            sleep 2
          done
          test "$(printf '%s' "$BUILD" | jq -r '.commit // empty')" = "$GITHUB_SHA"
          echo "ORBIT360_PREVIEW_URL=$URL" >> "$GITHUB_ENV"
          echo "ORBIT360_EXPECTED_COMMIT=$GITHUB_SHA" >> "$GITHUB_ENV"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Validar navegador y proveedor protegido
        shell: bash
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium
          node tools/orbit360-aseguradoras-import-readiness-v20260720.mjs
          node tools/orbit360-validar-proveedor-cuentas-aseguradoras-lab-v20260721.mjs
          cp orbit360-platform/runtime-gate-real-insurer-directories-v20260720/resultado-sanitizado.json orbit360-real-directories-evidence/readiness-sanitizado.json
          cp orbit360-platform/runtime-gate-real-insurer-directories-v20260720/bank-provider-sanitizado.json orbit360-real-directories-evidence/bank-provider-sanitizado.json
          test "$(jq -r '.ok // false' orbit360-real-directories-evidence/readiness-sanitizado.json)" = true
          test "$(jq -r '.ok // false' orbit360-real-directories-evidence/bank-provider-sanitizado.json)" = true

      - name: Subir evidencia sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orbit360-real-insurer-directories-${{ github.run_id }}-${{ github.run_attempt }}
          path: orbit360-real-directories-evidence
          if-no-files-found: error
          retention-days: 7

      - name: Publicar estado del gate
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          state=success
          description='Cuentas protegidas e importador listos para GT'
          if [ "${{ job.status }}" != success ]; then state=failure; description='Revisar evidencia del gate único'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -f state="$state" -f context='orbit360/aseguradoras-real-directories-v20260720' -f description="$description" -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
