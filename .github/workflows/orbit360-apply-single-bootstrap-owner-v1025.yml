name: Orbit 360 Apply Single Bootstrap Owner 1.0.25

on:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths: [".github/workflows/orbit360-apply-single-bootstrap-owner-v1025.yml"]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 1

      - name: Retirar cargadores auxiliares pre-Router
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');

          const adapterPath = 'orbit360-platform/modules/aseguradoras-v1197-ux-bridge.js';
          let adapter = fs.readFileSync(adapterPath, 'utf8');
          adapter = adapter.replace("  const TENANT_CONFIG_SRC = 'data/tenant-alianzas-soluciones-insurers-p10.js?v=20260716-2';\n", '');
          adapter = adapter.replace(/\n  function loadScriptOnce\(src, marker, ready\) \{[\s\S]*?\n  \}\n\n  function loadTenantConfig/, '\n  function loadTenantConfig');
          const oldTenantLoader = /  function loadTenantConfig\(\) \{[\s\S]*?\n  \}\n\n  function loadCatalog/;
          if (!oldTenantLoader.test(adapter)) throw new Error('TENANT_LOADER_BLOCK_NOT_FOUND');
          adapter = adapter.replace(oldTenantLoader, `  function tenantConfigReady() {
            return Array.isArray(window.OrbitTenantInsurerConfigsP10) && window.OrbitTenantInsurerConfigsP10.some(item => item && item.tenantId === 'alianzas-soluciones');
          }
          function loadTenantConfig() {
            if (tenantConfigReady()) return Promise.resolve(window.OrbitTenantInsurerConfigsP10 || []);
            if (tenantConfigPromise) return tenantConfigPromise;
            tenantConfigPromise = new Promise(resolve => {
              const started = Date.now();
              (function waitForRouterOwnedTenantConfig() {
                if (tenantConfigReady()) {
                  window.dispatchEvent(new CustomEvent('orbit:aseguradoras:tenant-config-ready'));
                  return resolve(window.OrbitTenantInsurerConfigsP10 || []);
                }
                if (Date.now() - started >= 8000) return resolve([]);
                setTimeout(waitForRouterOwnedTenantConfig, 80);
              })();
            });
            return tenantConfigPromise;
          }

          function loadCatalog`);
          const oldAdapterAutoload = "  loadStyle();\n  loadTenantConfig().then(() => window.dispatchEvent(new CustomEvent('orbit:aseguradoras:tenant-config-ready')));\n  loadCatalog();\n  normalizeAll();";
          if (!adapter.includes(oldAdapterAutoload)) throw new Error('ADAPTER_AUTOLOAD_BLOCK_NOT_FOUND');
          adapter = adapter.replace(oldAdapterAutoload, "  loadStyle();\n  normalizeAll();");
          const oldAdapterRender = "  mod.render = function (host) {\n    normalizeAll();";
          if (!adapter.includes(oldAdapterRender)) throw new Error('ADAPTER_RENDER_BLOCK_NOT_FOUND');
          adapter = adapter.replace(oldAdapterRender, "  mod.render = function (host) {\n    loadTenantConfig();\n    loadCatalog();\n    normalizeAll();");
          adapter = adapter.replace("  mod.__candidateContractAdapter = true;", "  mod.__runtimeOwnershipV20260718 = { tenantConfigOwner: 'core/router.js', phase: 'post-router-render', autoloadsBeforeRouter: false };\n  mod.__candidateContractAdapter = true;");
          if (adapter.includes('TENANT_CONFIG_SRC') || adapter.includes('data-asg-tenant-config')) throw new Error('ADAPTER_DUPLICATE_OWNER_REMAINS');
          fs.writeFileSync(adapterPath, adapter, 'utf8');

          const resourcesPath = 'orbit360-platform/modules/aseguradoras-v1202-resources-bridge.js';
          let resources = fs.readFileSync(resourcesPath, 'utf8');
          const oldResourcesAutoload = "  loadAysRuntime();\n  const originalRender = mod.render.bind(mod);";
          if (!resources.includes(oldResourcesAutoload)) throw new Error('RESOURCES_AUTOLOAD_BLOCK_NOT_FOUND');
          resources = resources.replace(oldResourcesAutoload, "  const originalRender = mod.render.bind(mod);");
          const oldResourcesRender = "  mod.render = function (host) {\n    const out = originalRender(host);";
          if (!resources.includes(oldResourcesRender)) throw new Error('RESOURCES_RENDER_BLOCK_NOT_FOUND');
          resources = resources.replace(oldResourcesRender, "  mod.render = function (host) {\n    loadAysRuntime();\n    const out = originalRender(host);");
          resources = resources.replace("  mod.__resourcesV1202 = { originalRender, loadAysRuntime };", "  mod.__resourcesRuntimeOwnershipV20260718 = { phase: 'post-router-render', autoloadsBeforeRouter: false };\n  mod.__resourcesV1202 = { originalRender, loadAysRuntime };");
          fs.writeFileSync(resourcesPath, resources, 'utf8');

          const runnerPath = 'tools/orbit360-gate-runtime-crm-v20260716.mjs';
          let runner = fs.readFileSync(runnerPath, 'utf8');
          runner = runner.replace("schemaVersion:'orbit360-runtime-gate-joint-v24-router-sequential'", "schemaVersion:'orbit360-runtime-gate-joint-v25-single-bootstrap-owner'");
          runner = runner.replace("contractVersion:'1.0.24'", "contractVersion:'1.0.25'");
          if (!runner.includes("contractVersion:'1.0.25'")) throw new Error('RUNNER_VERSION_NOT_UPDATED');
          fs.writeFileSync(runnerPath, runner, 'utf8');

          const registryPath = 'tools/orbit360-gate-contract-registry-v20260717.json';
          const registry = JSON.parse(fs.readFileSync(registryPath, 'utf8'));
          const gate = registry.gates.find(item => item.gateId === 'block1-client360-insurers-lab-v20260717');
          if (!gate) throw new Error('GATE_NOT_FOUND');
          gate.contractVersion = '1.0.25';
          gate.diagnosticRevision = 'single-router-bootstrap-post-render-module-loaders-v1';
          gate.status = 'ACTIVE_FUNCTIONAL_FIX';
          gate.diagnosticRule = 'Router is the only owner allowed to load tenant insurer bootstrap contracts. Aseguradoras adapters may observe tenant readiness and may load module-local knowledge resources only from mod.render, after Router contracts have completed.';
          gate.executionBudget.evidence = {
            sourceContractVersion: '1.0.24',
            passedStages: ['canonical_auth_ui_ready','canonical_owner_handoff_ready','canonical_pwa_controller_ready','canonical_runtime_scripts_syntax_ready','canonical_runtime_contract_loader_started','canonical_client_projection_ready'],
            failedStage: 'canonical_tenant_insurer_core_ready',
            tenantActiveConfigRequestedBeforeRouterContracts: true,
            tenantCoreRequestedSignal: true,
            tenantCoreHttpStatus: 200,
            tenantCoreRequestFinished: true,
            tenantCoreStaticSyntax: true,
            tenantCoreBrowserParsed: false,
            tenantCoreLoadedSignal: false,
            pageErrors: 0,
            runtimeExceptions: 0,
            mechanismFinding: 'Two Aseguradoras bridges executed module-local loaders at file evaluation time. The active tenant config and protected knowledge runtime entered the browser ordered script queue before the Router-owned core contract, creating competing bootstrap ownership.'
          };
          gate.executionBudget.interpretation = 'Version 1.0.25 preserves Router 1.0.24 and removes only pre-Router autoloads from Aseguradoras bridges. Tenant config is observed, never injected by the adapter. Knowledge and secure-resource runtimes start lazily from mod.render.';
          gate.executionBudget.exhaustionPolicy = 'Execute 1.0.25 once after GO_GATE_CONTRACT. If canonical_tenant_insurer_core_ready fails again, stop retries and inspect all dynamic script requests that occur before Router start; do not extend budgets or touch Store, Auth, rules, data or renderers.';
          gate.executionBudget.acceptancePolicy = 'Only a sanitized result with ok:true closes M1.';
          gate.reconciliation = {
            date: '2026-07-18',
            classifications: ['FUNCTIONAL_DEFECT'],
            scope: 'Aseguradoras bridge bootstrap ownership only',
            rootCause: 'The Router was declared canonical owner, but aseguradoras-v1197-ux-bridge and aseguradoras-v1202-resources-bridge still loaded tenant/runtime scripts at module evaluation time. Those auxiliary async=false scripts entered the same ordered queue before Router bootstrap completed.',
            corrections: ['remove tenant config script injection from the v1197 adapter','make v1197 observe Router-owned tenant config','move knowledge catalog loading to Aseguradoras render','move protected resources runtime loading to Aseguradoras render','register both bridges in gate contracts','preserve Router, Store, Auth, rules, data and canonical renderers','run binding preflight first and the official gate once'],
            openEvidence: ['1.0.25 sanitized ok:true across Dirección desktop, Operativo tablet and Asesor móvil'],
            preserved: ['Orbit.store API','core/auth.js','core/router.js 1.0.24','Firestore rules','Cliente 360 renderer','Aseguradoras renderer','414 clientes','26 aseguradoras','7 asesores']
          };

          for (const path of [adapterPath, resourcesPath]) {
            if (!gate.requiredFiles.includes(path)) gate.requiredFiles.push(path);
            if (!gate.runtimeGraphFiles.includes(path)) gate.runtimeGraphFiles.push(path);
          }
          const ownerEntries = [
            { id: 'insurersAdapterRuntime', path: adapterPath, requiredTokens: ["function tenantConfigReady()", "waitForRouterOwnedTenantConfig", "tenantConfigOwner: 'core/router.js'", "phase: 'post-router-render'", "autoloadsBeforeRouter: false", "loadTenantConfig();", "loadCatalog();"] },
            { id: 'insurersResourcesRuntime', path: resourcesPath, requiredTokens: ["loadAysRuntime();", "phase: 'post-router-render'", "autoloadsBeforeRouter: false", "mod.__resourcesRuntimeOwnershipV20260718"] }
          ];
          for (const entry of ownerEntries) {
            const existing = registry.canonicalOwners.find(item => item.id === entry.id);
            if (existing) Object.assign(existing, entry); else registry.canonicalOwners.push(entry);
          }
          gate.runtimeVersionContracts = gate.runtimeVersionContracts.filter(item => ![adapterPath, resourcesPath].includes(item.path));
          gate.runtimeVersionContracts.push(
            { path: adapterPath, requiredTokens: ["function tenantConfigReady()", "waitForRouterOwnedTenantConfig", "tenantConfigOwner: 'core/router.js'", "phase: 'post-router-render'", "autoloadsBeforeRouter: false"] },
            { path: resourcesPath, requiredTokens: ["loadAysRuntime();", "phase: 'post-router-render'", "autoloadsBeforeRouter: false", "mod.__resourcesRuntimeOwnershipV20260718"] }
          );
          for (const token of ['TENANT_CONFIG_SRC','data-asg-tenant-config',"loadTenantConfig().then(() => window.dispatchEvent(new CustomEvent('orbit:aseguradoras:tenant-config-ready')));\n  loadCatalog();","loadAysRuntime();\n  const originalRender"]) {
            if (!gate.forbiddenRuntimeReferences.includes(token)) gate.forbiddenRuntimeReferences.push(token);
          }
          const runnerContract = gate.runtimeVersionContracts.find(item => item.path === runnerPath);
          if (!runnerContract) throw new Error('RUNNER_CONTRACT_NOT_FOUND');
          runnerContract.requiredTokens = runnerContract.requiredTokens.filter(token => token !== "contractVersion:'1.0.24'");
          if (!runnerContract.requiredTokens.includes("contractVersion:'1.0.25'")) runnerContract.requiredTokens.unshift("contractVersion:'1.0.25'");
          fs.writeFileSync(registryPath, JSON.stringify(registry, null, 2) + '\n', 'utf8');

          fs.writeFileSync('orbit360-platform/docs/BLOQUE1-CAUSA-RAIZ-OWNER-DUPLICADO-ASEGURADORAS-1.0.25-20260718.md', [
            '# Bloque 1 · Owner duplicado de Aseguradoras · 1.0.25','',
            'Clasificación: `FUNCTIONAL_DEFECT`.','',
            'La evidencia 1.0.24 mostró que el archivo activo del tenant se solicitó antes de la cola canónica del Router. La auditoría encontró dos autoloads de nivel global: `loadTenantConfig()` en el adaptador v1197 y `loadAysRuntime()` en el bridge de recursos v1202. Ambos añadían scripts a la cola del navegador antes de finalizar el bootstrap propietario.','',
            'Corrección: el adaptador v1197 ya no inyecta la configuración tenant; observa la configuración cargada por el Router. El catálogo de conocimiento y el runtime de recursos se activan únicamente desde `mod.render`, después de concluir los contratos del Router.','',
            'Carril A: renderer, ficha, directorio y UX preservados.','Carril B: ownership de bootstrap corregido; Store, Auth, Router, reglas y backend protegidos sin cambios.','Carril C: 414 clientes, 26 aseguradoras y 7 asesores sin reimportación.','',
            'Claude: `BACKEND_PROTEGIDO_NO_CLAUDE`. Patrón reusable: los adaptadores consumidores no pueden cargar contratos del bootstrap canónico; solo observar readiness y cargar recursos locales después del render propietario.','',
            'Academia: distinguir owner canónico, adaptador consumidor, autoload pre-Router y carga lazy post-render.','',
            'Salida: preflight vinculante y una sola ejecución oficial; cierre exclusivamente con `ok:true`.',''
          ].join('\n'), 'utf8');

          fs.writeFileSync('orbit360-platform/docs/ACADEMIA-BLOQUE1-OWNER-UNICO-ASEGURADORAS-20260718.md', [
            '# Academia Orbit 360 · Owner único de Aseguradoras','',
            'El Router carga los contratos indispensables para iniciar la plataforma. Los bridges de Aseguradoras son consumidores: no deben inyectar configuración tenant ni runtimes protegidos al evaluarse el archivo.','',
            'Una carga de módulo es segura cuando ocurre después del bootstrap, desde `mod.render`, y no compite con la cola canónica. La evidencia debe distinguir request, HTTP 200, parseo, ejecución, owner listo y avance al contrato siguiente.','',
            'Este caso se clasifica como `FUNCTIONAL_DEFECT` de ownership, no como problema de datos, Auth, Store o renderer.',''
          ].join('\n'), 'utf8');
          NODE

          rm -f .github/workflows/orbit360-apply-single-bootstrap-owner-v1025.yml

      - name: Preflight vinculante
        shell: bash
        env:
          ORBIT360_BRANCH: ays/backend-tenant-lab-v99-20260703
        run: |
          set -euo pipefail
          node --check orbit360-platform/modules/aseguradoras-v1197-ux-bridge.js
          node --check orbit360-platform/modules/aseguradoras-v1202-resources-bridge.js
          node --check tools/orbit360-gate-runtime-crm-v20260716.mjs
          node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717
          test "$(jq -r '.status' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = "GO_GATE_CONTRACT"
          test "$(jq -r '.failed' orbit360-platform/runtime-gate-crm-v20260716/preflight-sanitizado.json)" = "0"

      - name: Publicar corte 1.0.25
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(block1): enforce single Router bootstrap owner 1.0.25"
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
