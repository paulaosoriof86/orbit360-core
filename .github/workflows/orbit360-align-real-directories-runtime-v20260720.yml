name: Orbit 360 Align Real Directories Runtime

on:
  push:
    branches: [ays/backend-tenant-lab-v99-20260703]
    paths:
      - '.github/workflows/orbit360-align-real-directories-runtime-v20260720.yml'

permissions:
  contents: write

jobs:
  align:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 0

      - name: Align canonical runtime gate
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const target = '.github/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml';
          let source = fs.readFileSync(target, 'utf8');
          const replacements = [
            ['name: Orbit 360 Clientes y Aseguradoras Runtime Gate 20260717', 'name: Orbit 360 Directorios Reales LAB Prepare 20260720'],
            ['ORBIT360_GATE_ID: block1-client360-insurers-lab-v20260717', 'ORBIT360_GATE_ID: block1-real-insurer-directories-lab-v20260720'],
            ['node tools/orbit360-validar-gate-contracts-v20260717.mjs block1-client360-insurers-lab-v20260717', 'node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"']
          ];
          for (const [before, after] of replacements) {
            const beforeCount = source.split(before).length - 1;
            const afterCount = source.split(after).length - 1;
            if (beforeCount === 1) source = source.replace(before, after);
            else if (beforeCount === 0 && afterCount === 1) continue;
            else throw new Error(`Unexpected workflow state: ${beforeCount}/${afterCount} for ${before}`);
          }
          fs.writeFileSync(target, source);
          fs.unlinkSync('.github/workflows/orbit360-align-real-directories-runtime-v20260720.yml');
          NODE
          git diff --check
          grep -Fq 'ORBIT360_GATE_ID: block1-real-insurer-directories-lab-v20260720' .github/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml
          grep -Fq 'node tools/orbit360-validar-gate-contracts-v20260717.mjs "$ORBIT360_GATE_ID"' .github/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml

      - name: Commit alignment
        shell: bash
        run: |
          git config user.name 'orbit360-gate-bot'
          git config user.email 'orbit360-gate-bot@users.noreply.github.com'
          git add .github/workflows/orbit360-aseguradoras-runtime-gate-v20260716.yml .github/workflows/orbit360-align-real-directories-runtime-v20260720.yml
          git commit -m 'ci(aseguradoras): align real directories runtime gate'
          git push origin HEAD:ays/backend-tenant-lab-v99-20260703
