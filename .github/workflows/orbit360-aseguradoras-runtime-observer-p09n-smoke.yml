name: Orbit360 Aseguradoras runtime observer P09N

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'orbit360-platform/core/aseguradoras-runtime-observer-p09n.js'
      - 'orbit360-platform/core/aseguradoras-runtime-bootstrap-p09f.js'
      - 'orbit360-platform/core/aseguradoras-same-origin-document-bridge-p09l.js'
      - 'orbit360-platform/modules/aseguradoras-knowledge-panel-p09f.js'
      - 'orbit360-platform/modules/aseguradoras-batch-admin-form-p09j.js'
      - 'tools/orbit360-aseguradoras-same-origin-host-p09l.mjs'
      - 'tools/orbit360-test-aseguradoras-runtime-observer-p09n.mjs'
      - 'tools/orbit360-test-aseguradoras-runtime-report-p09n.mjs'
      - 'tools/orbit360-test-aseguradoras-runtime-bootstrap-p09f.mjs'
      - 'tools/orbit360-test-aseguradoras-same-origin-host-p09l.mjs'
      - '.github/workflows/orbit360-aseguradoras-runtime-observer-p09n-smoke.yml'

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ays/backend-tenant-lab-v99-20260703
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax
        run: |
          node --check orbit360-platform/core/aseguradoras-runtime-observer-p09n.js
          node --check orbit360-platform/core/aseguradoras-runtime-bootstrap-p09f.js
          node --check orbit360-platform/core/aseguradoras-same-origin-document-bridge-p09l.js
          node --check tools/orbit360-aseguradoras-same-origin-host-p09l.mjs
          node --check tools/orbit360-test-aseguradoras-runtime-observer-p09n.mjs
          node --check tools/orbit360-test-aseguradoras-runtime-report-p09n.mjs
      - name: Runtime observer smoke
        run: node tools/orbit360-test-aseguradoras-runtime-observer-p09n.mjs
      - name: Private runtime report smoke
        run: node tools/orbit360-test-aseguradoras-runtime-report-p09n.mjs
      - name: Bootstrap regression smoke
        run: node tools/orbit360-test-aseguradoras-runtime-bootstrap-p09f.mjs
      - name: Same-origin regression smoke
        run: node tools/orbit360-test-aseguradoras-same-origin-host-p09l.mjs
      - name: Visible copy regression smoke
        run: node tools/orbit360-test-aseguradoras-knowledge-panel-p09f.mjs
      - name: Observer safety guards
        run: |
          python - <<'PY'
          from pathlib import Path
          src=Path('orbit360-platform/core/aseguradoras-runtime-observer-p09n.js').read_text(encoding='utf-8')
          forbidden=['localStorage','sessionStorage','.insert(','.update(','.remove(','XMLHttpRequest','document.cookie','innerHTML =']
          for item in forbidden:
              assert item not in src, f'forbidden observer behavior: {item}'
          assert 'submitRuntimeReport' in src
          assert 'containsPii: false' in src
          assert 'containsLocalPaths: false' in src
          assert "gate('module_boundary', false" in src
          host=Path('tools/orbit360-aseguradoras-same-origin-host-p09l.mjs').read_text(encoding='utf-8')
          assert 'REQUIRED_CLAUDE_GATES' in host
          assert "ready_for_super_accumulated_claude_package" in host
          assert "runtime-report" in host
          PY
      - name: Index and protected files remain untouched
        run: |
          git diff --exit-code -- orbit360-platform/index.html
          git diff --exit-code -- orbit360-platform/data/store.js
          git diff --exit-code -- orbit360-platform/data/store-firestore-lab.local.js
          git diff --exit-code -- orbit360-platform/core/backend-lab-loader.js
          git diff --exit-code -- orbit360-platform/core/backend-lab-init.js
          git diff --exit-code -- orbit360-platform/core/backend-lab-security-guard.js
          git diff --exit-code -- orbit360-platform/core/auth.js
          git diff --exit-code -- orbit360-platform/firestore.rules
      - name: Protected backend contract
        run: node tools/orbit360-validar-backend-lab-contrato.mjs
