document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

===\n   Orbit 360 · Design Tokens\n   Marca de PRODUCTO Orbit 360 (white-label ready).\n   No usar branding A&S en el chrome.\n   Paleta: rojo #C5162E · grafito #1E2227 · gris/blanco.\n   Tipos: Manrope (display) · Source Sans 3 (texto) · JetBrains Mono.\n   ============================================================ */\n:root{\n  /* ---- Brand ---- */\n  --red:        #C5162E;\n  --red-600:    #a01828;\n  --red-700:    #7e1220;\n  --red-soft:   rgba(197,22,46,.10);\n  --red-line:   rgba(197,22,46,.24);\n\n  --graph:      #1E2227;   /* grafito — chrome oscuro */\n  --graph-700:  #171a1e;\n  --graph-900:  #0f1114;\n\n  /* Azul SOLO acento mínimo (estados informativos) */\n  --info:       #1f3a5f;\n\n  /* ---- Neutrals ---- */\n  --ink:        #1b1f24;   /* texto principal */\n  --ink-2:      #4a525c;   /* texto secundario */\n  --ink-3:      #767f8a;   /* texto terciario / labels */\n  --line:       #e4e2dc;   /* bordes */\n  --line-2:     #efede7;\n  --surface:    #f5f4f0;   /* fondo app */\n  --card:       #ffffff;\n  --card-2:     #faf9f6;\n\n  /* ---- Semantic ---- */\n  --ok:         #1f8a4c;\n  --ok-soft:    rgba(31,138,76,.12);\n  --warn:       #c9821b;\n  --warn-soft:  rgba(201,130,27,.14);\n  --danger:     #C5162E;\n  --danger-soft:rgba(197,22,46,.10);\n\n  /* ---- Type ---- */\n  --f-display: 'Manrope', system-ui, sans-serif;\n  --f-text:    'Source Sans 3', system-ui, sans-serif;\n  --f-mono:    'JetBrains Mono', ui-monospace, monospace;\n\n  /* ---- Radius ---- */\n  --r-xs: 4px;\n  --r-sm: 7px;\n  --r-md: 11px;\n  --r-lg: 16px;\n  --r-xl: 22px;\n\n  /* ---- Shadow ---- */\n  --sh-1: 0 1px 2px rgba(15,17,20,.06), 0 1px 1px rgba(15,17,20,.04);\n  --sh-2: 0 4px 14px -8px rgba(15,17,20,.30);\n  --sh-3: 0 18px 40px -22px rgba(15,17,20,.45);\n\n  /* ---- Spacing scale ---- */\n  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;\n  --s-5: 20px; --s-6: 24px; --s-7: 32px; --s-8: 44px;\n\n  /* ---- Layout ---- */\n  --topbar-h: 56px;\n  --sidebar-w: 248px;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Orbit 360 · Base / Shell / Shared components\n   ============================================================ */\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nbody{\n  font-family:var(--f-text);\n  color:var(--ink);\n  background:var(--graph-900);\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n}\na{color:inherit;text-decoration:none}\nbutton{font-family:inherit}\n::selection{background:var(--red-soft)}\n\n/* ---------- TOPBAR (cintilla blanca, para mostrar logo del cliente) ---------- */\n.topbar{\n  position:fixed;top:0;left:0;right:0;height:var(--topbar-h);z-index:60;\n  display:flex;align-items:center;gap:var(--s-4);\n  padding:0 var(--s-5);\n  background:#ffffff;\n  border-bottom:1px solid var(--line);\n  box-shadow:0 1px 0 rgba(15,17,20,.03);\n  color:var(--ink);\n}\n.tb-burger{\n  display:none;border:none;background:var(--surface);color:var(--ink);\n  width:36px;height:36px;border-radius:var(--r-sm);font-size:18px;cursor:pointer;\n}\n.brand{display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}\n/* slot de logo del cliente (white-label) */\n.tb-logo{display:flex;align-items:center;gap:10px;padding-right:14px;margin-right:4px;border-right:1px solid var(--line)}\n.tb-logo .slot{width:34px;height:34px;border-radius:8px;background:var(--surface);border:1px dashed var(--line);display:grid;place-items:center;font-size:15px;color:var(--ink-3);overflow:hidden}\n.tb-logo .slot img{width:100%;height:100%;object-fit:contain}\n.tb-logo .cn{font-family:var(--f-display);font-weight:800;font-size:13.5px;line-height:1.05;letter-spacing:-.01em}\n.tb-logo .cn small{display:block;font-family:var(--f-mono);font-size:8px;letter-spacing:.16em;color:var(--ink-3);text-transform:uppercase;font-weight:400;margin-top:2px}\n.brand-mark{\n  width:34px;height:34px;border-radius:50%;flex-shrink:0;position:relative;\n  background:radial-gradient(circle at 32% 30%,#e8364c 0%,var(--red) 42%,var(--red-700) 100%);\n  box-shadow:inset 0 1px 0 rgba(255,255,255,.35), 0 3px 10px -4px rgba(197,22,46,.5);\n}\n.brand-mark::after{\n  content:\"\";position:absolute;inset:5px;border-radius:50%;\n  border:1.5px solid rgba(255,255,255,.85);\n  border-right-color:transparent;border-bottom-color:transparent;\n  transform:rotate(35deg);\n}\n.brand-mark::before{\n  content:\"\";position:absolute;width:5px;height:5px;border-radius:50%;background:#fff;\n  top:4px;right:7px;box-shadow:0 0 6px 1px rgba(255,255,255,.7);\n}\n.brand-name{font-family:var(--f-display);font-weight:800;font-size:16px;letter-spacing:-.01em;line-height:1}\n.brand-name b{color:var(--red)}\n.brand-sub{font-family:var(--f-mono);font-size:8.5px;letter-spacing:.22em;color:var(--ink-3);text-transform:uppercase;margin-top:2px}\n.tb-spacer{flex:1}\n.tb-search{\n  display:flex;align-items:center;gap:8px;background:var(--surface);\n  border:1px solid var(--line);border-radius:999px;padding:7px 14px;\n  color:var(--ink-3);font-size:13px;min-width:240px;cursor:text;\n}\n.tb-search input{background:none;border:none;outline:none;color:var(--ink);font-family:inherit;font-size:13px;width:100%}\n.tb-search input::placeholder{color:var(--ink-3)}\n.tb-pill{\n  font-family:var(--f-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;\n  border:1px solid var(--red-line);color:var(--red);background:var(--red-soft);\n  padding:4px 9px;border-radius:999px;white-space:nowrap;\n}\n.tb-ico{\n  width:36px;height:36px;border-radius:50%;display:grid;place-items:center;\n  background:var(--surface);font-size:15px;cursor:pointer;position:relative;border:1px solid var(--line);\n}\n.tb-ico:hover{background:var(--card-2);border-color:var(--ink-3)}\n.tb-ico .dot{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid #fff}\n.tb-user{display:flex;align-items:center;gap:9px;cursor:pointer;padding-left:6px}\n.tb-user .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-700));color:#fff;display:grid;place-items:center;font-family:var(--f-display);font-weight:700;font-size:13px;border:1.5px solid rgba(0,0,0,.06)}\n.tb-user .who{line-height:1.15}\n.tb-user .who b{font-size:13px;font-weight:700}\n.tb-user .who span{font-size:11px;color:var(--ink-3)}\n\n/* ---------- LAYOUT ---------- */\n#shell{display:flex;min-height:100vh;padding-top:var(--topbar-h)}\n#sidebar{\n  width:var(--sidebar-w);flex-shrink:0;position:fixed;top:var(--topbar-h);bottom:0;left:0;\n  background:linear-gradient(180deg,var(--graph) 0%,var(--graph-900) 100%);\n  overflow-y:auto;z-index:55;border-right:1px solid rgba(255,255,255,.05);\n  transition:transform .24s ease;\n}\n#sidebar::-webkit-scrollbar{width:4px}\n#sidebar::-webkit-scrollbar-thumb{background:rgba(197,22,46,.3);border-radius:4px}\n#main{margin-left:var(--sidebar-w);flex:1;min-width:0;background:var(--surface);min-height:calc(100vh - var(--topbar-h))}\n\n/* Sidebar CLARO (personalizable) — texto oscuro sobre fondo claro */\nbody.sb-light #sidebar{background:linear-gradient(180deg,#ffffff 0%,#f3f1ec 100%);border-right:1px solid var(--line)}\nbody.sb-light .nav-home{border-bottom:1px solid var(--line)}\nbody.sb-light .nav-toggle:hover{background:rgba(0,0,0,.03)}\nbody.sb-light .nav-label{color:var(--ink-2)}\nbody.sb-light .nav-arrow{color:var(--ink-3)}\nbody.sb-light .nav-link{color:var(--ink-2)}\nbody.sb-light .nav-link:hover{background:rgba(0,0,0,.04);color:var(--ink)}\nbody.sb-light .nav-home .nav-link{color:var(--ink)}\nbody.sb-light .nav-link.active{background:var(--red-soft);color:var(--red);border-left-color:var(--red)}\nbody.sb-light .nav-divider{border-top-color:var(--line)}\nbody.sb-light .nav-foot{color:var(--ink-3)}\nbody.sb-light .nav-foot .pwa{color:var(--ink-2)}\nbody.sb-light .nav-foot .pwa b,body.sb-light .nav-foot b{color:var(--ink)}\nbody.sb-light #sidebar::-webkit-scrollbar-thumb{background:var(--red-line)}\n\n/* Sidebar GRIS intermedio — fondo gris medio-claro, texto NEGRO */\nbody.sb-gray #sidebar{background:linear-gradient(180deg,#d8d5ce 0%,#c7c4bc 100%);border-right:1px solid rgba(0,0,0,.12)}\nbody.sb-gray .nav-home{border-bottom:1px solid rgba(0,0,0,.1)}\nbody.sb-gray .nav-toggle:hover{background:rgba(0,0,0,.05)}\nbody.sb-gray .nav-label{color:rgba(30,34,39,.62)}\nbody.sb-gray .nav-arrow{color:rgba(30,34,39,.5)}\nbody.sb-gray .nav-link{color:#262b30}\nbody.sb-gray .nav-link:hover{background:rgba(0,0,0,.06);color:#000}\nbody.sb-gray .nav-home .nav-link{color:#1E2227}\nbody.sb-gray .nav-link.active{background:var(--red);color:#fff;border-left-color:#1E2227}\nbody.sb-gray .nav-divider{border-top-color:rgba(0,0,0,.12)}\nbody.sb-gray .nav-foot{color:rgba(30,34,39,.6)}\nbody.sb-gray .nav-foot .pwa{color:rgba(30,34,39,.75)}\nbody.sb-gray .nav-foot .pwa b,body.sb-gray .nav-foot b{color:#1E2227}\nbody.sb-gray #sidebar::-webkit-scrollbar-thumb{background:rgba(0,0,0,.22)}\n\n/* Sidebar GRAFITO (gris oscuro) — texto claro */\nbody.sb-graphite #sidebar{background:linear-gradient(180deg,#3a4047 0%,#2b3036 100%);border-right:1px solid rgba(255,255,255,.08)}\nbody.sb-graphite .nav-home{border-bottom:1px solid rgba(255,255,255,.08)}\nbody.sb-graphite .nav-toggle:hover{background:rgba(255,255,255,.06)}\nbody.sb-graphite .nav-label{color:rgba(255,255,255,.6)}\nbody.sb-graphite .nav-arrow{color:rgba(255,255,255,.45)}\nbody.sb-graphite .nav-link{color:rgba(255,255,255,.82)}\nbody.sb-graphite .nav-link:hover{background:rgba(255,255,255,.08);color:#fff}\nbody.sb-graphite .nav-home .nav-link{color:#fff}\nbody.sb-graphite .nav-link.active{background:var(--red);color:#fff;border-left-color:#fff}\nbody.sb-graphite .nav-divider{border-top-color:rgba(255,255,255,.1)}\nbody.sb-graphite .nav-foot{color:rgba(255,255,255,.5)}\nbody.sb-graphite .nav-foot .pwa{color:rgba(255,255,255,.7)}\nbody.sb-graphite .nav-foot .pwa b,body.sb-graphite .nav-foot b{color:#fff}\nbody.sb-graphite #sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2)}\n\n/* ---------- SIDEBAR NAV ---------- */\n.nav-home{padding:12px 0 8px;border-bottom:1px solid rgba(255,255,255,.06)}\n.nav-group{padding:6px 0 2px}\n/* Sidebar oculto (toggle del topbar) */\nbody.sb-hidden #sidebar{transform:translateX(-100%)}\nbody.sb-hidden #main{margin-left:0}\n.tb-burger{display:inline-grid;place-items:center;width:30px;height:30px;border:none;background:none;font-size:17px;cursor:pointer;color:inherit;border-radius:6px;line-height:1;flex-shrink:0}\n.tb-burger:hover{background:rgba(0,0,0,.06)}\n.nav-toggle{\n  display:flex;align-items:center;justify-content:space-between;\n  padding:11px 18px 5px;cursor:pointer;user-select:none;\n}\n.nav-toggle:hover{background:rgba(255,255,255,.04)}\n.nav-label{display:flex;align-items:center;gap:8px;font-family:var(--f-display);font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.82)}\n.nav-label::before{content:\"\";width:4px;height:13px;border-radius:99px;background:var(--red);flex-shrink:0}\n.nav-arrow{font-size:9px;color:rgba(255,255,255,.55);transition:transform .2s}\n.nav-arrow.collapsed{transform:rotate(-90deg)}\n.nav-links{overflow:hidden;transition:max-height .25s ease;max-height:600px}\n.nav-links.collapsed{max-height:0}\n.nav-link{\n  display:flex;align-items:center;gap:11px;\n  padding:9px 18px;font-size:13.5px;color:rgba(255,255,255,.82);\n  cursor:pointer;border-left:3px solid transparent;transition:.14s;\n}\n.nav-link:hover{background:rgba(255,255,255,.06);color:#fff}\n.nav-link.active{\n  background:linear-gradient(90deg,rgba(197,22,46,.34) 0%,rgba(197,22,46,.03) 100%);\n  color:#fff;font-weight:700;border-left-color:var(--red);\n}\n.nav-ico{width:20px;text-align:center;font-size:15px;flex-shrink:0;opacity:.85}\n.nav-txt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.nav-badge{\n  font-family:var(--f-mono);font-size:8px;font-weight:600;letter-spacing:.08em;\n  padding:2px 6px;border-radius:999px;flex-shrink:0;\n}\n.nav-badge.core{background:var(--red);color:#fff}\n.nav-badge.beta{background:var(--info);color:#fff}\n.nav-badge.road{border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.6)}\n.nav-home .nav-link{font-weight:700;color:#fff}\n.nav-divider{border:none;border-top:1px solid rgba(255,255,255,.06);margin:6px 18px}\n.nav-foot{padding:14px 18px 22px;color:rgba(255,255,255,.32);font-size:11px;line-height:1.5}\n.nav-foot .pwa{display:flex;align-items:center;gap:8px;margin-top:10px;color:rgba(255,255,255,.55);font-size:11.5px}\n.nav-foot .pwa b{color:#fff;font-weight:700}\n\n/* ---------- PAGE ---------- */\n.page{padding:26px 30px 60px;max-width:1320px;margin:0 auto;animation:fade .28s ease}\n@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}\n.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}\n.crumb{font-size:12px;color:var(--ink-3);font-family:var(--f-mono);letter-spacing:.04em;margin-bottom:7px}\n.crumb b{color:var(--red)}\n.page-title{font-family:var(--f-display);font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.05;display:flex;align-items:center;gap:11px}\n.page-title::before{content:\"\";width:5px;height:26px;border-radius:99px;background:linear-gradient(180deg,var(--red),var(--red-700));flex-shrink:0}\n.page-sub{color:var(--ink-2);font-size:14.5px;margin-top:5px;max-width:640px}\n\n/* ---------- BADGES / CHIPS ---------- */\n.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;line-height:1.3;white-space:nowrap}\n.badge.ok{background:var(--ok-soft);color:var(--ok)}\n.badge.warn{background:var(--warn-soft);color:var(--warn)}\n.badge.danger{background:var(--danger-soft);color:var(--danger)}\n.badge.neutral{background:#eceae4;color:var(--ink-2)}\n.badge.info{background:rgba(31,58,95,.1);color:var(--info)}\n.dot-s{width:7px;height:7px;border-radius:50%;display:inline-block}\n\n/* ---------- BUTTONS ---------- */\n.btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--f-display);font-weight:700;font-size:13px;border-radius:var(--r-sm);padding:9px 15px;cursor:pointer;border:1px solid transparent;transition:.15s;white-space:nowrap}\n.btn:active{transform:translateY(1px)}\n.btn.primary{background:var(--red);color:#fff;box-shadow:0 6px 16px -8px rgba(197,22,46,.7)}\n.btn.primary:hover{background:var(--red-600)}\n.btn.ghost{background:var(--card);color:var(--ink);border-color:var(--line)}\n.btn.ghost:hover{border-color:var(--ink-3);background:var(--card-2)}\n.btn.dark{background:var(--graph);color:#fff}\n.btn.sm{padding:6px 11px;font-size:12px}\n\n/* ---------- CARD / SURFACES ---------- */\n.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--sh-1)}\n.card.pad{padding:18px}\n.muted{color:var(--ink-3)}\n.mono{font-family:var(--f-mono)}\n.hr{border:none;border-top:1px solid var(--line);margin:16px 0}\n\n/* ---------- TABLE ---------- */\n.tbl{width:100%;border-collapse:collapse;font-size:13.5px}\n.tbl th{\n  text-align:left;font-family:var(--f-display);font-size:11px;font-weight:800;\n  letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);\n  padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;\n}\n.tbl td{padding:11px 12px;border-bottom:1px solid var(--line-2);vertical-align:middle}\n.tbl tbody tr{transition:.12s}\n.tbl tbody tr:hover{background:var(--card-2)}\n.tbl tbody tr.clickable{cursor:pointer}\n.tbl .num{text-align:right;font-family:var(--f-mono);font-variant-numeric:tabular-nums}\n\n/* ---------- AVATAR ---------- */\n.av{display:grid;place-items:center;border-radius:50%;font-family:var(--f-display);font-weight:700;color:#fff;flex-shrink:0;background:linear-gradient(135deg,#5a6472,#363c45)}\n.av.sm{width:28px;height:28px;font-size:11px}\n.av.md{width:38px;height:38px;font-size:13px}\n.av.lg{width:58px;height:58px;font-size:20px}\n\n/* ---------- KPI ---------- */\n.kpi-row{display:grid;gap:14px;grid-template-columns:repeat(4,1fr)}\n.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:15px 16px;box-shadow:var(--sh-1);position:relative;overflow:hidden}\n.kpi .k-label{font-size:11.5px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}\n.kpi .k-val{font-family:var(--f-display);font-weight:800;font-size:25px;letter-spacing:-.02em;margin-top:6px;line-height:1}\n.kpi .k-val small{font-size:14px;font-weight:700;color:var(--ink-3)}\n.kpi .k-foot{font-size:12px;margin-top:7px;color:var(--ink-2);display:flex;align-items:center;gap:6px}\n.kpi .k-accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}\n.up{color:var(--ok)}.down{color:var(--danger)}\n\n/* ---------- EMPTY / MODULE STATE ---------- */\n.modstate{max-width:720px;margin:8px auto;text-align:center;padding:40px 28px}\n.modstate .ms-ico{font-size:46px;margin-bottom:10px}\n.modstate h2{font-family:var(--f-display);font-size:25px;font-weight:800;letter-spacing:-.02em}\n.modstate p{color:var(--ink-2);font-size:15px;margin:10px auto 0;max-width:560px;line-height:1.6}\n.modstate .scope{text-align:left;margin:22px auto 0;max-width:560px;display:grid;gap:9px}\n.modstate .scope li{display:flex;gap:10px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;font-size:13.5px;list-style:none}\n.modstate .scope li::before{content:\"▹\";color:var(--red);font-weight:700}\n\n/* ---------- FORM CONTROLS ---------- */\n.o-sel{\n  font-family:var(--f-text);font-size:13px;color:var(--ink);\n  background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);\n  padding:8px 11px;outline:none;transition:.14s;\n}\n.o-sel:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft)}\nselect.o-sel{cursor:pointer;appearance:none;background-image:url(\"data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23767f8a' fill='none' stroke-width='1.6'/%3E%3C/svg%3E\");background-repeat:no-repeat;background-position:right 11px center;padding-right:28px}\n\n/* ---------- PROGRESS ---------- */\n.bar{height:8px;border-radius:99px;background:#e9e7e1;overflow:hidden}\n.bar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red-600),var(--red))}\n\n/* ---------- TABS ---------- */\n.tabs{display:flex;gap:4px;background:#ecebe5;border:1px solid var(--line);border-radius:999px;padding:4px;overflow-x:auto;scrollbar-width:none}\n.tabs::-webkit-scrollbar{display:none}\n.tab{font-family:var(--f-display);font-weight:700;font-size:13px;color:var(--ink-2);padding:8px 15px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.14s}\n.tab:hover{color:var(--ink)}\n.tab.active{background:var(--card);color:var(--red);box-shadow:var(--sh-1)}\n\n/* ---------- DRAWER ---------- */\n.drawer-back{position:fixed;inset:0;background:rgba(15,17,20,.5);z-index:90;opacity:0;pointer-events:none;transition:.2s}\n.drawer-back.open{opacity:1;pointer-events:auto}\n.drawer{position:fixed;top:0;right:0;bottom:0;width:min(560px,94vw);background:var(--surface);z-index:91;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:var(--sh-3);overflow-y:auto}\n.drawer.open{transform:none}\n\n/* ---------- RESPONSIVE ---------- */\n.sb-overlay{display:none}\n@media(max-width:980px){\n  #sidebar{transform:translateX(-100%);box-shadow:6px 0 30px -10px rgba(0,0,0,.5)}\n  #sidebar.open{transform:none}\n  #main{margin-left:0}\n  .tb-burger{display:grid;place-items:center}\n  .tb-search{display:none}\n  .sb-overlay{position:fixed;inset:0;top:var(--topbar-h);background:rgba(0,0,0,.5);z-index:54}\n  .sb-overlay.show{display:block}\n  .kpi-row{grid-template-columns:repeat(2,1fr)}\n  .page{padding:20px 16px 50px}\n}\n@media(
