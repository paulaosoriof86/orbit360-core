<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="orbit-preview-version" content="20260714-3">
  <title>Orbit 360 · A&S</title>
  <style>
    body{font-family:Manrope,Arial,sans-serif;background:#1E2227;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0}
    div{text-align:center;padding:24px}span{display:inline-block;width:32px;height:32px;border:4px solid rgba(255,255,255,.25);border-top-color:#C5162E;border-radius:50%;animation:s 1s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div><span></span><p>Abriendo Orbit 360…</p></div>
<script>
  (async function(){
    try {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(function(r){ return r.unregister(); }));
      }
      if (window.caches && caches.keys) {
        var keys = await caches.keys();
        await Promise.all(keys.map(function(k){ return caches.delete(k); }));
      }
    } catch (e) {}
    location.replace('index.html?orbitBackend=firestore-lab&tenant=alianzas-soluciones&runtime=20260714-3#/importar');
  })();
</script>
</body>
</html>
