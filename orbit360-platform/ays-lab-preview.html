<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="orbit-preview-version" content="20260715-8">
  <title>Orbit 360 · A&S</title>
  <style>
    body{font-family:Manrope,Arial,sans-serif;background:#1E2227;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0}
    div{text-align:center;padding:24px}span{display:inline-block;width:32px;height:32px;border:4px solid rgba(255,255,255,.25);border-top-color:#C5162E;border-radius:50%;animation:s 1s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div><span></span><p>Preparando Orbit 360…</p></div>
<script>
  (async function(){
    try {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(function(r){ return r.unregister(); }));
      }
      if (window.caches && caches.keys) {
        var keys = await caches.keys();
        await Promise.all(keys.map(function(k){ return caches.delete(k); }));
      }
      var assets = [
        'core/backend-lab-loader.js?v=20260715-8',
        'core/backend-lab-init.js?v=20260715-8',
        'data/store-firestore-lab.local.js?v=20260715-8',
        'core/auth.js?v=20260715-8',
        'core/importa-dryrun-p0.js?v=20260715-8',
        'core/importa-write-p0.js?v=20260715-8',
        'modules/equipo.js?v=20260715-8',
        'core/backend-lab-auth-guard.js?v=20260715-8',
        'core/backend-lab-import-readiness-guard.js?v=20260715-8',
        'core/backend-lab-advisor-write-bridge.js?v=20260715-8',
        'data/import-initial-profiles.js?v=20260715-8',
        'data/tenant-config/alianzas-soluciones.asesores.json?v=20260715-8',
        'modules/importar-initial-tenant-lab.js?v=20260715-8'
      ];
      await Promise.all(assets.map(function(src){
        return fetch(src, { cache: 'reload', credentials: 'same-origin' }).catch(function(){ return null; });
      }));
    } catch (e) {}
    location.replace('index.html?orbitBackend=firestore-lab&tenant=alianzas-soluciones&runtime=20260715-8#/importar');
  })();
</script>
</body>
</html>
