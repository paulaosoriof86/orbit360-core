<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="orbit-preview-version" content="20260723-10">
  <meta name="orbit-critical-release" content="block1-critical-runtime-20260723-10">
  <title>Orbit 360 · A&S</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}body{font-family:Manrope,Arial,sans-serif;background:#1E2227;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0}main{text-align:center;padding:24px;max-width:520px}.spinner{display:inline-block;width:32px;height:32px;border:4px solid rgba(255,255,255,.25);border-top-color:#C5162E;border-radius:50%;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}p{line-height:1.45;color:#e9e9e9}.error{display:none;background:#171a1e;border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:18px;margin-top:16px}.error strong{display:block;color:#fff;margin-bottom:6px}.muted{font-size:13px;color:#bbb}
  </style>
</head>
<body>
<main>
  <span class="spinner" aria-hidden="true"></span>
  <p id="status">Preparando Orbit 360…</p>
  <div class="error" id="error" role="status" aria-live="polite"><strong>No se cargó la interfaz completa.</strong><span id="error-detail">Reintentando automáticamente…</span><div class="muted">No se abrirá la plataforma sin sus estilos base.</div></div>
</main>
<script>
  (function(){
    'use strict';
    var PREVIEW_BOOTSTRAP_BUDGET_MS = 20000;
    var PREVIEW_OPERATION_TIMEOUT_MS = 5000;
    var PREVIEW_WORKER_READY_TIMEOUT_MS = 9000;
    var RETRY_DELAY_MS = 4000;
    var MAX_STYLE_ATTEMPTS = 3;
    var SW_BUILD = '20260723-10';
    var CRITICAL_RELEASE = 'block1-critical-runtime-20260723-10';
    var target = 'index.html?orbitBackend=firestore-lab&tenant=alianzas-soluciones&runtime=20260723-10&criticalRelease=' + encodeURIComponent(CRITICAL_RELEASE) + '#/aseguradoras';
    var ESSENTIAL_STYLES = [
      'styles/tokens.css?v=' + SW_BUILD,
      'styles/base.css?v=' + SW_BUILD,
      'styles/infra.css?v=' + SW_BUILD,
      'styles/v1197-empalme.css?v=' + SW_BUILD,
      'styles/client-insurer-visual-contract-v20260720.css?v=' + SW_BUILD,
      'styles/client-insurer-edit-mode-v20260722.css?v=' + SW_BUILD
    ];
    var WARM_ASSETS = ESSENTIAL_STYLES.concat([
      'core/backend-lab-loader.js?v=20260716-2',
      'core/backend-lab-init.js?v=20260717-1',
      'data/store-firestore-lab.local.js?v=20260716-2',
      'core/router-tenant-config-bootstrap.js?v=20260723-10',
      'core/client-insurer-visual-stability-barrier-v20260721.js?v=20260723-10',
      'core/client-insurer-visual-contract-v20260720.js?v=20260723-10',
      'core/client-insurer-edit-owner-v20260722.js?v=20260723-10',
      'core/client-insurer-operational-directory-owner-v20260722.js?v=20260723-10',
      'core/pwa.js?v=20260723-10',
      'sw.js?v=' + SW_BUILD,
      'core/router.js?v1291',
      'core/auth.js?v=20260717-auth-timeout1',
      'modules/cliente360.js?v1360',
      'modules/aseguradoras.js?v=20260723-10'
    ]);
    var state = window.__ORBIT_PREVIEW_BOOTSTRAP__ = {
      version: '20260723.10-css-delivery-root',
      criticalRelease: CRITICAL_RELEASE,
      essentialStyles: ESSENTIAL_STYLES.slice(),
      status: 'preparing',
      cssReady: false,
      workerBuildReady: false,
      redirectBlockedWithoutCss: true
    };
    var statusNode = document.getElementById('status');
    var errorNode = document.getElementById('error');
    var errorDetail = document.getElementById('error-detail');

    function timeout(ms, value) { return new Promise(function(resolve){ setTimeout(function(){ resolve(value); }, ms); }); }
    function bounded(promise, ms, fallback) { return Promise.race([Promise.resolve(promise).catch(function(){ return fallback; }), timeout(ms, fallback)]); }
    function sleep(ms) { return timeout(ms, true); }
    function isCss(asset) { return /\.css(?:\?|$)/i.test(asset); }
    async function fetchAsset(asset) {
      var response = await fetch(asset, { cache:'reload', credentials:'same-origin', headers:{'Cache-Control':'no-cache'} });
      if (!response || !response.ok) throw new Error('HTTP_' + (response && response.status || 0) + ':' + asset);
      if (isCss(asset)) {
        var type = String(response.headers.get('content-type') || '').toLowerCase();
        if (type.indexOf('text/css') < 0) throw new Error('CSS_MIME_INVALID:' + asset + ':' + type);
        var text = await response.clone().text();
        if (text.trim().length < 32) throw new Error('CSS_EMPTY:' + asset);
      }
      return true;
    }
    async function verifyEssentialStyles() {
      var failures = [];
      for (var i = 0; i < ESSENTIAL_STYLES.length; i += 1) {
        try { await fetchAsset(ESSENTIAL_STYLES[i]); }
        catch (error) { failures.push(String(error && error.message || error)); }
      }
      if (failures.length) throw new Error(failures.join('|'));
      return true;
    }
    function controllerHasExpectedBuild() {
      var controller = navigator.serviceWorker && navigator.serviceWorker.controller;
      return Boolean(controller && String(controller.scriptURL || '').indexOf('v=' + SW_BUILD) >= 0);
    }
    async function prepareWorker() {
      if (!('serviceWorker' in navigator)) throw new Error('SERVICE_WORKER_UNSUPPORTED');
      var regs = await bounded(navigator.serviceWorker.getRegistrations(), PREVIEW_OPERATION_TIMEOUT_MS, []);
      await bounded(Promise.all((regs || []).map(function(reg){ return Promise.resolve(reg.unregister()).catch(function(){ return false; }); })), PREVIEW_OPERATION_TIMEOUT_MS, []);
      if (window.caches && caches.keys) {
        var keys = await bounded(caches.keys(), PREVIEW_OPERATION_TIMEOUT_MS, []);
        await bounded(Promise.all((keys || []).map(function(key){ return Promise.resolve(caches.delete(key)).catch(function(){ return false; }); })), PREVIEW_OPERATION_TIMEOUT_MS, []);
      }
      await bounded(navigator.serviceWorker.register('sw.js?v=' + SW_BUILD, { scope:'./' }), PREVIEW_OPERATION_TIMEOUT_MS, null);
      await bounded(navigator.serviceWorker.ready, PREVIEW_WORKER_READY_TIMEOUT_MS, null);
      if (!controllerHasExpectedBuild()) {
        await bounded(new Promise(function(resolve){ navigator.serviceWorker.addEventListener('controllerchange', resolve, { once:true }); }), 3500, null);
      }
      if (!controllerHasExpectedBuild()) throw new Error('SERVICE_WORKER_BUILD_NOT_CONTROLLING:' + SW_BUILD);
      state.workerBuildReady = true;
    }
    async function warmAssets() {
      await Promise.all(WARM_ASSETS.map(function(asset){ return fetchAsset(asset).catch(function(error){ if (isCss(asset)) throw error; return false; }); }));
    }
    async function prepare() {
      await prepareWorker();
      var lastError = null;
      for (var attempt = 1; attempt <= MAX_STYLE_ATTEMPTS; attempt += 1) {
        try {
          statusNode.textContent = 'Verificando la interfaz…';
          await warmAssets();
          await verifyEssentialStyles();
          state.cssReady = true;
          state.status = 'prepared';
          return true;
        } catch (error) {
          lastError = error;
          state.status = 'css-retry-' + attempt;
          if (attempt < MAX_STYLE_ATTEMPTS) await sleep(RETRY_DELAY_MS);
        }
      }
      throw lastError || new Error('CSS_NOT_READY');
    }
    function showFailure(error) {
      state.status = 'css-blocked';
      state.cssReady = false;
      errorNode.style.display = 'block';
      statusNode.textContent = 'Esperando los estilos de Orbit 360…';
      errorDetail.textContent = 'Reintentando automáticamente en ' + Math.round(RETRY_DELAY_MS / 1000) + ' segundos.';
      try { console.error('ORBIT360_CSS_DELIVERY_BLOCKED', error); } catch (ignore) {}
      setTimeout(function(){ location.reload(); }, RETRY_DELAY_MS);
    }
    Promise.race([
      prepare(),
      timeout(PREVIEW_BOOTSTRAP_BUDGET_MS, false)
    ]).then(function(ready){
      if (ready === true && state.cssReady === true && state.workerBuildReady === true) {
        state.redirectScheduled = true;
        location.replace(target);
        return;
      }
      showFailure(new Error('CSS_BOOTSTRAP_BUDGET_EXHAUSTED'));
    }).catch(showFailure);
  })();
</script>
</body>
</html>
