<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#0d2740"></rect><circle cx="50" cy="50" r="20" fill="none" stroke="#4ab4e6" stroke-width="5" stroke-dasharray="80 30"></circle><circle cx="66" cy="36" r="4.5" fill="#fff"></circle></svg>

<!-- LOGIN -->
<div id="login"></div>

<!-- APP SHELL -->
<div id="app">
  <aside class="rail" id="rail"></aside>
  <div class="scrim" onclick="document.body.classList.remove('nav-open')"></div>
  <div class="canvas">
    <div class="topbar">
      <button class="btn btn-ghost btn-icon menu-btn" onclick="document.body.classList.toggle('nav-open')">☰</button>
      <div class="tb-crumb" id="crumb"></div>
      <div class="spacer"></div>
      <div class="tb-client-logo" id="tbClientLogo" style="display:none"></div>
      <button class="tb-bell" id="tbSupport" title="Soporte" aria-label="Soporte">
        <span style="font-size:16px">🆘</span>
      </button>
      <button class="tb-bell" id="tbMail" title="Correo" aria-label="Correo">
        <span style="font-size:16px">✉️</span>
        <span class="tb-bell-badge" id="tbMailBadge" style="display:none">0</span>
      </button>
      <button class="tb-bell" id="tbBell" title="Novedades" aria-label="Novedades">
        <span style="font-size:17px">🔔</span>
        <span class="tb-bell-badge" id="tbBellBadge" style="display:none">0</span>
      </button>
      <div class="tb-demo"><span class="d"></span> Demo comercial</div>
    </div>
    <main class="content"><div id="view"></div></main>
  </div>
</div>
